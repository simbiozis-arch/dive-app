* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body,#root { width:100%; height:100%; overflow:hidden; font-family:'DM Sans',sans-serif; }
:root {
  --bg-1:#070c15; --bg-2:#0c1322; --bg-3:#111b2e; --bg-4:#182640;
  --bg-start:#0c1322; --bg-mid:#0a1628; --bg-end:#070c15;
  --accent:#5eaaa8; --accent-rgb:94,170,168; --accent-glow:rgba(94,170,168,0.12); --accent-text:#7ec8c8;
  --glow:rgba(94,170,168,0.12);
  --card:rgba(255,255,255,0.025); --text:rgba(220,225,235,0.92);
  --text-2:rgba(220,225,235,0.55); --text-3:rgba(220,225,235,0.30);
}

@keyframes fade-in { from{opacity:0} to{opacity:1} }
@keyframes deblur { from{opacity:0;filter:blur(3px)} to{opacity:1;filter:blur(0)} }
@keyframes rays-appear { from{opacity:0} to{opacity:1} }
@keyframes count-up { from{opacity:0} to{opacity:1} }
@keyframes drift { 0%{transform:translateY(100vh);opacity:0} 5%{opacity:var(--peak-opacity)} 95%{opacity:var(--peak-opacity)} 100%{transform:translateY(-5vh);opacity:0} }
@keyframes drift-h { 0%{transform:translateX(-10vw);opacity:0} 5%{opacity:var(--peak-opacity)} 95%{opacity:var(--peak-opacity)} 100%{transform:translateX(110vw);opacity:0} }
@keyframes twinkle { 0%,100%{opacity:var(--base-opacity)} 50%{opacity:0.05} }
@keyframes bokeh-drift { 0%{transform:translate(0,0)} 25%{transform:translate(10px,-15px)} 50%{transform:translate(-8px,12px)} 75%{transform:translate(15px,5px)} 100%{transform:translate(0,0)} }
@keyframes caustic-drift { 0%{transform:translateX(0)} 100%{transform:translateX(30px)} }
@keyframes causticsDrift { 0%{transform:translateX(-3%) skewX(-1deg)} 100%{transform:translateX(3%) skewX(1deg)} }
.ocean-caustics {
  position:fixed; top:0; left:0; right:0; height:35vh; pointer-events:none; z-index:1; opacity:0.4;
  mix-blend-mode:soft-light;
  background:
    repeating-linear-gradient(-45deg, transparent 0px, transparent 8px, rgba(94,170,168,0.015) 8px, rgba(94,170,168,0.015) 9px),
    repeating-linear-gradient(30deg, transparent 0px, transparent 12px, rgba(94,170,168,0.012) 12px, rgba(94,170,168,0.012) 13px);
  animation: causticsDrift 12s ease-in-out infinite alternate;
}
@keyframes tentacle-sway { 0% { transform: rotate(-3deg) scaleY(1); } 100% { transform: rotate(3deg) scaleY(1.05); } }
@keyframes light-emerge { 0% { width:4px; height:4px; opacity:0; } 100% { width:min(80vw,320px); height:min(80vw,320px); opacity:1; } }
@keyframes text-emerge { from { color:rgba(220,225,235,0); } to { color:rgba(220,225,235,0.6); } }
@keyframes bg-emerge { from { background:#000; } to { background:linear-gradient(180deg, #0e3d5c 0%, #082a42 33%, #041520 66%, #020a10 100%); } }
@keyframes hold-counter-pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.03); } }
@keyframes slowRotate { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

.font-display { font-family:'DM Sans',sans-serif; }
.font-mono { font-family:'JetBrains Mono',monospace !important; font-variant-numeric:tabular-nums !important; }
.font-body { font-family:inherit; }

.screen-transition { animation: fade-in 400ms ease-out; }
.text-deblur { animation: deblur 600ms ease-out forwards; }

.glass {
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 14px;
  padding: 18px 20px;
  transition: transform 120ms ease, background 120ms ease;
}
.glass:active { transform: scale(0.985); background: rgba(255,255,255,0.04); box-shadow: inset 0 0 30px rgba(94,170,168,0.04); }

.no-scrollbar::-webkit-scrollbar { display:none; }
.no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }

.screen-glow {
  position:fixed; top:-20%; left:-10%; width:60%; height:50%;
  background: radial-gradient(ellipse, rgba(var(--accent-rgb),0.04) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}

/* Session text segments: circle hides, text takes center */
.session-text-segment {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: calc(100% - 48px);
  max-width: 320px;
  text-align: center;
  z-index: 10;
  padding: 0 24px;
}
.session-text-content {
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  font-size: 18px;
  line-height: 1.8;
  color: rgba(220, 225, 235, 0.88);
  letter-spacing: 0.01em;
}
.circle-hidden { opacity: 0; transform: scale(0.7); transition: opacity 500ms ease, transform 500ms ease; }
.circle-visible { opacity: 1; transform: scale(1); transition: opacity 500ms ease, transform 500ms ease; transition-delay: 300ms; }
.text-fade-out { opacity: 0; filter: blur(3px); transition: opacity 400ms ease, filter 400ms ease; }
.session-text-container {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 20; pointer-events: none;
}
.bodyscan-crossfade {
  transition: opacity 400ms ease;
}
.dima-video {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  width:calc(100% - 48px); max-width:340px; aspect-ratio:9/16;
  border-radius:20px; overflow:hidden; z-index:30;
  box-shadow:0 0 60px rgba(0,0,0,0.5);
}
.dima-video video { width:100%; height:100%; object-fit:cover; }
.font-mono, .phase-timer, .hold-timer, .completion-stat-number,
.depth-number, .streak-number, .duration-badge, .mood-circle,
[class*="timer"], [class*="countdown"], [class*="depth-num"],
[class*="stat-num"], [class*="streak"], [class*="count-num"] {
  font-family: 'JetBrains Mono', 'SF Mono', monospace !important;
  font-variant-numeric: tabular-nums !important;
}
</style>

function getSessionInsight(stats, completionData, lang) {
  const now = new Date();
  const hour = now.getHours();
  const sessions = stats.totalSessions || 0;
  const streak = stats.streak || 0;
  const totalMinutes = stats.totalMinutes || 0;
  const totalDepth = stats.totalDepth || 0;
  const longestStreak = stats.longestStreak || 0;
  const techCount = (stats.techniquesUsed||[]).length;
  const weekNum = Math.ceil(streak / 7);
  const duration = completionData?.duration || 0;
  const minutes = Math.round(duration / 60);
  const depth = completionData?.depth || 0;
  const cycles = Math.round(duration / 10);
  const techniques = completionData?.techniques || [];

  const ctx = {
    duration, techniques, totalSessions: sessions, streak, totalMinutes,
    totalDepth, longestStreak, techniquesUsed: stats.techniquesUsed || [],
    techCount, sessions, weekNum, depth, minutes, cycles,
  };

  const shownIds = stats.shownInsightIds || [];
  const eligible = SESSION_INSIGHTS.filter(ins => {
    if (shownIds.includes(ins.id)) return false;
    try { return ins.condition(ctx); } catch { return false; }
  });

  if (eligible.length === 0) return null;
  const pick = eligible[Math.floor(Math.random() * eligible.length)];

  let text = pick.text;

  // Replace placeholders
  text = text.replace(/\{cycles\}/g, cycles)
    .replace(/\{depth\}/g, depth)
    .replace(/\{totalDepth\}/g, totalDepth)
    .replace(/\{streak\}/g, streak)
    .replace(/\{minutes\}/g, minutes)
    .replace(/\{totalMinutes\}/g, totalMinutes)
    .replace(/\{sessions\}/g, sessions)
    .replace(/\{longestStreak\}/g, longestStreak)
    .replace(/\{techCount\}/g, techCount)
    .replace(/\{weekNum\}/g, weekNum);

  return { id: pick.id, text };
}

// ===== SMART DAILY RECOMMENDATION =====
function getDailyRecommendation(stats, t) {
  const hour = new Date().getHours();
  const sessions = stats.totalSessions || 0;
  const safetyRecent = stats.safetyFlag && ((Date.now() - new Date(stats.safetyFlag.date).getTime()) < 7 * 86400000);

  // First session — always cyclic sigh intro
  if (sessions === 0) return { scenario:'_first_session', duration:5, title: t.firstDiveLabel || 'Your first dive', sub:'5 ' + t.min + ' \u00b7 ' + t.physiologicalSigh, isFirstSession:true };

  // Days 1-7: fixed progression
  const dayProgression = [
    { scenario:'_first_session', duration:5, title: t.firstDiveLabel, sub:'5 ' + t.min + ' \u00b7 ' + t.physiologicalSigh, isFirstSession:true },
    { scenario:'meeting', duration:5, title: 'Box breathing basics', sub:'5 ' + t.min + ' \u00b7 ' + t.boxBreathing },
    { scenario:'hard_day', duration:5, title: 'Ocean breath', sub:'5 ' + t.min + ' \u00b7 ' + t.ujjayi },
    { scenario:'cant_focus', duration:5, title: 'Segmented breathing', sub:'5 ' + t.min + ' \u00b7 ' + t.segmented },
    { scenario:'morning', duration:5, title: 'Diaphragmatic mastery', sub:'5 ' + t.min + ' \u00b7 ' + t.diaphragmatic },
    { scenario:'just_relax', duration:5, title: 'Extended box', sub:'5 ' + t.min + ' \u00b7 ' + t.boxBreathing },
    { scenario:'deep_dive', duration:10, title: 'Combined techniques', sub:'10 ' + t.min + ' \u00b7 ' + t.deepDive },
  ];

  if (sessions >= 1 && sessions <= 7) {
    return dayProgression[Math.min(sessions, dayProgression.length - 1)];
  }

  // Day 8+: time-based recommendations
  if (safetyRecent) {
    if (hour >= 6 && hour < 11) return { scenario:'morning', duration:5, title: t.morningStart, sub:'5 ' + t.min + ' \u00b7 ' + t.segmented };
    if (hour >= 17 && hour < 22) return { scenario:'hard_day', duration:5, title: t.afterToughDay, sub:'5 ' + t.min + ' \u00b7 ' + t.diaphragmatic };
    return { scenario:'just_relax', duration:5, title: t.justRelax, sub:'5 ' + t.min + ' \u00b7 ' + t.tidal };
  }
  if (hour >= 6 && hour < 11) return { scenario:'morning', duration:5, title: t.morningStart, sub:'5 ' + t.min + ' \u00b7 ' + t.segmented };
  if (hour >= 11 && hour < 17) return { scenario:'meeting', duration:5, title: t.beforeMeeting, sub:'5 ' + t.min + ' \u00b7 ' + t.boxBreathing };
  if (hour >= 17 && hour < 22) return { scenario:'hard_day', duration:5, title: t.afterToughDay, sub:'5 ' + t.min + ' \u00b7 ' + t.diaphragmatic };
  return { scenario:'insomnia', duration:10, title: t.cantSleep, sub:'10 ' + t.min + ' \u00b7 ' + t.diaphragmatic };
}

// ===== AMBIENT ENGINE =====
class AmbientEngine {
  constructor() { this.ctx = null; this.running = false; this.masterGain = null; }
  init(worldConfig) {
    if (this.ctx) this.destroy();
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = 0;
      this.masterGain.connect(this.ctx.destination);
      this.osc = this.ctx.createOscillator();
      this.osc.type = 'sine';
      this.osc.frequency.value = worldConfig.baseFreq;
      const oscGain = this.ctx.createGain();
      oscGain.gain.value = 0.12;
      this.osc.connect(oscGain);
      oscGain.connect(this.masterGain);
      const bufSize = this.ctx.sampleRate * 2;
      const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) d[i] = Math.random() * 2 - 1;
      this.noiseSrc = this.ctx.createBufferSource();
      this.noiseSrc.buffer = buf;
      this.noiseSrc.loop = true;
      this.filter = this.ctx.createBiquadFilter();
      this.filter.type = 'lowpass';
      this.filter.frequency.value = worldConfig.filterFreq;
      const noiseGain = this.ctx.createGain();
      noiseGain.gain.value = 0.06;
      this.noiseSrc.connect(this.filter);
      this.filter.connect(noiseGain);
      noiseGain.connect(this.masterGain);
      this.lfo = this.ctx.createOscillator();
      this.lfo.frequency.value = worldConfig.lfoRate;
      const lfoGain = this.ctx.createGain();
      lfoGain.gain.value = 3;
      this.lfo.connect(lfoGain);
      lfoGain.connect(this.osc.frequency);
      this.osc.start(); this.noiseSrc.start(); this.lfo.start();
      this._baseFreq = worldConfig.baseFreq;
      this._filterFreq = worldConfig.filterFreq;
      this.running = true;
    } catch(e) { console.warn('Audio init failed', e); }
  }
  updateForBreathing(phase, progress) {
    if (!this.ctx || !this.masterGain) return;
    const now = this.ctx.currentTime;
    const t = progress;
    if (phase === 'inhale' || phase === 'inhale1' || phase === 'inhale2') {
      if (this.osc) this.osc.frequency.linearRampToValueAtTime(this._baseFreq * (1 + 0.15 * t), now + 0.1);
      if (this.filter) this.filter.frequency.linearRampToValueAtTime(this._filterFreq * (1 + 0.5 * t), now + 0.1);
      this.masterGain.gain.linearRampToValueAtTime(0.10 + 0.06 * t, now + 0.1);
    } else if (phase === 'exhale') {
      if (this.osc) this.osc.frequency.linearRampToValueAtTime(this._baseFreq * (1.15 - 0.15 * t), now + 0.1);
      if (this.filter) this.filter.frequency.linearRampToValueAtTime(this._filterFreq * (1.5 - 0.5 * t), now + 0.1);
      this.masterGain.gain.linearRampToValueAtTime(0.16 - 0.06 * t, now + 0.1);
    } else if (phase === 'holdIn' || phase === 'hold') {
      const pulse = Math.sin(progress * Math.PI * 2) * 0.01;
      this.masterGain.gain.linearRampToValueAtTime(0.14 + pulse, now + 0.1);
    } else {
      this.masterGain.gain.linearRampToValueAtTime(0.06, now + 0.3);
      if (this.filter) this.filter.frequency.linearRampToValueAtTime(this._filterFreq * 0.6, now + 0.3);
    }
  }
  duck(dur=0.5) { if (!this.ctx||!this.masterGain) return; this.masterGain.gain.cancelScheduledValues(this.ctx.currentTime); this.masterGain.gain.setValueAtTime(this.masterGain.gain.value,this.ctx.currentTime); this.masterGain.gain.linearRampToValueAtTime(0.03,this.ctx.currentTime+dur); }
  unduck(dur=2) { if (!this.ctx||!this.masterGain) return; this.masterGain.gain.cancelScheduledValues(this.ctx.currentTime); this.masterGain.gain.setValueAtTime(this.masterGain.gain.value,this.ctx.currentTime); this.masterGain.gain.linearRampToValueAtTime(0.12,this.ctx.currentTime+dur); }
  fadeIn(dur=3) { if (!this.ctx||!this.masterGain) return; if (this.ctx.state==='suspended') this.ctx.resume(); this.masterGain.gain.cancelScheduledValues(this.ctx.currentTime); this.masterGain.gain.setValueAtTime(this.masterGain.gain.value,this.ctx.currentTime); this.masterGain.gain.linearRampToValueAtTime(0.15,this.ctx.currentTime+dur); }
  fadeOut(dur=2) { if (!this.ctx||!this.masterGain) return; this.masterGain.gain.cancelScheduledValues(this.ctx.currentTime); this.masterGain.gain.setValueAtTime(this.masterGain.gain.value,this.ctx.currentTime); this.masterGain.gain.linearRampToValueAtTime(0,this.ctx.currentTime+dur); }
  destroy() { this.fadeOut(0.5); setTimeout(() => { try { this.ctx?.close(); } catch {} this.ctx = null; this.running = false; }, 600); }
}

class VoicePlayer {
  constructor() {
    this.current = null;
    this.enabled = true;
  }
  play(audioKey, volume = 0.85) {
    if (!this.enabled) return null;
    if (!AUDIO_MAP[audioKey]) return null;
    if (this.current) { this.current.pause(); this.current = null; }
    const audio = new Audio(AUDIO_MAP[audioKey]);
    audio.volume = volume;
    audio.onerror = () => { this.current = null; };
    audio.play().catch(() => {});
    this.current = audio;
    return audio;
  }
  fadeOut(duration = 2000) {
    if (!this.current) return;
    const audio = this.current;
    const step = audio.volume / (duration / 50);
    const fade = setInterval(() => {
      if (audio.volume > step) { audio.volume -= step; }
      else { audio.pause(); audio.volume = 0; clearInterval(fade); }
    }, 50);
  }
  stop() {
    if (this.current) { this.current.pause(); this.current = null; }
  }
  toggle() {
    this.enabled = !this.enabled;
    if (!this.enabled) this.stop();
    return this.enabled;
  }
}

// ===== HAPTIC ENGINE =====
function hapticForPhase(phase, phaseDuration) {
  if (!navigator.vibrate) return null;
  try {
    if (phase === 'inhale' || phase === 'inhale1') {
      // ascending vibration: short bursts getting longer, 2 per second
      const count = Math.max(2, Math.floor(phaseDuration * 2));
      const pattern = [];
      for (let i = 0; i < count; i++) {
        const dur = 10 + (30 * i / count); // 10ms -> 40ms
        pattern.push(dur, Math.max(50, 500 / count - dur));
      }
      navigator.vibrate(pattern);
      return pattern;
    } else if (phase === 'inhale2') {
      navigator.vibrate([40, 80, 40]);
      return [40, 80, 40];
    } else if (phase === 'exhale') {
      const count = Math.max(2, Math.floor(phaseDuration * 2));
      const pattern = [];
      for (let i = 0; i < count; i++) {
        const dur = 40 - (30 * i / count); // 40ms -> 10ms
        pattern.push(dur, Math.max(50, 500 / count - dur));
      }
      navigator.vibrate(pattern);
      return pattern;
    } else if (phase === 'holdIn' || phase === 'hold') {
      // heartbeat pulse every 2 seconds
      navigator.vibrate([15, 1985]);
      return [15, 1985];
    } else {
      // holdOut, pause: silence
      navigator.vibrate(0);
      return null;
    }
  } catch { return null; }
}

// ===== SESSION ENGINE =====
class SessionEngine {
  constructor(segments, world, lang, voiceEnabled) {
    this.segments = segments;
    this.world = world;
    this.lang = lang;
    this.voiceEnabled = voiceEnabled;
    this.currentSegmentIndex = 0;
    this.segmentElapsed = 0;
    this.totalElapsed = 0;
    this.totalDuration = segments.reduce((sum, s) => sum + s.duration, 0);
    this.isRunning = false;
    this.isPaused = false;
    this.currentPhase = null;
    this.phaseElapsed = 0;
    this.phaseDuration = 0;
    this.cycleCount = 0;
    this.breathScale = 1.0;
    this.glowIntensity = 0.1;
    this.onUpdate = null;
    this.onSegmentChange = null;
    this.onPhaseChange = null;
    this.onComplete = null;
    this._lastTime = null;
    this._rafId = null;
    // Initialize first segment
    const seg = segments[0];
    if (seg && seg.type === 'breathing') {
      const phases = Object.keys(seg.params);
      this.currentPhase = phases[0];
      this.phaseDuration = seg.params[this.currentPhase];
    }
  }
  start() {
    this.isRunning = true;
    this._lastTime = performance.now();
    this._tick();
  }
  _tick() {
    if (!this.isRunning) return;
    const now = performance.now();
    const delta = (now - this._lastTime) / 1000;
    this._lastTime = now;
    if (this.isPaused) {
      this._rafId = requestAnimationFrame(() => this._tick());
      return;
    }
    this.segmentElapsed += delta;
    this.totalElapsed += delta;
    const segment = this.segments[this.currentSegmentIndex];
    if (!segment) return;
    // Video segments with duration 0 wait for skip()
    if (segment.duration > 0 && this.segmentElapsed >= segment.duration) {
      this._nextSegment();
      this._rafId = requestAnimationFrame(() => this._tick());
      return;
    }
    if (segment.type === 'breathing') {
      this._updateBreathing(segment, delta);
    }
    const diveProgress = this.totalDuration > 0 ? this.totalElapsed / this.totalDuration : 0;
    if (this.onUpdate) {
      this.onUpdate({
        segmentIndex: this.currentSegmentIndex,
        segmentType: segment.type,
        segmentElapsed: this.segmentElapsed,
        segmentDuration: segment.duration,
        segmentProgress: segment.duration > 0 ? Math.min(this.segmentElapsed / segment.duration, 1) : 0,
        phase: this.currentPhase,
        phaseElapsed: this.phaseElapsed,
        phaseDuration: this.phaseDuration,
        phaseProgress: this.phaseDuration > 0 ? this.phaseElapsed / this.phaseDuration : 0,
        cycleCount: this.cycleCount,
        breathScale: this.breathScale,
        glowIntensity: this.glowIntensity,
        totalElapsed: this.totalElapsed,
        totalDuration: this.totalDuration,
        diveProgress: Math.min(diveProgress, 1),
      });
    }
    this._rafId = requestAnimationFrame(() => this._tick());
  }
  _updateBreathing(segment, delta) {
    this.phaseElapsed += delta;
    if (this.phaseElapsed >= this.phaseDuration) {
      this._nextPhase(segment);
    }
    const t = this.phaseDuration > 0 ? Math.min(this.phaseElapsed / this.phaseDuration, 1) : 0;
    const eased = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
    const p = this.currentPhase;
    if (p==='inhale') {
      this.breathScale = 1.0 + 0.5*eased;
      this.glowIntensity = 0.1 + 0.15*eased;
    } else if (p==='inhale1') {
      // physiological sigh: first inhale 1.0 → 1.3
      this.breathScale = 1.0 + 0.3*eased;
      this.glowIntensity = 0.1 + 0.10*eased;
    } else if (p==='inhale2') {
      // physiological sigh: second inhale 1.3 → 1.5
      this.breathScale = 1.3 + 0.2*eased;
      this.glowIntensity = 0.2 + 0.05*eased;
    } else if (p==='belly') {
      // segmented: belly 1.0 → 1.17
      this.breathScale = 1.0 + 0.17*eased;
      this.glowIntensity = 0.1 + 0.05*eased;
    } else if (p==='ribs') {
      // segmented: ribs 1.17 → 1.33
      this.breathScale = 1.17 + 0.16*eased;
      this.glowIntensity = 0.15 + 0.05*eased;
    } else if (p==='chest') {
      // segmented: chest 1.33 → 1.5
      this.breathScale = 1.33 + 0.17*eased;
      this.glowIntensity = 0.20 + 0.05*eased;
    } else if (p==='holdIn'||p==='hold') {
      this.breathScale = 1.5;
      this.glowIntensity = 0.25 + Math.sin(this.phaseElapsed*2)*0.03;
    } else if (p==='exhale') {
      this.breathScale = 1.5 - 0.5*eased;
      this.glowIntensity = 0.25 - 0.15*eased;
    } else if (p==='holdOut'||p==='pause') {
      this.breathScale = 1.0;
      this.glowIntensity = 0.1;
    }
  }
  _nextPhase(segment) {
    const phases = Object.keys(segment.params);
    const idx = phases.indexOf(this.currentPhase);
    if (idx >= phases.length - 1) {
      this.cycleCount++;
      this.currentPhase = phases[0];
    } else {
      this.currentPhase = phases[idx + 1];
    }
    this.phaseElapsed = 0;
    this.phaseDuration = segment.params[this.currentPhase] || 4;
    if (this.onPhaseChange) this.onPhaseChange(this.currentPhase, this.cycleCount);
  }
  _nextSegment() {
    this.currentSegmentIndex++;
    if (this.currentSegmentIndex >= this.segments.length) {
      this.isRunning = false;
      if (this.onComplete) this.onComplete();
      return;
    }
    this.segmentElapsed = 0;
    const seg = this.segments[this.currentSegmentIndex];
    if (seg.type === 'breathing') {
      const phases = Object.keys(seg.params);
      this.currentPhase = phases[0];
      this.phaseElapsed = 0;
      this.phaseDuration = seg.params[this.currentPhase] || 4;
      this.cycleCount = 0;
    } else {
      this.currentPhase = null;
      this.phaseElapsed = 0;
      this.phaseDuration = 0;
      this.cycleCount = 0;
    }
    if (this.onSegmentChange) this.onSegmentChange(this.currentSegmentIndex, seg);
  }
  pause() { this.isPaused = true; }
  resume() { this.isPaused = false; this._lastTime = performance.now(); }
  skip() {
    const seg = this.segments[this.currentSegmentIndex];
    if (!seg) return;
    if (seg.duration > 0) {
      this.segmentElapsed = seg.duration;
    } else {
      // For duration-0 segments (e.g. video placeholders), directly advance
      this._nextSegment();
    }
  }
  destroy() { this.isRunning = false; if (this._rafId) cancelAnimationFrame(this._rafId); }
}

// ===== SESSION PLAYER (engine-driven) =====
function SessionPlayer({ segments, world, onComplete, onExit, t, voiceEnabled, ambientRef, currentLang }) {
  const engineRef = useRef(null);
  // Refs for 60fps direct DOM updates (no React re-render)
  const wrapperRef = useRef(null);
  const glowTargetRef = useRef(null);
  const phaseLabelRef = useRef(null);
  const phaseTimerRef = useRef(null);
  const phaseSubRef = useRef(null);
  const progressFillRef = useRef(null);
  const timeDisplayRef = useRef(null);
  // React state only for structural/low-frequency changes
  const [segIndex, setSegIndex] = useState(0);
  const [segType, setSegType] = useState(segments[0]?.type || 'text');
  const [currentSeg, setCurrentSeg] = useState(segments[0]);
  const totalDuration = useMemo(() => segments.reduce((s, seg) => s + seg.duration, 0), [segments]);
  const [diveProgress, setDiveProgress] = useState(0);
  const [paused, setPaused] = useState(false);
  const [showExitConfirm, setShowExitConfirm] = useState(false);
  const [hapticOn, setHapticOn] = useState(true);
  const hapticEnabledRef = useRef(true);
  const [voiceOn, setVoiceOn] = useState(voiceEnabled);
  const [bodyScanIdx, setBodyScanIdx] = useState(0);
  const lastPhaseRef = useRef('');
  const lastDiveProgressRef = useRef(0);
  const [controlOpacity, setControlOpacity] = useState(1);
  const controlFadeRef = useRef(null);

  const w = WORLDS[world];
  const palette = w.palette;
  const accentRgb = palette.accentRgb;
  const seg = currentSeg;

  // Body scan sentences
  const bodyScanSentences = useMemo(() => {
    if (!seg || seg.type !== 'bodyscan') return [];
    if (seg.parts) return seg.parts.map(p => p.text);
    if (seg.text) return seg.text.split('. ').map(s => s.replace(/\.$/, '').trim()).filter(Boolean);
    return [];
  }, [seg]);

  // Voice sync
  useEffect(() => { voicePlayer.enabled = voiceOn; if (!voiceOn) voicePlayer.stop(); }, [voiceOn]);
  // Haptic sync
  useEffect(() => { hapticEnabledRef.current = hapticOn; if (!hapticOn && navigator.vibrate) try { navigator.vibrate(0); } catch {} }, [hapticOn]);

  // Control bar auto-fade during breathing segments
  useEffect(() => {
    if (controlFadeRef.current) clearTimeout(controlFadeRef.current);
    if (segType === 'breathing' && !paused) {
      controlFadeRef.current = setTimeout(() => setControlOpacity(0.15), 3000);
    } else {
      setControlOpacity(1);
    }
    return () => { if (controlFadeRef.current) clearTimeout(controlFadeRef.current); };
  }, [segType, paused]);

  // Handle audio for segment transitions
  const handleSegmentTransition = useCallback((segIndex, newSeg) => {
    voicePlayer.stop();
    setBodyScanIdx(0);
    lastPhaseRef.current = '';

    if (!voiceOn) return;
    if (!newSeg || newSeg.type === 'breathing') {
      ambientRef.current?.unduck();
      return;
    }

    let audioKey = null;
    if (newSeg.type === 'text') {
      if (newSeg.textKey) {
        audioKey = mapTextToAudio(newSeg.textKey);
      } else {
        if (newSeg.text === t.sitDown) audioKey = 'intro_sit';
        else if (newSeg.text === t.sleepEnd) audioKey = 'session_end_sleep';
        else if (newSeg.text === t.openEyes) audioKey = 'session_end';
      }
    } else if (newSeg.type === 'bodyscan') {
      audioKey = newSeg.scanType === 'sleep' ? 'bodyscan_sleep' :
                 newSeg.scanType === 'short' ? 'bodyscan_short' : 'bodyscan_full';
    } else if (newSeg.type === 'visualization') {
      audioKey = `vis_${world}_calm`;
    }

    if (audioKey && AUDIO_MAP[audioKey]) {
      // 1-second silence gap before voice starts
      setTimeout(() => {
        ambientRef.current?.duck();
        const a = voicePlayer.play(audioKey, 0);
        if (a) {
          // Fade in over 500ms
          let vol = 0;
          const fadeInInterval = setInterval(() => {
            vol += 0.085;
            if (vol >= 0.85) { vol = 0.85; clearInterval(fadeInInterval); }
            try { a.volume = vol; } catch {}
          }, 50);
          a.onended = () => { ambientRef.current?.unduck(); };
          a.onerror = () => { ambientRef.current?.unduck(); };

          // Schedule fade out 1.5s before segment ends
          const fadeOutTime = Math.max(0, (newSeg.duration - 1.5) * 1000 - 1500);
          setTimeout(() => {
            voicePlayer.fadeOut(1500);
            ambientRef.current?.unduck();
          }, fadeOutTime);
        }
      }, 1000);
    }
  }, [voiceOn, currentLang, world, t]);

  // Create and manage engine
  useEffect(() => {
    const engine = new SessionEngine(segments, world, currentLang, voiceEnabled);
    engineRef.current = engine;

    engine.onUpdate = (s) => {
      // === HIGH FREQUENCY: direct DOM manipulation (every frame, no React) ===
      // Breathing object scale
      if (wrapperRef.current) {
        wrapperRef.current.style.transform = `translate(-50%, -50%) scale(${s.breathScale})`;
      }
      // Glow on the breathing object
      if (glowTargetRef.current) {
        const gi = s.glowIntensity;
        if (world === 'ocean') {
          glowTargetRef.current.style.boxShadow = `0 0 ${60+gi*200}px rgba(94,170,168,${gi}), 0 0 ${120+gi*300}px rgba(94,170,168,${gi*0.5}), inset 0 0 60px rgba(94,170,168,0.06)`;
        } else if (world === 'space') {
          glowTargetRef.current.style.boxShadow = `0 0 ${20+gi*60}px rgba(139,126,200,${0.3+gi*2}), 0 0 ${60+gi*80}px rgba(139,126,200,${0.15+gi*1.5}), 0 0 ${100+gi*100}px rgba(139,126,200,${gi})`;
        }
      }
      // Phase label
      if (phaseLabelRef.current && s.phase) {
        const label = t[PHASE_LANG_KEY[s.phase]] || s.phase;
        phaseLabelRef.current.textContent = label;
      }
      // Phase timer countdown
      if (phaseTimerRef.current && s.phaseDuration > 0) {
        phaseTimerRef.current.textContent = Math.ceil(Math.max(0, s.phaseDuration - s.phaseElapsed));
      }
      // Sub-instruction text
      if (phaseSubRef.current) {
        const subSeg = segments[s.segmentIndex];
        const sub = subSeg?.technique ? (t[PHASE_SUB_LANG_KEY[subSeg.technique]?.[s.phase]] || '') : '';
        phaseSubRef.current.textContent = sub;
      }
      // Time display
      if (timeDisplayRef.current) {
        const m = Math.floor(s.totalElapsed/60);
        const sec = Math.floor(s.totalElapsed%60);
        const tm = Math.floor(s.totalDuration/60);
        const ts = Math.floor(s.totalDuration%60);
        timeDisplayRef.current.textContent = `${m}:${String(sec).padStart(2,'0')} / ${tm}:${String(ts).padStart(2,'0')}`;
      }
      // Progress bar fill
      if (progressFillRef.current) {
        progressFillRef.current.style.width = `${s.diveProgress*100}%`;
      }
      // WOW 3: Reactive ambient sound
      if (s.phase && s.segmentType === 'breathing') {
        try { ambientRef.current?.updateForBreathing(s.phase, s.phaseProgress); } catch {}
      }

      // === LOW FREQUENCY: React state (only when values actually change) ===
      // diveProgress for background darkening (throttled to ~2x/sec)
      const dp = Math.round(s.diveProgress * 100) / 100;
      if (Math.abs(dp - lastDiveProgressRef.current) > 0.005) {
        lastDiveProgressRef.current = dp;
        setDiveProgress(dp);
      }
      // Body scan index from segmentProgress
      const curSeg = segments[s.segmentIndex];
      if (curSeg && curSeg.type === 'bodyscan') {
        if (curSeg.parts) {
          let acc = 0;
          for (let i = 0; i < curSeg.parts.length; i++) {
            acc += curSeg.parts[i].hold;
            if (s.segmentElapsed < acc) { setBodyScanIdx(i); break; }
            if (i === curSeg.parts.length - 1) setBodyScanIdx(i);
          }
        } else {
          const sentences = curSeg.text ? curSeg.text.split('. ').filter(Boolean) : [];
          if (sentences.length > 0) {
            const holdPerSentence = 5;
            const idx = Math.min(Math.floor(s.segmentElapsed / holdPerSentence), sentences.length - 1);
            setBodyScanIdx(idx);
          }
        }
      }
      // Haptic on phase change (WOW 2: advanced haptic)
      if (s.phase && s.phase !== lastPhaseRef.current) {
        lastPhaseRef.current = s.phase;
        if (hapticEnabledRef.current && navigator.vibrate) {
          try { hapticForPhase(s.phase, s.phaseDuration); } catch {}
        }
      }
    };

    // SEGMENT CHANGE: React state update (infrequent)
    engine.onSegmentChange = (index, seg) => {
      setSegIndex(index);
      setSegType(seg.type);
      setCurrentSeg(seg);
      handleSegmentTransition(index, seg);
    };
    engine.onComplete = () => onComplete();

    // Also trigger audio for first segment if it's a non-breathing segment
    const firstSeg = segments[0];
    if (firstSeg && firstSeg.type !== 'breathing') {
      handleSegmentTransition(0, firstSeg);
    }

    engine.start();

    return () => {
      engine.destroy();
      voicePlayer.stop();
    };
  }, [segments, world, currentLang, voiceEnabled]);

  // Pause/resume sync
  useEffect(() => {
    if (!engineRef.current) return;
    if (paused) engineRef.current.pause();
    else engineRef.current.resume();
  }, [paused]);

  // Dive darkening background
  const bgStyle = useMemo(() => {
    const darken = diveProgress;
    if (world === 'ocean') {
      return { background: `linear-gradient(180deg, rgba(14,61,92,${1-darken*0.8}) 0%, rgba(2,10,16,${0.8+darken*0.2}) 100%)` };
    } else {
      return { background: `rgba(13,11,26,${0.7+darken*0.3})` };
    }
  }, [diveProgress, world]);

  // techLabel is low-frequency (only changes on segment change)
  const techLabel = seg?.type === 'breathing' ? (t[TECHNIQUE_LANG_KEY[seg.technique]] || seg.technique) : '';

  const isTextSegment = seg && ['text','bodyscan','visualization'].includes(seg.type);

  const renderSegment = () => {
    if (!seg) return null;
    switch (seg.type) {
      case 'breathing':
        return (
          <div className="flex-1 flex flex-col items-center justify-center" style={{position:'relative'}}>
            {/* Breathing object wrapper — NO transition, scaled directly by ref */}
            <div ref={wrapperRef} style={{
              position: 'fixed', top: '42%', left: '50%',
              width: 'min(80vw, 320px)', aspectRatio: '1',
              margin: 0,
              willChange: 'transform',
              transform: 'translate(-50%, -50%) scale(1)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              zIndex: 5,
            }}>
              {/* Slow-rotating dashed ring */}
              <div style={{
                position:'absolute', inset:'-12px', borderRadius:'50%',
                border:`1px dashed rgba(${accentRgb},0.06)`,
                animation:'slowRotate 60s linear infinite',
                pointerEvents:'none',
              }} />
              {world === 'ocean' && <OceanBubble ref={glowTargetRef} />}
              {world === 'space' && <PulsarObject ref={glowTargetRef} />}
            </div>
            {/* Phase info — SEPARATE from bubble, fixed to bottom area */}
            <div style={{position:'fixed', bottom:'18%', left:'50%', transform:'translateX(-50%)', textAlign:'center', zIndex:10, width:'80%', maxWidth:340}}>
              <div ref={phaseLabelRef} className="font-body" style={{
                fontWeight:500, fontSize:14, letterSpacing:'0.1em', textTransform:'uppercase',
                color:'rgba(220,225,235,0.7)', marginBottom:4, minHeight:18,
              }}>
              </div>
              <div ref={phaseTimerRef} className="font-mono" style={{
                fontWeight:300, fontSize:32, color:'rgba(220,225,235,0.5)',
                fontVariantNumeric:'tabular-nums', minHeight:38,
              }}>
              </div>
              <div className="font-body" style={{fontSize:13, fontWeight:400, color:'var(--text-2)', marginTop:8}}>
                {techLabel}
              </div>
              <div ref={phaseSubRef} className="font-body" style={{fontSize:13,fontWeight:300,color:'var(--text-2)',maxWidth:280,lineHeight:1.6,marginTop:12,marginLeft:'auto',marginRight:'auto',minHeight:20}}>
              </div>
              {seg.hint && (
                <div className="font-body text-deblur" style={{fontSize:13, fontWeight:300, lineHeight:1.6, color:'var(--text-2)', maxWidth:280, marginTop:8, marginLeft:'auto', marginRight:'auto'}}>
                  {seg.hint}
                </div>
              )}
            </div>
          </div>
        );
      case 'text':
        return <SessionText text={seg.text} visible={true} />;
      case 'bodyscan':
        return <SessionText bodyScanSentences={bodyScanSentences} bodyScanIdx={bodyScanIdx} visible={true} />;
      case 'visualization': {
        const vText = seg.texts?.[world] || seg.texts?.ocean || '';
        return <SessionText text={vText} visible={true} />;
      }
      case 'video': {
        const hasVideoSrc = seg.src && seg.src.length > 0;
        if (hasVideoSrc) {
          return (
            <div className="flex-1 flex flex-col items-center justify-center">
              <div className="dima-video">
                <video
                  autoPlay
                  playsInline
                  onEnded={() => { if (engineRef.current) engineRef.current.skip(); }}
                  onError={() => {
                    // Fallback to placeholder on error
                    if (engineRef.current) engineRef.current.skip();
                  }}
                >
                  <source src={seg.src} type="video/mp4" />
                </video>
              </div>
            </div>
          );
        }
        return (
          <div className="flex-1 flex flex-col items-center justify-center px-6">
            <div className="screen-transition w-full" style={{maxWidth:340}}>
              <div style={{
                width:'100%', aspectRatio:'9/16', maxHeight:'50vh', borderRadius:20,
                background:'rgba(255,255,255,0.025)', border:'1px solid rgba(255,255,255,0.06)',
                display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                marginBottom:20, position:'relative', overflow:'hidden',
              }}>
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none" style={{opacity:0.3, marginBottom:12}}>
                  <circle cx="24" cy="24" r="23" stroke={palette.accent} strokeWidth="1.5"/>
                  <path d="M20 16l12 8-12 8V16z" fill={palette.accent} opacity="0.6"/>
                </svg>
                <div className="font-body" style={{fontWeight:400, fontSize:13, color:'var(--text-3)', textAlign:'center', padding:'0 24px', lineHeight:1.5}}>
                  Video from coach — coming soon
                </div>
              </div>
              <div style={{textAlign:'center'}}>
                <button className="px-8 py-3 rounded-full font-body"
                  style={{fontWeight:500, fontSize:14, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}
                  onClick={() => { if (engineRef.current) engineRef.current.skip(); }}>
                  {t.continueText}
                </button>
              </div>
            </div>
          </div>
        );
      }
      default: return null;
    }
  };

  return (
    <div className="fixed inset-0 flex flex-col z-50" style={{...bgStyle, transition:'background 2s ease'}}
      onTouchStart={() => { setControlOpacity(1); if (controlFadeRef.current) clearTimeout(controlFadeRef.current); if (segType === 'breathing' && !paused) controlFadeRef.current = setTimeout(() => setControlOpacity(0.15), 3000); }}
      onClick={() => { setControlOpacity(1); if (controlFadeRef.current) clearTimeout(controlFadeRef.current); if (segType === 'breathing' && !paused) controlFadeRef.current = setTimeout(() => setControlOpacity(0.15), 3000); }}>
      <Particles world={world} diveProgress={diveProgress} />
      <div className="relative z-10 flex flex-col h-full">
        {/* Top bar */}
        <div className="flex items-center justify-between px-6" style={{paddingTop:'env(safe-area-inset-top, 48px)', paddingBottom:8, opacity:controlOpacity, transition:'opacity 600ms ease'}}>
          <button onClick={() => setShowExitConfirm(true)} className="flex items-center justify-center rounded-full" style={{width:44,height:44,background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.06)'}}>
            <Icon name="close" size={18}/>
          </button>
          <div ref={timeDisplayRef} className="font-mono" style={{fontSize:13, fontWeight:300, color:'rgba(226,232,240,0.5)'}}>
            0:00 / {Math.floor(totalDuration / 60)}:{String(Math.floor(totalDuration % 60)).padStart(2,'0')}
          </div>
          <div className="flex items-center gap-2">
              <button onClick={() => setVoiceOn(v => !v)} className="flex items-center justify-center rounded-full" style={{width:44,height:44,background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.06)', color: voiceOn ? palette.accent : 'var(--text-3)'}}>
                <Icon name={voiceOn ? 'mic' : 'mic_off'} size={16}/>
              </button>
            <button onClick={() => { setHapticOn(h => !h); }} className="flex items-center justify-center rounded-full" style={{width:44,height:44,background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.06)', color: hapticOn ? palette.accent : 'var(--text-3)'}}>
              <Icon name={hapticOn ? 'haptic' : 'haptic_off'} size={16}/>
            </button>
            <button onClick={() => setPaused(!paused)} className="flex items-center justify-center rounded-full" style={{width:44,height:44,background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.06)'}}>
              <Icon name={paused ? 'play' : 'pause'} size={16}/>
            </button>
            <button onClick={() => { if (engineRef.current) engineRef.current.skip(); }} className="flex items-center justify-center rounded-full" style={{width:44,height:44,background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.06)'}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <polygon points="5,4 15,12 5,20" fill="rgba(226,232,240,0.8)"/>
                <line x1="19" y1="5" x2="19" y2="19" stroke="rgba(226,232,240,0.8)" strokeWidth="2"/>
              </svg>
            </button>
          </div>
        </div>

        {/* Progress bar */}
        <div className="relative" style={{height:2, borderRadius:1, background:'rgba(255,255,255,0.04)', margin:'0 24px 8px'}}>
          <div ref={progressFillRef} className="absolute top-0 h-full" style={{width:'0%', borderRadius:1, background:`rgba(${accentRgb},0.6)`}} />
        </div>

        {renderSegment()}

        {/* Exit confirm */}
        {showExitConfirm && (
          <div className="absolute inset-0 flex items-center justify-center z-60" style={{background:'rgba(0,0,0,0.6)', backdropFilter:'blur(12px)'}}>
            <div className="text-center screen-transition">
              <div className="font-body mb-2" style={{fontSize:20, fontWeight:400, color:'rgba(226,232,240,0.95)'}}>{t.exitSession}</div>
              <div className="font-body mb-6" style={{fontSize:14, fontWeight:300, color:'var(--text-2)'}}>{t.exitConfirm}</div>
              <div className="flex gap-3 justify-center">
                <button onClick={() => { setShowExitConfirm(false); onExit(); }} className="px-6 py-3 rounded-full font-body" style={{fontWeight:500, background:'rgba(255,255,255,0.08)', border:'1px solid rgba(255,255,255,0.1)', color:'var(--text)'}}>{t.exitYes}</button>
                <button onClick={() => setShowExitConfirm(false)} className="px-6 py-3 rounded-full font-body" style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}>{t.exitNo}</button>
              </div>
            </div>
          </div>
        )}

        {/* Pause overlay */}
        {paused && !showExitConfirm && (
          <div className="absolute inset-0 flex items-center justify-center z-60" style={{background:'rgba(0,0,0,0.6)', backdropFilter:'blur(12px)'}}>
            <div className="text-center screen-transition">
              <div className="font-body mb-6" style={{fontSize:32, fontWeight:300, color:'rgba(226,232,240,0.95)', letterSpacing:'0.1em'}}>{t.pause}</div>
              <button onClick={() => setPaused(false)} className="px-8 py-3 rounded-full font-body" style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}>
                {t.resume}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ===== FIRST BREATH SCREEN =====
function FirstBreathScreen({ palette, accentRgb, t, onComplete, ambientRef }) {
  const [breathPhase, setBreathPhase] = useState('cinematic'); // 'cinematic' | 'done' | 'feeling' | 'holdTest' | 'goal'
  const [elapsed, setElapsed] = useState(0);
  const [currentPhase, setCurrentPhase] = useState(null);
  const [breathScale, setBreathScale] = useState(1.0);
  const [holdTestPhase, setHoldTestPhase] = useState('intro'); // 'intro' | 'holding' | 'result'
  const [holdTime, setHoldTime] = useState(0);
  const holdStartRef = useRef(null);
  const holdIntervalRef = useRef(null);
  const ambientFadeStarted = useRef(false);
  const introAudioRef = useRef(null);
  const voiceClipsRef = useRef([]);
  const diveAudioRef = useRef(null);
  const firedEventsRef = useRef(new Set());

  // 70s event-driven timeline: 7 voice clips + 4 breathing cycles
  const totalDuration = 70;
  const phases = ['inhale1','inhale2','exhale'];
  const phaseDurations = {inhale1:2,inhale2:1,exhale:7}; // 10s per cycle
  const phaseLabels = {inhale1:t.inhale,inhale2:t.inhale2,exhale:t.exhale};
  const fbWorld = 'ocean';
  const fbW = WORLDS.ocean;
  const oceanBg = fbW.bgGradient;

  // Timeline events
  const INTRO_EVENTS = [
    { time:2,  type:'voice', file:'audio/intro_01_welcome.mp3' },
    { time:6,  type:'voice', file:'audio/intro_02_freediver.mp3' },
    { time:12, type:'voice', file:'audio/intro_03_follow.mp3' },
    { time:18, type:'breath_start' }, // cycle 1
    { time:28, type:'voice', file:'audio/intro_04_good.mp3' },
    { time:31, type:'breath_start' }, // cycle 2
    { time:41, type:'voice', file:'audio/intro_05_onemore.mp3' },
    { time:44, type:'breath_start' }, // cycle 3
    { time:54, type:'voice', file:'audio/intro_06_calming.mp3' },
    { time:57, type:'breath_start' }, // cycle 4
    { time:67, type:'voice', file:'audio/intro_07_ready.mp3' },
    { time:70, type:'end' },
  ];

  // Voice clip player with quick fade-in
  const playVoiceClip = (src) => {
    try {
      const a = new Audio(src);
      a.volume = 0;
      voiceClipsRef.current.push(a);
      a.play().catch(() => {});
      let v = 0;
      const fi = setInterval(() => {
        v += 0.05;
        if (v >= 0.7) { v = 0.7; clearInterval(fi); }
        try { a.volume = v; } catch {}
      }, 20);
    } catch {}
  };

  // Cinematic timeline — event-driven with 7 voice clips + 4 breathing cycles
  useEffect(() => {
    if (breathPhase !== 'cinematic') return;
    let el = 0;
    let lastTime = performance.now();
    let running = true;
    // Breathing state (only active during breath_start events)
    let breathing = false;
    let phaseIdx = 0;
    let phaseElapsed = 0;
    firedEventsRef.current = new Set();

    const tick = () => {
      if (!running) return;
      const now = performance.now();
      const dt = (now - lastTime) / 1000;
      lastTime = now;
      el += dt;
      setElapsed(el);

      // Start ambient at 0.5s
      if (el >= 0.5 && !ambientFadeStarted.current) {
        ambientFadeStarted.current = true;
        try {
          const a = new Audio('audio/dive_intro_ambient.mp3');
          a.volume = 0; introAudioRef.current = a;
          a.play().catch(() => {});
          let vol = 0;
          const fi = setInterval(() => {
            vol += 0.004; if (vol >= 0.25) { vol = 0.25; clearInterval(fi); }
            try { a.volume = vol; } catch {}
          }, 50);
        } catch {}
      }

      // Fire timeline events
      for (const ev of INTRO_EVENTS) {
        if (el >= ev.time && !firedEventsRef.current.has(ev.time + ev.type)) {
          firedEventsRef.current.add(ev.time + ev.type);
          if (ev.type === 'voice') playVoiceClip(ev.file);
          else if (ev.type === 'breath_start') {
            breathing = true; phaseIdx = 0; phaseElapsed = 0;
            setCurrentPhase('inhale1');
          }
          else if (ev.type === 'end') { setBreathPhase('done'); return; }
        }
      }

      // Animate breathing when active
      if (breathing) {
        phaseElapsed += dt;
        const curPhase = phases[phaseIdx];
        const dur = phaseDurations[curPhase];
        if (phaseElapsed >= dur) {
          phaseElapsed -= dur;
          phaseIdx++;
          if (phaseIdx >= phases.length) {
            // Cycle complete — stop breathing until next breath_start event
            breathing = false;
            setCurrentPhase(null);
            setBreathScale(1.0);
          } else {
            setCurrentPhase(phases[phaseIdx]);
          }
        }
        if (breathing) {
          const p = phases[phaseIdx];
          const d = phaseDurations[p];
          const prog = d > 0 ? Math.min(phaseElapsed / d, 1) : 0;
          const eased = prog < 0.5 ? 4*prog*prog*prog : 1 - Math.pow(-2*prog+2,3)/2;
          if (p === 'inhale1') setBreathScale(1.0 + 0.5 * eased);
          else if (p === 'inhale2') setBreathScale(1.5 + 0.2 * eased);
          else if (p === 'exhale') setBreathScale(1.7 - 0.7 * eased);
        }
      }

      if (el >= totalDuration) { setBreathPhase('done'); return; }
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
    return () => { running = false; };
  }, [breathPhase]);

  // Done -> feeling transition + fade out all audio
  useEffect(() => {
    if (breathPhase === 'done') {
      // Fade out ambient over 2 seconds
      if (introAudioRef.current) {
        const a = introAudioRef.current;
        const fo = setInterval(() => {
          if (a.volume > 0.02) { try { a.volume = Math.max(0, a.volume - 0.01); } catch {} }
          else { a.pause(); a.volume = 0; clearInterval(fo); }
        }, 50);
      }
      // Stop any playing voice clips
      voiceClipsRef.current.forEach(a => { try { a.pause(); } catch {} });
      voiceClipsRef.current = [];
      const t0 = setTimeout(() => setBreathPhase('feeling'), 800);
      return () => clearTimeout(t0);
    }
  }, [breathPhase]);

  // Cleanup hold test interval + all audio on unmount
  useEffect(() => {
    return () => {
      if (holdIntervalRef.current) { clearInterval(holdIntervalRef.current); holdIntervalRef.current = null; }
      if (introAudioRef.current) { try { introAudioRef.current.pause(); introAudioRef.current.src = ''; } catch {} introAudioRef.current = null; }
      if (diveAudioRef.current) { try { diveAudioRef.current.pause(); diveAudioRef.current.src = ''; } catch {} diveAudioRef.current = null; }
      voiceClipsRef.current.forEach(a => { try { a.pause(); a.src = ''; } catch {} });
      voiceClipsRef.current = [];
    };
  }, []);

  // Background interpolation: pure black -> ocean gradient over 65s
  const bgProgress = Math.min(elapsed / 65, 1);
  const cinematicBg = breathPhase === 'cinematic'
    ? `linear-gradient(180deg, rgb(${Math.round(bgProgress*14)},${Math.round(bgProgress*61)},${Math.round(bgProgress*92)}) 0%, rgb(${Math.round(bgProgress*8)},${Math.round(bgProgress*42)},${Math.round(bgProgress*66)}) 33%, rgb(${Math.round(bgProgress*4)},${Math.round(bgProgress*21)},${Math.round(bgProgress*32)}) 66%, rgb(${Math.round(bgProgress*2)},${Math.round(bgProgress*10)},${Math.round(bgProgress*16)}) 100%)`
    : oceanBg;

  // Breath hold test depth calculation — uses global holdTimeToDepth + depthContext

  const startHoldTest = () => {
    setHoldTestPhase('holding');
    setHoldTime(0);
    holdStartRef.current = Date.now();
    // Play dive/splash audio
    try {
      const da = new Audio('audio/dive_underwater.mp3');
      da.currentTime = 0;
      da.volume = 0.5;
      diveAudioRef.current = da;
      da.play().catch(() => {});
      // After splash (4s), settle to ambient volume
      setTimeout(() => {
        let vol = 0.5;
        const settle = setInterval(() => {
          vol -= 0.01;
          if (vol <= 0.25) { vol = 0.25; clearInterval(settle); }
          try { da.volume = vol; } catch {}
        }, 50);
      }, 4000);
    } catch {}
    holdIntervalRef.current = setInterval(() => {
      if (!holdStartRef.current) return;
      const h = (Date.now() - holdStartRef.current) / 1000;
      setHoldTime(h);
    }, 100);
  };

  const stopHoldTest = () => {
    if (holdIntervalRef.current) { clearInterval(holdIntervalRef.current); holdIntervalRef.current = null; }
    // Fade out dive audio
    if (diveAudioRef.current) {
      const da = diveAudioRef.current;
      let vol = da.volume || 0.25;
      const fadeOut = setInterval(() => {
        vol -= 0.008;
        if (vol <= 0) { da.pause(); clearInterval(fadeOut); }
        else { try { da.volume = vol; } catch {} }
      }, 50);
    }
    if (!holdStartRef.current) { setHoldTestPhase('result'); return; }
    const finalTime = (Date.now() - holdStartRef.current) / 1000;
    holdStartRef.current = null;
    setHoldTime(finalTime);
    setHoldTestPhase('result');
  };

  // Goal screen (What brought you here?)
  if (breathPhase === 'goal') {
    return (
      <div className="fixed inset-0 flex flex-col items-center justify-center px-8" style={{background:oceanBg}}>
        <Particles world={fbWorld} />
        <div className="screen-transition text-center z-10">
          <div className="font-body mb-10" style={{fontSize:24, fontWeight:300, color:'rgba(226,232,240,0.95)', letterSpacing:'0.06em'}}>{t.whatBroughtYou}</div>
          <div className="flex flex-col gap-3 items-center">
            {[[t.stressRelief,'stress_relief'],[t.betterFocus,'better_focus'],[t.betterSleep,'better_sleep'],[t.moreEnergy,'more_energy']].map(([label,val]) => (
              <button key={val} className="glass px-8 py-3 font-body w-full max-w-xs"
                style={{fontWeight:500, fontSize:14, color:palette.accent, border:`1px solid rgba(${accentRgb},0.25)`}}
                onClick={() => onComplete(val, holdTime > 0 ? holdTime : null)}>
                {label}
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // Breath hold test screen
  if (breathPhase === 'holdTest') {
    const holdDepth = holdTimeToDepth(holdTime);
    if (holdTestPhase === 'intro') {
      return (
        <div className="fixed inset-0 flex flex-col items-center justify-center px-8" style={{background:oceanBg}}>
          <Particles world={fbWorld} />
          <div className="screen-transition text-center z-10">
            <div className="font-body mb-4" style={{fontSize:24, fontWeight:300, color:'rgba(226,232,240,0.95)', letterSpacing:'0.04em'}}>{t.holdTestTitle || "Let's find your starting depth"}</div>
            <div className="font-body mb-10" style={{fontSize:14, fontWeight:300, color:'rgba(220,225,235,0.55)', maxWidth:280, margin:'0 auto', lineHeight:1.7}}>{t.holdTestDesc || 'Exhale fully. Then hold. Tap when you need to breathe.'}</div>
            <button className="px-10 py-3 rounded-full font-body"
              style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}
              onClick={startHoldTest}>
              {t.holdTestStart || 'Start'}
            </button>
          </div>
        </div>
      );
    }
    if (holdTestPhase === 'holding') {
      const holdProgress = Math.min(holdTime / 120, 1);
      const darken = Math.min(holdTime / 60, 0.5);
      return (
        <div className="fixed inset-0 flex flex-col items-center justify-center px-8" style={{background:`linear-gradient(180deg, rgba(14,61,92,${1-darken}) 0%, rgba(2,10,16,${0.8+darken}) 100%)`}} onClick={stopHoldTest}>
          <div className="screen-transition text-center z-10" style={{width:'100%'}}>
            <div className="font-mono" style={{fontSize:56, fontWeight:300, color:'rgba(220,225,235,0.9)', fontVariantNumeric:'tabular-nums', animation:'hold-counter-pulse 2s ease-in-out infinite'}}>{holdTime.toFixed(1)}</div>
            <div className="font-body mt-2 mb-8" style={{fontSize:13, fontWeight:400, color:'rgba(220,225,235,0.4)', letterSpacing:'0.05em'}}>{t.hold || 'Hold'}</div>
            <div style={{width:'80%', maxWidth:300, height:4, borderRadius:2, background:'rgba(255,255,255,0.06)', margin:'0 auto'}}>
              <div style={{width:`${holdProgress*100}%`, height:'100%', borderRadius:2, background:`rgba(${accentRgb},0.6)`, transition:'width 100ms linear'}} />
            </div>
          </div>
        </div>
      );
    }
    if (holdTestPhase === 'result') {
      return (
        <div className="fixed inset-0 flex flex-col items-center justify-center px-8" style={{background:oceanBg}}>
          <Particles world={fbWorld} />
          <div className="screen-transition text-center z-10">
            <div className="font-body mb-6" style={{fontSize:16, fontWeight:300, color:'rgba(220,225,235,0.55)', letterSpacing:'0.04em'}}>{t.holdTestYourDepth || 'Your starting depth'}</div>
            <div className="font-mono mb-2" style={{fontSize:48, fontWeight:300, color:palette.accent}}>{holdDepth}<span style={{fontSize:24}}>m</span></div>
            <div className="font-body mb-10" style={{fontSize:15, fontWeight:300, color:'rgba(220,225,235,0.5)'}}>{depthContext(holdDepth)}</div>
            <button className="px-10 py-3 rounded-full font-body"
              style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}
              onClick={() => setBreathPhase('goal')}>
              {t.continueText || 'Continue'}
            </button>
          </div>
        </div>
      );
    }
  }

  // Feeling screen
  if (breathPhase === 'feeling' || breathPhase === 'done') {
    return (
      <div className="fixed inset-0 flex flex-col items-center justify-center px-8" style={{background:oceanBg}}>
        <Particles world={fbWorld} />
        <div className="screen-transition text-center z-10">
          <div className="font-body mb-10" style={{fontSize:24, fontWeight:300, color:'rgba(226,232,240,0.95)', letterSpacing:'0.06em'}}>{t.howDoYouFeel}</div>
          <div className="flex gap-3 justify-center">
            {[[t.feelBetter,'better'],[t.feelCalmer,'calmer'],[t.feelCurious,'curious']].map(([label,val]) => (
              <button key={val} className="glass px-6 py-3 font-body"
                style={{fontWeight:500, fontSize:14, color:palette.accent, border:`1px solid rgba(${accentRgb},0.25)`}}
                onClick={() => { setBreathPhase('holdTest'); }}>
                {label}
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // Cinematic breathing phase
  const showText = elapsed >= 2;
  const showBubble = elapsed >= 6; // bubble forms at 6s (with intro_02_freediver)
  const bubbleOpacity = elapsed >= 6 ? Math.min((elapsed - 6) * 0.25, 1) : 0;
  const lightSize = elapsed >= 2 ? Math.min((elapsed - 2) * 80, 320) : 0; // light grows 2-6s
  const lightOpacity = elapsed >= 2 ? Math.min((elapsed - 2) * 0.5, 1) : 0;
  const textOpacity = elapsed >= 2 ? Math.min((elapsed - 2) * 0.3, 0.6) : 0;

  return (
    <div className="fixed inset-0 flex flex-col items-center justify-center" style={{background:cinematicBg, transition:'background 1s linear'}}>
      {/* Teal light point emerges 2-4s */}
      {elapsed >= 2 && !showBubble && (
        <div style={{
          position:'absolute', top:'50%', left:'50%', transform:'translate(-50%, -50%)',
          width: lightSize, height: lightSize, borderRadius:'50%',
          background:`radial-gradient(circle, rgba(94,170,168,${lightOpacity * 0.3}) 0%, rgba(94,170,168,${lightOpacity * 0.1}) 40%, transparent 70%)`,
          transition:'width 2s ease-out, height 2s ease-out',
        }} />
      )}
      {/* Text: Take one breath with us */}
      {showText && (
        <div className="font-body z-10" style={{
          position:'absolute', top: showBubble ? '22%' : '50%', left:'50%',
          transform:'translate(-50%, -50%)',
          fontSize:18, fontWeight:300, letterSpacing:'0.04em',
          color:`rgba(220,225,235,${textOpacity})`,
          transition:'top 1s ease, color 2s ease',
        }}>{t.takeOneBreath}</div>
      )}
      {/* Breathing bubble — animates during all 4 cycles */}
      {showBubble && (
        <div style={{opacity:bubbleOpacity, transition:'opacity 1s ease', width:'100%', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center'}}>
          <div style={{position:'relative', width:'min(70vw, 260px)', aspectRatio:'1', margin:'0 auto', display:'flex', alignItems:'center', justifyContent:'center',
            transform:`scale(${breathScale})`, transition:'transform 200ms ease-out'}}>
            <OceanBubble />
          </div>
          {currentPhase && (
            <div style={{marginTop:40, textAlign:'center'}}>
              <div className="font-body" style={{fontWeight:500, fontSize:14, letterSpacing:'0.1em', textTransform:'uppercase', color:'rgba(220,225,235,0.7)', marginBottom:4}}>
                {phaseLabels[currentPhase]}
              </div>
            </div>
          )}
        </div>
      )}
      {/* Particles fade in after 4s */}
      {elapsed >= 4 && <Particles world={fbWorld} />}
    </div>
  );
}

// ===== ANIMATED NUMBER COMPONENT =====
function AnimatedNumber({ value, duration = 1200 }) {
  const [display, setDisplay] = useState(0);
  useEffect(() => {
    if (!value) { setDisplay(0); return; }
    const startTime = performance.now();
    let raf;
    function tick() {
      const elapsed = performance.now() - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      setDisplay(Math.round(value * eased));
      if (progress < 1) raf = requestAnimationFrame(tick);
    }
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [value]);
  return display;
}

  const updateStats = (sessionInfo) => {
