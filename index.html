// ===== HAPTIC ENGINE =====
function hapticForPhase(phase, phaseDuration) {
  if (!navigator.vibrate) return null;
  try {
    if (phase === 'inhale' || phase === 'inhale1') {
      // ascending vibration: short bursts getting longer, 2 per second
      const count = Math.max(2, Math.floor(phaseDuration * 2));
      const pattern = [];
      for (let i = 0; i < count; i++) {
        const dur = 10 + (30 * i / count); // 10ms -> 40ms
        pattern.push(dur, Math.max(50, 500 / count - dur));
      }
      navigator.vibrate(pattern);
      return pattern;
    } else if (phase === 'inhale2') {
      navigator.vibrate([40, 80, 40]);
      return [40, 80, 40];
    } else if (phase === 'exhale') {
      const count = Math.max(2, Math.floor(phaseDuration * 2));
      const pattern = [];
      for (let i = 0; i < count; i++) {
        const dur = 40 - (30 * i / count); // 40ms -> 10ms
        pattern.push(dur, Math.max(50, 500 / count - dur));
      }
      navigator.vibrate(pattern);
      return pattern;
    } else if (phase === 'holdIn' || phase === 'hold') {
      // heartbeat pulse every 2 seconds
      navigator.vibrate([15, 1985]);
      return [15, 1985];
    } else {
      // holdOut, pause: silence
      navigator.vibrate(0);
      return null;
    }
  } catch { return null; }
}

// ===== SESSION ENGINE =====
class SessionEngine {
  constructor(segments, world, lang, voiceEnabled) {
    this.segments = segments;
    this.world = world;
    this.lang = lang;
    this.voiceEnabled = voiceEnabled;
    this.currentSegmentIndex = 0;
    this.segmentElapsed = 0;
    this.totalElapsed = 0;
    this.totalDuration = segments.reduce((sum, s) => sum + s.duration, 0);
    this.isRunning = false;
    this.isPaused = false;
    this.currentPhase = null;
    this.phaseElapsed = 0;
    this.phaseDuration = 0;
    this.cycleCount = 0;
    this.breathScale = 1.0;
    this.glowIntensity = 0.1;
    this.onUpdate = null;
    this.onSegmentChange = null;
    this.onPhaseChange = null;
    this.onComplete = null;
    this._lastTime = null;
    this._rafId = null;
    this.actualElapsed = 0;
    this.actualBreathCycles = 0;
    this._lastPhase = null;
    // Initialize first segment
    const seg = segments[0];
    if (seg && seg.type === 'breathing') {
      const phases = Object.keys(seg.params);
      this.currentPhase = phases[0];
      this.phaseDuration = seg.params[this.currentPhase];
    }
  }
  start() {
    this.isRunning = true;
    this._lastTime = performance.now();
    this._tick();
  }
  _tick() {
    if (!this.isRunning) return;
    const now = performance.now();
    const delta = (now - this._lastTime) / 1000;
    this._lastTime = now;
    if (this.isPaused) {
      this._rafId = requestAnimationFrame(() => this._tick());
      return;
    }
    this.segmentElapsed += delta;
    this.totalElapsed += delta;
    this.actualElapsed += delta;
    const segment = this.segments[this.currentSegmentIndex];
    if (!segment) return;
    // Video segments with duration 0 wait for skip()
    if (segment.duration > 0 && this.segmentElapsed >= segment.duration) {
      this._nextSegment();
      this._rafId = requestAnimationFrame(() => this._tick());
      return;
    }
    if (segment.type === 'breathing') {
      this._updateBreathing(segment, delta);
    }
    const diveProgress = this.totalDuration > 0 ? this.totalElapsed / this.totalDuration : 0;
    if (this.onUpdate) {
      this.onUpdate({
        segmentIndex: this.currentSegmentIndex,
        segmentType: segment.type,
        segmentElapsed: this.segmentElapsed,
        segmentDuration: segment.duration,
        segmentProgress: segment.duration > 0 ? Math.min(this.segmentElapsed / segment.duration, 1) : 0,
        phase: this.currentPhase,
        phaseElapsed: this.phaseElapsed,
        phaseDuration: this.phaseDuration,
        phaseProgress: this.phaseDuration > 0 ? this.phaseElapsed / this.phaseDuration : 0,
        cycleCount: this.cycleCount,
        breathScale: this.breathScale,
        glowIntensity: this.glowIntensity,
        totalElapsed: this.totalElapsed,
        totalDuration: this.totalDuration,
        diveProgress: Math.min(diveProgress, 1),
      });
    }
    this._rafId = requestAnimationFrame(() => this._tick());
  }
  _updateBreathing(segment, delta) {
    this.phaseElapsed += delta;
    if (this.phaseElapsed >= this.phaseDuration) {
      this._nextPhase(segment);
    }
    const t = this.phaseDuration > 0 ? Math.min(this.phaseElapsed / this.phaseDuration, 1) : 0;
    const eased = 0.5 - 0.5 * Math.cos(t * Math.PI); // cosine easing — zero velocity at both ends, no jitter
    const p = this.currentPhase;
    if (p==='inhale') {
      this.breathScale = 1.0 + 0.5*eased;
      this.glowIntensity = 0.1 + 0.15*eased;
    } else if (p==='inhale1') {
      // physiological sigh: first inhale 1.0 → 1.3
      this.breathScale = 1.0 + 0.3*eased;
      this.glowIntensity = 0.1 + 0.10*eased;
    } else if (p==='inhale2') {
      // physiological sigh: second inhale 1.3 → 1.5
      this.breathScale = 1.3 + 0.2*eased;
      this.glowIntensity = 0.2 + 0.05*eased;
    } else if (p==='belly') {
      // segmented: belly 1.0 → 1.17
      this.breathScale = 1.0 + 0.17*eased;
      this.glowIntensity = 0.1 + 0.05*eased;
    } else if (p==='ribs') {
      // segmented: ribs 1.17 → 1.33
      this.breathScale = 1.17 + 0.16*eased;
      this.glowIntensity = 0.15 + 0.05*eased;
    } else if (p==='chest') {
      // segmented: chest 1.33 → 1.5
      this.breathScale = 1.33 + 0.17*eased;
      this.glowIntensity = 0.20 + 0.05*eased;
    } else if (p==='holdIn'||p==='hold') {
      this.breathScale = 1.5;
      this.glowIntensity = 0.25 + Math.sin(this.phaseElapsed*2)*0.03;
    } else if (p==='exhale') {
      this.breathScale = 1.5 - 0.5*eased;
      this.glowIntensity = 0.25 - 0.15*eased;
    } else if (p==='holdOut'||p==='pause') {
      this.breathScale = 1.0;
      this.glowIntensity = 0.1;
    }
  }
  _nextPhase(segment) {
    const prevPhase = this.currentPhase;
    const phases = Object.keys(segment.params);
    const idx = phases.indexOf(this.currentPhase);
    if (idx >= phases.length - 1) {
      this.cycleCount++;
      this.currentPhase = phases[0];
    } else {
      this.currentPhase = phases[idx + 1];
    }
    const newPhase = this.currentPhase;
    if ((prevPhase === 'exhale' && newPhase === 'inhale') || (prevPhase === 'exhale' && newPhase === 'belly')) {
      this.actualBreathCycles++;
    }
    this.phaseElapsed = 0;
    this.phaseDuration = segment.params[this.currentPhase] || 4;
    if (this.onPhaseChange) this.onPhaseChange(this.currentPhase, this.cycleCount);
  }
  _nextSegment() {
    this.currentSegmentIndex++;
    if (this.currentSegmentIndex >= this.segments.length) {
      this.isRunning = false;
      if (this.onComplete) this.onComplete();
      return;
    }
    this.segmentElapsed = 0;
    const seg = this.segments[this.currentSegmentIndex];
    if (seg.type === 'breathing') {
      const phases = Object.keys(seg.params);
      this.currentPhase = phases[0];
      this.phaseElapsed = 0;
      this.phaseDuration = seg.params[this.currentPhase] || 4;
      this.cycleCount = 0;
    } else {
      this.currentPhase = null;
      this.phaseElapsed = 0;
      this.phaseDuration = 0;
      this.cycleCount = 0;
    }
    if (this.onSegmentChange) this.onSegmentChange(this.currentSegmentIndex, seg);
  }
  // FIX6: extend current segment if audio is longer than planned
  extendCurrentSegment(minDuration) {
    const seg = this.segments[this.currentSegmentIndex];
    if (seg && seg.duration < minDuration) {
      const diff = minDuration - seg.duration;
      seg.duration = minDuration;
      this.totalDuration += diff;
    }
  }
  pause() { this.isPaused = true; }
  resume() { this.isPaused = false; this._lastTime = performance.now(); }
  skip() {
    const seg = this.segments[this.currentSegmentIndex];
    if (!seg) return;
    if (seg.duration > 0) {
      this.segmentElapsed = seg.duration;
    } else {
      // For duration-0 segments (e.g. video placeholders), directly advance
      this._nextSegment();
    }
  }
  destroy() { this.isRunning = false; if (this._rafId) cancelAnimationFrame(this._rafId); }
}

// ===== SESSION PLAYER (engine-driven) =====
function SessionPlayer({ segments, world, onComplete, onExit, t, voiceEnabled, ambientRef, currentLang }) {
  const engineRef = useRef(null);
  // Refs for 60fps direct DOM updates (no React re-render)
  const wrapperRef = useRef(null);
  const glowTargetRef = useRef(null);
  const phaseLabelRef = useRef(null);
  const phaseSubRef = useRef(null);
  const progressFillRef = useRef(null);
  const timeDisplayRef = useRef(null);
  const bubbleTimerRef = useRef(null); // FIX2: countdown inside bubble
  // React state only for structural/low-frequency changes
  const [segIndex, setSegIndex] = useState(0);
  const [segType, setSegType] = useState(segments[0]?.type || 'text');
  const [currentSeg, setCurrentSeg] = useState(segments[0]);
  const totalDuration = useMemo(() => segments.reduce((s, seg) => s + seg.duration, 0), [segments]);
  const [diveProgress, setDiveProgress] = useState(0);
  const [paused, setPaused] = useState(false);
  const [showExitConfirm, setShowExitConfirm] = useState(false);
  const [hapticOn, setHapticOn] = useState(true);
  const hapticEnabledRef = useRef(true);
  const [eyesClosedMode, setEyesClosedMode] = useState(false);
  const ecPhaseRef = useRef(null);
  const [voiceOn, setVoiceOn] = useState(voiceEnabled);
  const [bodyScanIdx, setBodyScanIdx] = useState(0);
  const lastPhaseRef = useRef('');
  const lastDiveProgressRef = useRef(0);
  const [controlOpacity, setControlOpacity] = useState(1);
  const controlFadeRef = useRef(null);

  const w = WORLDS[world];
  const palette = w.palette;
  const accentRgb = palette.accentRgb;
  const seg = currentSeg;
  const wakeLockRef = useRef(null);

  // Body scan sentences
  const bodyScanSentences = useMemo(() => {
    if (!seg || seg.type !== 'bodyscan') return [];
    if (seg.parts) return seg.parts.map(p => p.text);
    if (seg.text) return seg.text.split('. ').map(s => s.replace(/\.$/, '').trim()).filter(Boolean);
    return [];
  }, [seg]);

  // Voice sync
  useEffect(() => { voicePlayer.enabled = voiceOn; if (!voiceOn) voicePlayer.stop(); }, [voiceOn]);
  // Haptic sync
  useEffect(() => { hapticEnabledRef.current = hapticOn; if (!hapticOn && navigator.vibrate) try { navigator.vibrate(0); } catch {} }, [hapticOn]);

  // Control bar auto-fade during breathing segments
  useEffect(() => {
    if (controlFadeRef.current) clearTimeout(controlFadeRef.current);
    if (segType === 'breathing' && !paused) {
      controlFadeRef.current = setTimeout(() => setControlOpacity(0.15), 3000);
    } else {
      setControlOpacity(1);
    }
    return () => { if (controlFadeRef.current) clearTimeout(controlFadeRef.current); };
  }, [segType, paused]);

  // Bubble wrapper + Zone 3 fade: hide during text/bodyscan/visualization segments
  useEffect(() => {
    if (wrapperRef.current) {
      if (['text','bodyscan','visualization'].includes(segType)) {
        wrapperRef.current.style.transition = 'opacity 400ms ease';
        wrapperRef.current.style.opacity = '0';
      } else {
        wrapperRef.current.style.transition = 'opacity 400ms ease';
        wrapperRef.current.style.opacity = '1';
      }
    }
  }, [segType]);

  // Handle audio for segment transitions
  const handleSegmentTransition = useCallback((segIndex, newSeg) => {
    voicePlayer.stop();
    setBodyScanIdx(0);
    lastPhaseRef.current = '';

    if (!voiceOn) return;
    if (!newSeg || newSeg.type === 'breathing') {
      ambientRef.current?.unduck();
      return;
    }

    let audioKey = null;
    if (newSeg.type === 'text') {
      if (newSeg.textKey) {
        // Check TEXT_VOICE_MAP first, then legacy mapTextToAudio
        audioKey = (TEXT_VOICE_MAP[newSeg.textKey] && AUDIO_MAP[TEXT_VOICE_MAP[newSeg.textKey]])
          ? TEXT_VOICE_MAP[newSeg.textKey]
          : mapTextToAudio(newSeg.textKey);
      } else {
        if (newSeg.text === t.sitDown) audioKey = 'intro_sit';
        else if (newSeg.text === t.sleepEnd) audioKey = 'session_end_sleep';
        else if (newSeg.text === t.openEyes) audioKey = 'session_end';
      }
    } else if (newSeg.type === 'bodyscan') {
      audioKey = newSeg.scanType === 'sleep' ? 'bodyscan_sleep' :
                 newSeg.scanType === 'short' ? 'bodyscan_short' : 'bodyscan_full';
    } else if (newSeg.type === 'visualization') {
      audioKey = `vis_${world}_calm`;
    }

    if (audioKey && AUDIO_MAP[audioKey]) {
      // 600ms silence gap before voice starts (matches text deblur animation)
      setTimeout(() => {
        ambientRef.current?.duck();
        const a = voicePlayer.play(audioKey, 0);
        if (a) {
          // FIX6: extend segment if audio is longer than planned
          a.addEventListener('loadedmetadata', () => {
            if (a.duration && isFinite(a.duration) && engineRef.current) {
              const needed = a.duration + 2;
              if (needed > newSeg.duration) engineRef.current.extendCurrentSegment(needed);
            }
          }, { once: true });
          // Fade in over 500ms
          let vol = 0;
          const fadeInInterval = setInterval(() => {
            vol += 0.085;
            if (vol >= 0.85) { vol = 0.85; clearInterval(fadeInInterval); }
            try { a.volume = vol; } catch {}
          }, 50);
          a.onended = () => { ambientRef.current?.unduck(); };
          a.onerror = () => { ambientRef.current?.unduck(); };

          // Schedule fade out 1.5s before segment ends
          const fadeOutTime = Math.max(0, (newSeg.duration - 1.5) * 1000 - 1500);
          setTimeout(() => {
            voicePlayer.fadeOut(1500);
            ambientRef.current?.unduck();
          }, fadeOutTime);
        }
      }, 600);
    }
  }, [voiceOn, currentLang, world, t]);

  // Create and manage engine
  useEffect(() => {
    const engine = new SessionEngine(segments, world, currentLang, voiceEnabled);
    engineRef.current = engine;

    engine.onUpdate = (s) => {
      // === HIGH FREQUENCY: direct DOM manipulation (every frame, no React) ===
      // Breathing object scale
      if (wrapperRef.current) {
        wrapperRef.current.style.transform = `translate(-50%, -50%) scale(${s.breathScale})`;
      }
      // Glow on the breathing object
      if (glowTargetRef.current) {
        const gi = s.glowIntensity;
        glowTargetRef.current.style.boxShadow = `0 0 ${60+gi*200}px rgba(94,170,168,${gi}), 0 0 ${120+gi*300}px rgba(94,170,168,${gi*0.5}), inset 0 0 60px rgba(94,170,168,0.06)`;
      }
      // Phase label (Zone 3)
      if (phaseLabelRef.current && s.phase) {
        phaseLabelRef.current.textContent = PHASE_DISPLAY_LABEL[s.phase] || s.phase.toUpperCase();
      }
      // Eyes-closed phase label
      if (ecPhaseRef.current && s.phase) {
        ecPhaseRef.current.textContent = PHASE_DISPLAY_LABEL[s.phase] || s.phase.toUpperCase();
      }
      // Bubble inner countdown (large, inside bubble)
      if (bubbleTimerRef.current) {
        bubbleTimerRef.current.textContent = s.phaseDuration > 0 ? Math.ceil(Math.max(0, s.phaseDuration - s.phaseElapsed)) : '';
      }
      // Phase instruction (Zone 3)
      if (phaseSubRef.current) {
        phaseSubRef.current.textContent = PHASE_INSTRUCTIONS[s.phase] || '';
      }
      // Time display
      if (timeDisplayRef.current) {
        const m = Math.floor(s.totalElapsed/60);
        const sec = Math.floor(s.totalElapsed%60);
        const tm = Math.floor(s.totalDuration/60);
        const ts = Math.floor(s.totalDuration%60);
        timeDisplayRef.current.textContent = `${m}:${String(sec).padStart(2,'0')} / ${tm}:${String(ts).padStart(2,'0')}`;
      }
      // Progress bar fill
      if (progressFillRef.current) {
        progressFillRef.current.style.width = `${s.diveProgress*100}%`;
      }
      // WOW 3: Reactive ambient sound
      if (s.phase && s.segmentType === 'breathing') {
        try { ambientRef.current?.updateForBreathing(s.phase, s.phaseProgress); } catch {}
      }

      // === LOW FREQUENCY: React state (only when values actually change) ===
      // diveProgress for background darkening (throttled to ~2x/sec)
      const dp = Math.round(s.diveProgress * 100) / 100;
      if (Math.abs(dp - lastDiveProgressRef.current) > 0.005) {
        lastDiveProgressRef.current = dp;
        setDiveProgress(dp);
      }
      // Body scan index from segmentProgress
      const curSeg = segments[s.segmentIndex];
      if (curSeg && curSeg.type === 'bodyscan') {
        if (curSeg.parts) {
          let acc = 0;
          for (let i = 0; i < curSeg.parts.length; i++) {
            acc += curSeg.parts[i].hold;
            if (s.segmentElapsed < acc) { setBodyScanIdx(i); break; }
            if (i === curSeg.parts.length - 1) setBodyScanIdx(i);
          }
        } else {
          const sentences = curSeg.text ? curSeg.text.split('. ').filter(Boolean) : [];
          if (sentences.length > 0) {
            const holdPerSentence = 5;
            const idx = Math.min(Math.floor(s.segmentElapsed / holdPerSentence), sentences.length - 1);
            setBodyScanIdx(idx);
          }
        }
      }
      // Haptic on phase change (WOW 2: advanced haptic + eyes-closed enhanced)
      if (s.phase && s.phase !== lastPhaseRef.current) {
        lastPhaseRef.current = s.phase;
        if (hapticEnabledRef.current && navigator.vibrate) {
          try {
            if (eyesClosedMode) {
              navigator.vibrate(0); // cancel previous
              navigator.vibrate(HAPTIC_PATTERNS.transition);
              setTimeout(() => {
                const hType = mapPhaseToHaptic(s.phase);
                const pattern = HAPTIC_PATTERNS[hType]?.(s.phaseDuration * 1000);
                if (pattern?.length) navigator.vibrate(pattern);
              }, 250);
            } else {
              hapticForPhase(s.phase, s.phaseDuration);
            }
          } catch {}
        }
      }
    };

    // PHASE CHANGE: play audio cues
    engine.onPhaseChange = (phase, cycleCount) => {
      const curSegIdx = engineRef.current ? engineRef.current.currentSegmentIndex : 0;
      const curSeg = segments[curSegIdx];
      if (curSeg && curSeg.type === 'breathing' && voiceEnabled) {
        playPhaseCue(curSeg.technique || '', phase, cycleCount === 0);
      }
    };

    // SEGMENT CHANGE: React state update (infrequent)
    engine.onSegmentChange = (index, seg) => {
      setSegIndex(index);
      setSegType(seg.type);
      setCurrentSeg(seg);
      handleSegmentTransition(index, seg);
    };
    engine.onComplete = () => onComplete({ actualElapsed: Math.round(engine.actualElapsed), actualBreathCycles: engine.actualBreathCycles });

    // Also trigger audio for first segment if it's a non-breathing segment
    const firstSeg = segments[0];
    if (firstSeg && firstSeg.type !== 'breathing') {
      handleSegmentTransition(0, firstSeg);
    }

    engine.start();

    // WakeLock: keep screen on during session
    if ('wakeLock' in navigator) {
      navigator.wakeLock.request('screen').then(lock => { wakeLockRef.current = lock; }).catch(() => {});
    }

    return () => {
      engine.destroy();
      voicePlayer.stop();
      if (wakeLockRef.current) { wakeLockRef.current.release().catch(() => {}); wakeLockRef.current = null; }
    };
  }, [segments, world, currentLang, voiceEnabled]);

  // Pause/resume sync
  useEffect(() => {
    if (!engineRef.current) return;
    if (paused) {
      engineRef.current.pause();
      if (ambientRef.current?.ctx?.state === 'running') ambientRef.current.ctx.suspend();
      if (voicePlayer.current) voicePlayer.current.pause();
      if (navigator.vibrate) navigator.vibrate(0);
    } else {
      engineRef.current.resume();
      if (ambientRef.current?.ctx?.state === 'suspended') ambientRef.current.ctx.resume();
      if (voicePlayer.current && voicePlayer.current.paused) voicePlayer.current.play().catch(()=>{});
    }
  }, [paused]);

  // Dive darkening background
  const bgStyle = useMemo(() => {
    const darken = diveProgress;
    if (world === 'ocean') {
      return { background: `linear-gradient(180deg, rgba(14,61,92,${1-darken*0.8}) 0%, rgba(2,10,16,${0.8+darken*0.2}) 100%)` };
    } else {
      return { background: `rgba(13,11,26,${0.7+darken*0.3})` };
    }
  }, [diveProgress, world]);

  // techLabel is low-frequency (only changes on segment change)
  const techLabel = seg?.type === 'breathing' ? (t[TECHNIQUE_LANG_KEY[seg.technique]] || seg.technique) : '';

  const isTextSegment = seg && ['text','bodyscan','visualization'].includes(seg.type);

  const renderSegment = () => {
    if (!seg) return null;
    switch (seg.type) {
      case 'breathing':
        return (
          <div className="flex-1 flex flex-col items-center justify-center" style={{position:'relative'}}>
            {/* Breathing object wrapper — NO transition, scaled directly by ref */}
            <div ref={wrapperRef} style={{
              position: 'fixed', top: '42%', left: '50%',
              width: 'min(75vw, 300px)', aspectRatio: '1',
              margin: 0,
              willChange: 'transform',
              transition: 'none',
              transform: 'translate(-50%, -50%) scale(1)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              zIndex: 5,
            }}>
              <OceanBubble ref={glowTargetRef} />
              {/* Countdown inside bubble — large but ghosted */}
              <div ref={bubbleTimerRef} style={{
                position:'absolute', top:'50%', left:'50%',
                transform:'translate(-50%,-50%)',
                fontFamily:"'JetBrains Mono',monospace",
                fontSize:48, fontWeight:200, fontVariantNumeric:'tabular-nums',
                color:'rgba(220,225,235,0.20)',
                pointerEvents:'none', userSelect:'none', zIndex:6,
              }} />
            </div>
            {/* Zone 3: phase info — fixed bottom, clean */}
            <div style={{position:'fixed', bottom:'calc(80px + env(safe-area-inset-bottom, 24px))', left:0, right:0, textAlign:'center', zIndex:10, padding:'0 24px', pointerEvents:'none'}}>
              <div ref={phaseLabelRef} className="font-body" style={{
                fontWeight:500, fontSize:14, letterSpacing:'0.15em', textTransform:'uppercase',
                color:'rgba(220,225,235,0.55)', marginBottom:12, minHeight:18,
              }}>
              </div>
              <div ref={phaseSubRef} className="font-body" style={{
                fontSize:15, fontWeight:300, color:'rgba(220,225,235,0.40)',
                lineHeight:1.5, maxWidth:260, margin:'0 auto', minHeight:44,
              }}>
              </div>
              <div style={{pointerEvents:'auto', marginTop:8}}>
                <button onClick={() => setEyesClosedMode(true)} style={{
                  background:'none', border:'none',
                  fontSize:12, color:'rgba(220,225,235,0.18)',
                  letterSpacing:'0.1em', cursor:'pointer', fontFamily:"'DM Sans',sans-serif",
                }}>
                  Close your eyes
                </button>
              </div>
            </div>
          </div>
        );
      case 'text':
        return <SessionText text={seg.text} texts={seg.texts} duration={seg.duration} visible={true} />;
      case 'bodyscan':
        return <SessionText bodyScanSentences={bodyScanSentences} bodyScanIdx={bodyScanIdx} visible={true} />;
      case 'visualization': {
        const vText = seg.texts?.[world] || seg.texts?.ocean || '';
        return <SessionText text={vText} visible={true} />;
      }
      case 'video': {
        const hasVideoSrc = seg.src && seg.src.length > 0;
        if (hasVideoSrc) {
          return (
            <div className="flex-1 flex flex-col items-center justify-center">
              <div className="dima-video">
                <video
                  autoPlay
                  playsInline
                  onEnded={() => { if (engineRef.current) engineRef.current.skip(); }}
                  onError={() => {
                    // Fallback to placeholder on error
                    if (engineRef.current) engineRef.current.skip();
                  }}
                >
                  <source src={seg.src} type="video/mp4" />
                </video>
              </div>
            </div>
          );
        }
        return (
          <div className="flex-1 flex flex-col items-center justify-center px-6">
            <div className="screen-transition w-full" style={{maxWidth:340}}>
              <div style={{
                width:'100%', aspectRatio:'9/16', maxHeight:'50vh', borderRadius:20,
                background:'rgba(255,255,255,0.025)', border:'1px solid rgba(255,255,255,0.06)',
                display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                marginBottom:20, position:'relative', overflow:'hidden',
              }}>
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none" style={{opacity:0.3, marginBottom:12}}>
                  <circle cx="24" cy="24" r="23" stroke={palette.accent} strokeWidth="1.5"/>
                  <path d="M20 16l12 8-12 8V16z" fill={palette.accent} opacity="0.6"/>
                </svg>
                <div className="font-body" style={{fontWeight:400, fontSize:13, color:'var(--text-3)', textAlign:'center', padding:'0 24px', lineHeight:1.5}}>
                  Video from coach — coming soon
                </div>
              </div>
              <div style={{textAlign:'center'}}>
                <button className="px-8 py-3 rounded-full font-body"
                  style={{fontWeight:500, fontSize:14, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}
                  onClick={() => { if (engineRef.current) engineRef.current.skip(); }}>
                  {t.continueText}
                </button>
              </div>
            </div>
          </div>
        );
      }
      default: return null;
    }
  };

  return (
    <div className="fixed inset-0 flex flex-col z-50" style={{...bgStyle, transition:'background 2s ease'}}
      onTouchStart={() => { setControlOpacity(1); if (controlFadeRef.current) clearTimeout(controlFadeRef.current); if (segType === 'breathing' && !paused) controlFadeRef.current = setTimeout(() => setControlOpacity(0.15), 3000); }}
      onClick={() => { setControlOpacity(1); if (controlFadeRef.current) clearTimeout(controlFadeRef.current); if (segType === 'breathing' && !paused) controlFadeRef.current = setTimeout(() => setControlOpacity(0.15), 3000); }}>
      <Particles world={world} diveProgress={diveProgress} />
      {/* Session ambient: caustics + micro-bubbles */}
      {segType === 'breathing' && (
        <>
          <div className="ocean-caustics" />
          {Array.from({length:12}).map((_,i) => {
            const size = 2 + Math.random() * 3;
            const left = 5 + (i / 12) * 90;
            const dur = 8 + Math.random() * 12;
            const delay = Math.random() * 10;
            return <div key={'mb'+i} style={{position:'fixed',bottom:0,left:`${left}%`,width:size,height:size,borderRadius:'50%',background:`rgba(${accentRgb},0.18)`,pointerEvents:'none',zIndex:2,animation:`bubbleRise ${dur}s linear ${delay}s infinite`}} />;
          })}
        </>
      )}
      <div className="relative z-10 flex flex-col h-full">
        {/* Zone 1: Top controls — fixed, fades during breathing */}
        <div style={{position:'fixed', top:0, left:0, right:0, zIndex:20, padding:'12px 16px', paddingTop:'calc(12px + env(safe-area-inset-top, 44px))', display:'flex', justifyContent:'space-between', alignItems:'center', opacity:controlOpacity, transition:'opacity 600ms ease'}}>
          <button onClick={() => setShowExitConfirm(true)} className="flex items-center justify-center rounded-full" style={{width:40,height:40,background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.06)'}}>
            <Icon name="close" size={16}/>
          </button>
          <div ref={timeDisplayRef} className="font-mono" style={{fontSize:13, fontWeight:300, color:'rgba(226,232,240,0.35)', letterSpacing:'0.02em'}}>
            0:00 / {Math.floor(totalDuration / 60)}:{String(Math.floor(totalDuration % 60)).padStart(2,'0')}
          </div>
          <div className="flex items-center gap-2">
            <button onClick={() => setPaused(!paused)} className="flex items-center justify-center rounded-full" style={{width:36,height:36,background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.06)'}}>
              <Icon name={paused ? 'play' : 'pause'} size={14}/>
            </button>
            <button onClick={() => { if (engineRef.current) engineRef.current.skip(); }} className="flex items-center justify-center rounded-full" style={{width:36,height:36,background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.06)'}}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><polygon points="5,4 15,12 5,20" fill="rgba(226,232,240,0.6)"/><line x1="19" y1="5" x2="19" y2="19" stroke="rgba(226,232,240,0.6)" strokeWidth="2"/></svg>
            </button>
          </div>
        </div>

        {/* Progress bar — fixed just above tab bar */}
        <div style={{position:'fixed', bottom:'calc(56px + env(safe-area-inset-bottom, 0px))', left:0, right:0, height:2, background:'rgba(255,255,255,0.03)', zIndex:15}}>
          <div ref={progressFillRef} style={{height:'100%', width:'0%', borderRadius:1, background:`rgba(${accentRgb},0.40)`, transition:'width 1s linear'}} />
        </div>

        {renderSegment()}

        {/* Exit confirm */}
        {showExitConfirm && (
          <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.65)', zIndex:60, display:'flex', alignItems:'center', justifyContent:'center', backdropFilter:'blur(12px)'}}>
            <div className="text-center screen-transition" style={{background:'rgba(12,19,34,0.95)', border:'1px solid rgba(255,255,255,0.06)', borderRadius:14, padding:24, maxWidth:280, width:'calc(100% - 48px)', zIndex:61}}>
              <div className="font-body mb-2" style={{fontSize:20, fontWeight:400, color:'rgba(226,232,240,0.95)'}}>{t.exitSession}</div>
              <div className="font-body mb-6" style={{fontSize:14, fontWeight:300, color:'var(--text-2)'}}>{t.exitConfirm}</div>
              <div className="flex gap-3 justify-center">
                <button onClick={() => { setShowExitConfirm(false); onExit(); }} className="px-6 py-3 rounded-full font-body" style={{fontWeight:500, background:'rgba(255,255,255,0.08)', border:'1px solid rgba(255,255,255,0.1)', color:'var(--text)'}}>{t.exitYes}</button>
                <button onClick={() => setShowExitConfirm(false)} className="px-6 py-3 rounded-full font-body" style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}>{t.exitNo}</button>
              </div>
            </div>
          </div>
        )}

        {/* Pause overlay */}
        {paused && !showExitConfirm && (
          <div className="absolute inset-0 flex items-center justify-center" style={{zIndex:60, background:'rgba(0,0,0,0.7)', backdropFilter:'blur(12px)'}}>
            <div className="text-center screen-transition" style={{zIndex:61}}>
              <div className="font-body mb-6" style={{fontSize:32, fontWeight:300, color:'rgba(226,232,240,0.95)', letterSpacing:'0.1em'}}>{t.pause}</div>
              <button onClick={() => setPaused(false)} className="px-8 py-3 rounded-full font-body" style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}>
                {t.resume}
              </button>
            </div>
          </div>
        )}
      </div>

      {/* Eyes-closed overlay */}
      {eyesClosedMode && (
        <div onClick={() => setEyesClosedMode(false)} style={{
          position:'fixed', inset:0,
          background:'#04090E',
          zIndex:100,
          display:'flex', alignItems:'center', justifyContent:'center',
          flexDirection:'column',
        }}>
          <div style={{
            width:6, height:6, borderRadius:'50%',
            background:'rgba(94,170,168,0.2)',
            boxShadow:'0 0 12px rgba(94,170,168,0.2)',
            animation:'pulse 4s ease-in-out infinite',
          }} />
          <div ref={ecPhaseRef} style={{
            position:'absolute', bottom:100,
            fontSize:11, color:'rgba(94,170,168,0.25)',
            letterSpacing:'0.15em', textTransform:'uppercase',
            fontFamily:"'DM Sans',sans-serif",
          }} />
          <div style={{
            position:'absolute', bottom:50,
            fontSize:10, color:'rgba(255,255,255,0.1)',
            letterSpacing:'0.1em', fontFamily:"'DM Sans',sans-serif",
          }}>tap to return</div>
        </div>
      )}
    </div>
  );
}

// ===== FIRST BREATH SCREEN =====
function FirstBreathScreen({ palette, accentRgb, t, onComplete, ambientRef }) {
  const [breathPhase, setBreathPhase] = useState('text_sequence'); // 'text_sequence' | 'cinematic' | 'done' | 'feeling' | 'holdTest' | 'goal'
  const [elapsed, setElapsed] = useState(0);
  const [currentPhase, setCurrentPhase] = useState(null);
  const cinematicBubbleRef = useRef(null); // BUG1: ref-based scale to avoid transition jumps
  const [introTextIdx, setIntroTextIdx] = useState(-1);
  const [introTextOpacity, setIntroTextOpacity] = useState(0);
  const [holdTestPhase, setHoldTestPhase] = useState('intro'); // 'intro' | 'holding' | 'result'
  const [holdTime, setHoldTime] = useState(0);
  const holdStartRef = useRef(null);
  const holdIntervalRef = useRef(null);
  const ambientFadeStarted = useRef(false);
  const introAudioRef = useRef(null);
  const cinematicTimerRef = useRef(null); // FIX8: countdown inside cinematic bubble
  const voiceClipsRef = useRef([]);
  const diveAudioRef = useRef(null);
  const firedEventsRef = useRef(new Set());
  const [bubbleReveal, setBubbleReveal] = useState('hidden'); // 'hidden' | 'glow' | 'forming' | 'ready'

  // Bubble reveal phases after text sequence ends
  useEffect(() => {
    if (breathPhase === 'cinematic') {
      const t1 = setTimeout(() => setBubbleReveal('glow'), 500);
      const t2 = setTimeout(() => setBubbleReveal('forming'), 2000);
      const t3 = setTimeout(() => setBubbleReveal('ready'), 3500);
      return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
    }
  }, [breathPhase]);

  // Text sequence before breathing
  const INTRO_TEXTS = [
    { text: 'DIVE', style: 'title', showFor: 2000, gapAfter: 500 },
    { text: 'Before a meeting that matters', style: 'phrase', showFor: 2200, gapAfter: 300 },
    { text: 'After a day that broke you', style: 'phrase', showFor: 2200, gapAfter: 300 },
    { text: "When sleep won't come", style: 'phrase', showFor: 2000, gapAfter: 300 },
    { text: 'When you need to be sharp', style: 'phrase', showFor: 2000, gapAfter: 500 },
    { text: 'Prepare.', style: 'tagline', showFor: 1500, gapAfter: 200 },
    { text: 'Breathe.', style: 'tagline', showFor: 1500, gapAfter: 200 },
    { text: 'Dive.', style: 'tagline-accent', showFor: 1500, gapAfter: 800 },
  ];

  // Text sequence timer
  useEffect(() => {
    if (breathPhase !== 'text_sequence') return;
    let idx = 0; let running = true;
    const showNext = () => {
      if (!running || idx >= INTRO_TEXTS.length) {
        if (running) setBreathPhase('cinematic');
        return;
      }
      setIntroTextIdx(idx);
      setIntroTextOpacity(1);
      const item = INTRO_TEXTS[idx];
      idx++;
      setTimeout(() => {
        if (!running) return;
        setIntroTextOpacity(0);
        setTimeout(() => { if (running) showNext(); }, 400 + (item.gapAfter || 300));
      }, item.showFor);
    };
    const t0 = setTimeout(showNext, 500);
    return () => { running = false; clearTimeout(t0); };
  }, [breathPhase]);

  // Breathing phase setup
  const totalDuration = 50; // ~50s of breathing after text
  const phases = ['inhale1','inhale2','exhale'];
  const phaseDurations = {inhale1:2,inhale2:1,exhale:7}; // 10s per cycle
  const phaseLabels = {inhale1:t.inhale,inhale2:t.inhale2,exhale:t.exhale};
  const fbWorld = 'ocean';
  const fbW = WORLDS.ocean;
  const oceanBg = fbW.bgGradient;

  // Timeline events for breathing phase (time relative to breathing phase start)
  const INTRO_EVENTS = [
    { time:1,  type:'voice', file:'audio/intro_01_welcome.mp3' },
    { time:4,  type:'voice', file:'audio/intro_02_freediver.mp3' },
    { time:9,  type:'voice', file:'audio/intro_03_follow.mp3' },
    { time:13, type:'breath_start' }, // cycle 1
    { time:23, type:'voice', file:'audio/intro_04_good.mp3' },
    { time:26, type:'breath_start' }, // cycle 2
    { time:36, type:'voice', file:'audio/intro_05_onemore.mp3' },
    { time:39, type:'breath_start' }, // cycle 3
    { time:49, type:'end' },
  ];

  // Voice clip player with quick fade-in
  const playVoiceClip = (src) => {
    try {
      const a = new Audio(src);
      a.volume = 0;
      voiceClipsRef.current.push(a);
      a.play().catch(() => {});
      let v = 0;
      const fi = setInterval(() => {
        v += 0.05;
        if (v >= 0.7) { v = 0.7; clearInterval(fi); }
        try { a.volume = v; } catch {}
      }, 20);
    } catch {}
  };

  // Cinematic timeline — event-driven with 7 voice clips + 4 breathing cycles
  useEffect(() => {
    if (breathPhase !== 'cinematic') return;
    let el = 0;
    let lastTime = performance.now();
    let running = true;
    // Breathing state (only active during breath_start events)
    let breathing = false;
    let phaseIdx = 0;
    let phaseElapsed = 0;
    firedEventsRef.current = new Set();

    const tick = () => {
      if (!running) return;
      const now = performance.now();
      const dt = (now - lastTime) / 1000;
      lastTime = now;
      el += dt;
      setElapsed(el);

      // Start ambient at 0.5s
      if (el >= 0.5 && !ambientFadeStarted.current) {
        ambientFadeStarted.current = true;
        try {
          const a = new Audio('audio/dive_intro_ambient.mp3');
          a.volume = 0; introAudioRef.current = a;
          a.play().catch(() => {});
          let vol = 0;
          const fi = setInterval(() => {
            vol += 0.004; if (vol >= 0.25) { vol = 0.25; clearInterval(fi); }
            try { a.volume = vol; } catch {}
          }, 50);
        } catch {}
      }

      // Fire timeline events
      for (const ev of INTRO_EVENTS) {
        if (el >= ev.time && !firedEventsRef.current.has(ev.time + ev.type)) {
          firedEventsRef.current.add(ev.time + ev.type);
          if (ev.type === 'voice') playVoiceClip(ev.file);
          else if (ev.type === 'breath_start') {
            breathing = true; phaseIdx = 0; phaseElapsed = 0;
            setCurrentPhase('inhale1');
          }
          else if (ev.type === 'end') { setBreathPhase('done'); return; }
        }
      }

      // Animate breathing when active
      if (breathing) {
        phaseElapsed += dt;
        const curPhase = phases[phaseIdx];
        const dur = phaseDurations[curPhase];
        if (phaseElapsed >= dur) {
          phaseElapsed -= dur;
          phaseIdx++;
          if (phaseIdx >= phases.length) {
            // Cycle complete — stop breathing until next breath_start event
            breathing = false;
            setCurrentPhase(null);
            // Keep breathScale at current value (don't jump to 1.0)
          } else {
            setCurrentPhase(phases[phaseIdx]);
          }
        }
        if (breathing) {
          const p = phases[phaseIdx];
          const d = phaseDurations[p];
          const prog = d > 0 ? Math.min(phaseElapsed / d, 1) : 0;
          const eased = 0.5 - 0.5 * Math.cos(prog * Math.PI); // cosine easing
          let sc = 1.0;
          if (p === 'inhale1') sc = 1.0 + 0.5 * eased;
          else if (p === 'inhale2') sc = 1.5 + 0.2 * eased;
          else if (p === 'exhale') sc = 1.7 - 0.7 * eased;
          // BUG1: direct DOM update — no React state, no CSS transition jumps
          if (cinematicBubbleRef.current) cinematicBubbleRef.current.style.transform = `translate(-50%, -50%) scale(${sc})`;
          // FIX8: update cinematic bubble timer via ref
          if (cinematicTimerRef.current) {
            cinematicTimerRef.current.textContent = Math.ceil(Math.max(0, d - phaseElapsed));
          }
        } else {
          if (cinematicTimerRef.current) cinematicTimerRef.current.textContent = '';
        }
      }

      if (el >= totalDuration) { setBreathPhase('done'); return; }
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
    return () => { running = false; };
  }, [breathPhase]);

  // Done -> feeling transition + fade out all audio
  useEffect(() => {
    if (breathPhase === 'done') {
      // Fade out ambient over 2 seconds
      if (introAudioRef.current) {
        const a = introAudioRef.current;
        const fo = setInterval(() => {
          if (a.volume > 0.02) { try { a.volume = Math.max(0, a.volume - 0.01); } catch {} }
          else { a.pause(); a.volume = 0; clearInterval(fo); }
        }, 50);
      }
      // Stop any playing voice clips
      voiceClipsRef.current.forEach(a => { try { a.pause(); } catch {} });
      voiceClipsRef.current = [];
      const t0 = setTimeout(() => setBreathPhase('feeling'), 800);
      return () => clearTimeout(t0);
    }
  }, [breathPhase]);

  // Cleanup hold test interval + all audio on unmount
  useEffect(() => {
    return () => {
      if (holdIntervalRef.current) { clearInterval(holdIntervalRef.current); holdIntervalRef.current = null; }
      if (introAudioRef.current) { try { introAudioRef.current.pause(); introAudioRef.current.src = ''; } catch {} introAudioRef.current = null; }
      if (diveAudioRef.current) { try { diveAudioRef.current.pause(); diveAudioRef.current.src = ''; } catch {} diveAudioRef.current = null; }
      voiceClipsRef.current.forEach(a => { try { a.pause(); a.src = ''; } catch {} });
      voiceClipsRef.current = [];
    };
  }, []);

  // Background interpolation: pure black -> ocean gradient over 65s
  const bgProgress = Math.min(elapsed / 65, 1);
  const cinematicBg = breathPhase === 'cinematic'
    ? `linear-gradient(180deg, rgb(${Math.round(bgProgress*14)},${Math.round(bgProgress*61)},${Math.round(bgProgress*92)}) 0%, rgb(${Math.round(bgProgress*8)},${Math.round(bgProgress*42)},${Math.round(bgProgress*66)}) 33%, rgb(${Math.round(bgProgress*4)},${Math.round(bgProgress*21)},${Math.round(bgProgress*32)}) 66%, rgb(${Math.round(bgProgress*2)},${Math.round(bgProgress*10)},${Math.round(bgProgress*16)}) 100%)`
    : oceanBg;

  // Breath hold test depth calculation — uses global holdTimeToDepth + depthContext

  const startHoldTest = () => {
    setHoldTestPhase('splash');
    setHoldTime(0);
    // Play dive/splash audio
    try {
      const da = new Audio('audio/dive_underwater.mp3');
      da.currentTime = 0;
      da.volume = 0.5;
      diveAudioRef.current = da;
      da.play().catch(() => {});
      // After splash (4s), settle to ambient volume
      setTimeout(() => {
        let vol = 0.5;
        const settle = setInterval(() => {
          vol -= 0.01;
          if (vol <= 0.25) { vol = 0.25; clearInterval(settle); }
          try { da.volume = vol; } catch {}
        }, 50);
      }, 4000);
    } catch {}
    // Vibrate splash
    HAPTIC.splash();
    // After 2 seconds, start actual timer
    setTimeout(() => {
      setHoldTestPhase('holding');
      holdStartRef.current = Date.now();
      holdIntervalRef.current = setInterval(() => {
        if (!holdStartRef.current) return;
        const h = (Date.now() - holdStartRef.current) / 1000;
        setHoldTime(h);
      }, 100);
    }, 2000);
  };

  const stopHoldTest = () => {
    if (holdIntervalRef.current) { clearInterval(holdIntervalRef.current); holdIntervalRef.current = null; }
    // Fade out dive audio
    if (diveAudioRef.current) {
      const da = diveAudioRef.current;
      let vol = da.volume || 0.25;
      const fadeOut = setInterval(() => {
        vol -= 0.008;
        if (vol <= 0) { da.pause(); clearInterval(fadeOut); }
        else { try { da.volume = vol; } catch {} }
      }, 50);
    }
    if (!holdStartRef.current) { setHoldTestPhase('result'); return; }
    const finalTime = (Date.now() - holdStartRef.current) / 1000;
    holdStartRef.current = null;
    setHoldTime(finalTime);
    setHoldTestPhase('result');
  };

  // Goal screen (What brought you here?)
  if (breathPhase === 'goal') {
    return (
      <div className="fixed inset-0 flex flex-col items-center justify-center px-8" style={{background:oceanBg}}>
        <Particles world={fbWorld} />
        <div className="screen-transition text-center z-10">
          <div className="font-body mb-10" style={{fontSize:24, fontWeight:300, color:'rgba(226,232,240,0.95)', letterSpacing:'0.06em'}}>{t.whatBroughtYou}</div>
          <div className="flex flex-col gap-3 items-center">
            {[[t.stressRelief,'stress_relief'],[t.betterFocus,'better_focus'],[t.betterSleep,'better_sleep'],[t.moreEnergy,'more_energy']].map(([label,val]) => (
              <button key={val} className="glass px-8 py-3 font-body w-full max-w-xs"
                style={{fontWeight:500, fontSize:14, color:palette.accent, border:`1px solid rgba(${accentRgb},0.25)`}}
                onClick={() => onComplete(val, holdTime > 0 ? holdTime : null)}>
                {label}
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // Breath hold test screen
  if (breathPhase === 'holdTest') {
    const holdDepth = holdTimeToDepth(holdTime);
    if (holdTestPhase === 'intro') {
      return (
        <div className="fixed inset-0 flex flex-col items-center justify-center px-8" style={{background:oceanBg}}>
          <Particles world={fbWorld} />
          <div className="screen-transition text-center z-10">
            <div className="font-body mb-8" style={{fontSize:22, fontWeight:300, color:'rgba(226,232,240,0.95)', letterSpacing:'0.04em'}}>{t.holdTestTitle || "Let's find your depth"}</div>
            <div className="flex flex-col gap-3 mb-10" style={{maxWidth:260, margin:'0 auto 40px'}}>
              {[
                '1. Take a big breath IN through your nose',
                '2. Now hold it',
                '3. Tap when you need to breathe',
              ].map((step, i) => (
                <div key={i} className="font-body" style={{fontSize:14, fontWeight:300, color: i === 1 ? `rgba(${accentRgb},0.8)` : 'rgba(220,225,235,0.6)', letterSpacing:'0.02em', textAlign:'left', paddingLeft:8}}>{step}</div>
              ))}
            </div>
            <button className="px-10 py-3 rounded-full font-body"
              style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.3)`, color:palette.accent, letterSpacing:'0.05em'}}
              onClick={startHoldTest}>
              Hold &amp; Start
            </button>
          </div>
        </div>
      );
    }
    if (holdTestPhase === 'splash') {
      return (
        <div className="fixed inset-0 flex flex-col items-center justify-center px-8" style={{background:'linear-gradient(180deg, rgb(10,44,66) 0%, rgb(1,7,11) 100%)', transition:'background 1s linear'}}>
          <Particles world={fbWorld} />
          <div className="screen-transition text-center z-10">
            <div className="font-body" style={{fontSize:28, fontWeight:200, color:'rgba(94,170,168,0.8)', letterSpacing:'0.15em', animation:'hold-counter-pulse 1s ease-in-out infinite'}}>Diving...</div>
            <div className="font-mono mt-6" style={{fontSize:48, fontWeight:300, color:'rgba(220,225,235,0.3)'}}>—</div>
          </div>
        </div>
      );
    }
    if (holdTestPhase === 'holding') {
      const holdProgress = Math.min(holdTime / 120, 1);
      // Background DARKENS based on hold progress
      const progress = Math.min(1, holdTime / 60);
      const r1 = Math.round(14 * (1 - progress * 0.7));
      const g1 = Math.round(61 * (1 - progress * 0.7));
      const b1 = Math.round(92 * (1 - progress * 0.7));
      const r2 = Math.round(2 * (1 - progress * 0.7));
      const g2 = Math.round(10 * (1 - progress * 0.7));
      const b2 = Math.round(16 * (1 - progress * 0.7));
      const holdBg = `linear-gradient(180deg, rgb(${r1},${g1},${b1}) 0%, rgb(${r2},${g2},${b2}) 100%)`;
      return (
        <div className="fixed inset-0 flex flex-col items-center justify-center px-8" style={{background:holdBg}} onClick={stopHoldTest}>
          {/* Left-edge depth meter — fills downward */}
          <div style={{position:'fixed', left:'16px', top:'20%', bottom:'20%', width:'2px', background:'rgba(255,255,255,0.03)', borderRadius:'1px'}}>
            <div style={{position:'absolute', top:0, width:'2px', height:`${progress*100}%`, background:'rgba(94,170,168,0.3)', borderRadius:'1px', transition:'height 0.5s linear'}} />
            <div style={{position:'absolute', top:`${progress*100}%`, left:'8px', fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'rgba(94,170,168,0.4)'}}>
              {Math.round(holdTime * 0.8)}m
            </div>
          </div>
          <div className="screen-transition text-center z-10" style={{width:'100%'}}>
            <div className="font-mono" style={{fontSize:56, fontWeight:300, color:'rgba(220,225,235,0.9)', fontVariantNumeric:'tabular-nums', animation:'hold-counter-pulse 2s ease-in-out infinite'}}>{holdTime.toFixed(1)}</div>
            <div className="font-body mt-2 mb-8" style={{fontSize:13, fontWeight:400, color:'rgba(220,225,235,0.4)', letterSpacing:'0.05em'}}>{t.hold || 'Hold'}</div>
            {/* Pulsing tap-anywhere hint */}
            <div className="font-body hold-tap-hint" style={{fontSize:12, fontWeight:300, color:'rgba(220,225,235,0.5)', letterSpacing:'0.08em', marginBottom:24}}>tap anywhere to surface</div>
          </div>
        </div>
      );
    }
    if (holdTestPhase === 'result') {
      return (
        <div className="fixed inset-0 flex flex-col items-center justify-center px-8" style={{background:oceanBg}}>
          <Particles world={fbWorld} />
          <div className="screen-transition text-center z-10">
            <div className="font-body mb-6" style={{fontSize:16, fontWeight:300, color:'rgba(220,225,235,0.55)', letterSpacing:'0.04em'}}>Your starting depth</div>
            <div className="font-mono mb-2" style={{fontSize:48, fontWeight:300, color:palette.accent}}>{formatDepth(holdDepth)}<span style={{fontSize:24}}>m</span></div>
            <div className="font-body mb-3" style={{fontSize:15, fontWeight:300, color:'rgba(220,225,235,0.5)'}}>{depthContext(holdDepth)}</div>
            <div className="font-body mb-10" style={{fontSize:13, fontWeight:300, color:`rgba(${accentRgb},0.6)`, letterSpacing:'0.04em'}}>You descended {formatDepth(holdDepth)}m and surfaced safely.</div>
            <button className="px-10 py-3 rounded-full font-body"
              style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}
              onClick={() => setBreathPhase('goal')}>
              {t.continueText || 'Continue'}
            </button>
          </div>
        </div>
      );
    }
  }

  // Feeling screen
  if (breathPhase === 'feeling' || breathPhase === 'done') {
    return (
      <div className="fixed inset-0 flex flex-col items-center justify-center px-8" style={{background:oceanBg}}>
        <Particles world={fbWorld} />
        <div className="screen-transition text-center z-10">
          <div className="font-body mb-10" style={{fontSize:24, fontWeight:300, color:'rgba(226,232,240,0.95)', letterSpacing:'0.06em'}}>{t.howDoYouFeel}</div>
          <div className="flex gap-3 justify-center">
            {[[t.feelBetter,'better'],[t.feelCalmer,'calmer'],[t.feelCurious,'curious']].map(([label,val]) => (
              <button key={val} className="glass px-6 py-3 font-body"
                style={{fontWeight:500, fontSize:14, color:palette.accent, border:`1px solid rgba(${accentRgb},0.25)`}}
                onClick={() => { setBreathPhase('holdTest'); }}>
                {label}
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // TEXT SEQUENCE PHASE — cinematic text cards on black
  if (breathPhase === 'text_sequence') {
    const item = introTextIdx >= 0 && introTextIdx < INTRO_TEXTS.length ? INTRO_TEXTS[introTextIdx] : null;
    const textStyles = {
      title: { fontSize:42, fontWeight:200, letterSpacing:'0.3em', textTransform:'uppercase', color:'rgba(94,170,168,0.9)' },
      phrase: { fontSize:20, fontWeight:300, lineHeight:1.6, color:'rgba(220,225,235,0.70)' },
      tagline: { fontSize:24, fontWeight:400, color:'rgba(220,225,235,0.80)' },
      'tagline-accent': { fontSize:24, fontWeight:400, color:'rgba(94,170,168,0.9)' },
    };
    return (
      <div className="fixed inset-0 flex items-center justify-center" style={{background:'#000', zIndex:100}}
        onClick={() => setBreathPhase('cinematic')}>
        {item && (
          <p key={introTextIdx} className="font-body" style={{
            textAlign:'center', maxWidth:300, padding:'0 24px',
            opacity: introTextOpacity,
            filter: `blur(${introTextOpacity > 0.5 ? 0 : 6}px)`,
            transition: 'opacity 500ms ease, filter 500ms ease',
            ...textStyles[item.style],
          }}>
            {item.text}
          </p>
        )}
        <div className="font-body" style={{position:'fixed', bottom:40, left:'50%', transform:'translateX(-50%)', fontSize:11, color:'rgba(220,225,235,0.32)', letterSpacing:'0.06em'}}>
          tap to skip
        </div>
      </div>
    );
  }

  // CINEMATIC BREATHING PHASE
  const showBubble = bubbleReveal !== 'hidden';
  const bubbleOpacity = bubbleReveal === 'hidden' ? 0 : bubbleReveal === 'glow' ? 0.3 : bubbleReveal === 'forming' ? 0.8 : 1;
  const bubbleScale = bubbleReveal === 'hidden' ? 0.2 : bubbleReveal === 'glow' ? 0.4 : bubbleReveal === 'forming' ? 0.85 : 1;
  const lightSize = elapsed >= 1 ? Math.min((elapsed - 1) * 100, 320) : 0;
  const lightOpacity = elapsed >= 1 ? Math.min((elapsed - 1) * 0.4, 1) : 0;
  const smallTextOpacity = elapsed >= 4 ? Math.min((elapsed - 4) * 0.15, 0.45) : 0;

  return (
    <div className="fixed inset-0 flex flex-col items-center justify-center" style={{background:cinematicBg, transition:'background 1s linear'}}>
      {/* Teal light point emerges 1-4s */}
      {elapsed >= 1 && bubbleReveal !== 'ready' && (
        <div style={{
          position:'absolute', top:'50%', left:'50%', transform:'translate(-50%, -50%)',
          width: lightSize, height: lightSize, borderRadius:'50%',
          background:`radial-gradient(circle, rgba(94,170,168,${lightOpacity * 0.3}) 0%, rgba(94,170,168,${lightOpacity * 0.1}) 40%, transparent 70%)`,
          transition:'width 2s ease-out, height 2s ease-out',
        }} />
      )}
      {/* Small text: Take one breath with us */}
      {elapsed >= 4 && (
        <div className="font-body z-10" style={{
          position:'absolute', top:'22%', left:'50%',
          transform:'translate(-50%, -50%)',
          fontSize:14, fontWeight:300, letterSpacing:'0.06em',
          color:`rgba(220,225,235,${smallTextOpacity})`,
          textAlign:'center', width:'80%', maxWidth:300,
        }}>{t.takeOneBreath}</div>
      )}
      {/* Breathing bubble — animates during all cycles */}
      {showBubble && (
        <div style={{opacity:bubbleOpacity, transform:`scale(${bubbleScale})`, transition:'opacity 1500ms ease-out, transform 1500ms ease-out', width:'100%', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center'}}>
          {/* BUG1: positioned absolutely so translate(-50%,-50%) anchor works like session player */}
          <div ref={cinematicBubbleRef} style={{
            position:'absolute', top:'42%', left:'50%',
            width:'min(75vw, 300px)', aspectRatio:'1',
            willChange:'transform', transition:'none',
            transform:'translate(-50%, -50%) scale(1)',
            display:'flex', alignItems:'center', justifyContent:'center',
          }}>
            <OceanBubble />
            {/* FIX8: countdown inside cinematic bubble */}
            <div ref={cinematicTimerRef} style={{
              position:'absolute', top:'50%', left:'50%',
              transform:'translate(-50%,-50%)',
              fontFamily:"'JetBrains Mono',monospace",
              fontSize:36, fontWeight:300, fontVariantNumeric:'tabular-nums',
              color:'rgba(220,225,235,0.25)',
              pointerEvents:'none', userSelect:'none',
            }} />
          </div>
          {currentPhase && (

// ===== ANIMATED NUMBER COMPONENT =====
function AnimatedNumber({ value, suffix = '', duration = 1200 }) {
  const [display, setDisplay] = useState(0);
  useEffect(() => {
    if (!value) { setDisplay(0); return; }
    const startTime = performance.now();
    let raf;
    function tick() {
      const elapsed = performance.now() - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      setDisplay(value * eased);
      if (progress < 1) raf = requestAnimationFrame(tick);
    }
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [value]);
  if (typeof value === 'number' && Number.isInteger(value)) return Math.round(display) + suffix;
  return (typeof value === 'number' && value >= 10) ? Math.round(display) + suffix : display.toFixed(1) + suffix;
}

function formatDepth(meters) {
  if (!meters || isNaN(meters) || meters <= 0) return '0';
  if (meters < 10) return meters.toFixed(1);
  return Math.round(meters).toString();
}

// ===== ERROR BOUNDARY =====
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false };
  }
  static getDerivedStateFromError() {
    return { hasError: true };
  }
  componentDidCatch(error, info) {
    console.error('DIVE Error:', error, info);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', {
        style: {
          position: 'fixed', inset: 0,
          background: '#051225',
          display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center',
          color: 'rgba(220,225,235,0.7)',
          fontFamily: "'DM Sans', sans-serif",
          padding: '24px',
          textAlign: 'center',
        }
      },
        React.createElement('p', { style: { fontSize: '18px', marginBottom: '16px' } }, 'Something went wrong'),
        React.createElement('button', {
          onClick: () => window.location.reload(),
          style: {
            padding: '12px 24px', borderRadius: '12px',
            background: 'rgba(94,170,168,0.1)',
            border: '1px solid rgba(94,170,168,0.2)',
            color: 'rgba(94,170,168,0.8)',
            fontSize: '15px', cursor: 'pointer',
          }
        }, 'Restart')
      );
    }
    return this.props.children;
  }
}
