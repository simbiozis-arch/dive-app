          <div style={{color:palette.accent, opacity:0.4}}><Icon name={selectedProgram === 'first_dive' ? 'prog_bubble' : selectedProgram === 'stress_shield' ? 'prog_shield' : 'prog_target'} size={36}/></div>
          <div className="font-body mt-3" style={{fontSize:24, fontWeight:300, color:'rgba(226,232,240,0.95)', letterSpacing:'0.08em'}}>{t[nameKey]}</div>
          <div className="font-body mt-1" style={{fontSize:13, fontWeight:400, color:'var(--text-3)'}}>{t[subKey]}</div>
          <div className="mt-4 mx-auto" style={{height:2, borderRadius:1, background:'rgba(255,255,255,0.04)', maxWidth:200}}>
            <div style={{height:'100%', borderRadius:1, width:`${progress.length/prog.days*100}%`, background:`rgba(${accentRgb},0.6)`, transition:'width 1s ease'}} />
          </div>
          <div className="font-body mt-2" style={{fontSize:12, fontWeight:400, color:palette.accent, opacity:0.8}}>{progress.length} / {prog.days} {t.days}</div>
        </div>
        <div className="space-y-3">
          {prog.sessions.map((daySegs, i) => {
            const completed = progress.includes(i);
            const premiumLocked = !stats.isPremium && i > prog.trialDay;
            // Sequential unlock: day 0 always available, day N requires day N-1 completed
            const prevCompleted = i === 0 || progress.includes(i - 1);
            // Cooldown: if previous day completed today, show "available tomorrow"
            const prevCompletedToday = i > 0 && progress.includes(i - 1) && lastCompletionDate === today && hoursSinceLast < 12;
            const sequentialLocked = !completed && (!prevCompleted || prevCompletedToday);
            const locked = premiumLocked || sequentialLocked;
            let subText = '';
            if (completed) subText = t.completed;
            else if (premiumLocked) subText = t.locked;
            else if (!prevCompleted) subText = t.completePrevDay;
            else if (prevCompletedToday) subText = t.availableTomorrow;
            else subText = t.startDay;

            return (
              <button key={i} className="glass p-5 w-full text-left flex items-center gap-4"
                style={{opacity: locked && !completed ? 0.5 : 1}}
                onClick={() => { if (locked) { if (premiumLocked) setShowPaywall(true); return; } startSession(daySegs, {programId:selectedProgram, day:i, category:'program'}); }}>
                <div className="flex items-center justify-center rounded-full font-mono"
                  style={{width:40, height:40, fontWeight:300, fontSize:14, background: completed ? `rgba(${accentRgb},0.15)` : 'rgba(255,255,255,0.06)', border: completed ? `1px solid rgba(${accentRgb},0.3)` : '1px solid rgba(255,255,255,0.06)', color: completed ? palette.accent : 'rgba(226,232,240,0.5)'}}>
                  {completed ? <Icon name="check" size={16}/> : i + 1}
                </div>
                <div className="flex-1">
                  <div className="font-body" style={{fontWeight:600, fontSize:15, color:'rgba(255,255,255,0.92)'}}>{t.dayN} {i + 1}</div>
                  <div className="font-body" style={{fontSize:12, fontWeight:400, color:'rgba(255,255,255,0.4)', marginTop:3}}>
                    {subText}
                  </div>
                </div>
                {locked && !completed && <span style={{color:'var(--text-3)',opacity:0.5}}><Icon name="lock" size={16}/></span>}
              </button>
            );
          })}
        </div>
      </div>
    );
  };

  const renderPrograms = () => (
    <div className="screen-transition overflow-y-auto h-full no-scrollbar" style={{padding:'env(safe-area-inset-top, 48px) 24px 100px 24px'}}>
      <div className="font-body mb-8" style={{fontSize:24, fontWeight:300, color:'rgba(226,232,240,0.95)', letterSpacing:'0.1em'}}>{t.programs}</div>
      <div className="space-y-4">
        {Object.entries(PROGRAMS).map(([key, prog]) => {
          const progress = (stats.programProgress?.[key] || []).length;
          const nameKey = key === 'first_dive' ? 'firstDive' : key === 'stress_shield' ? 'stressShield' : 'deepFocus';
          const subKey = nameKey + 'Sub';
          return (
            <button key={key} className="glass p-6 w-full text-left"
              onClick={() => { setSelectedProgram(key); setScreen('program_view'); }}>
              <div className="flex items-center gap-4 mb-4">
                <span style={{color:palette.accent,opacity:0.5}}><Icon name={key === 'first_dive' ? 'prog_bubble' : key === 'stress_shield' ? 'prog_shield' : 'prog_target'} size={28}/></span>
                <div>
                  <div className="font-body" style={{fontWeight:600, fontSize:16, color:'rgba(255,255,255,0.92)'}}>{t[nameKey]}</div>
                  <div className="font-body" style={{fontSize:12, fontWeight:400, color:'rgba(255,255,255,0.4)', marginTop:2}}>{t[subKey]}</div>
                </div>
              </div>
              <div style={{height:2, borderRadius:1, background:'rgba(255,255,255,0.04)'}}>
                <div style={{height:'100%', borderRadius:1, width:`${progress/prog.days*100}%`, background:`rgba(${accentRgb},0.6)`, transition:'width 1s ease'}} />
              </div>
              <div className="font-body mt-2" style={{fontSize:12, fontWeight:400, color:palette.accent, opacity:0.7}}>{progress}/{prog.days} {t.days}</div>
            </button>
          );
        })}
      </div>
    </div>
  );

  const renderProfile = () => {
    const earned = BADGES.filter(b => b.condition(stats));
    return (
      <div className="screen-transition overflow-y-auto h-full no-scrollbar" style={{padding:'env(safe-area-inset-top, 48px) 24px 100px 24px'}}>
        <div className="font-body mb-4" style={{fontSize:24, fontWeight:300, color:'rgba(226,232,240,0.95)', letterSpacing:'0.1em'}}>{t.profile}</div>

        {/* Total depth — hero number */}
        <div className="text-center mb-6">
          <div className="font-mono" style={{fontSize:48, fontWeight:200, color:palette.accent}}>{stats.totalDepth}</div>
          <div className="font-body" style={{fontSize:12, fontWeight:400, color:'var(--text-3)', letterSpacing:'0.05em', marginTop:2}}>{t.totalDepth} ({WORLDS[world].depthUnit})</div>
        </div>

        {/* Other stats */}
        <div className="grid grid-cols-2 gap-3 mb-8">
          {[
            [stats.streak, t.dayStreak],
            [stats.totalSessions, t.sessions],
          ].map(([val, label], i) => (
            <div key={i} className="glass p-4 text-center">
              <div className="font-mono" style={{fontSize:22, fontWeight:300, color:palette.accent}}>{val}</div>
              <div className="font-body mt-2" style={{fontSize:11, fontWeight:400, color:'var(--text-3)', letterSpacing:'0.05em'}}>{label}</div>
            </div>
          ))}
        </div>

        {/* World switch — only show if space is unlocked */}
        {(() => {
          const spaceUnlocked = stats.isPremium || (stats.longestStreak || 0) >= 30;
          return spaceUnlocked ? (
            <div className="mb-8">
              <div className="font-body mb-4" style={{fontSize:13, fontWeight:600, color:'rgba(226,232,240,0.6)', letterSpacing:'0.06em', textTransform:'uppercase'}}>{t.world}</div>
              <div className="flex gap-3">
                {Object.entries(WORLDS).filter(([k]) => k !== 'memory').map(([key, wd]) => (
                  <button key={key} className="glass flex-1 p-4 text-center"
                    style={{border: world === key ? `1px solid rgba(${wd.palette.accentRgb},0.3)` : '1px solid rgba(255,255,255,0.06)', boxShadow: world === key ? `0 0 15px rgba(${wd.palette.accentRgb},0.1)` : 'none'}}
                    onClick={() => selectWorld(key)}>
                    <div style={{color:wd.palette.accent,opacity:0.5}}><Icon name="world" size={20}/></div>
                    <div className="font-body mt-2" style={{fontSize:12, fontWeight:400, color:'rgba(226,232,240,0.6)'}}>{t[key]}</div>
                  </button>
                ))}
              </div>
            </div>
          ) : null;
        })()}

        {/* Badges */}
        <div className="mb-8">
          <div className="font-body mb-4" style={{fontSize:13, fontWeight:600, color:'rgba(226,232,240,0.6)', letterSpacing:'0.06em', textTransform:'uppercase'}}>{t.badges} ({earned.length}/{BADGES.length})</div>
          <div className="grid grid-cols-4 gap-2">
            {BADGES.map(b => {
              const has = b.condition(stats);
              return (
                <div key={b.id} className="glass p-3 text-center" style={{opacity: has ? 1 : 0.25}}>
                  <div style={{color: has ? palette.accent : 'var(--text-3)', opacity: has ? 0.8 : 0.4}}><Icon name="check" size={20}/></div>
                  <div className="font-body mt-1" style={{fontSize:10, fontWeight:400, color:'rgba(226,232,240,0.6)'}}>{BADGE_NAMES[b.id]}</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Settings */}
        <div className="mb-8">
          <div className="font-body mb-4" style={{fontSize:13, fontWeight:600, color:'rgba(226,232,240,0.6)', letterSpacing:'0.06em', textTransform:'uppercase'}}>{t.settings}</div>
          <div className="glass p-5 space-y-4">
            {[
              [t.ambientSound, 'soundEnabled'],
              [t.vibration, 'vibrateEnabled'],
            ].map(([label, key]) => (
              <div key={key} className="flex items-center justify-between">
                <span className="font-body" style={{fontSize:14, fontWeight:400, color:'rgba(226,232,240,0.75)'}}>{label}</span>
                <button className="relative rounded-full" style={{width:44, height:24, background: stats[key] ? `rgba(${accentRgb},0.25)` : 'rgba(255,255,255,0.1)', border:'1px solid rgba(255,255,255,0.06)', transition:'all 200ms ease'}}
                  onClick={() => setStats(s => ({...s, [key]:!s[key]}))}>
                  <div className="absolute rounded-full transition-all" style={{top:3, width:16, height:16, background: stats[key] ? palette.accent : 'rgba(255,255,255,0.3)', left: stats[key] ? 'calc(100% - 20px)' : '4px'}} />
                </button>
              </div>
            ))}
            {/* Voice narration toggle */}
            <div className="flex items-center justify-between">
              <span className="font-body" style={{fontSize:14, fontWeight:400, color:'rgba(226,232,240,0.75)'}}>{t.voiceNarration}</span>
              <button className="relative rounded-full" style={{width:44, height:24, background: stats.voiceEnabled ? `rgba(${accentRgb},0.25)` : 'rgba(255,255,255,0.1)', border:'1px solid rgba(255,255,255,0.06)', transition:'all 200ms ease'}}
                onClick={() => setStats(s => ({...s, voiceEnabled:!s.voiceEnabled}))}>
                <div className="absolute rounded-full transition-all" style={{top:3, width:16, height:16, background: stats.voiceEnabled ? palette.accent : 'rgba(255,255,255,0.3)', left: stats.voiceEnabled ? 'calc(100% - 20px)' : '4px'}} />
              </button>
            </div>
            {/* Language switch */}
            <div className="flex items-center justify-between">
              <span className="font-body" style={{fontSize:14, fontWeight:400, color:'rgba(226,232,240,0.75)'}}>{t.language}</span>
              <select className="font-body rounded-lg px-3 py-1" style={{fontSize:13, fontWeight:400, background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.08)', color:'rgba(226,232,240,0.75)', outline:'none'}}
                value={currentLang} onChange={e => setCurrentLang(e.target.value)}>
                <option value="en">English</option>
                <option value="ru">Русский</option>
                <option value="zh">中文</option>
                <option value="ar">العربية</option>
              </select>
            </div>
            <div className="flex items-center justify-between">
              <span className="font-body" style={{fontSize:14, fontWeight:400, color:'rgba(226,232,240,0.75)'}}>{t.premium}</span>
              <span className="font-body" style={{fontSize:13, fontWeight:500, color: stats.isPremium ? palette.accent : 'var(--text-3)'}}>{stats.isPremium ? t.active : t.free}</span>
            </div>
          </div>
        </div>

        {/* History */}
        {stats.history.length > 0 && (
          <div className="mb-8">
            <div className="font-body mb-4" style={{fontSize:13, fontWeight:600, color:'rgba(226,232,240,0.6)', letterSpacing:'0.06em', textTransform:'uppercase'}}>{t.history}</div>
            <div className="space-y-2">
              {stats.history.slice(-5).reverse().map((h, i) => (
                <div key={i} className="glass p-4 flex items-center gap-3">
                  <span style={{color:palette.accent,opacity:0.4}}><Icon name={SCENARIOS[h.scenario]?.svgIcon || 'check'} size={16}/></span>
                  <div className="flex-1">
                    <div className="font-body" style={{fontSize:14, fontWeight:500, color:'rgba(226,232,240,0.85)'}}>{t[SCENARIO_LANG_KEY[h.scenario]] || h.scenario}</div>
                    <div className="font-body" style={{fontSize:11, fontWeight:400, color:'var(--text-3)', marginTop:2}}>{new Date(h.date).toLocaleDateString(currentLang === 'zh' ? 'zh-CN' : currentLang === 'ar' ? 'ar' : currentLang)}</div>
                  </div>
                  <div className="font-mono" style={{fontSize:12, fontWeight:300, color:palette.accent}}>{Math.round(h.duration/60)}{t.min}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Reset */}
        <button className="w-full py-3 font-body rounded-full" style={{fontSize:13, fontWeight:400, color:'rgba(252,129,129,0.6)', border:'1px solid rgba(252,129,129,0.15)'}}
          onClick={() => { if (confirm(t.resetConfirm)) { setStats(defaultStats()); setScreen('lang_select'); }}}>
          {t.resetProgress}
        </button>
      </div>
    );
  };

  const renderScreen = () => {
    if (screen === 'category') return renderCategory();

    if (screen === 'program_view') return renderProgramView();
    switch (tab) {
      case 'home': return renderHome();
      case 'quick': return renderQuickDive();
      case 'programs': return renderPrograms();
      case 'profile': return renderProfile();
      default: return renderHome();
    }
  };

  const showTabs = !['category','program_view'].includes(screen);

  return (
    <div className="fixed inset-0" style={{background:bg}}>
      <Particles world={world} />
      <div className="relative z-10 h-full">
        {renderScreen()}
      </div>

      {/* Tab bar */}
      {showTabs && (
        <div className="fixed bottom-0 left-0 right-0 z-40" style={{background:'rgba(7,12,21,0.85)', backdropFilter:'blur(20px)', WebkitBackdropFilter:'blur(20px)', borderTop:'1px solid rgba(255,255,255,0.04)'}}>
          <div className="flex justify-around" style={{paddingTop:12, paddingBottom:'env(safe-area-inset-bottom, 24px)'}}>
            {[
              {id:'home', svgIcon:'home', labelKey:'home'},
              {id:'quick', svgIcon:'quick', labelKey:'explore'},
              {id:'programs', svgIcon:'programs', labelKey:'programs'},
              {id:'profile', svgIcon:'profile', labelKey:'profile'},
            ].map(tb => (
              <button key={tb.id} className="flex flex-col items-center py-1 px-3" style={{gap:3}}
                onClick={() => { setTab(tb.id); if (['category','program_view'].includes(screen)) setScreen('home'); }}>
                <span style={{color: tab === tb.id ? palette.accent : 'var(--text-3)', transition:'color 200ms ease'}}><Icon name={tb.svgIcon} size={20}/></span>
                <span className="font-body" style={{fontSize:10, fontWeight:500, letterSpacing:'0.03em', color: tab === tb.id ? palette.accent : 'var(--text-3)', transition:'color 200ms ease'}}>{t[tb.labelKey]}</span>
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Surface breath overlay */}
      {showSurfaceBreath && (
        <div className="fixed inset-0 z-50 flex items-center justify-center" style={{background:'rgba(0,0,0,0.8)', backdropFilter:'blur(16px)'}}>
          <div className="screen-transition text-center z-10 px-8">
            <div className="font-body mb-4" style={{fontSize:20, fontWeight:300, color:'rgba(226,232,240,0.95)'}}>{t.missedYesterday}</div>
            <div className="font-body mb-8" style={{fontSize:14, fontWeight:400, color:'var(--text-2)', maxWidth:280, margin:'0 auto', lineHeight:1.6}}>
              {(t.surfaceBreathOffer || '').replace('{N}', surfaceBreathStreak)}
            </div>
            <div className="flex flex-col gap-3 items-center">
              <button className="px-8 py-3 rounded-full font-body w-full max-w-xs"
                style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}
                onClick={() => {
                  setShowSurfaceBreath(false);
                  // Launch 60s cyclic sigh (6 cycles x 10s)
                  const surfaceSegs = [
                    { type:'breathing', technique:'physiological_sigh', duration:60, params:{ inhale1:2, inhale2:1, exhale:7 } }
                  ];
                  startSession(surfaceSegs, {scenario:'surface_breath', category:'recovery'});
                  // Preserve streak + 1
                  setStats(s => {
                    const newStreak = s.streak + 1;
                    return {...s, streak: newStreak, longestStreak: Math.max(s.longestStreak || 0, newStreak), lastSessionDate: new Date().toISOString().split('T')[0]};
                  });
                }}>
                {t.surfaceBreathButton}
              </button>
              <button className="px-8 py-3 rounded-full font-body w-full max-w-xs"
                style={{fontWeight:400, fontSize:13, color:'var(--text-3)', border:'1px solid rgba(255,255,255,0.06)'}}
                onClick={() => {
                  setShowSurfaceBreath(false);
                  setStats(s => ({...s, streak: 0}));
                }}>
                {t.letItGo}
              </button>
            </div>
          </div>
        </div>
      )}

      {showPaywall && <PaywallModal />}

      {/* Weekly summary overlay */}
      {showWeekly && (() => {
        const weekSessions = stats.history?.filter(h => {
          const d = new Date(h.date);
          return (Date.now() - d.getTime()) < 7 * 86400000;
        }) || [];
        const weekMinutes = weekSessions.reduce((s, h) => s + Math.round((h.duration || 0) / 60), 0);
        const weekDepth = Math.round(stats.totalDepth * 10) / 10;
        // Most used technique from recent history
        const techCounts = {};
        (stats.history || []).slice(-20).forEach(h => {
          if (h.scenario) {
            const sc = SCENARIOS[h.scenario];
            if (sc) {
              const content = getSessionContent(t, world)[h.scenario];
              if (content) {
                const firstDur = Object.keys(content)[0];
                const segs = content[firstDur] || [];
                segs.filter(s => s.type === 'breathing').forEach(s => {
                  techCounts[s.technique] = (techCounts[s.technique] || 0) + 1;
                });
              }
            }
          }
        });
        const topTech = Object.entries(techCounts).sort((a,b) => b[1] - a[1])[0];
        const topTechLabel = topTech ? (t[TECHNIQUE_LANG_KEY[topTech[0]]] || topTech[0]) : '-';
        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center" style={{background:'rgba(0,0,0,0.8)', backdropFilter:'blur(16px)'}}>
            <div className="screen-transition text-center z-10 px-8">
              <div className="font-body mb-8" style={{fontSize:14, fontWeight:600, color:palette.accent, letterSpacing:'0.15em'}}>{t.thisWeek}</div>
              {/* Hero depth number */}
              <div className="text-center mb-6">
                <div className="font-mono" style={{fontSize:48, fontWeight:300, color:palette.accent}}>{weekDepth}</div>
                <div className="font-body" style={{fontSize:12, fontWeight:400, color:'var(--text-3)', marginTop:4}}>{t.weeklyDepth}</div>
              </div>
              <div className="flex gap-6 justify-center mb-8">
                {[[weekSessions.length, t.weeklyDives],[weekMinutes, t.weeklyMinutes],[stats.streak, t.dayStreak]].map(([val,label],i) => (
                  <div key={i} className="text-center">
                    <div className="font-mono" style={{fontSize:28, fontWeight:300, color:palette.accent}}>{val}</div>
                    <div className="font-body" style={{fontSize:11, fontWeight:400, color:'var(--text-3)', marginTop:4}}>{label}</div>
                  </div>
                ))}
              </div>
              <div className="glass p-4 mx-auto mb-8" style={{maxWidth:200}}>
                <div className="font-body" style={{fontSize:11, fontWeight:500, color:'var(--text-3)', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:4}}>{t.mostUsed}</div>
                <div className="font-body" style={{fontSize:16, fontWeight:400, color:'rgba(226,232,240,0.9)'}}>{topTechLabel}</div>
              </div>
              <button className="px-10 py-3 rounded-full font-body"
                style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}
                onClick={() => { setShowWeekly(false); setStats(s => ({...s, lastWeeklySummary: new Date().toISOString()})); }}>
                {t.continueText}
              </button>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
} catch(e) {
  document.getElementById('root').innerHTML = '<pre style="color:red;padding:20px">'+e.message+'\n'+e.stack+'</pre>';
}
</script>
</body>
</html>
