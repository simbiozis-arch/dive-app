    }
  }, []);
  useEffect(() => {
    saveData(stats);
    // Cloud sync: debounced save to Supabase
    if (authUser && !isDemo(authUser)) {
      const t = setTimeout(() => cloudSaveProfile(authUser.id, stats), 2000);
      return () => clearTimeout(t);
    }
  }, [stats, authUser]);

  // Sync from cloud on auth
  useEffect(() => {
    if (!authUser || isDemo(authUser)) return;
    (async () => {
      await flushPendingSync(authUser.id);
      const cloudData = await cloudLoadProfile(authUser.id);
      if (cloudData) {
        // Merge: cloud wins if it has more sessions
        const local = loadData() || defaultStats();
        if ((cloudData.totalSessions || 0) >= (local.totalSessions || 0)) {
          setStats({ ...defaultStats(), ...cloudData });
        }
      }
    })();
  }, [authUser]);

  // Flush pending sync on reconnect
  useEffect(() => {
    const handleOnline = () => { if (authUser && !isDemo(authUser)) flushPendingSync(authUser.id); };
    window.addEventListener('online', handleOnline);
    return () => window.removeEventListener('online', handleOnline);
  }, [authUser]);

  // P1.2: Background audio — resume on app visibility restore
  useEffect(() => {
    const handleVisibility = () => {
      if (!document.hidden) {
        // App resumed — resume AudioContext if suspended
        if (ambientRef.current?.ctx?.state === 'suspended') {
          ambientRef.current.ctx.resume();
        }
        // Resume voice audio if playing
        if (voicePlayer.current && voicePlayer.current.paused) {
          voicePlayer.current.play().catch(() => {});
        }
      }
      // When hidden: do nothing — let audio continue naturally
    };
    document.addEventListener('visibilitychange', handleVisibility);
    return () => document.removeEventListener('visibilitychange', handleVisibility);
  }, []);

  // Apply CSS vars for world
  useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty('--accent', palette.accent);
    r.style.setProperty('--accent-rgb', accentRgb);
    r.style.setProperty('--accent-text', palette.accent);
    r.style.setProperty('--glow', palette.glow);
  }, [world]);

  useEffect(() => {
    if (!stats.lastSessionDate) return;
    const last = new Date(stats.lastSessionDate);
    const today = new Date();
    const diffDays = Math.floor((today - last) / 86400000);
    if (diffDays >= 2 && stats.streak > 0) {
      // Missed 2+ days — offer surface breath to save streak
      setSurfaceBreathStreak(stats.streak);
      setShowSurfaceBreath(true);
    }
  }, []);

  // Breath retest check
  useEffect(() => {
    if (screen === 'home' && stats.onboarded) {
      const lastTest = (stats.breathTests || [])[((stats.breathTests || []).length) - 1];
      const days = lastTest ? Math.floor((Date.now() - new Date(lastTest.date).getTime()) / 86400000) : 999;
      // Check dismiss — only re-show after 1 day from dismiss
      const dismissDate = stats.lastRetestDismiss;
      const daysSinceDismiss = dismissDate ? Math.floor((Date.now() - new Date(dismissDate).getTime()) / 86400000) : 999;
      if (days >= 7 && (stats.totalSessions || 0) >= 3 && daysSinceDismiss >= 1 && !showRetestPrompt) {
        setRetestDays(days);
        setShowRetestPrompt(true);
      }
    }
  }, [screen]);

  const updateStats = (sessionInfo) => {
    const now = new Date();
    const today = now.toISOString().split('T')[0];
    const hour = now.getHours();
    setStats(prev => {
      const newTechs = [...new Set([...(prev.techniquesUsed||[]), ...(sessionInfo.techniques||[])])];
      const newCats = [...new Set([...(prev.categoriesUsed||[]), sessionInfo.category].filter(Boolean))];
      const isNight = hour >= 21 || hour <= 5;
      const isMorning = hour >= 5 && hour < 9;
      let streak = prev.streak;
      if (prev.lastSessionDate !== today) {
        const last = prev.lastSessionDate ? new Date(prev.lastSessionDate) : null;
        const diff = last ? Math.floor((new Date(today) - last) / 86400000) : 2;
        streak = diff === 1 ? prev.streak + 1 : 1;
      }
      const longestStreak = Math.max(prev.longestStreak || 0, streak);
      const depth = sessionDepth(sessionInfo.duration || 0, sessionInfo.mainTechnique || 'diaphragmatic', prev.level || 'basic');
      const newTechStats = {...(prev.techniqueStats || {})};
      (sessionInfo.techniques || []).forEach(tc => { newTechStats[tc] = (newTechStats[tc] || 0) + 1; });
      return {
        ...prev, totalSessions: prev.totalSessions + 1, streak, longestStreak, lastSessionDate: today,
        totalDepth: Math.round((prev.totalDepth + depth) * 10) / 10,
        totalMinutes: prev.totalMinutes + Math.round((sessionInfo.duration || 0) / 60),
        totalSeconds: (prev.totalSeconds || 0) + (sessionInfo.duration || 0),
        techniquesUsed: newTechs, categoriesUsed: newCats,
        nightSessions: prev.nightSessions + (isNight ? 1 : 0),
        morningSessions: prev.morningSessions + (isMorning ? 1 : 0),
        techniqueStats: newTechStats,
        history: [...prev.history, { date: now.toISOString(), scenario: sessionInfo.scenario, scenarioKey: sessionInfo.scenario, duration: sessionInfo.duration, category: sessionInfo.category, depth, mainTechnique: sessionInfo.mainTechnique || 'diaphragmatic', preMood: sessionInfo.preMood != null ? sessionInfo.preMood : null }].slice(-100),
      };
    });
  };

  const mergeConsecutiveTexts = (segs) => {
    const result = [];
    for (let i = 0; i < segs.length; i++) {
      if (segs[i].type === 'text' && result.length > 0 && result[result.length - 1].type === 'text') {
        const prev = result[result.length - 1];
        prev.duration = (prev.duration || 5) + (segs[i].duration || 5) + 2;
        prev.texts = prev.texts || [prev.text || prev.textKey];
        prev.texts.push(segs[i].text || segs[i].textKey);
      } else {
        result.push({...segs[i]});
      }
    }
    return result;
  };

  const actuallyStartSession = (segments, meta = {}) => {
    // Apply adaptive difficulty level timings to breathing segments
    const userLevel = stats.level || 'basic';
    segments.forEach(seg => {
      if (seg.type === 'breathing' && seg.technique !== 'custom') {
        const levelTimings = getSessionTimings(seg.technique, userLevel);
        if (levelTimings && Object.keys(levelTimings).length > 0) {
          seg.params = { ...seg.params, ...levelTimings };
        }
      }
    });
    const mergedSegs = mergeConsecutiveTexts(segments);
    ph('session_start', { scenario: meta?.scenario, technique: segments.find(s=>s.type==='breathing')?.technique, duration: segments.reduce((a,s)=>a+(s.duration||0),0), level: userLevel });
    setActiveSession({ segments: mergedSegs, meta });
    if (stats.soundEnabled) { ambientRef.current.init(WORLDS[world].ambient); ambientRef.current.fadeIn(); }
    // P1.2: MediaSession metadata so lock screen shows session info
    if ('mediaSession' in navigator) {
      try {
        navigator.mediaSession.metadata = new window.MediaMetadata({
          title: 'DIVE — Breathing Session',
          artist: 'DIVE',
        });
        navigator.mediaSession.setActionHandler('pause', () => {});
      } catch(e) {}
    }
  };

  const [showPreMood, setShowPreMood] = useState(false);
  const [pendingSessionData, setPendingSessionData] = useState(null);
  const preMoodTimerRef = useRef(null);

  const startSession = (segments, meta = {}, options = {}) => {
    setCurrentMood({pre: options.preMood != null ? options.preMood : null, post:null});
    setMoodDelta(null);
    if (options.skipPreMood) {
      // Skip pre-mood screen entirely (e.g. SOS flow already asked)
      actuallyStartSession(segments, meta);
    } else {
      setPendingSessionData({ segments, meta });
      setShowPreMood(true);
    }
  };

  // Auto-dismiss pre-mood after 5 seconds
  useEffect(() => {
    if (showPreMood && pendingSessionData) {
      preMoodTimerRef.current = setTimeout(() => {
        setShowPreMood(false);
        actuallyStartSession(pendingSessionData.segments, pendingSessionData.meta);
        setPendingSessionData(null);
      }, 5000);
      return () => clearTimeout(preMoodTimerRef.current);
    }
  }, [showPreMood, pendingSessionData]);


  const endSession = (completed = true, actualData = null) => {
    ambientRef.current.fadeOut();
    setTimeout(() => ambientRef.current.destroy(), 2500);
    if (completed && activeSession) {
      const segs = activeSession.segments;
      const totalDur = segs.reduce((s, seg) => s + seg.duration, 0);
      const techs = [...new Set(segs.filter(s => s.type === 'breathing').map(s => s.technique))];
      const breathSegs = segs.filter(s => s.type === 'breathing');
      const mainTech = breathSegs.length > 0 ? breathSegs.reduce((a, b) => b.duration > a.duration ? b : a).technique : 'diaphragmatic';
      const actualDur = (actualData && actualData.actualElapsed > 0) ? actualData.actualElapsed : totalDur;
      updateStats({ duration: actualDur, techniques: techs, category: activeSession.meta?.category, scenario: activeSession.meta?.scenario, mainTechnique: mainTech, preMood: currentMood.pre });
      if (activeSession.meta?.programId && activeSession.meta?.day !== undefined) {
        setStats(prev => {
          const pp = {...(prev.programProgress || {})};
          if (!pp[activeSession.meta.programId]) pp[activeSession.meta.programId] = [];
          if (!pp[activeSession.meta.programId].includes(activeSession.meta.day)) pp[activeSession.meta.programId] = [...pp[activeSession.meta.programId], activeSession.meta.day];
          const prog = PROGRAMS[activeSession.meta.programId];
          const programsCompleted = prog && pp[activeSession.meta.programId].length >= prog.days ? prev.programsCompleted + 1 : prev.programsCompleted;
          return {...prev, programProgress: pp, programsCompleted};
        });
      }
      const breathCycles = (actualData && actualData.actualBreathCycles > 0)
        ? actualData.actualBreathCycles
        : (segs.filter(s => s.type === 'breathing').reduce((total, s) => {
            const cycleDur = Object.values(s.params).reduce((a, b) => a + b, 0);
            return total + (cycleDur > 0 ? Math.floor(s.duration / cycleDur) : 0);
          }, 0) || Math.round(totalDur / 16));
      const cData = { duration: actualDur, techniques: techs, depth: sessionDepth(actualDur, mainTech, stats.level || 'basic'), breathCycles, segments: segs, _lastScenario: activeSession.meta?.scenario };
      ph('session_complete', { scenario: activeSession.meta?.scenario, depth: cData.depth, preMood: currentMood.pre, postMood: currentMood.post });
      setActiveSession(null);
      setShowSurfacing(true);
      setTimeout(() => {
        setShowSurfacing(false);
        setCompletionData(cData);
        setShowCompletion(true);
      }, 2200);
      return;
    }
    ph('session_exit', { scenario: activeSession?.meta?.scenario });
    setActiveSession(null);
  };

  const checkAccess = (item, dur) => {
    if (stats.isPremium) return true;
    if (!item.free) return false;
    // Free scenarios: 10min versions are premium only
    if (dur && dur >= 10) return false;
    return true;
  };

  const bg = getDepthBackground(stats.totalDepth);

  // ===== CUSTOM PATTERN HELPERS =====
  function saveCustomPattern(pattern) {
    const newPattern = {
      id: Date.now().toString(),
      name: pattern.name || ('Custom ' + (customPatterns.length + 1)),
      inhale: pattern.inhale,
      holdIn: pattern.holdIn,
      exhale: pattern.exhale,
      holdOut: pattern.holdOut,
      extraSip: pattern.extraSip,
      sessionMode: pattern.sessionMode,
      sessionLength: pattern.sessionLength,
      createdAt: new Date().toISOString(),
    };
    const updated = [...customPatterns, newPattern];
    setCustomPatterns(updated);
    localStorage.setItem('dive_custom_patterns', JSON.stringify(updated));
    return newPattern;
  }

  function customPatternToSegments(pattern) {
    const params = {};
    if (pattern.inhale > 0) params.inhale = pattern.inhale;
    if (pattern.extraSip) params.inhale2 = 1;
    if (pattern.holdIn > 0) params.holdIn = pattern.holdIn;
    if (pattern.exhale > 0) params.exhale = pattern.exhale;
    if (pattern.holdOut > 0) params.holdOut = pattern.holdOut;
    let duration;
    if (pattern.sessionMode === 'cycles') {
      const cycleLen = (pattern.inhale||0) + (pattern.extraSip?1:0) + (pattern.holdIn||0) + (pattern.exhale||0) + (pattern.holdOut||0);
      duration = cycleLen * (pattern.sessionLength || 5);
    } else {
      duration = (pattern.sessionLength || 3) * 60;
    }
    return [{ type: 'breathing', technique: 'custom', duration, params }];
  }

  function startBreathTest() {
    setShowRetestPrompt(false);
    setScreen('first_breath');
  }

  function getAdaptedParams(technique, baseParams) {
    const level = getDifficultyLevel(stats?.bestHoldDepth || 0);
    if (!level) return baseParams;
    const t2 = level.timings;
    switch(technique) {
      case 'box': return { inhale: t2.box.i, holdIn: t2.box.hIn, exhale: t2.box.e, holdOut: t2.box.hOut };
      case 'physiological_sigh': return { inhale1: t2.sigh.i1, inhale2: t2.sigh.i2, exhale: t2.sigh.e };
      case 'diaphragmatic': return { inhale: t2.exhale.i, exhale: t2.exhale.e };
      default: return baseParams;
    }
  }



  // ===== AUTH GATE =====
  if (authLoading) {
    return (<div style={{position:'fixed',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(180deg,#0e3d5c 0%,#020a10 100%)'}}>
      <p style={{fontFamily:"'DM Sans',sans-serif",fontWeight:200,fontSize:'24px',letterSpacing:'0.2em',color:'rgba(94,170,168,0.5)'}}>DIVE</p>
    </div>);
  }
  if (!authUser) {
    return <AuthScreen onDemo={() => setAuthUser({ id: 'demo', isDemo: true })} />;
  }

  // ===== FIRST BREATH SCREEN =====
  if (screen === 'first_breath') {
    return <FirstBreathScreen palette={palette} accentRgb={accentRgb} t={t} ambientRef={ambientRef}
      onComplete={(goal, holdTimeResult) => {
        if (!isReplayIntro) {
          setStats(s => {
            const hDepth = holdTimeResult ? holdTimeToDepth(holdTimeResult) : null;
            const newState = {...s, firstFeeling: goal, userGoal: goal, onboarded:true, introSeen:true, world:'ocean', initialHoldTime: holdTimeResult ? Math.round(holdTimeResult*10)/10 : null, initialDepth: hDepth, totalDepth: hDepth ? Math.round((s.totalDepth + hDepth) * 10) / 10 : s.totalDepth};
            if (holdTimeResult && holdTimeResult > 0) {
              newState.breathTests = [...(s.breathTests || []), { date: new Date().toISOString(), holdTime: Math.round(holdTimeResult*10)/10, depth: hDepth }];
              // Also save to standalone localStorage array for cross-reference
              try {
                const tests = JSON.parse(localStorage.getItem('dive-breath-tests') || '[]');
                tests.push({ date: new Date().toISOString(), holdTime: Math.round(holdTimeResult*10)/10, depth: hDepth });
                localStorage.setItem('dive-breath-tests', JSON.stringify(tests));
              } catch(e) {}
              // Update difficulty level (only upgrade)
              const newBestDepth = Math.max(s.bestHoldDepth || 0, hDepth || 0);
              const newLevel = getDifficultyLevel(newBestDepth);
              const currentLevelIdx = DIFFICULTY_LEVELS.findIndex(l => l.id === (s.difficultyLevel || 'beginner'));
              const newLevelIdx = DIFFICULTY_LEVELS.findIndex(l => l.id === newLevel.id);
              newState.bestHoldDepth = newBestDepth;
              newState.difficultyLevel = newLevelIdx > currentLevelIdx ? newLevel.id : (s.difficultyLevel || 'beginner');
              // Update adaptive level (LEVELS system)
              const allTests = [...(s.breathTests || []), { holdTime: Math.round(holdTimeResult*10)/10 }];
              const newAdaptiveLevel = determineLevel(allTests);
              if (LEVELS[newAdaptiveLevel].id > LEVELS[s.level || 'basic'].id) {
                newState.level = newAdaptiveLevel;
              }
              newState.lastRetestDate = new Date().toISOString();
              if (newLevelIdx > currentLevelIdx) {
                setLevelUpMessage('Level up! You are now ' + newLevel.label);
              }
            }
            return newState;
          });
          ph('onboarding_complete', { goal, holdTime: holdTimeResult });
        }
        setIsReplayIntro(false);
        setScreen('home'); setTab('home');
      }} />;
  }


  // Pre-mood overlay
  if (showPreMood && pendingSessionData) {
    return (
      <div className="fixed inset-0 flex flex-col items-center justify-center" style={{background:bg, zIndex:50}}>
        <Particles world={world} />
        <div className="z-10 text-center">
          <p className="font-body" style={{fontWeight:300, fontSize:20, color:'var(--text)', marginBottom:32}}>How are you feeling?</p>
          <div style={{display:'flex', gap:16, justifyContent:'center'}}>
            {[1,2,3,4,5].map(n => (
              <button key={n} onClick={() => {
                if (preMoodTimerRef.current) clearTimeout(preMoodTimerRef.current);
                setCurrentMood(m => ({...m, pre:n}));
                setShowPreMood(false);
                actuallyStartSession(pendingSessionData.segments, pendingSessionData.meta);
                setPendingSessionData(null);
              }} style={{
                width:48, height:48, borderRadius:'50%',
                border:'1px solid rgba(255,255,255,0.08)', background:'transparent',
                fontFamily:"'JetBrains Mono',monospace", fontWeight:300, fontSize:18,
                color:'var(--text-2)', display:'flex', alignItems:'center', justifyContent:'center',
                cursor:'pointer',
              }}>{n}</button>
            ))}
          </div>
          <div style={{display:'flex', justifyContent:'space-between', width:280, margin:'12px auto 0'}}>
            <span style={{fontSize:11, color:'var(--text-3)'}}>calm</span>
            <span style={{fontSize:11, color:'var(--text-3)'}}>stressed</span>
          </div>
          <button onClick={() => {
            if (preMoodTimerRef.current) clearTimeout(preMoodTimerRef.current);
            setShowPreMood(false);
            actuallyStartSession(pendingSessionData.segments, pendingSessionData.meta);
            setPendingSessionData(null);
          }} style={{marginTop:32, fontSize:13, color:'var(--text-3)', background:'none', border:'none', cursor:'pointer'}}>Skip</button>
        </div>
      </div>
    );
  }

  // Active session
  if (activeSession) {
    return <SessionPlayer segments={activeSession.segments} world={world} onComplete={(actualData) => endSession(true, actualData)} onExit={() => endSession(false)} t={t} voiceEnabled={stats.voiceEnabled} ambientRef={ambientRef} currentLang={currentLang} />;
  }

  // Surfacing transition
  if (showSurfacing) {
    return (
      <div className="fixed inset-0 flex items-center justify-center" style={{background:'linear-gradient(180deg, #0e3d5c 0%, #082a42 100%)'}}>
        <Particles world={world} />
        <div className="z-10 text-center">
          <div className="font-body" style={{fontSize:18, fontWeight:200, color:'rgba(220,225,235,1)', opacity:0.25, letterSpacing:'0.15em', animation:'surfaceUp 2.2s ease-out forwards'}}>Surfacing</div>
        </div>
      </div>
    );
  }

  // Completion
  if (showCompletion && completionData) {
    const earnedBadges = BADGES.filter(b => b.condition(stats));
    // Note: no useMemo here — conditional hooks violate React rules
    const sessionInsight = getSessionInsight(stats, completionData, currentLang);
    const closeCompletion = () => { setShowCompletion(false); setCompletionData(null); setCompletionStep('stats'); setCompletionFeeling(null); setMoodDelta(null); };
    return (
      <div className="fixed inset-0 flex flex-col items-center justify-center px-8" style={{background:bg}}>
        <div style={{position:'absolute',top:'-50%',left:'50%',width:'200%',height:'100%',transform:'translateX(-50%)',
          background:`radial-gradient(ellipse at 50% 0%, rgba(${accentRgb},0.08) 0%, transparent 60%)`,
          animation:'rays-appear 2s ease-out forwards', pointerEvents:'none', zIndex:0}} />
        <Particles world={world} />
        <div className="screen-transition text-center z-10">
          <div style={{marginBottom:20, color:palette.accent, opacity:0.4}}><Icon name="check" size={32}/></div>
          <div className="font-body mb-3" style={{fontSize:28, fontWeight:300, color:'rgba(226,232,240,0.95)'}}>{t.diveComplete}</div>
          <div style={{borderTop:'1px solid rgba(255,255,255,0.04)', borderBottom:'1px solid rgba(255,255,255,0.04)', padding:'20px 0', margin:'24px 0'}}>
            <div style={{display:'flex', justifyContent:'center', gap:24, padding:'0 16px', boxSizing:'border-box'}}>
              {[[Math.round(completionData.duration / 60), t.duration || t.min],[completionData.breathCycles || Math.round(completionData.duration / 16), t.breathCycles || 'Breaths'],[formatDepth(completionData.depth), WORLDS[world].depthUnit]].map(([val,label],i) => (
                <div key={i} style={{textAlign:'center', minWidth:0, flexShrink:1, animation:`count-up 600ms ${i*150}ms ease-out both`}}>
                  <div className="font-mono" style={{fontSize:20, fontWeight:300, color:palette.accent}}>{val}</div>
                  <div className="font-body" style={{fontSize:11, fontWeight:300, color:'var(--text-3)', marginTop:4, letterSpacing:'0.05em', textTransform:'lowercase'}}>{label}</div>
                </div>
              ))}
            </div>
          </div>
          {earnedBadges.length > 0 && (
            <div className="flex gap-2 justify-center flex-wrap mb-6">
              {earnedBadges.slice(-3).map((b, i) => (
                <div key={b.id} className="glass px-4 py-2 flex items-center gap-2">
                  <span style={{color:palette.accent,opacity:0.6}}><Icon name="check" size={14}/></span>
                  <span className="font-body" style={{fontSize:12, fontWeight:500, color:'rgba(226,232,240,0.85)'}}>{BADGE_NAMES[b.id]}</span>
                </div>
              ))}
            </div>
          )}

          {/* WOW 5: Post-session insight */}
          {sessionInsight && (
            <div className="mb-6 text-deblur" style={{maxWidth:300, margin:'0 auto 24px'}}>
              <div className="font-body" style={{fontSize:15, fontWeight:300, color:'rgba(220,225,235,0.65)', lineHeight:1.7, textAlign:'center'}}>
                {sessionInsight.text}
              </div>
            </div>
          )}

          {/* Post-session mood — 1-5 scale */}
          {completionStep === 'stats' && !moodDelta && (
            <div className="mb-6 screen-transition">
              <MoodScale label={t.andNow || 'And now?'} lowLabel={t.moodLow} highLabel={t.moodHigh} onSelect={(n) => {
                setCurrentMood(m => ({...m, post:n}));
                const pre = currentMood.pre;
                if (pre !== null && n !== null) {
                  const delta = pre - n;
                  if (delta > 0) setMoodDelta(`Dropped ${delta} point${delta > 1 ? 's' : ''}`);
                  else if (delta === 0) setMoodDelta('Consistency builds resilience');
                  else setMoodDelta('Some sessions plant seeds for later');
                }
                // Store mood in last history entry
                setStats(s => {
                  const hist = [...s.history];
                  if (hist.length > 0) { hist[hist.length-1] = {...hist[hist.length-1], preMood: pre, postMood: n}; }
                  return {...s, history: hist, lastFeeling: n};
                });
                setTimeout(() => {
                  // Check if intensive session -> show safety question
                  if (completionData && isIntensiveSession(completionData.segments)) setCompletionStep('safety');
                  else setCompletionStep('done');
                }, pre !== null ? 2000 : 600);
              }} />
            </div>
          )}
          {/* Mood delta display — only if pre-mood was captured (not SOS) */}
          {moodDelta && currentMood.pre !== null && (
            <div className="mb-6 screen-transition">
              <div className="font-mono" style={{fontSize:22, fontWeight:300, color:'rgba(220,225,235,0.8)', textAlign:'center', marginBottom:6}}>
                {currentMood.pre} → {currentMood.post}
              </div>
              <div className="font-body" style={{fontSize:13, fontWeight:300, color:'rgba(220,225,235,0.45)', textAlign:'center'}}>{moodDelta}</div>
            </div>
          )}

          {/* Safety check — after intensive sessions */}
          {completionStep === 'safety' && (
            <div className="mb-6 screen-transition">
              <div className="font-body mb-5" style={{fontSize:16, fontWeight:300, color:'rgba(226,232,240,0.8)'}}>{t.safetyQuestion}</div>
              <div className="flex gap-3 justify-center">
                <button className="glass px-6 py-2.5 font-body"
                  style={{fontSize:14, fontWeight:500, color:'rgba(252,129,129,0.8)', border:'1px solid rgba(252,129,129,0.25)'}}
                  onClick={() => {
                    setStats(s => ({...s, safetyFlag: { date: new Date().toISOString() }}));

                  }}>
                  {t.safetyYes}
                </button>
                <button className="glass px-6 py-2.5 font-body"
                  style={{fontSize:14, fontWeight:500, color:palette.accent, border:`1px solid rgba(${accentRgb},0.25)`}}

                    setCompletionStep('done');
                  }}>
                  {t.safetyNo}
                </button>
              </div>
            </div>
          )}
          {completionStep === 'safety_msg' && (
            <div className="mb-6 screen-transition">
              <div className="font-body mb-3" style={{fontSize:15, fontWeight:300, color:'rgba(220,225,235,0.65)', lineHeight:1.7, textAlign:'center', maxWidth:300, margin:'0 auto'}}>{t.safetyMessage}</div>
              <div className="font-body mb-5" style={{fontSize:12, fontWeight:300, color:'rgba(220,225,235,0.3)', lineHeight:1.6, textAlign:'center', maxWidth:280, margin:'0 auto'}}>If symptoms persist, consult a healthcare professional.</div>
              <button className="px-8 py-3 rounded-full font-body mx-auto block"
                style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}
                onClick={() => {
                  if (stats.totalSessions <= 1 && !stats.reminderTime) setCompletionStep('reminder');
                  else setCompletionStep('done');
                }}>
                {t.continueText}
              </button>
            </div>
          )}

          {/* Step 3: Reminder prompt — first session AND no reminder */}
          {completionStep === 'reminder' && (
            <div className="mb-6 screen-transition">
              <div className="font-body mb-4" style={{fontSize:16, fontWeight:300, color:'rgba(226,232,240,0.8)'}}>{t.buildHabit || t.setReminder}</div>
              <div className="flex gap-3 justify-center">
                {[[t.habitMorning || t.reminderMorning,'morning'],[t.habitEvening || t.reminderEvening,'evening'],[t.habitNotNow || t.reminderNotNow,null]].map(([label,val]) => (
                  <button key={label} className="glass px-5 py-2.5 font-body"
                    style={{fontSize:13, fontWeight:500, color: val ? palette.accent : 'rgba(226,232,240,0.5)', border: val ? `1px solid rgba(${accentRgb},0.25)` : '1px solid rgba(255,255,255,0.06)'}}
                    onClick={() => {
                      setStats(s => ({...s, reminderTime: val}));
                      setCompletionStep('done');
                    }}>
                    {label}
                  </button>
                ))}
              </div>
              {stats.reminderTime && <div className="font-body mt-3" style={{fontSize:12, color:palette.accent, opacity:0.7}}>{t.reminderSet} \u2713</div>}
            </div>
          )}

          {/* Final buttons */}
          {completionStep === 'done' && (
            <div className="flex gap-3 justify-center screen-transition">
              <button className="px-8 py-3 rounded-full font-body"
                style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}
                onClick={closeCompletion}>
                {t.newDive}
              </button>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ===== PAYWALL =====
  const PaywallModal = () => {
    const monthlyPrice = t.paywallMonthly || t.monthly;
    const yearlyPrice = t.paywallYearly || t.yearly;
    const yearlySave = t.paywallYearlySave || t.yearlySave;
    const trialNote = t.trialNotice || t.paywallTrialNote || '';
    const startTrialLabel = t.paywallStartTrial || t.startTrial;
    return (
    <div className="fixed inset-0 z-50 flex items-end justify-center" style={{background:'rgba(0,0,0,0.7)', backdropFilter:'blur(12px)'}}>
      <div className="glass w-full max-w-sm mx-6 mb-8 p-6 screen-transition" style={{borderRadius:14}}>
        <div className="text-center mb-5">
          <div className="font-body mb-2" style={{fontSize:24, fontWeight:300, color:'rgba(226,232,240,0.95)', letterSpacing:'0.08em'}}>{t.unlockAll}</div>
        </div>
        <div className="space-y-2.5 mb-5">
          {(t.paywallFeatures||[]).map(f => (
            <div key={f} className="flex items-center gap-3 font-body" style={{fontSize:13, fontWeight:400, color:'rgba(226,232,240,0.75)'}}>
              <span style={{color:palette.accent}}><Icon name="check" size={14}/></span>{f}
            </div>
          ))}
        </div>
        <div style={{display:'flex', gap:12, marginBottom:16, padding:'0 2px', boxSizing:'border-box'}}>
          <div className="flex-1 glass p-4 text-center cursor-pointer" style={{border:'1px solid rgba(255,255,255,0.06)', minWidth:0}}>
            <div className="font-body" style={{fontWeight:500, fontSize:13, color:'rgba(226,232,240,0.7)', whiteSpace:'nowrap'}}>{monthlyPrice}</div>
          </div>
          <div className="flex-1 glass p-5 text-center cursor-pointer" style={{border:`2px solid rgba(${accentRgb},0.4)`, boxShadow:`0 0 20px rgba(${accentRgb},0.12)`, transform:'scale(1.03)', minWidth:0}}>
            <div className="font-body" style={{fontWeight:500, fontSize:16, color:palette.accent, whiteSpace:'nowrap'}}>{yearlyPrice}</div>
            <div className="font-body" style={{fontSize:11, fontWeight:500, color:palette.accent, opacity:0.8, marginTop:3, whiteSpace:'nowrap'}}>{yearlySave}</div>
          </div>
        </div>
        {trialNote && <div className="font-body text-center mb-4" style={{fontSize:11, fontWeight:400, color:'var(--text-3)', lineHeight:1.5}}>{trialNote}</div>}
        <button className="w-full py-3.5 rounded-full font-body mb-3"
          style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}>
          {startTrialLabel}
        </button>
        <button className="w-full py-2 font-body" style={{fontSize:12, fontWeight:400, color:'var(--text-3)'}}
          onClick={() => { ph('paywall_converted', { plan: 'demo' }); setStats(s => ({...s, isPremium:true})); setShowPaywall(false); }}>
          {t.demoUnlock}
        </button>
        <button className="w-full py-2 font-body" style={{fontSize:12, fontWeight:400, color:'rgba(226,232,240,0.2)'}}
          onClick={() => setShowPaywall(false)}>
          {t.close}
        </button>
      </div>
    </div>
  );
  };

  // ===== HOME =====
  // Breathe Now choice — goes through normal pre-mood flow
  const startBreatheNowChoice = (opt) => {
    const params = TECHNIQUES[opt.technique]?.defaults || {};
    const segs = [{ type:'breathing', technique: opt.technique, duration: opt.duration, params }];
    startSession(segs, {scenario:'breathe_now', category:'breathe_now'});
  };

  const launchScenario = (id, dur) => {
    // Handle first session special case
    if (id === '_first_session') {
      startSession(FIRST_SESSION(t), {scenario:'first_session', category:'focus'});
      return;
    }
    const sc = SCENARIOS[id];
    if (!sc) return;
    if (!checkAccess(sc)) { ph('paywall_shown', {}); setShowPaywall(true); return; }
    const d = dur || sc.durations[0];
    // Check 10min premium restriction
    if (d >= 10 && !sc.free && !stats.isPremium) { ph('paywall_shown', {}); setShowPaywall(true); return; }
    let segs = getSessionContent(t, world)[id]?.[d];
    // Fallback: if no segments for this duration, generate a generic session
    if (!segs || segs.length === 0) {
      const scenarioContent = getSessionContent(t, world)[id];
      const existingDurations = scenarioContent ? Object.keys(scenarioContent).map(Number) : [];
      if (existingDurations.length > 0) {
        // Use the closest existing duration's first breathing technique as base
        const closest = existingDurations.reduce((a, b) => Math.abs(b - d) < Math.abs(a - d) ? b : a);
        const baseSegs = scenarioContent[closest];
        const firstBreathing = baseSegs.find(s => s.type === 'breathing');
        if (firstBreathing) {
          const targetSec = d * 60;
          segs = [
            { type:'text', duration:8, text:t.sitDown, textKey:'sitDown' },
            { type:'breathing', technique:firstBreathing.technique, duration: Math.round(targetSec * 0.7), params:{...firstBreathing.params} },
            { type:'breathing', technique:'diaphragmatic', duration: Math.round(targetSec * 0.25), params:{inhale:4, exhale:8} },
            { type:'text', duration: Math.round(targetSec * 0.05) || 5, text:t.openEyes, textKey:'openEyes' },
          ];
        }
      }
    }
    if (segs) {
      // FIX3: skip leading text segments for users with 3+ sessions
      if (stats.totalSessions >= 3) {
        const firstBreathIdx = segs.findIndex(s => s.type === 'breathing');
        if (firstBreathIdx > 0) segs = segs.slice(firstBreathIdx);
      }
      startSession(segs, {scenario:id, category:sc.cat});
    }
  };

  const handleScenarioTap = (id) => {
    const sc = SCENARIOS[id];
    if (!sc) return;
    if (sc.durations && sc.durations.length > 1) {
      setDurationPickerScenario({ id, ...sc });
    } else {
      launchScenario(id, sc.durations[0] || null);
    }
  };

  function getGreeting(t) {
    const hour = new Date().getHours();
    if (hour >= 5 && hour < 12) return t.goodMorning;
    if (hour >= 12 && hour < 17) return t.goodAfternoon;
    if (hour >= 17 && hour < 22) return t.goodEvening;
    return t.goodNight;
  }

  const renderHome = () => {
    const rec = getDailyRecommendation(stats, t);
    return (
    <div className="screen-transition overflow-y-auto h-full no-scrollbar" style={{padding:'env(safe-area-inset-top, 48px) 24px 140px 24px'}}>
      <div className="flex items-center justify-between mb-6">
        <div>
          <div className="font-body" style={{fontSize:24, fontWeight:200, color:'rgba(226,232,240,0.95)', letterSpacing:'0.25em', textTransform:'uppercase'}}>{t.appName}</div>
          <div className="font-body" style={{fontSize:11, fontWeight:300, letterSpacing:'0.15em', color:'rgba(220,225,235,0.25)', marginTop:4}}>PREPARE &middot; BREATHE &middot; DIVE</div>
        </div>
      </div>

      {/* Time-based greeting */}
      <div className="font-body mb-4" style={{fontSize:14, fontWeight:300, color:'var(--text-3)', textAlign:'left'}}>{getGreeting(t)}</div>

      {/* Daily recommendation card */}
      <button className="w-full text-left mb-6" style={{
        minHeight:'max(150px, 35vh)', borderRadius:14, padding:'32px 24px', position:'relative', overflow:'hidden',
        background:'rgba(255,255,255,0.024)',
        border:'1px solid rgba(255,255,255,0.05)',
        display:'flex', flexDirection:'column', justifyContent:'space-between',
      }} onClick={() => launchScenario(rec.scenario, rec.duration)}>
        <div>
          <div className="font-body mb-2" style={{fontSize:12, fontWeight:500, color:palette.accent, opacity:0.7, letterSpacing:'0.08em', textTransform:'uppercase'}}>{rec.isGoTo ? 'YOUR GO-TO' : t.todaysDiveLabel}</div>
          <div className="font-body mb-3" style={{fontSize:22, fontWeight:400, color:'rgba(226,232,240,0.95)', letterSpacing:'0.04em'}}>{rec.title}</div>
          <div className="font-body" style={{fontSize:14, fontWeight:300, color:'var(--text-2)'}}>{rec.sub}</div>
        </div>
        <div style={{textAlign:'center', marginTop:16}}>
          <div className="inline-flex items-center justify-center font-body"
            style={{padding:'10px 28px', borderRadius:12, fontWeight:500, fontSize:14, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:'rgba(94,170,168,0.85)', letterSpacing:'0.04em'}}>
            {t.begin}
          </div>
        </div>
      </button>

      {/* Streak + depth below card */}
      <div className="flex gap-4 mb-6 justify-center items-center flex-wrap">
        <div className="font-body" style={{fontSize:12, fontWeight:400, color:'var(--text-3)'}}>
          {stats.streak > 0 ? <><span className="font-mono">{stats.streak}</span> {t.dayStreak}</> : t.streakStart}
        </div>
        <div className="font-body" style={{fontSize:12, fontWeight:400, color:'var(--text-3)'}}>
          <span className="font-mono">{formatDepth(stats.totalDepth)}</span> {WORLDS[world].depthUnit} {t.depth}
        </div>
        <span style={{
          display:'inline-flex', alignItems:'center', gap:4,
          background:'rgba(94,170,168,0.1)', border:'1px solid rgba(94,170,168,0.3)',
          borderRadius:20, padding:'3px 10px',
          fontSize:11, fontFamily:"'DM Sans',sans-serif", fontWeight:500,
          color:'rgba(94,170,168,0.8)',
        }}>
          {LEVELS[stats.level || 'basic']?.name || getDifficultyLevel(stats.bestHoldDepth)?.label || 'Basic'}
        </span>
      </div>

      {/* Depth progress bar to next milestone */}
      {(() => {
        const milestones = [{depth:5,label:'A swimming pool'},{depth:10,label:'The reef edge'},{depth:15,label:'A coral reef'},{depth:25,label:'Beginner freediver'},{depth:40,label:'Where sunlight fades'},{depth:60,label:'Advanced freediver'},{depth:100,label:'The twilight zone'}];
        const next = milestones.find(m => m.depth > stats.totalDepth) || milestones[milestones.length-1];
        const prev = milestones.filter(m => m.depth <= stats.totalDepth).pop() || {depth:0};
        const prog = next.depth > prev.depth ? Math.min(1, (stats.totalDepth - prev.depth) / (next.depth - prev.depth)) : 1;
        return (
          <div style={{marginBottom:16, opacity:0.5}}>
            <div style={{height:3, borderRadius:2, background:'rgba(255,255,255,0.04)', overflow:'hidden'}}>
              <div style={{height:'100%', width:`${prog*100}%`, borderRadius:2, background:`rgba(${accentRgb},0.4)`, transition:'width 600ms ease'}} />
            </div>
            <div className="flex justify-between mt-1" style={{fontSize:10, color:'rgba(220,225,235,0.25)'}}>
              <span className="font-mono">{formatDepth(stats.totalDepth)}m</span>
              <span className="font-body">{formatDepth(next.depth)}m · {next.label}</span>
            </div>
          </div>
        );
      })()}

      {/* FIX6: One-time depth explainer tooltip */}
      {stats.totalSessions === 1 && !stats.depthExplained && (
        <div style={{padding:'10px 16px', marginBottom:16, borderRadius:10, background:'rgba(94,170,168,0.05)', border:'1px solid rgba(94,170,168,0.10)', fontSize:12, color:'rgba(220,225,235,0.5)', lineHeight:1.6}}>
          Your depth grows with each session — like a freediver going deeper with practice.
          <button onClick={() => setStats(s => ({...s, depthExplained:true}))}
            style={{display:'block', marginTop:6, fontSize:11, color:palette.accent, opacity:0.7, background:'none', border:'none', cursor:'pointer', padding:0}}>
            Got it
          </button>
        </div>

      {/* Habit reminder prompt — show on home after 3+ sessions if no reminder set */}
      {stats.totalSessions >= 3 && !stats.reminderTime && (
        <div style={{padding:'14px 16px', marginBottom:16, borderRadius:10, background:'rgba(94,170,168,0.05)', border:'1px solid rgba(94,170,168,0.10)', fontSize:13, color:'rgba(220,225,235,0.6)', lineHeight:1.6}}>
          {t.buildHabit || 'Build a daily habit?'}
          <div style={{display:'flex', gap:8, marginTop:10}}>
            {[[t.habitMorning || 'Morning 8:00','morning'],[t.habitEvening || 'Evening 21:00','evening']].map(([label,val]) => (
              <button key={val} onClick={() => setStats(s => ({...s, reminderTime: val}))}
                style={{padding:'6px 14px', borderRadius:8, background:`rgba(${accentRgb},0.08)`, border:`1px solid rgba(${accentRgb},0.18)`, fontSize:12, fontWeight:500, color:palette.accent, cursor:'pointer'}}>
                {label}
              </button>

            <button onClick={() => setStats(s => ({...s, reminderTime: 'dismissed'}))}
              style={{padding:'6px 14px', borderRadius:8, background:'none', border:'1px solid rgba(255,255,255,0.06)', fontSize:12, color:'rgba(220,225,235,0.35)', cursor:'pointer'}}>
              {t.habitNotNow || 'Not now'}
            </button>
          </div>
        </div>
      )}

      {/* SOS + Breathe now — fixed action bar above tab bar */}
      <div style={{
        position:'fixed', bottom:64, left:0, right:0,
        padding:'8px 20px', paddingTop:20,
        display:'flex', gap:8,
        background:'linear-gradient(0deg, rgba(2,10,16,0.95) 0%, transparent 100%)',
        zIndex:20, pointerEvents:'none',
      }}>
        <button style={{
          flex:1, height:44, borderRadius:14, background:`rgba(${accentRgb},0.06)`, border:`1px solid rgba(${accentRgb},0.12)`,
          color:'rgba(220,225,235,0.7)', display:'flex', alignItems:'center', justifyContent:'center', gap:8,
          fontSize:14, fontWeight:400, pointerEvents:'auto', cursor:'pointer',
        }} onClick={() => {
          setCurrentMood({pre: null, post: null});
          setMoodDelta(null);
          ph('sos_used', {});
          const segs = [{ type:'breathing', technique:'physiological_sigh', duration:90, params:{inhale1:2,inhale2:1,exhale:7} }];
          actuallyStartSession(segs, {scenario:'stress_sos', category:'stress', isSOSSession:true});
        }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
          Stressed? Breathe.
        </button>
        <button className="breathe-now-btn" style={{flex:1, pointerEvents:'auto'}} onClick={() => setScreen('breathe-choice')}>
          Breathe now
        </button>
      </div>

      {/* Daily insight */}
      {(() => {
        const HOME_INSIGHTS = [
          "Navy SEALs use box breathing to perform under fire",
          "5 minutes of cyclic sighing reduces cortisol more than meditation",
          "Freedivers slow their heart from 80 to 30 bpm with breath alone",
          "Your diaphragm is the only skeletal muscle that works 24/7",
          "Exhaling longer than inhaling activates your vagus nerve",
          "3 physiological sighs can reset your nervous system in 90 seconds",
          "Japanese pearl divers hold their breath for 2+ minutes",
        ];
        return (
          <div style={{margin:'16px 0', padding:'14px 16px', borderRadius:12, background:'rgba(255,255,255,0.015)', border:'1px solid rgba(255,255,255,0.03)'}}>
            <p className="font-body" style={{fontSize:13, fontWeight:300, color:'rgba(220,225,235,0.45)', lineHeight:1.5, margin:0}}>
              {HOME_INSIGHTS[Math.floor(Date.now() / 86400000) % HOME_INSIGHTS.length]}
            </p>
          </div>
        );
      })()}

      {/* Programs — horizontal scroll */}
      <div className="mb-6">
        <div className="font-body mb-3" style={{fontSize:11, fontWeight:500, color:'rgba(220,225,235,0.28)', letterSpacing:'0.12em', textTransform:'uppercase'}}>{t.programs}</div>
        <div className="flex gap-3 overflow-x-auto no-scrollbar pb-2">
          {Object.entries(PROGRAMS).map(([key, prog]) => {
            const progress = (stats.programProgress?.[key] || []).length;
            const nameKey = key === 'first_dive' ? 'firstDive' : key === 'stress_shield' ? 'stressShield' : 'deepFocus';
            return (
              <button key={key} className="glass flex-shrink-0 p-4 text-left" style={{width:150, minHeight:100}}
                onClick={() => { setSelectedProgram(key); setScreen('program_view'); }}>
                <span style={{color:palette.accent,opacity:0.5}}><Icon name={key === 'first_dive' ? 'prog_bubble' : key === 'stress_shield' ? 'prog_shield' : 'prog_target'} size={20}/></span>
                <div className="font-body mt-2" style={{fontWeight:500, fontSize:13, color:'rgba(255,255,255,0.92)'}}>{t[nameKey]}</div>
                <div className="flex gap-1 mt-2 flex-wrap">
                  {key === 'first_dive' && <span style={{padding:'3px 10px', borderRadius:6, background:'rgba(94,170,168,0.08)', border:'1px solid rgba(94,170,168,0.15)', fontSize:11, color:'rgba(94,170,168,0.7)'}}>{t.day1Free}</span>}
                  {key !== 'first_dive' && !stats.isPremium && <span style={{padding:'3px 10px', borderRadius:6, background:'rgba(94,170,168,0.06)', border:'1px solid rgba(94,170,168,0.12)', fontSize:11, color:'rgba(94,170,168,0.5)'}}>{t.premiumLabel}</span>}
                </div>
                <div className="mt-2" style={{height:2, borderRadius:1, background:'rgba(255,255,255,0.04)'}}>
                  <div style={{height:'100%', borderRadius:1, width:`${progress/prog.days*100}%`, background:`rgba(${accentRgb},0.6)`}} />
                </div>
                <div className="font-mono mt-1" style={{fontSize:10, fontWeight:300, color:palette.accent, opacity:0.7}}>{progress}/{prog.days}</div>
              </button>
            );
          })}
        </div>
      </div>

      {/* Quick Dives — category pills */}
      <div className="mb-8">
        <div className="font-body mb-3" style={{fontSize:11, fontWeight:500, color:'rgba(220,225,235,0.28)', letterSpacing:'0.12em', textTransform:'uppercase'}}>{t.quickDives}</div>
        <div className="flex gap-2 overflow-x-auto no-scrollbar mb-4">
          {Object.keys(CATEGORIES).map(catKey => (
            <button key={catKey} className="flex-shrink-0 font-body" style={{
              padding:'6px 16px', borderRadius:20, fontSize:13,
              background: quickDiveCat === catKey ? `rgba(${accentRgb},0.10)` : 'transparent',
              border: quickDiveCat === catKey ? `1px solid rgba(${accentRgb},0.20)` : '1px solid rgba(255,255,255,0.06)',
              color: quickDiveCat === catKey ? palette.accent : 'var(--text-2)',
            }} onClick={() => setQuickDiveCat(catKey)}>
              {t[CATEGORY_LANG_KEY[catKey]]}
            </button>
          ))}
        </div>
        <div className="space-y-2">
          {Object.entries(SCENARIOS).filter(([_, s]) => s.cat === quickDiveCat).map(([id, sc]) => (
            <button key={id} className="glass w-full text-left flex items-center gap-3 px-4 py-3" style={{position:'relative'}}
              onClick={() => handleScenarioTap(id)}>
              <span style={{color:palette.accent,opacity:0.5}}><Icon name={sc.svgIcon || id} size={18}/></span>
              <div className="flex-1">
                <div className="font-body" style={{fontWeight:500, fontSize:13, color:'rgba(255,255,255,0.85)'}}>{t[SCENARIO_LANG_KEY[id]]}</div>
                <div className="font-mono mt-1" style={{fontSize:11, fontWeight:300, color:'rgba(255,255,255,0.35)'}}>{sc.durations.map(d => d + ' ' + t.min).join(' / ')}</div>
              </div>
              {!checkAccess(sc) && <span style={{color:'var(--text-3)', opacity:0.4}}><Icon name="lock" size={14}/></span>}
            </button>
          ))}
          {/* Custom pattern card */}
          <button className="glass w-full text-left flex items-center gap-3 px-4 py-3"
            onClick={() => setScreen('custom-pattern')}>

  const renderProgramView = () => {
    const prog = PROGRAMS[selectedProgram];
    if (!prog) { setScreen('home'); return null; }
    const progress = stats.programProgress?.[selectedProgram] || [];
    const nameKey = selectedProgram === 'first_dive' ? 'firstDive' : selectedProgram === 'stress_shield' ? 'stressShield' : 'deepFocus';
    const subKey = nameKey + 'Sub';

    // Find last completion time for cooldown check
    const lastCompletionEntry = stats.history?.filter(h => h.scenario === selectedProgram || h.category === 'program').slice(-1)[0];
    const lastCompletionTime = lastCompletionEntry ? new Date(lastCompletionEntry.date).getTime() : 0;
    const hoursSinceLast = (Date.now() - lastCompletionTime) / 3600000;
    const today = new Date().toISOString().split('T')[0];
    const lastCompletionDate = lastCompletionEntry ? new Date(lastCompletionEntry.date).toISOString().split('T')[0] : null;

    return (
      <div className="screen-transition overflow-y-auto h-full no-scrollbar" style={{padding:'env(safe-area-inset-top, 48px) 24px 100px 24px'}}>
        <button className="flex items-center gap-2 mb-5" onClick={() => { setScreen('home'); setTab('home'); }} style={{color:'var(--text-3)'}}>
          <Icon name="back" size={16}/><span className="font-body" style={{fontSize:13, fontWeight:400}}>{t.back}</span>
        </button>
        <div className="text-center mb-8">
          <div style={{color:palette.accent, opacity:0.4}}><Icon name={selectedProgram === 'first_dive' ? 'prog_bubble' : selectedProgram === 'stress_shield' ? 'prog_shield' : 'prog_target'} size={36}/></div>
          <div className="font-body mt-3" style={{fontSize:24, fontWeight:300, color:'rgba(226,232,240,0.95)', letterSpacing:'0.08em'}}>{t[nameKey]}</div>
          <div className="font-body mt-1" style={{fontSize:13, fontWeight:400, color:'var(--text-3)'}}>{t[subKey]}</div>
          <div className="mt-4 mx-auto" style={{height:2, borderRadius:1, background:'rgba(255,255,255,0.04)', maxWidth:200}}>
            <div style={{height:'100%', borderRadius:1, width:`${progress.length/prog.days*100}%`, background:`rgba(${accentRgb},0.6)`, transition:'width 1s ease'}} />
          </div>
          <div className="font-body mt-2" style={{fontSize:12, fontWeight:400, color:palette.accent, opacity:0.8}}>{progress.length} / {prog.days} {t.days}</div>
        </div>
        <div className="space-y-3">
          {prog.sessions.map((daySegs, i) => {
            const completed = progress.includes(i);
            const premiumLocked = !stats.isPremium && i > prog.trialDay;
            // Sequential unlock: day 0 always available, day N requires day N-1 completed
            const prevCompleted = i === 0 || progress.includes(i - 1);
            // Cooldown: if previous day completed today, show "available tomorrow"
            const prevCompletedToday = i > 0 && progress.includes(i - 1) && lastCompletionDate === today && hoursSinceLast < 12;
            const sequentialLocked = !completed && (!prevCompleted || prevCompletedToday);
            const locked = premiumLocked || sequentialLocked;
            let subText = '';
            if (completed) subText = t.completed;
            else if (premiumLocked) subText = t.locked;
            else if (!prevCompleted) subText = t.completePrevDay;
            else if (prevCompletedToday) subText = t.availableTomorrow;
            else subText = t.startDay;

            return (
              <button key={i} className="glass p-5 w-full text-left flex items-center gap-4"
                style={{opacity: locked && !completed ? 0.5 : 1}}
                onClick={() => { if (locked) { if (premiumLocked) setShowPaywall(true); return; } startSession(daySegs, {programId:selectedProgram, day:i, category:'program'}); }}>
                <div className="flex items-center justify-center rounded-full font-mono"
                  style={{width:40, height:40, fontWeight:300, fontSize:14, background: completed ? `rgba(${accentRgb},0.15)` : 'rgba(255,255,255,0.06)', border: completed ? `1px solid rgba(${accentRgb},0.3)` : '1px solid rgba(255,255,255,0.06)', color: completed ? palette.accent : 'rgba(226,232,240,0.5)'}}>
                  {completed ? <Icon name="check" size={16}/> : i + 1}

                <div className="flex-1">
                  <div className="font-body" style={{fontWeight:500, fontSize:15, color:'rgba(255,255,255,0.92)'}}>{t.dayN} {i + 1}</div>
                  <div className="font-body" style={{fontSize:12, fontWeight:400, color:'rgba(255,255,255,0.4)', marginTop:3}}>
                    {subText}
                  </div>
                </div>
                {locked && !completed && <span style={{color:'var(--text-3)',opacity:0.4}}><Icon name="lock" size={14}/></span>}
              </button>
            );
          })}
        </div>
      </div>
    );

            </button>
          );
        })}
      </div>
    </div>

  const renderProfile = () => {
    // Mood chart data: sessions with preMood + postMood
    const moodSessions = (stats.history || []).filter(h => h.preMood != null && h.postMood != null).slice(-7);
    const hasMoodChart = moodSessions.length >= 3;
    // Stress relief rate: sessions where postMood > preMood
    const ratedSessions = (stats.history || []).filter(h => h.preMood != null && h.postMood != null);
    const relievedCount = ratedSessions.filter(h => h.postMood > h.preMood).length;
    const stressReliefRate = ratedSessions.length >= 3 ? Math.round((relievedCount / ratedSessions.length) * 100) : null;
    // Mood avg delta
    const moodAvgDelta = hasMoodChart ? (moodSessions.reduce((s,h) => s + (h.postMood - h.preMood), 0) / moodSessions.length).toFixed(1) : null;

    return (
      <div className="screen-transition overflow-y-auto h-full no-scrollbar" style={{padding:'env(safe-area-inset-top, 48px) 24px 100px 24px'}}>

        {/* 1. HERO: Big animated depth */}
        <div className="text-center" style={{marginBottom:28}}>
          <div className="font-mono" style={{fontSize:48, fontWeight:200, color:'rgba(94,170,168,0.85)'}}>
            <AnimatedNumber value={stats.totalDepth} suffix="" />
          </div>
          <div className="font-body" style={{fontSize:12, fontWeight:400, color:'var(--text-3)', letterSpacing:'0.08em', marginTop:2}}>depth ({WORLDS[world].depthUnit})</div>
          <div style={{display:'flex', justifyContent:'center', gap:32, marginTop:16}}>
            {[
              [stats.streak || 0, 'streak'],

              <div key={label} style={{textAlign:'center'}}>

              </div>
            ))}
          </div>
        </div>

        {/* 2. STRESS RELIEF RATE */}
        {stressReliefRate !== null && (
          <div style={{textAlign:'center', marginBottom:24}}>
            <span className="font-mono" style={{fontSize:22, fontWeight:300, color:palette.accent}}>{stressReliefRate}%</span>
            <span className="font-body" style={{fontSize:13, fontWeight:300, color:'var(--text-2)', marginLeft:8}}>of sessions reduce your stress</span>
          </div>
        )}

        {/* 3. THIS WEEK MOOD CHART */}
        {hasMoodChart && (() => {
          const chartW = 280, chartH = 100, padX = 10, padY = 10;
          const n = moodSessions.length;
          const xStep = n > 1 ? (chartW - padX * 2) / (n - 1) : 0;
          const yScale = (v) => padY + (chartH - padY * 2) * (1 - (v - 1) / 4); // mood 1-5
          const preLine = moodSessions.map((h,i) => `${padX + i * xStep},${yScale(h.preMood)}`).join(' ');
          const postLine = moodSessions.map((h,i) => `${padX + i * xStep},${yScale(h.postMood)}`).join(' ');
          return (
            <div style={{marginBottom:24, borderTop:'1px solid rgba(255,255,255,0.03)', paddingTop:20}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
                <div className="font-body" style={{fontSize:11, fontWeight:500, color:'rgba(220,225,235,0.28)', letterSpacing:'0.12em', textTransform:'uppercase'}}>This week</div>
                {moodAvgDelta && <span className="font-mono" style={{fontSize:11, color: parseFloat(moodAvgDelta) >= 0 ? 'rgba(94,170,168,0.7)' : 'rgba(252,129,129,0.6)'}}>avg {parseFloat(moodAvgDelta) >= 0 ? '+' : ''}{moodAvgDelta}</span>}
              </div>
              <svg viewBox={`0 0 ${chartW} ${chartH}`} style={{width:'100%', height:100}}>
                <polyline points={preLine} fill="none" stroke="rgba(220,225,235,0.2)" strokeWidth="1.5" strokeDasharray="4 3" />
                <polyline points={postLine} fill="none" stroke="rgba(94,170,168,0.7)" strokeWidth="2" />
                {moodSessions.map((h,i) => (
                  <React.Fragment key={i}>
                    <circle cx={padX + i * xStep} cy={yScale(h.preMood)} r="3" fill="rgba(220,225,235,0.15)" />
                    <circle cx={padX + i * xStep} cy={yScale(h.postMood)} r="3.5" fill="rgba(94,170,168,0.8)" />
                  </React.Fragment>
                ))}
              </svg>
              <div style={{display:'flex', justifyContent:'center', gap:20, marginTop:6}}>
                <span style={{fontSize:10, color:'var(--text-3)'}}>— — before</span>
                <span style={{fontSize:10, color:'rgba(94,170,168,0.6)'}}>—— after</span>
              </div>
            </div>
          );
        })()}

        {/* 4. TECHNIQUES mastery */}
        <div style={{marginBottom:24, borderTop:'1px solid rgba(255,255,255,0.03)', paddingTop:20}}>

          <div className="space-y-3">

              ['segmented','Segmented'],
              ['tidal','Tidal'],
              ['recovery','Recovery'],
            ].map(([techKey, displayName]) => {
              const count = (stats.techniqueStats || {})[techKey] || 0;
              const masteryLabel = count === 0 ? '\u2014' : count <= 5 ? 'Learning' : count <= 15 ? 'Comfortable' : 'Mastered';
              const progress = Math.min(count / 16, 1);
              return (
                <div key={techKey} className="flex items-center gap-3">

                  <div className="font-mono" style={{fontSize:12, color:palette.accent, minWidth:16, textAlign:'right'}}>{count}</div>
                  <div className="font-body" style={{fontSize:10, fontWeight:300, color:'var(--text-3)', minWidth:68, textAlign:'right'}}>{masteryLabel}</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* 5. DEPTH PROGRESS — breath tests */}
        {(stats.breathTests || []).length > 0 && (
          <div style={{marginBottom:24, borderTop:'1px solid rgba(255,255,255,0.03)', paddingTop:20}}>
            <div className="font-body mb-4" style={{fontSize:11, fontWeight:500, color:'rgba(220,225,235,0.28)', letterSpacing:'0.12em', textTransform:'uppercase'}}>Depth progress</div>

              {(stats.breathTests || []).slice(-6).map((bt, i) => {

              {stats.lastRetestDate ? 'Retest breath hold' : 'Take breath hold test'}
            </button>
          </div>

        {/* No breath tests yet — show CTA */}
        {(stats.breathTests || []).length === 0 && (
          <div style={{marginBottom:24, borderTop:'1px solid rgba(255,255,255,0.03)', paddingTop:20}}>
            <div className="font-body mb-4" style={{fontSize:11, fontWeight:500, color:'rgba(220,225,235,0.28)', letterSpacing:'0.12em', textTransform:'uppercase'}}>Depth progress</div>
            <button onClick={() => startBreathTest()} style={{
              width:'100%', padding:'11px',
              borderRadius:12, border:'1px solid rgba(94,170,168,0.2)',
              background:'rgba(94,170,168,0.06)',
              color:'rgba(94,170,168,0.8)', fontSize:14, cursor:'pointer', fontFamily:"'DM Sans',sans-serif",
            }}>
              Take breath hold test
            </button>
          </div>
        )}

        {/* 6. RECENT DIVES */}
        {stats.history.length > 0 && (
          <div style={{marginBottom:24, borderTop:'1px solid rgba(255,255,255,0.03)', paddingTop:20}}>

            <div className="space-y-2">
              {stats.history.slice(-10).reverse().map((h, i) => (
                <div key={i} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 0', borderBottom:'1px solid rgba(255,255,255,0.02)'}}>
                  <div>
                    <div className="font-body" style={{fontSize:14, fontWeight:400, color:'rgba(226,232,240,0.8)'}}>{getScenarioDisplayName(h.scenario)}</div>
                    <div className="font-body" style={{fontSize:11, fontWeight:400, color:'var(--text-3)', marginTop:2}}>{new Date(h.date).toLocaleDateString('en', {month:'short', day:'numeric'})}</div>

                  <div style={{textAlign:'right'}}>
                    <div className="font-mono" style={{fontSize:12, fontWeight:300, color:'var(--text-3)'}}>
                      {Math.round((h.duration || 0)/60)}min
                    </div>

            <div className="flex items-center justify-between">
              <span className="font-body" style={{fontSize:14, fontWeight:400, color:'rgba(226,232,240,0.75)'}}>{t.voiceNarration}</span>
              <button className="relative rounded-full" style={{width:44, height:24, background: stats.voiceEnabled ? `rgba(${accentRgb},0.25)` : 'rgba(255,255,255,0.1)', border:'1px solid rgba(255,255,255,0.06)', transition:'all 200ms ease'}}
                onClick={() => setStats(s => ({...s, voiceEnabled:!s.voiceEnabled}))}>
                <div className="absolute rounded-full transition-all" style={{top:3, width:16, height:16, background: stats.voiceEnabled ? palette.accent : 'rgba(255,255,255,0.3)', left: stats.voiceEnabled ? 'calc(100% - 20px)' : '4px'}} />
              </button>
            </div>
          </div>

          {/* Replay intro + Reset */}
          <button className="w-full py-3 font-body rounded-full mb-3" style={{fontSize:13, fontWeight:400, color:'var(--text-2)', border:'1px solid rgba(255,255,255,0.07)', marginTop:16}}
            onClick={() => { setIsReplayIntro(true); setScreen('first_breath'); }}>
            Replay intro
          </button>
          <button className="w-full py-3 font-body rounded-full" style={{fontSize:13, fontWeight:400, color:'rgba(252,129,129,0.6)', border:'1px solid rgba(252,129,129,0.15)'}}
            onClick={() => setShowResetConfirm(true)}>
            {t.resetProgress}
          </button>
          {authUser && !isDemo(authUser) && (
            <button className="w-full py-3 font-body rounded-full" style={{fontSize:13, fontWeight:400, color:'var(--text-3)', border:'1px solid rgba(255,255,255,0.05)', marginTop:12}}
              onClick={async () => { if (supabaseClient) await supabaseClient.auth.signOut(); setAuthUser(null); }}>
              Sign out
            </button>
          )}
          {isDemo(authUser) && (
            <button className="w-full py-3 font-body rounded-full" style={{fontSize:13, fontWeight:400, color:'rgba(94,170,168,0.6)', border:'1px solid rgba(94,170,168,0.15)', marginTop:12}}
              onClick={() => setAuthUser(null)}>
              Create account to sync data
            </button>
          )}
          {showResetConfirm && (
            <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,padding:'24px'}}>
              <div style={{background:'rgba(12,22,40,0.98)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:'14px',padding:'24px',maxWidth:'320px',width:'100%'}}>
                <p style={{fontSize:'16px',fontWeight:400,color:'rgba(220,225,235,0.88)',marginBottom:'8px'}}>Reset all progress?</p>
                <p style={{fontSize:'13px',color:'rgba(220,225,235,0.45)',marginBottom:'24px',lineHeight:1.5}}>Depth, streak, sessions, and settings will be permanently deleted.</p>
                <div style={{display:'flex',gap:'12px'}}>
                  <button onClick={() => setShowResetConfirm(false)} style={{flex:1,padding:'10px',borderRadius:'10px',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',color:'rgba(220,225,235,0.7)',fontSize:'14px',cursor:'pointer'}}>Cancel</button>
                  <button onClick={() => { setShowResetConfirm(false); setStats(defaultStats()); setScreen('first_breath'); }} style={{flex:1,padding:'10px',borderRadius:'10px',background:'rgba(180,60,60,0.12)',border:'1px solid rgba(180,60,60,0.25)',color:'rgba(220,130,130,0.85)',fontSize:'14px',cursor:'pointer'}}>Delete everything</button>
                </div>
              </div>
            </div>
          )}
        </div>

        {/* Medical disclaimer */}
        <div style={{marginTop:8, paddingTop:16, borderTop:'1px solid rgba(255,255,255,0.03)', fontSize:11, color:'rgba(220,225,235,0.20)', lineHeight:1.6}}>
          DIVE is a breathing exercise tool, not a medical device. Consult your doctor before starting any breathing practice, especially if you have cardiovascular or respiratory conditions. Based on peer-reviewed research including Balban et al. (Stanford, 2023).
        </div>
      </div>
    );
  };


  const renderScreen = () => {
    if (screen === 'custom-pattern') return (
      <CustomPatternScreen
        onBack={() => setScreen('home')}
        onSave={(cp) => saveCustomPattern(cp)}
        onStart={(cp) => {
          const segs = customPatternToSegments(cp);
          setScreen('home');
          startSession(segs, {scenario:'custom', category:'custom'});
        }}
      />
    );
    if (screen === 'category') return renderCategory();

    if (screen === 'breathe-choice') return (
      <div style={{position:'fixed',inset:0,background:'linear-gradient(180deg,#0e3d5c 0%,#020a10 100%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',zIndex:50,padding:'24px'}}>
        <p style={{fontSize:'20px',fontWeight:300,color:'rgba(220,225,235,0.7)',marginBottom:'32px'}}>What do you need?</p>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',width:'100%',maxWidth:'320px'}}>
          {[
            {label:'Calm down', sub:'Cyclic sigh \u00b7 3 min', technique:'physiological_sigh', duration:180},
            {label:'Get focused', sub:'Box breathing \u00b7 3 min', technique:'box', duration:180},
            {label:'Energy boost', sub:'Segmented \u00b7 3 min', technique:'segmented', duration:180},
            {label:'Just breathe', sub:'Extended exhale \u00b7 3 min', technique:'diaphragmatic', duration:180},
          ].map(opt => (
            <button key={opt.label} onClick={() => { setScreen('home'); startBreatheNowChoice(opt); }} style={{padding:'20px 16px',borderRadius:'14px',background:'rgba(255,255,255,0.025)',border:'1px solid rgba(255,255,255,0.06)',cursor:'pointer',textAlign:'left'}}>
              <div style={{fontSize:'15px',fontWeight:400,color:'rgba(220,225,235,0.8)'}}>{opt.label}</div>
              <div style={{fontSize:'11px',fontWeight:300,color:'rgba(220,225,235,0.35)',marginTop:4}}>{opt.sub}</div>
            </button>
          ))}
        </div>
        <button onClick={() => setScreen('home')} style={{marginTop:32,fontSize:13,color:'rgba(220,225,235,0.3)',background:'none',border:'none',cursor:'pointer'}}>Cancel</button>
      </div>
    );

    if (screen === 'program_view') return renderProgramView();
    switch (tab) {
      case 'home': return renderHome();
      case 'profile': return renderProfile();
      default: return renderHome();
    }
  };

  const showTabs = !['category','program_view','breathe-choice','custom-pattern'].includes(screen);

  return (
    <div className="fixed inset-0" style={{background:bg}}>
      <div className="ocean-caustics" />
      <Particles world={world} />
      <div className="relative z-10 h-full">
        {renderScreen()}
      </div>

      {/* Tab bar */}
      {showTabs && (
        <div className="fixed bottom-0 left-0 right-0 z-40" style={{background:'rgba(7,12,21,0.72)', backdropFilter:'blur(24px) saturate(1.4)', WebkitBackdropFilter:'blur(24px) saturate(1.4)', borderTop:'1px solid rgba(255,255,255,0.04)'}}>
          <div className="flex justify-around" style={{paddingTop:12, paddingBottom:'env(safe-area-inset-bottom, 24px)'}}>
            {[
              {id:'home', svgIcon:'home', labelKey:'home'},
              {id:'profile', svgIcon:'profile', labelKey:'profile'},
            ].map(tb => (
              <button key={tb.id} className="flex flex-col items-center py-1 px-3" style={{gap:3}}
                onClick={() => { setTab(tb.id); if (['category','program_view'].includes(screen)) setScreen('home'); }}>
                <span style={{color: tab === tb.id ? palette.accent : 'var(--text-3)', transition:'color 200ms ease'}}><Icon name={tb.svgIcon} size={20}/></span>
                <span className="font-body" style={{fontSize:10, fontWeight:500, letterSpacing:'0.03em', color: tab === tb.id ? palette.accent : 'var(--text-3)', transition:'color 200ms ease'}}>{t[tb.labelKey]}</span>
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Surface breath overlay */}
      {showSurfaceBreath && (
        <div className="fixed inset-0 z-50 flex items-center justify-center" style={{background:'rgba(0,0,0,0.8)', backdropFilter:'blur(16px)'}}>
          <div className="screen-transition text-center z-10 px-8">
            <div className="font-body mb-3" style={{fontSize:20, fontWeight:300, color:'rgba(226,232,240,0.95)'}}>{t.missedYesterday}</div>
            <div className="font-body mb-6" style={{fontSize:16, fontWeight:400, color:palette.accent}}>
              {surfaceBreathStreak} {t.streakAtRisk || t.dayStreak}
            </div>
            <div className="font-body mb-8" style={{fontSize:14, fontWeight:400, color:'var(--text-2)', maxWidth:280, margin:'0 auto', lineHeight:1.6}}>
              {(t.surfaceBreathOffer || '').replace('{N}', surfaceBreathStreak)}
            </div>
            <div className="flex flex-col gap-3 items-center">
              <button className="px-8 py-3 rounded-full font-body w-full max-w-xs"
                style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}
                onClick={() => {
                  setShowSurfaceBreath(false);
                  setCurrentMood({pre: null, post: null});
                  setMoodDelta(null);
                  // Launch 60s cyclic sigh (6 cycles x 10s) — no pre-mood
                  const surfaceSegs = [
                    { type:'breathing', technique:'physiological_sigh', duration:60, params:{ inhale1:2, inhale2:1, exhale:7 } }
                  ];
                  actuallyStartSession(surfaceSegs, {scenario:'surface_breath', category:'recovery'});
                  // Preserve streak + 1
                  setStats(s => {
                    const newStreak = s.streak + 1;
                    return {...s, streak: newStreak, longestStreak: Math.max(s.longestStreak || 0, newStreak), lastSessionDate: new Date().toISOString().split('T')[0]};
                  });
                }}>
                {t.surfaceBreath1Min || t.surfaceBreathButton}
              </button>
              <button className="px-8 py-3 rounded-full font-body w-full max-w-xs"
                style={{fontWeight:400, fontSize:13, color:'var(--text-3)', border:'1px solid rgba(255,255,255,0.06)'}}
                onClick={() => {
                  setShowSurfaceBreath(false);
                  setStats(s => ({...s, streak: 1, lastSessionDate: new Date().toISOString().split('T')[0]}));
                }}>
                {t.letItGo}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Retest prompt overlay */}
      {showRetestPrompt && (() => {
        const prevTest = (stats.breathTests || []).slice(-1)[0];
        const prevDepth = prevTest ? prevTest.depth : null;
        return (
        <div className="fixed inset-0 z-50 flex items-center justify-center" style={{background:'rgba(0,0,0,0.8)', backdropFilter:'blur(16px)'}}>
          <div className="screen-transition text-center z-10 px-8">
            <div className="font-body mb-4" style={{fontSize:20, fontWeight:300, color:'rgba(226,232,240,0.95)'}}>Time to check your progress</div>
            <div className="font-body mb-4" style={{fontSize:14, fontWeight:400, color:'var(--text-2)', maxWidth:280, margin:'0 auto', lineHeight:1.6}}>
              {retestDays === 999 ? '' : retestDays + ' days since your last test.'}
            </div>
            {prevDepth != null && (
              <div className="font-body mb-6" style={{fontSize:13, fontWeight:300, color:palette.accent, opacity:0.7}}>
                Previous depth: {formatDepth(prevDepth)}m
              </div>
            )}
            <div className="flex flex-col gap-3 items-center">
              <button className="px-8 py-3 rounded-full font-body w-full max-w-xs"
                style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}
                onClick={() => {
                  setShowRetestPrompt(false);
                  setScreen('first_breath');
                }}>
                {t.retestNow}
              </button>
              <button className="px-8 py-3 rounded-full font-body w-full max-w-xs"
                style={{fontWeight:400, fontSize:13, color:'var(--text-3)', border:'1px solid rgba(255,255,255,0.06)'}}
                onClick={() => { setShowRetestPrompt(false); setStats(s => ({...s, lastRetestDismiss: new Date().toISOString()})); }}>
                {t.retestLater}
              </button>
            </div>
          </div>
        </div>
        );
      })()}

      {/* Stress SOS overlay removed — SOS is now instant from home button */}

      {showPaywall && <PaywallModal />}

      {/* Duration picker bottom sheet */}
      {durationPickerScenario && (
        <div onClick={() => setDurationPickerScenario(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'flex-end',zIndex:50}}>
          <div onClick={e => e.stopPropagation()} style={{width:'100%',padding:'24px',paddingBottom:'calc(24px + env(safe-area-inset-bottom, 16px))',background:'rgba(12,19,34,0.98)',borderRadius:'20px 20px 0 0',borderTop:'1px solid rgba(255,255,255,0.06)'}}>
            <p style={{fontSize:'16px',fontWeight:400,color:'rgba(220,225,235,0.88)',marginBottom:'16px'}}>{t[SCENARIO_LANG_KEY[durationPickerScenario.id]] || durationPickerScenario.id}</p>
            <div style={{display:'flex',gap:'12px'}}>
              {(durationPickerScenario.durations || []).map(d => (
                <button key={d} onClick={() => { launchScenario(durationPickerScenario.id, d); setDurationPickerScenario(null); }} style={{flex:1,padding:'14px',borderRadius:'12px',background:'rgba(255,255,255,0.025)',border:'1px solid rgba(255,255,255,0.06)',fontSize:'15px',color:'rgba(220,225,235,0.88)',cursor:'pointer'}}>
                  {d} {t.min}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Weekly summary overlay */}
      {showWeekly && (() => {
        const weekSessions = stats.history?.filter(h => {
          const d = new Date(h.date);
          return (Date.now() - d.getTime()) < 7 * 86400000;
        }) || [];
        const weekMinutes = weekSessions.reduce((s, h) => s + Math.round((h.duration || 0) / 60), 0);
        const weekDepth = formatDepth(stats.totalDepth);
        // Most used technique from recent history
        const techCounts = {};
        (stats.history || []).slice(-20).forEach(h => {
          if (h.scenario) {
            const sc = SCENARIOS[h.scenario];
            if (sc) {
              const content = getSessionContent(t, world)[h.scenario];
              if (content) {
                const firstDur = Object.keys(content)[0];
                const segs = content[firstDur] || [];
                segs.filter(s => s.type === 'breathing').forEach(s => {
                  techCounts[s.technique] = (techCounts[s.technique] || 0) + 1;
                });
              }
            }
          }
        });
        const topTech = Object.entries(techCounts).sort((a,b) => b[1] - a[1])[0];
        const topTechLabel = topTech ? (t[TECHNIQUE_LANG_KEY[topTech[0]]] || topTech[0]) : '-';
        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center" style={{background:'rgba(0,0,0,0.8)', backdropFilter:'blur(16px)'}}>
            <div className="screen-transition text-center z-10 px-8">
              <div className="font-body mb-8" style={{fontSize:14, fontWeight:500, color:palette.accent, letterSpacing:'0.15em'}}>{t.thisWeek}</div>
              {/* Hero depth number */}
              <div className="text-center mb-6">
                <div className="font-mono" style={{fontSize:48, fontWeight:300, color:palette.accent}}>{weekDepth}</div>
                <div className="font-body" style={{fontSize:12, fontWeight:400, color:'var(--text-3)', marginTop:4}}>{t.weeklyDepth}</div>
              </div>
              <div className="flex gap-6 justify-center mb-8">
                {[[weekSessions.length, t.weeklyDives],[weekMinutes, t.weeklyMinutes],[stats.streak, t.dayStreak]].map(([val,label],i) => (
                  <div key={i} className="text-center">
                    <div className="font-mono" style={{fontSize:28, fontWeight:300, color:palette.accent}}>{val}</div>
                    <div className="font-body" style={{fontSize:11, fontWeight:400, color:'var(--text-3)', marginTop:4}}>{label}</div>
                  </div>
                ))}
              </div>
              <div className="glass p-4 mx-auto mb-8" style={{maxWidth:200}}>
                <div className="font-body" style={{fontSize:11, fontWeight:500, color:'var(--text-3)', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:4}}>{t.mostUsed}</div>
                <div className="font-body" style={{fontSize:16, fontWeight:400, color:'rgba(226,232,240,0.9)'}}>{topTechLabel}</div>
              </div>
              <button className="px-10 py-3 rounded-full font-body"
                style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}
                onClick={() => { setShowWeekly(false); setStats(s => ({...s, lastWeeklySummary: new Date().toISOString()})); }}>
                {t.continueText}
              </button>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(
    React.createElement(ErrorBoundary, null, React.createElement(App))
  );
} catch(e) {
  document.getElementById('root').innerHTML = '<pre style="color:red;padding:20px">'+e.message+'\n'+e.stack+'</pre>';
}
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
