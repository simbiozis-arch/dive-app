* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body,#root { width:100%; height:100%; overflow:hidden; font-family:'DM Sans',sans-serif; }
:root {
  --bg-1:#070c15; --bg-2:#0c1322; --bg-3:#111b2e; --bg-4:#182640;
  --bg-start:#0c1322; --bg-mid:#0a1628; --bg-end:#070c15;
  --accent:#5eaaa8; --accent-glow:rgba(94,170,168,0.12); --accent-text:#7ec8c8;
  --glow:rgba(94,170,168,0.12);
  --card:rgba(255,255,255,0.025); --text:rgba(220,225,235,0.92);
  --text-2:rgba(220,225,235,0.55); --text-3:rgba(220,225,235,0.30);
}

@keyframes fade-in { from{opacity:0} to{opacity:1} }
@keyframes deblur { from{opacity:0;filter:blur(3px)} to{opacity:1;filter:blur(0)} }
@keyframes rays-appear { from{opacity:0} to{opacity:1} }
@keyframes count-up { from{opacity:0} to{opacity:1} }
@keyframes drift { 0%{transform:translateY(100vh);opacity:0} 5%{opacity:var(--peak-opacity)} 95%{opacity:var(--peak-opacity)} 100%{transform:translateY(-5vh);opacity:0} }

.font-display { font-family:'DM Sans',sans-serif; }
.font-mono { font-family:'JetBrains Mono',monospace; font-variant-numeric:tabular-nums; }
.font-body { font-family:'DM Sans',sans-serif; }

.screen-transition { animation: fade-in 400ms ease-out; }
.text-deblur { animation: deblur 500ms ease-out forwards; }

.glass {
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 14px;
  padding: 18px 20px;
  transition: transform 120ms ease, background 120ms ease;
}
.glass:active { transform: scale(0.985); background: rgba(255,255,255,0.04); }

.no-scrollbar::-webkit-scrollbar { display:none; }
.no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }

/* Single soft light spot per screen */
.screen-glow {
  position:fixed; top:-20%; left:-10%; width:60%; height:50%;
  background: radial-gradient(ellipse, rgba(94,170,168,0.04) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}

// ===== AMBIENT ENGINE =====
class AmbientEngine {
  constructor() { this.ctx = null; this.running = false; this.masterGain = null; }
  init(worldConfig) {
    if (this.ctx) this.destroy();
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = 0;
      this.masterGain.connect(this.ctx.destination);
      // Bass drone
      this.osc = this.ctx.createOscillator();
      this.osc.type = 'sine';
      this.osc.frequency.value = worldConfig.baseFreq;
      const oscGain = this.ctx.createGain();
      oscGain.gain.value = 0.12;
      this.osc.connect(oscGain);
      oscGain.connect(this.masterGain);
      // Noise
      const bufSize = this.ctx.sampleRate * 2;
      const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) d[i] = Math.random() * 2 - 1;
      this.noiseSrc = this.ctx.createBufferSource();
      this.noiseSrc.buffer = buf;
      this.noiseSrc.loop = true;
      this.filter = this.ctx.createBiquadFilter();
      this.filter.type = 'lowpass';
      this.filter.frequency.value = worldConfig.filterFreq;
      const noiseGain = this.ctx.createGain();
      noiseGain.gain.value = 0.06;
      this.noiseSrc.connect(this.filter);
      this.filter.connect(noiseGain);
      noiseGain.connect(this.masterGain);
      // LFO
      this.lfo = this.ctx.createOscillator();
      this.lfo.frequency.value = worldConfig.lfoRate;
      const lfoGain = this.ctx.createGain();
      lfoGain.gain.value = 3;
      this.lfo.connect(lfoGain);
      lfoGain.connect(this.osc.frequency);
      // Harmony for memory world
      if (worldConfig.baseFreq === 82) {
        this.osc2 = this.ctx.createOscillator();
        this.osc2.type = 'sine';
        this.osc2.frequency.value = 123;
        const osc2Gain = this.ctx.createGain();
        osc2Gain.gain.value = 0.03;
        this.osc2.connect(osc2Gain);
        osc2Gain.connect(this.masterGain);
        this.osc2.start();
      }
      this.osc.start();
      this.noiseSrc.start();
      this.lfo.start();
      this.running = true;
    } catch(e) { console.warn('Audio init failed', e); }
  }
  fadeIn(dur = 3) {
    if (!this.ctx || !this.masterGain) return;
    if (this.ctx.state === 'suspended') this.ctx.resume();
    this.masterGain.gain.cancelScheduledValues(this.ctx.currentTime);
    this.masterGain.gain.setValueAtTime(this.masterGain.gain.value, this.ctx.currentTime);
    this.masterGain.gain.linearRampToValueAtTime(0.15, this.ctx.currentTime + dur);
  }
  fadeOut(dur = 2) {
    if (!this.ctx || !this.masterGain) return;
    this.masterGain.gain.cancelScheduledValues(this.ctx.currentTime);
    this.masterGain.gain.setValueAtTime(this.masterGain.gain.value, this.ctx.currentTime);
    this.masterGain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + dur);
  }
  destroy() {
    this.fadeOut(0.5);
    setTimeout(() => {
      try { this.ctx?.close(); } catch {}
      this.ctx = null; this.running = false;
    }, 600);
  }
}

}

// ===== BREATHING CIRCLE =====
function BreathingCircle({ technique, params, elapsed, phaseName, phaseTime, phaseRemaining }) {
  const tech = TECHNIQUES[technique];
  if (!tech) return null;
  const phases = tech.phases;
  const totalCycle = phases.reduce((s, p) => s + (params[p] || tech.defaults[p] || 4), 0);

  // Determine current phase and scale
  let scale = 1.0;
  const isInhale = ['inhale','inhale1','inhale2','belly','ribs','chest'].includes(phaseName);
  const isHold = ['holdIn'].includes(phaseName);
  const isExhale = ['exhale'].includes(phaseName);
  const isPause = ['holdOut','pause'].includes(phaseName);

  const phaseDuration = params[phaseName] || tech.defaults[phaseName] || 4;
  const progress = phaseDuration > 0 ? Math.min(1, (phaseDuration - phaseRemaining) / phaseDuration) : 0;

  if (technique === 'segmented') {
    if (phaseName === 'belly') scale = 1.0 + 0.15 * progress;
    else if (phaseName === 'ribs') scale = 1.15 + 0.15 * progress;
    else if (phaseName === 'chest') scale = 1.3 + 0.2 * progress;
    else scale = 1.5 - 0.5 * progress; // exhale
  } else if (technique === 'physiological_sigh') {
    if (phaseName === 'inhale1') scale = 1.0 + 0.3 * progress;
    else if (phaseName === 'inhale2') scale = 1.3 + 0.2 * progress;
    else scale = 1.5 - 0.5 * progress;
  } else {
    if (isInhale) scale = 1.0 + 0.45 * progress;
    else if (isHold) scale = 1.45;
    else if (isExhale) scale = 1.45 - 0.45 * progress;
    else scale = 1.0;
  }

  // Muted glow — no bright colors
  const accentRgb = '94,170,168';

  return (
    <div className="flex flex-col items-center justify-center">
      <div style={{position:'relative', width:'min(60vw, 240px)', aspectRatio:'1'}}>
        {/* Static thin ring — NOT rotating */}
        <div style={{
          position:'absolute', inset:'-6px', borderRadius:'50%',
          border:`1px solid rgba(${accentRgb},0.12)`,
        }} />
        <div style={{
          width:'100%', height:'100%', borderRadius:'50%',
          background: `radial-gradient(circle at 40% 35%, rgba(${accentRgb},0.25) 0%, rgba(${accentRgb},0.08) 40%, rgba(12,19,34,0.9) 80%)`,
          boxShadow: isHold
            ? `0 0 100px rgba(${accentRgb},0.18), 0 0 200px rgba(${accentRgb},0.08)`
            : `0 0 80px rgba(${accentRgb},0.10), 0 0 160px rgba(${accentRgb},0.05)`,
          transform: `scale(${Math.min(scale, 1.45)})`,
          transition: `transform 0.3s cubic-bezier(0.4,0,0.2,1), box-shadow 0.5s ease`,
          display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
        }}>
          <div className="font-body" style={{fontSize:16, fontWeight:500, letterSpacing:'0.08em', textTransform:'uppercase', color:'rgba(255,255,255,0.9)'}}>
            {PHASE_LABELS[phaseName] || phaseName}
          </div>
          <div className="font-mono" style={{fontSize:36, fontWeight:300, color:'rgba(255,255,255,0.75)', marginTop:4}}>
            {Math.ceil(phaseRemaining)}
          </div>
        </div>
      </div>
      <div className="font-body mt-5" style={{fontSize:13, fontWeight:400, color:'var(--text-2)'}}>
        {tech.name}
      </div>
    </div>
  );
}

// ===== SESSION PLAYER =====
function SessionPlayer({ segments, world, onComplete, onExit }) {
  const [segIdx, setSegIdx] = useState(0);
  const [segElapsed, setSegElapsed] = useState(0);
  const [totalElapsed, setTotalElapsed] = useState(0);
  const [paused, setPaused] = useState(false);
  const [phaseName, setPhaseName] = useState('');
  const [phaseRemaining, setPhaseRemaining] = useState(0);
  const rafRef = useRef(null);
  const lastTimeRef = useRef(null);

  const totalDuration = useMemo(() => segments.reduce((s, seg) => s + seg.duration, 0), [segments]);
  const seg = segments[segIdx];
  const w = WORLDS[world];
  const palette = w.palette;

  // Gradient depth effect
  const depthProgress = totalDuration > 0 ? totalElapsed / totalDuration : 0;
  const bgColor = useMemo(() => {
    const lerp = (a, b, t) => {
      const ah = parseInt(a.slice(1), 16), bh = parseInt(b.slice(1), 16);
      const ar = (ah >> 16)&0xff, ag = (ah >> 8)&0xff, ab = ah&0xff;
      const br = (bh >> 16)&0xff, bg_ = (bh >> 8)&0xff, bb = bh&0xff;
      const r = Math.round(ar + (br-ar)*t), g = Math.round(ag + (bg_-ag)*t), b_ = Math.round(ab + (bb-ab)*t);
      return `rgb(${r},${g},${b_})`;
    };
    if (depthProgress < 0.5) return lerp(palette.bgStart, palette.bgMid, depthProgress * 2);
    return lerp(palette.bgMid, palette.bgEnd, (depthProgress - 0.5) * 2);
  }, [depthProgress, palette]);

  // Compute current phase for breathing segments
  useEffect(() => {
    if (!seg || seg.type !== 'breathing') return;
    const tech = TECHNIQUES[seg.technique];
    if (!tech) return;
    const p = seg.params || tech.defaults;
    const phases = tech.phases;
    const cycleDur = phases.reduce((s, ph) => s + (p[ph] || tech.defaults[ph] || 4), 0);
    const cyclePos = segElapsed % cycleDur;
    let acc = 0;
    for (const ph of phases) {
      const dur = p[ph] || tech.defaults[ph] || 4;
      if (cyclePos < acc + dur) {
        setPhaseName(ph);
        setPhaseRemaining(dur - (cyclePos - acc));
        return;
      }
      acc += dur;
    }
    setPhaseName(phases[0]);
    setPhaseRemaining(p[phases[0]] || tech.defaults[phases[0]] || 4);
  }, [segElapsed, seg]);

  // Body scan part tracking
  const [bodyScanIdx, setBodyScanIdx] = useState(0);
  useEffect(() => {
    if (!seg || seg.type !== 'bodyscan') return;
    let acc = 0;
    for (let i = 0; i < seg.parts.length; i++) {
      acc += seg.parts[i].hold;
      if (segElapsed < acc) { setBodyScanIdx(i); return; }
    }
    setBodyScanIdx(seg.parts.length - 1);
  }, [segElapsed, seg]);

  // Animation loop
  useEffect(() => {
    if (paused) return;
    lastTimeRef.current = performance.now();
    const tick = (now) => {
      const dt = (now - (lastTimeRef.current || now)) / 1000;
      lastTimeRef.current = now;
      setSegElapsed(prev => {
        const next = prev + dt;
        if (next >= seg.duration) {
          if (segIdx < segments.length - 1) {
            setSegIdx(si => si + 1);
            setBodyScanIdx(0);
            return 0;
          } else {
            onComplete();
            return prev;
          }
        }
        return next;
      });
      setTotalElapsed(prev => prev + dt);
      rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [paused, segIdx, seg, segments.length]);

  // Vibrate on phase change
  useEffect(() => {
    if (seg?.type === 'breathing' && navigator.vibrate) {
      try { navigator.vibrate(30); } catch {}
    }
  }, [phaseName]);

  // Progress bar segments
  const progressSegments = useMemo(() => {
    let acc = 0;
    return segments.map((s, i) => {
      const start = acc / totalDuration * 100;
      const width = s.duration / totalDuration * 100;
      acc += s.duration;
      return { start, width, type: s.type };
    });
  }, [segments, totalDuration]);

  const renderSegment = () => {
    if (!seg) return null;
    switch (seg.type) {
      case 'breathing':
        const subInstruction = PHASE_SUBS[seg.technique]?.[phaseName] || '';
        return (
          <div className="flex-1 flex flex-col items-center justify-center">
            <div className="font-body mb-4" style={{fontSize:13,fontWeight:400,color:'var(--text-2)'}}>{TECHNIQUES[seg.technique]?.name}</div>
            <BreathingCircle technique={seg.technique} params={seg.params || TECHNIQUES[seg.technique]?.defaults} elapsed={segElapsed} phaseName={phaseName} phaseTime={0} phaseRemaining={phaseRemaining} />
            {subInstruction && (
              <div className="font-body text-center mt-5 px-8" style={{fontSize:13,fontWeight:300,color:'var(--text-2)',maxWidth:280,lineHeight:1.6}}>
                {subInstruction}
              </div>
            )}
            {seg.hint && segElapsed < 15 && !subInstruction && (
              <div className="font-body text-center mt-5 px-8 text-deblur" style={{fontSize:13, fontWeight:300, lineHeight:1.6, color:'var(--text-2)', maxWidth:280}}>
                {seg.hint}
              </div>
            )}
          </div>
        );
      case 'text':
        return (
          <div className="flex-1 flex items-center justify-center px-8">
            <div className="font-body text-center text-deblur" style={{fontSize:17, fontWeight:300, lineHeight:1.75, color:'var(--text)', maxWidth:300, letterSpacing:'0.01em'}} key={seg.text.slice(0,20)}>
              {seg.text}
            </div>
          </div>
        );
      case 'bodyscan':
        const part = seg.parts[bodyScanIdx];
        return (
          <div className="flex-1 flex items-center justify-center px-8">
            <div className="font-body text-center text-deblur" style={{fontSize:17, fontWeight:300, lineHeight:1.75, color:'var(--text)', maxWidth:300, letterSpacing:'0.01em'}} key={bodyScanIdx}>
              {part?.text}
            </div>
          </div>
        );
      case 'visualization':
        const vText = seg.texts[world] || seg.texts.ocean || '';
        return (
          <div className="flex-1 flex items-center justify-center px-8">
            <div className="font-body text-center text-deblur" style={{fontSize:17, fontWeight:300, lineHeight:1.75, color:'var(--text)', maxWidth:300, letterSpacing:'0.01em'}} key={vText.slice(0,20)}>
              {vText}
            </div>
          </div>
        );
      case 'video':
        return (
          <div className="flex-1 flex flex-col items-center justify-center px-8">
            <div className="glass p-8 text-center screen-transition" style={{maxWidth:300}}>
              <div style={{marginBottom:16, color:'var(--accent-text)', opacity:0.3}}><Icon name="video" size={32}/></div>
              <div className="font-body mb-2" style={{fontWeight:500, fontSize:14, color:'rgba(226,232,240,0.85)'}}>Video Placeholder</div>
              <div className="font-body" style={{fontSize:12, fontWeight:400, color:'var(--text-3)', lineHeight:1.5}}>{seg.placeholder}</div>
              <div className="font-mono mt-4" style={{fontSize:12, fontWeight:300, color:palette.accent, opacity:0.8}}>{Math.ceil(seg.duration - segElapsed)}s</div>
            </div>
          </div>
        );
      default: return null;
    }
  };

  return (
    <div className="fixed inset-0 flex flex-col z-50" style={{background:bgColor, transition:'background 2s ease'}}>
      {/* Top bar */}
      <div className="flex items-center justify-between px-6" style={{paddingTop:'env(safe-area-inset-top, 48px)', paddingBottom:8}}>
        <button onClick={onExit} className="flex items-center justify-center rounded-full" style={{width:44,height:44,background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.08)',backdropFilter:'blur(4px)'}}>
          <Icon name="close" size={18}/>
        </button>
        <div className="font-mono" style={{fontSize:13, fontWeight:300, color:'rgba(226,232,240,0.5)'}}>
          {Math.floor(totalElapsed / 60)}:{String(Math.floor(totalElapsed % 60)).padStart(2,'0')} / {Math.floor(totalDuration / 60)}:{String(Math.floor(totalDuration % 60)).padStart(2,'0')}
        </div>
        <button onClick={() => setPaused(!paused)} className="flex items-center justify-center rounded-full" style={{width:44,height:44,background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.08)',backdropFilter:'blur(4px)'}}>
          <Icon name={paused ? 'play' : 'pause'} size={16}/>
        </button>
      </div>

      {/* Progress bar — 2px thin, premium */}
      <div className="relative" style={{height:2, borderRadius:1, background:'rgba(255,255,255,0.06)', margin:'0 24px 8px'}}>
        {progressSegments.map((ps, i) => (
          <React.Fragment key={i}>
            <div className="absolute top-0 h-full" style={{left:ps.start+'%', width:ps.width+'%'}}>
              {i <= segIdx && (
                <div className="h-full" style={{
                  width: i < segIdx ? '100%' : `${(segElapsed / seg.duration) * 100}%`,
                  borderRadius:1,
                  background: `linear-gradient(90deg, ${seg.type === 'breathing' ? (TECHNIQUES[seg.technique]?.color || palette.accent) : palette.accent}, rgba(255,255,255,0.3))`,
                  transition: 'width 1s linear',
                }} />
              )}
            </div>
            {i < progressSegments.length-1 && (
              <div className="absolute" style={{left: (ps.start+ps.width)+'%', top:-2, width:1, height:6, background:'rgba(255,255,255,0.12)'}} />
            )}
          </React.Fragment>
        ))}
      </div>

      {/* Content */}
      {renderSegment()}

      {/* Pause overlay */}
      {paused && (
        <div className="absolute inset-0 flex items-center justify-center z-60" style={{background:'rgba(0,0,0,0.6)', backdropFilter:'blur(12px)'}}>
          <div className="text-center screen-transition">
            <div className="font-body mb-6" style={{fontSize:32, fontWeight:300, color:'rgba(226,232,240,0.95)', letterSpacing:'0.1em'}}>Пауза</div>
            <button onClick={() => setPaused(false)} className="px-8 py-3 rounded-full font-body" style={{fontWeight:500, background:'rgba(79,209,197,0.15)', border:'1px solid rgba(79,209,197,0.3)', color:'#4fd1c5', backdropFilter:'blur(8px)'}}>
              Продолжить
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ===== MAIN APP =====
function App() {
  const [stats, setStats] = useState(() => loadData() || defaultStats());
  const [screen, setScreen] = useState(stats.onboarded ? 'home' : 'splash');
  const [onboardStep, setOnboardStep] = useState(0);
  const [selectedCat, setSelectedCat] = useState(null);
  const [selectedScenario, setSelectedScenario] = useState(null);
  const [selectedDuration, setSelectedDuration] = useState(null);
  const [activeSession, setActiveSession] = useState(null);
  const [selectedProgram, setSelectedProgram] = useState(null);
  const [selectedDay, setSelectedDay] = useState(null);
  const [tab, setTab] = useState('home');
  const [showPaywall, setShowPaywall] = useState(false);
  const [showCompletion, setShowCompletion] = useState(false);
  const [completionData, setCompletionData] = useState(null);
  const ambientRef = useRef(new AmbientEngine());
  const world = stats.world || 'ocean';
  const palette = WORLDS[world].palette;

  // Save stats
  useEffect(() => { saveData(stats); }, [stats]);

  // Apply CSS vars
  useEffect(() => {
    const p = WORLDS[world].palette;
    const r = document.documentElement;
    r.style.setProperty('--bg-start', p.bgStart);
    r.style.setProperty('--bg-mid', p.bgMid);
    r.style.setProperty('--bg-end', p.bgEnd);
    r.style.setProperty('--accent', p.accent);
    r.style.setProperty('--glow', p.glow);
    r.style.setProperty('--card', p.card);
    r.style.setProperty('--text', p.text);
  }, [world]);

  // Streak check on mount
  useEffect(() => {
    if (!stats.lastSessionDate) return;
    const last = new Date(stats.lastSessionDate);
    const today = new Date();
    const diffDays = Math.floor((today - last) / 86400000);
    if (diffDays > 1) {
      setStats(s => ({...s, streak: 0}));
    }
  }, []);

  const updateStats = useCallback((sessionInfo) => {
    const now = new Date();
    const today = now.toISOString().split('T')[0];
    const hour = now.getHours();
    setStats(prev => {
      const newTechs = [...new Set([...(prev.techniquesUsed||[]), ...(sessionInfo.techniques||[])])];
      const newCats = [...new Set([...(prev.categoriesUsed||[]), sessionInfo.category].filter(Boolean))];
      const isNight = hour >= 21 || hour <= 5;
      const isMorning = hour >= 5 && hour < 9;
      let streak = prev.streak;
      if (prev.lastSessionDate !== today) {
        const last = prev.lastSessionDate ? new Date(prev.lastSessionDate) : null;
        const diff = last ? Math.floor((new Date(today) - last) / 86400000) : 2;
        streak = diff === 1 ? prev.streak + 1 : 1;
      }
      const depth = (sessionInfo.duration || 0) / 60 * (sessionInfo.multiplier || 1);
      return {
        ...prev,
        totalSessions: prev.totalSessions + 1,
        streak, lastSessionDate: today,
        totalDepth: Math.round((prev.totalDepth + depth) * 10) / 10,
        totalMinutes: prev.totalMinutes + Math.round((sessionInfo.duration || 0) / 60),
        techniquesUsed: newTechs, categoriesUsed: newCats,
        nightSessions: prev.nightSessions + (isNight ? 1 : 0),
        morningSessions: prev.morningSessions + (isMorning ? 1 : 0),
        history: [...prev.history, { date: now.toISOString(), scenario: sessionInfo.scenario, duration: sessionInfo.duration, category: sessionInfo.category }].slice(-100),
      };
    });
  }, []);

  const startSession = (segments, meta = {}) => {
    setActiveSession({ segments, meta });
    // Start ambient
    if (stats.soundEnabled) {
      ambientRef.current.init(WORLDS[world].ambient);
      ambientRef.current.fadeIn();
    }
  };

  const endSession = (completed = true) => {
    ambientRef.current.fadeOut();
    setTimeout(() => ambientRef.current.destroy(), 2500);
    if (completed && activeSession) {
      const segs = activeSession.segments;
      const totalDur = segs.reduce((s, seg) => s + seg.duration, 0);
      const techs = [...new Set(segs.filter(s => s.type === 'breathing').map(s => s.technique))];
      const maxMult = Math.max(...segs.filter(s => s.type === 'breathing').map(s => TECHNIQUES[s.technique]?.multiplier || 1), 1);
      updateStats({
        duration: totalDur, techniques: techs, category: activeSession.meta?.category,
        scenario: activeSession.meta?.scenario, multiplier: maxMult,
      });
      // Program progress
      if (activeSession.meta?.programId && activeSession.meta?.day !== undefined) {
        setStats(prev => {
          const pp = {...(prev.programProgress || {})};
          if (!pp[activeSession.meta.programId]) pp[activeSession.meta.programId] = [];
          if (!pp[activeSession.meta.programId].includes(activeSession.meta.day)) {
            pp[activeSession.meta.programId] = [...pp[activeSession.meta.programId], activeSession.meta.day];
          }
          const prog = PROGRAMS[activeSession.meta.programId];
          const programsCompleted = prog && pp[activeSession.meta.programId].length >= prog.days
            ? prev.programsCompleted + 1 : prev.programsCompleted;
          return {...prev, programProgress: pp, programsCompleted};
        });
      }
      setCompletionData({
        duration: totalDur, techniques: techs, depth: Math.round(totalDur / 60 * maxMult * 10) / 10,
      });
      setShowCompletion(true);
    }
    setActiveSession(null);

          background:`radial-gradient(ellipse at 50% 0%, ${palette.accent}14 0%, transparent 60%)`,
          animation:'rays-appear 2s ease-out forwards', pointerEvents:'none', zIndex:0}} />
        <Particles world={world} />
        <div className="screen-transition text-center z-10">
          <div style={{marginBottom:20, color:'var(--accent-text)', opacity:0.4}}><Icon name="check" size={32}/></div>
          <div className="font-body mb-3" style={{fontSize:32, fontWeight:300, color:'rgba(226,232,240,0.95)', }}>session complete</div>
          <div className="font-body mb-8" style={{fontSize:13, fontWeight:400, color:'var(--text-2)'}}>Сессия завершена</div>
          <div className="flex gap-8 justify-center mb-10">

              <div key={i} className="text-center" style={{animation:`count-up 600ms ${i*150}ms ease-out both`}}>

        <div className="text-center mb-5">
          <div className="font-body mb-2" style={{fontSize:24, fontWeight:300, color:'rgba(226,232,240,0.95)', letterSpacing:'0.08em'}}>Unlock Everything</div>

        </button>

    if (screen === 'category') return renderCategory();
    if (screen === 'session_pre') return renderSessionPre();
    if (screen === 'program_view') return renderProgramView();

    switch (tab) {
      case 'home': return renderHome();
      case 'quick': return renderQuickDive();
      case 'programs': return renderPrograms();
      case 'profile': return renderProfile();
      default: return renderHome();
    }
  };

  const showTabs = !['category','session_pre','program_view'].includes(screen);

  return (
    <div className="fixed inset-0" style={{background:bg}}>
      <Particles world={world} />
      <div className="relative z-10 h-full">
        {renderScreen()}
      </div>

      {/* Tab bar — premium */}
      {showTabs && (
        <div className="fixed bottom-0 left-0 right-0 z-40" style={{background:'rgba(7,12,21,0.85)', backdropFilter:'blur(20px)', WebkitBackdropFilter:'blur(20px)', borderTop:'1px solid rgba(255,255,255,0.04)'}}>
          <div className="flex justify-around" style={{paddingTop:12, paddingBottom:'env(safe-area-inset-bottom, 24px)'}}>
            {[
              {id:'home', svgIcon:'home', label:'Home'},
              {id:'quick', svgIcon:'quick', label:'Explore'},
              {id:'programs', svgIcon:'programs', label:'Programs'},
              {id:'profile', svgIcon:'profile', label:'Profile'},
            ].map(t => (
              <button key={t.id} className="flex flex-col items-center py-1 px-3" style={{gap:3}}
                onClick={() => { setTab(t.id); if (['category','session_pre','program_view'].includes(screen)) setScreen('home'); }}>
                <span style={{color: tab === t.id ? 'var(--accent-text)' : 'var(--text-3)', transition:'color 200ms ease'}}><Icon name={t.svgIcon} size={20}/></span>
                <span className="font-body" style={{fontSize:10, fontWeight:500, letterSpacing:'0.03em', color: tab === t.id ? 'var(--accent-text)' : 'var(--text-3)', transition:'color 200ms ease'}}>{t.label}</span>
              </button>
            ))}
          </div>
        </div>
      )}

      {showPaywall && <PaywallModal />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
