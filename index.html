        const last = prev.lastSessionDate ? new Date(prev.lastSessionDate) : null;
        const diff = last ? Math.floor((new Date(today) - last) / 86400000) : 2;
        streak = diff === 1 ? prev.streak + 1 : 1;
      }
      const longestStreak = Math.max(prev.longestStreak || 0, streak);
      const depth = sessionDepth(sessionInfo.duration || 0, sessionInfo.mainTechnique || 'diaphragmatic');
      const newTechStats = {...(prev.techniqueStats || {})};
      (sessionInfo.techniques || []).forEach(tc => { newTechStats[tc] = (newTechStats[tc] || 0) + 1; });
      return {
        ...prev, totalSessions: prev.totalSessions + 1, streak, longestStreak, lastSessionDate: today,
        totalDepth: Math.round((prev.totalDepth + depth) * 10) / 10,
        totalMinutes: prev.totalMinutes + Math.round((sessionInfo.duration || 0) / 60),
        techniquesUsed: newTechs, categoriesUsed: newCats,
        nightSessions: prev.nightSessions + (isNight ? 1 : 0),
        morningSessions: prev.morningSessions + (isMorning ? 1 : 0),
        techniqueStats: newTechStats,
        history: [...prev.history, { date: now.toISOString(), scenario: sessionInfo.scenario, duration: sessionInfo.duration, category: sessionInfo.category }].slice(-100),
      };
    });
  };

  const actuallyStartSession = (segments, meta = {}) => {
    setActiveSession({ segments, meta });
    if (stats.soundEnabled) { ambientRef.current.init(WORLDS[world].ambient); ambientRef.current.fadeIn(); }
  };

  const [showPreMood, setShowPreMood] = useState(false);
  const [pendingSessionData, setPendingSessionData] = useState(null);

  const startSession = (segments, meta = {}) => {
    setCurrentMood({pre:null, post:null});
    setMoodDelta(null);
    setPendingSessionData({ segments, meta });
    setShowPreMood(true);
  };


  const endSession = (completed = true) => {
    ambientRef.current.fadeOut();
    setTimeout(() => ambientRef.current.destroy(), 2500);
    if (completed && activeSession) {
      const segs = activeSession.segments;
      const totalDur = segs.reduce((s, seg) => s + seg.duration, 0);
      const techs = [...new Set(segs.filter(s => s.type === 'breathing').map(s => s.technique))];
      const breathSegs = segs.filter(s => s.type === 'breathing');
      const mainTech = breathSegs.length > 0 ? breathSegs.reduce((a, b) => b.duration > a.duration ? b : a).technique : 'diaphragmatic';
      updateStats({ duration: totalDur, techniques: techs, category: activeSession.meta?.category, scenario: activeSession.meta?.scenario, mainTechnique: mainTech });
      if (activeSession.meta?.programId && activeSession.meta?.day !== undefined) {
        setStats(prev => {
          const pp = {...(prev.programProgress || {})};
          if (!pp[activeSession.meta.programId]) pp[activeSession.meta.programId] = [];
          if (!pp[activeSession.meta.programId].includes(activeSession.meta.day)) pp[activeSession.meta.programId] = [...pp[activeSession.meta.programId], activeSession.meta.day];
          const prog = PROGRAMS[activeSession.meta.programId];
          const programsCompleted = prog && pp[activeSession.meta.programId].length >= prog.days ? prev.programsCompleted + 1 : prev.programsCompleted;
          return {...prev, programProgress: pp, programsCompleted};
        });
      }
      const breathCycles = segs.filter(s => s.type === 'breathing').reduce((total, s) => {
        const cycleDur = Object.values(s.params).reduce((a, b) => a + b, 0);
        return total + (cycleDur > 0 ? Math.floor(s.duration / cycleDur) : 0);
      }, 0) || Math.round(totalDur / 16);
      setCompletionData({ duration: totalDur, techniques: techs, depth: sessionDepth(totalDur, mainTech), breathCycles, segments: segs, _lastScenario: activeSession.meta?.scenario });
      setShowCompletion(true);
    }
    setActiveSession(null);
  };

  const checkAccess = (item, dur) => {
    if (stats.isPremium) return true;
    if (!item.free) return false;
    // Free scenarios: 10min versions are premium only
    if (dur && dur >= 10) return false;
    return true;
  };
  const selectWorld = (w) => setStats(s => ({...s, world: w}));

  const bg = w.bgGradient;



  // ===== FIRST BREATH SCREEN =====
  if (screen === 'first_breath') {
    return <FirstBreathScreen palette={palette} accentRgb={accentRgb} t={t} ambientRef={ambientRef}
      onComplete={(goal, holdTimeResult) => { setStats(s => {
        const hDepth = holdTimeResult ? holdTimeToDepth(holdTimeResult) : null;
        const newState = {...s, firstFeeling: goal, userGoal: goal, onboarded:true, world:'ocean', initialHoldTime: holdTimeResult ? Math.round(holdTimeResult*10)/10 : null, initialDepth: hDepth};
        if (holdTimeResult && holdTimeResult > 0) {
          newState.breathTests = [...(s.breathTests || []), { date: new Date().toISOString(), holdTime: Math.round(holdTimeResult*10)/10, depth: hDepth }];
        }
        return newState;
      }); setScreen('home'); setTab('home'); }} />;
  }


  // Pre-mood overlay
  if (showPreMood && pendingSessionData) {
    return (
      <div className="fixed inset-0 flex flex-col items-center justify-center" style={{background:bg, zIndex:50}}>
        <Particles world={world} />
        <div className="z-10 text-center">
          <p className="font-body" style={{fontWeight:300, fontSize:20, color:'var(--text)', marginBottom:32}}>How are you feeling?</p>
          <div style={{display:'flex', gap:16, justifyContent:'center'}}>
            {[1,2,3,4,5].map(n => (
              <button key={n} onClick={() => {
                setCurrentMood(m => ({...m, pre:n}));
                setShowPreMood(false);
                actuallyStartSession(pendingSessionData.segments, pendingSessionData.meta);
                setPendingSessionData(null);
              }} style={{
                width:48, height:48, borderRadius:'50%',
                border:'1px solid rgba(255,255,255,0.08)', background:'transparent',
                fontFamily:"'JetBrains Mono',monospace", fontWeight:300, fontSize:18,
                color:'var(--text-2)', display:'flex', alignItems:'center', justifyContent:'center',
                cursor:'pointer',
              }}>{n}</button>
            ))}
          </div>
          <div style={{display:'flex', justifyContent:'space-between', width:280, margin:'12px auto 0'}}>
            <span style={{fontSize:11, color:'var(--text-3)'}}>calm</span>
            <span style={{fontSize:11, color:'var(--text-3)'}}>stressed</span>
          </div>
          <button onClick={() => {
            setShowPreMood(false);
            actuallyStartSession(pendingSessionData.segments, pendingSessionData.meta);
            setPendingSessionData(null);
          }} style={{marginTop:32, fontSize:13, color:'var(--text-3)', background:'none', border:'none', cursor:'pointer'}}>Skip</button>
        </div>
      </div>
    );
  }

  // Active session
  if (activeSession) {
    return <SessionPlayer segments={activeSession.segments} world={world} onComplete={() => endSession(true)} onExit={() => endSession(false)} t={t} voiceEnabled={stats.voiceEnabled} ambientRef={ambientRef} currentLang={currentLang} />;
  }

  // Completion
  if (showCompletion && completionData) {
    const earnedBadges = BADGES.filter(b => b.condition(stats));
    // Note: no useMemo here — conditional hooks violate React rules
    const sessionInsight = getSessionInsight(stats, completionData, currentLang);
    const closeCompletion = () => { setShowCompletion(false); setCompletionData(null); setCompletionStep('stats'); setCompletionFeeling(null); setMoodDelta(null); };
    return (
      <div className="fixed inset-0 flex flex-col items-center justify-center px-8" style={{background:bg}}>
        <div style={{position:'absolute',top:'-50%',left:'50%',width:'200%',height:'100%',transform:'translateX(-50%)',
          background:`radial-gradient(ellipse at 50% 0%, rgba(${accentRgb},0.08) 0%, transparent 60%)`,
          animation:'rays-appear 2s ease-out forwards', pointerEvents:'none', zIndex:0}} />
        <Particles world={world} />
        <div className="screen-transition text-center z-10">
          <div style={{marginBottom:20, color:palette.accent, opacity:0.4}}><Icon name="check" size={32}/></div>
          <div className="font-body mb-3" style={{fontSize:28, fontWeight:300, color:'rgba(226,232,240,0.95)'}}>{t.diveComplete}</div>
          <div style={{borderTop:'1px solid rgba(255,255,255,0.04)', borderBottom:'1px solid rgba(255,255,255,0.04)', padding:'20px 0', margin:'24px 0'}}>
            <div className="flex justify-center" style={{gap:0}}>
              {[[Math.round(completionData.duration / 60), t.duration || t.min],[completionData.breathCycles || Math.round(completionData.duration / 16), t.breathCycles || 'Breaths'],[completionData.depth, WORLDS[world].depthUnit]].map(([val,label],i) => (
                <div key={i} className="text-center flex-1" style={{animation:`count-up 600ms ${i*150}ms ease-out both`}}>
                  <div className="font-mono" style={{fontSize:28, fontWeight:300, color:palette.accent}}>{val}</div>
                  <div className="font-body" style={{fontSize:11, fontWeight:300, color:'var(--text-3)', marginTop:4, letterSpacing:'0.05em', textTransform:'lowercase'}}>{label}</div>
                </div>
              ))}
            </div>
          </div>
          {earnedBadges.length > 0 && (
            <div className="flex gap-2 justify-center flex-wrap mb-6">
              {earnedBadges.slice(-3).map((b, i) => (
                <div key={b.id} className="glass px-4 py-2 flex items-center gap-2">
                  <span style={{color:palette.accent,opacity:0.6}}><Icon name="check" size={14}/></span>
                  <span className="font-body" style={{fontSize:12, fontWeight:500, color:'rgba(226,232,240,0.85)'}}>{BADGE_NAMES[b.id]}</span>
                </div>
              ))}
            </div>
          )}

          {/* WOW 5: Post-session insight */}
          {sessionInsight && (
            <div className="mb-6 text-deblur" style={{maxWidth:300, margin:'0 auto 24px'}}>
              <div className="font-body" style={{fontSize:15, fontWeight:300, color:'rgba(220,225,235,0.65)', lineHeight:1.7, textAlign:'center'}}>
                {sessionInsight.text}
              </div>
            </div>
          )}

          {/* Post-session mood — 1-5 scale */}
          {completionStep === 'stats' && !moodDelta && (
            <div className="mb-6 screen-transition">
              <MoodScale label={t.andNow || 'And now?'} lowLabel={t.moodLow} highLabel={t.moodHigh} onSelect={(n) => {
                setCurrentMood(m => ({...m, post:n}));
                const pre = currentMood.pre;
                if (pre !== null && n !== null) {
                  const delta = pre - n;
                  if (delta > 0) setMoodDelta((t.moodImprove || '{pre} \u2192 {post} \u00b7 \u2212{delta} points').replace('{pre}',pre).replace('{post}',n).replace('{delta}',delta));
                  else if (delta === 0) setMoodDelta(t.moodSame || 'Consistency builds resilience.');
                  else setMoodDelta(t.moodWorse || 'Some sessions plant seeds for later.');
                }
                // Store mood in last history entry
                setStats(s => {
                  const hist = [...s.history];
                  if (hist.length > 0) { hist[hist.length-1] = {...hist[hist.length-1], preMood: pre, postMood: n}; }
                  return {...s, history: hist, lastFeeling: n};
                });
                setTimeout(() => {
                  // Check if intensive session -> show safety question
                  if (completionData && isIntensiveSession(completionData.segments)) setCompletionStep('safety');
                  else if (stats.totalSessions <= 1 && !stats.reminderTime) setCompletionStep('reminder');
                  else setCompletionStep('done');
                }, pre !== null ? 2000 : 600);
              }} />
            </div>
          )}
          {/* Mood delta display */}
          {moodDelta && completionStep === 'stats' && (
            <div className="mb-6 screen-transition">
              <div className="font-body" style={{fontSize:15, fontWeight:300, color:'rgba(220,225,235,0.65)', lineHeight:1.7, textAlign:'center'}}>{moodDelta}</div>
            </div>
          )}

          {/* Safety check — after intensive sessions */}
          {completionStep === 'safety' && (
            <div className="mb-6 screen-transition">
              <div className="font-body mb-5" style={{fontSize:16, fontWeight:300, color:'rgba(226,232,240,0.8)'}}>{t.safetyQuestion}</div>
              <div className="flex gap-3 justify-center">
                <button className="glass px-6 py-2.5 font-body"
                  style={{fontSize:14, fontWeight:500, color:'rgba(252,129,129,0.8)', border:'1px solid rgba(252,129,129,0.25)'}}
                  onClick={() => {
                    setStats(s => ({...s, safetyFlag: { date: new Date().toISOString() }}));
                    setCompletionStep('safety_msg');
                  }}>
                  {t.safetyYes}
                </button>
                <button className="glass px-6 py-2.5 font-body"
                  style={{fontSize:14, fontWeight:500, color:palette.accent, border:`1px solid rgba(${accentRgb},0.25)`}}
                  onClick={() => {
                    if (stats.totalSessions <= 1 && !stats.reminderTime) setCompletionStep('reminder');
                    else setCompletionStep('done');
                  }}>
                  {t.safetyNo}
                </button>
              </div>
            </div>
          )}
          {completionStep === 'safety_msg' && (
            <div className="mb-6 screen-transition">
              <div className="font-body mb-5" style={{fontSize:15, fontWeight:300, color:'rgba(220,225,235,0.65)', lineHeight:1.7, textAlign:'center', maxWidth:300, margin:'0 auto'}}>{t.safetyMessage}</div>
              <button className="px-8 py-3 rounded-full font-body mx-auto block"
                style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}
                onClick={() => {
                  if (stats.totalSessions <= 1 && !stats.reminderTime) setCompletionStep('reminder');
                  else setCompletionStep('done');
                }}>
                {t.continueText}
              </button>
            </div>
          )}

          {/* Step 3: Reminder prompt — first session AND no reminder */}
          {completionStep === 'reminder' && (
            <div className="mb-6 screen-transition">
              <div className="font-body mb-4" style={{fontSize:16, fontWeight:300, color:'rgba(226,232,240,0.8)'}}>{t.buildHabit || t.setReminder}</div>
              <div className="flex gap-3 justify-center">
                {[[t.habitMorning || t.reminderMorning,'morning'],[t.habitEvening || t.reminderEvening,'evening'],[t.habitNotNow || t.reminderNotNow,null]].map(([label,val]) => (
                  <button key={label} className="glass px-5 py-2.5 font-body"
                    style={{fontSize:13, fontWeight:500, color: val ? palette.accent : 'rgba(226,232,240,0.5)', border: val ? `1px solid rgba(${accentRgb},0.25)` : '1px solid rgba(255,255,255,0.06)'}}
                    onClick={() => {
                      setStats(s => ({...s, reminderTime: val}));
                      setCompletionStep('done');
                    }}>
                    {label}
                  </button>
                ))}
              </div>
              {stats.reminderTime && <div className="font-body mt-3" style={{fontSize:12, color:palette.accent, opacity:0.7}}>{t.reminderSet} \u2713</div>}
            </div>
          )}

          {/* Final buttons */}
          {completionStep === 'done' && (
            <div className="flex gap-3 justify-center screen-transition">
              <button className="px-8 py-3 rounded-full font-body"
                style={{fontWeight:500, background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.08)', color:'rgba(226,232,240,0.7)'}}
                onClick={() => {
                  closeCompletion();
                  if (completionData._lastScenario) launchScenario(completionData._lastScenario);
                }}>
                {t.repeat}
              </button>
              <button className="px-8 py-3 rounded-full font-body"
                style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}
                onClick={closeCompletion}>
                {t.newDive}
              </button>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ===== PAYWALL =====
  const PaywallModal = () => {
    const monthlyPrice = t.paywallMonthly || t.monthly;
    const yearlyPrice = t.paywallYearly || t.yearly;
    const yearlySave = t.paywallYearlySave || t.yearlySave;
    const trialNote = t.trialNotice || t.paywallTrialNote || '';
    const startTrialLabel = t.paywallStartTrial || t.startTrial;
    return (
    <div className="fixed inset-0 z-50 flex items-end justify-center" style={{background:'rgba(0,0,0,0.7)', backdropFilter:'blur(12px)'}}>
      <div className="glass w-full max-w-sm mx-6 mb-8 p-6 screen-transition" style={{borderRadius:24}}>
        <div className="text-center mb-5">
          <div className="font-body mb-2" style={{fontSize:24, fontWeight:300, color:'rgba(226,232,240,0.95)', letterSpacing:'0.08em'}}>{t.unlockAll}</div>
        </div>
        <div className="space-y-2.5 mb-5">
          {(t.paywallFeatures||[]).map(f => (
            <div key={f} className="flex items-center gap-3 font-body" style={{fontSize:13, fontWeight:400, color:'rgba(226,232,240,0.75)'}}>
              <span style={{color:palette.accent}}><Icon name="check" size={14}/></span>{f}
            </div>
          ))}
        </div>
        <div className="flex gap-3 mb-4">
          <div className="flex-1 glass p-4 text-center cursor-pointer" style={{border:'1px solid rgba(255,255,255,0.06)'}}>
            <div className="font-body" style={{fontWeight:600, fontSize:14, color:'rgba(226,232,240,0.7)'}}>{monthlyPrice}</div>
          </div>
          <div className="flex-1 glass p-5 text-center cursor-pointer" style={{border:`2px solid rgba(${accentRgb},0.4)`, boxShadow:`0 0 20px rgba(${accentRgb},0.12)`, transform:'scale(1.03)'}}>
            <div className="font-body" style={{fontWeight:600, fontSize:16, color:palette.accent}}>{yearlyPrice}</div>
            <div className="font-body" style={{fontSize:12, fontWeight:500, color:palette.accent, opacity:0.8, marginTop:3}}>{yearlySave}</div>
          </div>
        </div>
        {trialNote && <div className="font-body text-center mb-4" style={{fontSize:11, fontWeight:400, color:'var(--text-3)', lineHeight:1.5}}>{trialNote}</div>}
        <button className="w-full py-3.5 rounded-full font-body mb-3"
          style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}>
          {startTrialLabel}
        </button>
        <button className="w-full py-2 font-body" style={{fontSize:12, fontWeight:400, color:'var(--text-3)'}}
          onClick={() => { setStats(s => ({...s, isPremium:true})); setShowPaywall(false); }}>
          {t.demoUnlock}
        </button>
        <button className="w-full py-2 font-body" style={{fontSize:12, fontWeight:400, color:'rgba(226,232,240,0.2)'}}
          onClick={() => setShowPaywall(false)}>
          {t.close}
        </button>
      </div>
    </div>
  );
  };

  // ===== HOME =====
  const launchScenario = (id, dur) => {
    // Handle first session special case
    if (id === '_first_session') {
      startSession(FIRST_SESSION(t), {scenario:'first_session', category:'focus'});
      return;
    }
    const sc = SCENARIOS[id];
    if (!sc) return;
    if (!checkAccess(sc)) { setShowPaywall(true); return; }
    const d = dur || sc.durations[0];
    // Check 10min premium restriction
    if (d >= 10 && !sc.free && !stats.isPremium) { setShowPaywall(true); return; }
    let segs = getSessionContent(t, world)[id]?.[d];
    // Fallback: if no segments for this duration, generate a generic session
    if (!segs || segs.length === 0) {
      const scenarioContent = getSessionContent(t, world)[id];
      const existingDurations = scenarioContent ? Object.keys(scenarioContent).map(Number) : [];
      if (existingDurations.length > 0) {
        // Use the closest existing duration's first breathing technique as base
        const closest = existingDurations.reduce((a, b) => Math.abs(b - d) < Math.abs(a - d) ? b : a);
        const baseSegs = scenarioContent[closest];
        const firstBreathing = baseSegs.find(s => s.type === 'breathing');
        if (firstBreathing) {
          const targetSec = d * 60;
          segs = [
            { type:'text', duration:8, text:t.sitDown, textKey:'sitDown' },
            { type:'breathing', technique:firstBreathing.technique, duration: Math.round(targetSec * 0.7), params:{...firstBreathing.params} },
            { type:'breathing', technique:'diaphragmatic', duration: Math.round(targetSec * 0.25), params:{inhale:4, exhale:8} },
            { type:'text', duration: Math.round(targetSec * 0.05) || 5, text:t.openEyes, textKey:'openEyes' },
          ];
        }
      }
    }
    if (segs) startSession(segs, {scenario:id, category:sc.cat});
  };

  function getGreeting(t) {
    const hour = new Date().getHours();
    if (hour >= 5 && hour < 12) return t.goodMorning;
    if (hour >= 12 && hour < 17) return t.goodAfternoon;
    if (hour >= 17 && hour < 22) return t.goodEvening;
    return t.goodNight;
  }

  const renderHome = () => {
    const rec = getDailyRecommendation(stats, t);
    return (
    <div className="screen-transition overflow-y-auto h-full no-scrollbar" style={{padding:'env(safe-area-inset-top, 48px) 24px 100px 24px'}}>
      <div className="flex items-center justify-between mb-6">
        <div>
          <div className="font-body" style={{fontSize:24, fontWeight:200, color:'rgba(226,232,240,0.95)', letterSpacing:'0.25em', textTransform:'uppercase'}}>{t.appName}</div>
        </div>
      </div>

      {/* Time-based greeting */}
      <div className="font-body mb-3" style={{fontSize:14, fontWeight:300, color:'var(--text-3)', textAlign:'left'}}>{getGreeting(t)}</div>

      {/* Daily recommendation card */}
      <button className="w-full text-left mb-6" style={{
        minHeight:200, borderRadius:18, padding:'32px 24px', position:'relative', overflow:'hidden',
        background:`linear-gradient(135deg, rgba(${accentRgb},0.10) 0%, rgba(${accentRgb},0.03) 100%)`,
        border:`1px solid rgba(${accentRgb},0.22)`,
        display:'flex', flexDirection:'column', justifyContent:'space-between',
      }} onClick={() => launchScenario(rec.scenario, rec.duration)}>
        <div>
          <div className="font-body mb-2" style={{fontSize:12, fontWeight:500, color:palette.accent, opacity:0.7, letterSpacing:'0.08em', textTransform:'uppercase'}}>{t.todaysDiveLabel}</div>
          <div className="font-body mb-3" style={{fontSize:22, fontWeight:400, color:'rgba(226,232,240,0.95)', letterSpacing:'0.04em'}}>{rec.title}</div>
          <div className="font-body" style={{fontSize:14, fontWeight:300, color:'var(--text-2)'}}>{rec.sub}</div>
        </div>
        <div style={{textAlign:'center', marginTop:16}}>
          <div className="inline-flex items-center justify-center font-body"
            style={{height:44, padding:'0 28px', borderRadius:10, fontWeight:500, fontSize:15, background:`rgba(${accentRgb},0.15)`, border:`1px solid rgba(${accentRgb},0.3)`, color:palette.accent, letterSpacing:'0.04em'}}>
            {t.begin}
          </div>
        </div>
      </button>

      {/* Streak + depth below card */}
      <div className="flex gap-4 mb-6 justify-center">
        <div className="font-body" style={{fontSize:12, fontWeight:400, color:'var(--text-3)'}}>
          {stats.streak > 0 ? <><span className="font-mono">{stats.streak}</span> {t.dayStreak}</> : t.streakStart}
        </div>
        <div className="font-body" style={{fontSize:12, fontWeight:400, color:'var(--text-3)'}}>
          <span className="font-mono">{stats.totalDepth}</span> {WORLDS[world].depthUnit} {t.depth}
        </div>
      </div>

      {/* Stress SOS button */}
      <button className="w-full mb-6" style={{
        height:44, borderRadius:12, background:`rgba(${accentRgb},0.06)`, border:`1px solid rgba(${accentRgb},0.12)`,
        color:'rgba(220,225,235,0.7)', display:'flex', alignItems:'center', justifyContent:'center', gap:8,
        fontSize:14, fontWeight:400,
      }} onClick={() => setShowStressChoice(true)}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        Stressed right now?
      </button>

      {/* Programs — horizontal scroll */}
      <div className="mb-6">
        <div className="font-body mb-3" style={{fontSize:11, fontWeight:600, color:'rgba(220,225,235,0.30)', letterSpacing:'0.12em', textTransform:'uppercase'}}>{t.programs}</div>
        <div className="flex gap-3 overflow-x-auto no-scrollbar pb-2">
          {Object.entries(PROGRAMS).map(([key, prog]) => {
            const progress = (stats.programProgress?.[key] || []).length;
            const nameKey = key === 'first_dive' ? 'firstDive' : key === 'stress_shield' ? 'stressShield' : 'deepFocus';
            return (

    const nameKey = selectedProgram === 'first_dive' ? 'firstDive' : selectedProgram === 'stress_shield' ? 'stressShield' : 'deepFocus';
    const subKey = nameKey + 'Sub';

    // Find last completion time for cooldown check
    const lastCompletionEntry = stats.history?.filter(h => h.scenario === selectedProgram || h.category === 'program').slice(-1)[0];
    const lastCompletionTime = lastCompletionEntry ? new Date(lastCompletionEntry.date).getTime() : 0;
    const hoursSinceLast = (Date.now() - lastCompletionTime) / 3600000;
    const today = new Date().toISOString().split('T')[0];
    const lastCompletionDate = lastCompletionEntry ? new Date(lastCompletionEntry.date).toISOString().split('T')[0] : null;

    return (
      <div className="screen-transition overflow-y-auto h-full no-scrollbar" style={{padding:'env(safe-area-inset-top, 48px) 24px 100px 24px'}}>

        </button>
        <div className="text-center mb-8">

          <div className="font-body mt-3" style={{fontSize:24, fontWeight:300, color:'rgba(226,232,240,0.95)', letterSpacing:'0.08em'}}>{t[nameKey]}</div>
          <div className="font-body mt-1" style={{fontSize:13, fontWeight:400, color:'var(--text-3)'}}>{t[subKey]}</div>

          <div className="font-body mt-2" style={{fontSize:12, fontWeight:400, color:palette.accent, opacity:0.8}}>{progress.length} / {prog.days} {t.days}</div>
        </div>
        <div className="space-y-3">
          {prog.sessions.map((daySegs, i) => {
            const completed = progress.includes(i);
            const premiumLocked = !stats.isPremium && i > prog.trialDay;
            // Sequential unlock: day 0 always available, day N requires day N-1 completed
            const prevCompleted = i === 0 || progress.includes(i - 1);
            // Cooldown: if previous day completed today, show "available tomorrow"
            const prevCompletedToday = i > 0 && progress.includes(i - 1) && lastCompletionDate === today && hoursSinceLast < 12;
            const sequentialLocked = !completed && (!prevCompleted || prevCompletedToday);
            const locked = premiumLocked || sequentialLocked;
            let subText = '';
            if (completed) subText = t.completed;
            else if (premiumLocked) subText = t.locked;
            else if (!prevCompleted) subText = t.completePrevDay;
            else if (prevCompletedToday) subText = t.availableTomorrow;
            else subText = t.startDay;

            return (
              <button key={i} className="glass p-5 w-full text-left flex items-center gap-4"
                style={{opacity: locked && !completed ? 0.5 : 1}}
                onClick={() => { if (locked) { if (premiumLocked) setShowPaywall(true); return; } startSession(daySegs, {programId:selectedProgram, day:i, category:'program'}); }}>
                <div className="flex items-center justify-center rounded-full font-mono"

                    {subText}

                </div>
                {locked && !completed && <span style={{color:'var(--text-3)',opacity:0.5}}><Icon name="lock" size={16}/></span>}
              </button>
            );
          })}
        </div>
      </div>
    );

        {/* History */}
        {stats.history.length > 0 && (
          <div className="mb-8" style={{borderTop:'1px solid rgba(255,255,255,0.03)', paddingTop:20}}>
            <div className="font-body mb-4" style={{fontSize:11, fontWeight:600, color:'rgba(220,225,235,0.30)', letterSpacing:'0.12em', textTransform:'uppercase'}}>{t.history}</div>
            <div className="space-y-2">
              {stats.history.slice(-5).reverse().map((h, i) => (
                <div key={i} className="glass p-4 flex items-center gap-3">
                  <span style={{color:palette.accent,opacity:0.4}}><Icon name={SCENARIOS[h.scenario]?.svgIcon || 'check'} size={16}/></span>
                  <div className="flex-1">
                    <div className="font-body" style={{fontSize:14, fontWeight:500, color:'rgba(226,232,240,0.85)'}}>{getScenarioDisplayName(h.scenario)}</div>
                    <div className="font-body" style={{fontSize:11, fontWeight:400, color:'var(--text-3)', marginTop:2}}>{new Date(h.date).toLocaleDateString('en')}</div>
                  </div>
                  <div className="font-mono" style={{fontSize:12, fontWeight:300, color:palette.accent}}>{Math.round(h.duration/60)}{t.min}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Reset */}
        <button className="w-full py-3 font-body rounded-full" style={{fontSize:13, fontWeight:400, color:'rgba(252,129,129,0.6)', border:'1px solid rgba(252,129,129,0.15)'}}
          onClick={() => { if (confirm(t.resetConfirm)) { setStats(defaultStats()); setScreen('first_breath'); }}}>
          {t.resetProgress}
        </button>
      </div>
    );
  };

  const renderScreen = () => {
    if (screen === 'category') return renderCategory();

    if (screen === 'program_view') return renderProgramView();
    switch (tab) {
      case 'home': return renderHome();
      case 'quick': return renderQuickDive();
      case 'programs': return renderPrograms();
      case 'profile': return renderProfile();
      default: return renderHome();
    }
  };

  const showTabs = !['category','program_view'].includes(screen);

  return (
    <div className="fixed inset-0" style={{background:bg}}>
      {world === 'ocean' && <div className="ocean-caustics" />}
      {world === 'space' && (
        <div style={{
          position:'fixed', top:'20%', right:'-10%', width:'40vw', height:'40vw',
          borderRadius:'50%', pointerEvents:'none', zIndex:0,
          background:'radial-gradient(circle, rgba(255,200,100,0.03) 0%, rgba(255,180,80,0.015) 30%, transparent 70%)'
        }} />
      )}
      <Particles world={world} />
      <div className="relative z-10 h-full">
        {renderScreen()}
      </div>

      {/* Tab bar */}
      {showTabs && (
        <div className="fixed bottom-0 left-0 right-0 z-40" style={{background:'rgba(7,12,21,0.85)', backdropFilter:'blur(20px)', WebkitBackdropFilter:'blur(20px)', borderTop:'1px solid rgba(255,255,255,0.04)'}}>
          <div className="flex justify-around" style={{paddingTop:12, paddingBottom:'env(safe-area-inset-bottom, 24px)'}}>
            {[
              {id:'home', svgIcon:'home', labelKey:'home'},
              {id:'quick', svgIcon:'quick', labelKey:'explore'},
              {id:'programs', svgIcon:'programs', labelKey:'programs'},
              {id:'profile', svgIcon:'profile', labelKey:'profile'},
            ].map(tb => (
              <button key={tb.id} className="flex flex-col items-center py-1 px-3" style={{gap:3}}
                onClick={() => { setTab(tb.id); if (['category','program_view'].includes(screen)) setScreen('home'); }}>
                <span style={{color: tab === tb.id ? palette.accent : 'var(--text-3)', transition:'color 200ms ease'}}><Icon name={tb.svgIcon} size={20}/></span>
                <span className="font-body" style={{fontSize:10, fontWeight:500, letterSpacing:'0.03em', color: tab === tb.id ? palette.accent : 'var(--text-3)', transition:'color 200ms ease'}}>{t[tb.labelKey]}</span>
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Surface breath overlay */}
      {showSurfaceBreath && (
        <div className="fixed inset-0 z-50 flex items-center justify-center" style={{background:'rgba(0,0,0,0.8)', backdropFilter:'blur(16px)'}}>
          <div className="screen-transition text-center z-10 px-8">
            <div className="font-body mb-3" style={{fontSize:20, fontWeight:300, color:'rgba(226,232,240,0.95)'}}>{t.missedYesterday}</div>
            <div className="font-body mb-6" style={{fontSize:16, fontWeight:400, color:palette.accent}}>
              {surfaceBreathStreak} {t.streakAtRisk || t.dayStreak}
            </div>
            <div className="font-body mb-8" style={{fontSize:14, fontWeight:400, color:'var(--text-2)', maxWidth:280, margin:'0 auto', lineHeight:1.6}}>
              {(t.surfaceBreathOffer || '').replace('{N}', surfaceBreathStreak)}
            </div>
            <div className="flex flex-col gap-3 items-center">
              <button className="px-8 py-3 rounded-full font-body w-full max-w-xs"
                style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}
                onClick={() => {
                  setShowSurfaceBreath(false);
                  // Launch 60s cyclic sigh (6 cycles x 10s)
                  const surfaceSegs = [
                    { type:'breathing', technique:'physiological_sigh', duration:60, params:{ inhale1:2, inhale2:1, exhale:7 } }
                  ];
                  startSession(surfaceSegs, {scenario:'surface_breath', category:'recovery'});
                  // Preserve streak + 1
                  setStats(s => {
                    const newStreak = s.streak + 1;
                    return {...s, streak: newStreak, longestStreak: Math.max(s.longestStreak || 0, newStreak), lastSessionDate: new Date().toISOString().split('T')[0]};
                  });
                }}>
                {t.surfaceBreath1Min || t.surfaceBreathButton}
              </button>
              <button className="px-8 py-3 rounded-full font-body w-full max-w-xs"
                style={{fontWeight:400, fontSize:13, color:'var(--text-3)', border:'1px solid rgba(255,255,255,0.06)'}}
                onClick={() => {
                  setShowSurfaceBreath(false);
                  setStats(s => ({...s, streak: 0}));
                }}>
                {t.letItGo}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Retest prompt overlay */}
      {showRetestPrompt && (
        <div className="fixed inset-0 z-50 flex items-center justify-center" style={{background:'rgba(0,0,0,0.8)', backdropFilter:'blur(16px)'}}>
          <div className="screen-transition text-center z-10 px-8">
            <div className="font-body mb-4" style={{fontSize:20, fontWeight:300, color:'rgba(226,232,240,0.95)'}}>{t.retestTitle}</div>
            <div className="font-body mb-8" style={{fontSize:14, fontWeight:400, color:'var(--text-2)', maxWidth:280, margin:'0 auto', lineHeight:1.6}}>
              {retestDays === 999 ? '' : retestDays} {t.retestSub}
            </div>
            <div className="flex flex-col gap-3 items-center">
              <button className="px-8 py-3 rounded-full font-body w-full max-w-xs"
                style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}
                onClick={() => {
                  setShowRetestPrompt(false);
                  setScreen('first_breath');
                }}>
                {t.retestNow}
              </button>
              <button className="px-8 py-3 rounded-full font-body w-full max-w-xs"
                style={{fontWeight:400, fontSize:13, color:'var(--text-3)', border:'1px solid rgba(255,255,255,0.06)'}}
                onClick={() => setShowRetestPrompt(false)}>
                {t.retestLater}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Stress SOS choice overlay */}
      {showStressChoice && (
        <div className="fixed inset-0 z-50 flex items-center justify-center" style={{background:'rgba(0,0,0,0.8)', backdropFilter:'blur(16px)'}}>
          <div className="screen-transition text-center z-10 px-6 w-full" style={{maxWidth:360}}>
            <div className="flex flex-col gap-3">
              <button className="glass p-5 w-full text-left" style={{borderRadius:16}}
                onClick={() => {
                  setShowStressChoice(false);
                  startSession(STRESS_SOS_SESSIONS.calmNow, {scenario:'stress_sos_calm', category:'stress'});
                }}>
                <div className="font-body" style={{fontSize:16, fontWeight:400, color:'rgba(226,232,240,0.92)'}}>I need to calm down NOW</div>
                <div className="font-body mt-1" style={{fontSize:13, fontWeight:300, color:'var(--text-2)'}}>3 min &middot; Cyclic Sigh</div>
              </button>
              <button className="glass p-5 w-full text-left" style={{borderRadius:16}}
                onClick={() => {
                  setShowStressChoice(false);
                  startSession(STRESS_SOS_SESSIONS.prepareStress, {scenario:'stress_sos_prepare', category:'stress'});
                }}>
                <div className="font-body" style={{fontSize:16, fontWeight:400, color:'rgba(226,232,240,0.92)'}}>Prepare for something stressful</div>
                <div className="font-body mt-1" style={{fontSize:13, fontWeight:300, color:'var(--text-2)'}}>5 min &middot; Box Breathing</div>
              </button>
            </div>
            <button className="font-body mt-6" style={{fontSize:13, color:'var(--text-3)', background:'none', border:'none', cursor:'pointer'}}
              onClick={() => setShowStressChoice(false)}>
              {t.close}
            </button>
          </div>
        </div>
      )}

      {showPaywall && <PaywallModal />}

      {/* Weekly summary overlay */}
      {showWeekly && (() => {
        const weekSessions = stats.history?.filter(h => {
          const d = new Date(h.date);
          return (Date.now() - d.getTime()) < 7 * 86400000;
        }) || [];
        const weekMinutes = weekSessions.reduce((s, h) => s + Math.round((h.duration || 0) / 60), 0);
        const weekDepth = Math.round(stats.totalDepth * 10) / 10;
        // Most used technique from recent history
        const techCounts = {};
        (stats.history || []).slice(-20).forEach(h => {
          if (h.scenario) {
            const sc = SCENARIOS[h.scenario];
            if (sc) {
              const content = getSessionContent(t, world)[h.scenario];
              if (content) {
                const firstDur = Object.keys(content)[0];
                const segs = content[firstDur] || [];
                segs.filter(s => s.type === 'breathing').forEach(s => {
                  techCounts[s.technique] = (techCounts[s.technique] || 0) + 1;
                });
              }
            }
          }
        });
        const topTech = Object.entries(techCounts).sort((a,b) => b[1] - a[1])[0];
        const topTechLabel = topTech ? (t[TECHNIQUE_LANG_KEY[topTech[0]]] || topTech[0]) : '-';
        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center" style={{background:'rgba(0,0,0,0.8)', backdropFilter:'blur(16px)'}}>
            <div className="screen-transition text-center z-10 px-8">
              <div className="font-body mb-8" style={{fontSize:14, fontWeight:600, color:palette.accent, letterSpacing:'0.15em'}}>{t.thisWeek}</div>
              {/* Hero depth number */}
              <div className="text-center mb-6">
                <div className="font-mono" style={{fontSize:48, fontWeight:300, color:palette.accent}}>{weekDepth}</div>
                <div className="font-body" style={{fontSize:12, fontWeight:400, color:'var(--text-3)', marginTop:4}}>{t.weeklyDepth}</div>
              </div>
              <div className="flex gap-6 justify-center mb-8">
                {[[weekSessions.length, t.weeklyDives],[weekMinutes, t.weeklyMinutes],[stats.streak, t.dayStreak]].map(([val,label],i) => (
                  <div key={i} className="text-center">
                    <div className="font-mono" style={{fontSize:28, fontWeight:300, color:palette.accent}}>{val}</div>
                    <div className="font-body" style={{fontSize:11, fontWeight:400, color:'var(--text-3)', marginTop:4}}>{label}</div>
                  </div>
                ))}
              </div>
              <div className="glass p-4 mx-auto mb-8" style={{maxWidth:200}}>
                <div className="font-body" style={{fontSize:11, fontWeight:500, color:'var(--text-3)', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:4}}>{t.mostUsed}</div>
                <div className="font-body" style={{fontSize:16, fontWeight:400, color:'rgba(226,232,240,0.9)'}}>{topTechLabel}</div>
              </div>
              <button className="px-10 py-3 rounded-full font-body"
                style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}
                onClick={() => { setShowWeekly(false); setStats(s => ({...s, lastWeeklySummary: new Date().toISOString()})); }}>
                {t.continueText}
              </button>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
} catch(e) {
  document.getElementById('root').innerHTML = '<pre style="color:red;padding:20px">'+e.message+'\n'+e.stack+'</pre>';
}
</script>
</body>
</html>
