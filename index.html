<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body,#root { width:100%; height:100%; overflow:hidden; font-family:'DM Sans',sans-serif; }
html[lang="ar"] body, html[lang="ar"] #root { font-family:'IBM Plex Sans Arabic','DM Sans',sans-serif; }
html[lang="zh"] body, html[lang="zh"] #root { font-family:'Noto Sans SC','DM Sans',sans-serif; }
:root {
  --bg-1:#070c15; --bg-2:#0c1322; --bg-3:#111b2e; --bg-4:#182640;
  --bg-start:#0c1322; --bg-mid:#0a1628; --bg-end:#070c15;
  --accent:#5eaaa8; --accent-rgb:94,170,168; --accent-glow:rgba(94,170,168,0.12); --accent-text:#7ec8c8;
  --glow:rgba(94,170,168,0.12);
  --card:rgba(255,255,255,0.025); --text:rgba(220,225,235,0.92);
  --text-2:rgba(220,225,235,0.55); --text-3:rgba(220,225,235,0.30);
}

@keyframes fade-in { from{opacity:0} to{opacity:1} }
@keyframes deblur { from{opacity:0;filter:blur(3px)} to{opacity:1;filter:blur(0)} }
@keyframes rays-appear { from{opacity:0} to{opacity:1} }
@keyframes count-up { from{opacity:0} to{opacity:1} }
@keyframes drift { 0%{transform:translateY(100vh);opacity:0} 5%{opacity:var(--peak-opacity)} 95%{opacity:var(--peak-opacity)} 100%{transform:translateY(-5vh);opacity:0} }
@keyframes drift-h { 0%{transform:translateX(-10vw);opacity:0} 5%{opacity:var(--peak-opacity)} 95%{opacity:var(--peak-opacity)} 100%{transform:translateX(110vw);opacity:0} }
@keyframes twinkle { 0%,100%{opacity:var(--base-opacity)} 50%{opacity:0.05} }
@keyframes bokeh-drift { 0%{transform:translate(0,0)} 25%{transform:translate(10px,-15px)} 50%{transform:translate(-8px,12px)} 75%{transform:translate(15px,5px)} 100%{transform:translate(0,0)} }
@keyframes caustic-drift { 0%{transform:translateX(0)} 100%{transform:translateX(30px)} }
@keyframes tentacle-sway { 0% { transform: rotate(-3deg) scaleY(1); } 100% { transform: rotate(3deg) scaleY(1.05); } }

.font-display { font-family:'DM Sans',sans-serif; }
.font-mono { font-family:'JetBrains Mono',monospace; font-variant-numeric:tabular-nums; }
.font-body { font-family:inherit; }

.screen-transition { animation: fade-in 400ms ease-out; }
.text-deblur { animation: deblur 600ms ease-out forwards; }

.glass {
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 14px;
  padding: 18px 20px;
  transition: transform 120ms ease, background 120ms ease;
}
.glass:active { transform: scale(0.985); background: rgba(255,255,255,0.04); }

.no-scrollbar::-webkit-scrollbar { display:none; }
.no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }

.screen-glow {
  position:fixed; top:-20%; left:-10%; width:60%; height:50%;
  background: radial-gradient(ellipse, rgba(var(--accent-rgb),0.04) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}

/* Session text segments: circle hides, text takes center */
.session-text-segment {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: calc(100% - 48px);
  max-width: 320px;
  text-align: center;
  z-index: 10;
  padding: 0 24px;
}
.session-text-content {
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  font-size: 18px;
  line-height: 1.8;
  color: rgba(220, 225, 235, 0.88);
  letter-spacing: 0.01em;
}
.circle-hidden { opacity: 0; transform: scale(0.7); transition: opacity 500ms ease, transform 500ms ease; }
.circle-visible { opacity: 1; transform: scale(1); transition: opacity 500ms ease, transform 500ms ease; transition-delay: 300ms; }
.text-fade-out { opacity: 0; filter: blur(3px); transition: opacity 400ms ease, filter 400ms ease; }
</style>

// ===== AMBIENT ENGINE =====
class AmbientEngine {
  constructor() { this.ctx = null; this.running = false; this.masterGain = null; }
  init(worldConfig) {
    if (this.ctx) this.destroy();
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = 0;
      this.masterGain.connect(this.ctx.destination);
      this.osc = this.ctx.createOscillator();
      this.osc.type = 'sine';
      this.osc.frequency.value = worldConfig.baseFreq;
      const oscGain = this.ctx.createGain();
      oscGain.gain.value = 0.12;
      this.osc.connect(oscGain);
      oscGain.connect(this.masterGain);
      const bufSize = this.ctx.sampleRate * 2;
      const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) d[i] = Math.random() * 2 - 1;
      this.noiseSrc = this.ctx.createBufferSource();
      this.noiseSrc.buffer = buf;
      this.noiseSrc.loop = true;
      this.filter = this.ctx.createBiquadFilter();
      this.filter.type = 'lowpass';
      this.filter.frequency.value = worldConfig.filterFreq;
      const noiseGain = this.ctx.createGain();
      noiseGain.gain.value = 0.06;
      this.noiseSrc.connect(this.filter);
      this.filter.connect(noiseGain);
      noiseGain.connect(this.masterGain);
      this.lfo = this.ctx.createOscillator();
      this.lfo.frequency.value = worldConfig.lfoRate;
      const lfoGain = this.ctx.createGain();
      lfoGain.gain.value = 3;
      this.lfo.connect(lfoGain);
      lfoGain.connect(this.osc.frequency);
      if (worldConfig.baseFreq === 82) {
        this.osc2 = this.ctx.createOscillator();
        this.osc2.type = 'sine';
        this.osc2.frequency.value = 123;
        const osc2Gain = this.ctx.createGain();
        osc2Gain.gain.value = 0.03;
        this.osc2.connect(osc2Gain);
        osc2Gain.connect(this.masterGain);
        this.osc2.start();
      }
      this.osc.start(); this.noiseSrc.start(); this.lfo.start();
      this.running = true;
    } catch(e) { console.warn('Audio init failed', e); }
  }
  duck(dur=0.5) { if (!this.ctx||!this.masterGain) return; this.masterGain.gain.cancelScheduledValues(this.ctx.currentTime); this.masterGain.gain.setValueAtTime(this.masterGain.gain.value,this.ctx.currentTime); this.masterGain.gain.linearRampToValueAtTime(0.03,this.ctx.currentTime+dur); }
  unduck(dur=2) { if (!this.ctx||!this.masterGain) return; this.masterGain.gain.cancelScheduledValues(this.ctx.currentTime); this.masterGain.gain.setValueAtTime(this.masterGain.gain.value,this.ctx.currentTime); this.masterGain.gain.linearRampToValueAtTime(0.12,this.ctx.currentTime+dur); }
  fadeIn(dur=3) { if (!this.ctx||!this.masterGain) return; if (this.ctx.state==='suspended') this.ctx.resume(); this.masterGain.gain.cancelScheduledValues(this.ctx.currentTime); this.masterGain.gain.setValueAtTime(this.masterGain.gain.value,this.ctx.currentTime); this.masterGain.gain.linearRampToValueAtTime(0.15,this.ctx.currentTime+dur); }
  fadeOut(dur=2) { if (!this.ctx||!this.masterGain) return; this.masterGain.gain.cancelScheduledValues(this.ctx.currentTime); this.masterGain.gain.setValueAtTime(this.masterGain.gain.value,this.ctx.currentTime); this.masterGain.gain.linearRampToValueAtTime(0,this.ctx.currentTime+dur); }
  destroy() { this.fadeOut(0.5); setTimeout(() => { try { this.ctx?.close(); } catch {} this.ctx = null; this.running = false; }, 600); }
}

// ===== VOICE PLAYER =====
class VoicePlayer {
  constructor() {
    this.current = null;
    this.enabled = true;
  }
  play(audioKey, volume = 0.85) {
    if (!this.enabled) return null;
    if (!AUDIO_MAP[audioKey]) return null;
    if (this.current) { this.current.pause(); this.current = null; }
    const audio = new Audio(AUDIO_MAP[audioKey]);
    audio.volume = volume;
    audio.onerror = () => { this.current = null; };
    audio.play().catch(() => {});
    this.current = audio;
    return audio;
  }
  fadeOut(duration = 2000) {
    if (!this.current) return;
    const audio = this.current;
    const step = audio.volume / (duration / 50);
    const fade = setInterval(() => {
      if (audio.volume > step) { audio.volume -= step; }
      else { audio.pause(); audio.volume = 0; clearInterval(fade); }
    }, 50);
  }
  stop() {
    if (this.current) { this.current.pause(); this.current = null; }
  }
  toggle() {
    this.enabled = !this.enabled;
    if (!this.enabled) this.stop();
    return this.enabled;
  }
}

// ===== GENERATE BREATHING KEYFRAMES =====
function generateBreathingKeyframes(technique, params) {
  const tech = TECHNIQUES[technique];
  if (!tech) return { keyframesCSS: '', totalDuration: 16 };
  const p = params || tech.defaults;
  const phases = tech.phases;
  let totalDuration = 0;
  for (const ph of phases) totalDuration += (p[ph] || tech.defaults[ph] || 4);

  let elapsed = 0;
  const kf = [];

  for (const phase of phases) {
    const dur = p[phase] || tech.defaults[phase] || 4;
    const startPct = (elapsed / totalDuration) * 100;
    const endPct = ((elapsed + dur) / totalDuration) * 100;

    if (phase === 'inhale' || phase === 'inhale1' || phase === 'belly') {
      kf.push(`${startPct.toFixed(2)}% { transform: scale(1); }`);
      kf.push(`${endPct.toFixed(2)}% { transform: scale(1.45); }`);
    } else if (phase === 'inhale2' || phase === 'ribs') {
      kf.push(`${startPct.toFixed(2)}% { transform: scale(1.15); }`);
      kf.push(`${endPct.toFixed(2)}% { transform: scale(1.3); }`);
    } else if (phase === 'chest') {
      kf.push(`${startPct.toFixed(2)}% { transform: scale(1.3); }`);
      kf.push(`${endPct.toFixed(2)}% { transform: scale(1.45); }`);
    } else if (phase === 'holdIn' || phase === 'hold') {
      kf.push(`${startPct.toFixed(2)}% { transform: scale(1.45); }`);
      kf.push(`${endPct.toFixed(2)}% { transform: scale(1.45); }`);
    } else if (phase === 'exhale') {
      kf.push(`${startPct.toFixed(2)}% { transform: scale(1.45); }`);
      kf.push(`${endPct.toFixed(2)}% { transform: scale(1); }`);
    } else if (phase === 'holdOut' || phase === 'pause') {
      kf.push(`${startPct.toFixed(2)}% { transform: scale(1); }`);
      kf.push(`${endPct.toFixed(2)}% { transform: scale(1); }`);
    }
    elapsed += dur;
  }

  const keyframesCSS = `@keyframes breathe-cycle { ${kf.join(' ')} }`;
  return { keyframesCSS, totalDuration };
}

// ===== SESSION PLAYER =====
function SessionPlayer({ segments, world, onComplete, onExit, t, voiceEnabled, ambientRef, currentLang }) {
  const [segIdx, setSegIdx] = useState(0);
  const [segElapsed, setSegElapsed] = useState(0);
  const [totalElapsed, setTotalElapsed] = useState(0);
  const [paused, setPaused] = useState(false);
  const [phaseName, setPhaseName] = useState('');
  const [phaseRemaining, setPhaseRemaining] = useState(0);
  const [showExitConfirm, setShowExitConfirm] = useState(false);
  const [voiceOn, setVoiceOn] = useState(voiceEnabled && currentLang === 'en');
  const rafRef = useRef(null);
  const lastTimeRef = useRef(null);

  const totalDuration = useMemo(() => segments.reduce((s, seg) => s + seg.duration, 0), [segments]);
  const seg = segments[segIdx];
  const w = WORLDS[world];
  const palette = w.palette;
  const accentRgb = palette.accentRgb;

  const depthProgress = totalDuration > 0 ? totalElapsed / totalDuration : 0;

  // Dive darkening background
  const bgStyle = useMemo(() => {
    const darken = depthProgress;
    if (world === 'ocean') {
      // From teal surface to black abyss
      return { background: `linear-gradient(180deg, rgba(14,61,92,${1-darken*0.8}) 0%, rgba(2,10,16,${0.8+darken*0.2}) 100%)` };
    } else if (world === 'space') {
      return { background: `rgba(13,11,26,${0.7+darken*0.3})` };
    } else {
      return { background: `rgba(26,21,16,${0.7+darken*0.3})` };
    }
  }, [depthProgress, world]);

  // Sync voicePlayer with voiceOn state
  useEffect(() => { voicePlayer.enabled = voiceOn; if (!voiceOn) voicePlayer.stop(); }, [voiceOn]);

  // Voice audio: play matching audio for text/bodyscan/visualization segments ONLY
  // NO voice during breathing segments
  const voicePlayedForSegRef = useRef(false);
  useEffect(() => {
    voicePlayedForSegRef.current = false;
    voicePlayer.stop();
  }, [segIdx]);

  useEffect(() => {
    if (!voiceOn || voicePlayedForSegRef.current) return;
    if (!seg || currentLang !== 'en') return;

    // NO audio during breathing — complete silence, only ambient
    if (seg.type === 'breathing') {
      ambientRef.current?.unduck();
      return;
    }

    let audioKey = null;
    if (seg.type === 'text') {
      // Map textKey or fallback to text content matching
      if (seg.textKey) {
        audioKey = mapTextToAudio(seg.textKey);
      } else {
        if (seg.text === t.sitDown) audioKey = 'intro_sit';
        else if (seg.text === t.sleepEnd) audioKey = 'session_end_sleep';
        else if (seg.text === t.openEyes) audioKey = 'session_end';
      }
    } else if (seg.type === 'bodyscan') {
      audioKey = seg.scanType === 'sleep' ? 'bodyscan_sleep' :
                 seg.scanType === 'short' ? 'bodyscan_short' : 'bodyscan_full';
    } else if (seg.type === 'visualization') {
      audioKey = `vis_${world}_calm`;
    }

    if (audioKey && AUDIO_MAP[audioKey]) {
      voicePlayedForSegRef.current = true;
      // 1.5 second silence gap before voice starts
      const silenceTimeout = setTimeout(() => {
        ambientRef.current?.duck();
        // Play at volume 0 then fade in
        const a = voicePlayer.play(audioKey, 0);
        if (a) {
          // Fade in over 0.5s
          let vol = 0;
          const fadeInInterval = setInterval(() => {
            vol += 0.05;
            if (vol >= 0.85) { vol = 0.85; clearInterval(fadeInInterval); }
            try { a.volume = vol; } catch {}
          }, 30);
          a.onended = () => { ambientRef.current?.unduck(); };
          a.onerror = () => { ambientRef.current?.unduck(); };

          // Schedule fade out 2 seconds before segment ends (1.5s fade duration)
          const fadeOutTime = Math.max(0, (seg.duration - 2) * 1000 - 1500);
          const fadeOutTimeout = setTimeout(() => {
            voicePlayer.fadeOut(1500);
            ambientRef.current?.unduck();
          }, fadeOutTime);

          // store for cleanup
          a._fadeOutTimeout = fadeOutTimeout;
          a._fadeInInterval = fadeInInterval;
        }
      }, 1500);

      return () => {
        clearTimeout(silenceTimeout);
        if (voicePlayer.current) {
          clearTimeout(voicePlayer.current._fadeOutTimeout);
          clearInterval(voicePlayer.current._fadeInInterval);
        }
      };
    }
  }, [segIdx, seg, voiceOn, currentLang, world]);

  // Phase computation with audio sync
  const [cycleNumber, setCycleNumber] = useState(0);
  const lastPhaseRef = useRef('');
  const breathIntroPlayedRef = useRef(false);

  // Reset breath intro flag on segment change
  useEffect(() => { breathIntroPlayedRef.current = false; lastPhaseRef.current = ''; setCycleNumber(0); }, [segIdx]);

  useEffect(() => {
    if (!seg || seg.type !== 'breathing') return;
    const tech = TECHNIQUES[seg.technique];
    if (!tech) return;
    const p = seg.params || tech.defaults;
    const phases = tech.phases;
    const cycleDur = phases.reduce((s, ph) => s + (p[ph] || tech.defaults[ph] || 4), 0);
    const currentCycle = Math.floor(segElapsed / cycleDur);
    const cyclePos = segElapsed % cycleDur;
    setCycleNumber(currentCycle);
    let acc = 0;
    let currentPhase = phases[0];
    let remaining = p[phases[0]] || tech.defaults[phases[0]] || 4;
    for (const ph of phases) {
      const dur = p[ph] || tech.defaults[ph] || 4;
      if (cyclePos < acc + dur) { currentPhase = ph; remaining = dur - (cyclePos - acc); break; }
      acc += dur;
    }
    setPhaseName(currentPhase);
    setPhaseRemaining(remaining);

    // NO voice audio during breathing — only visual + phase label
    // Phase change haptic only
    if (currentPhase !== lastPhaseRef.current) {
      lastPhaseRef.current = currentPhase;
      // Haptic
      if (navigator.vibrate) {
        try { navigator.vibrate(currentPhase === 'exhale' ? 150 : 80); } catch {}
      }
    }
  }, [segElapsed, seg, currentLang, voiceOn]);

  const [bodyScanIdx, setBodyScanIdx] = useState(0);
  const bodyScanSentences = useMemo(() => {
    if (!seg || seg.type !== 'bodyscan') return [];
    if (seg.parts) return seg.parts.map(p => p.text);
    if (seg.text) return seg.text.split('. ').map(s => s.replace(/\.$/, '').trim()).filter(Boolean);
    return [];
  }, [seg]);
  useEffect(() => {
    if (!seg || seg.type !== 'bodyscan') return;
    if (seg.parts) {
      let acc = 0;
      for (let i = 0; i < seg.parts.length; i++) { acc += seg.parts[i].hold; if (segElapsed < acc) { setBodyScanIdx(i); return; } }
      setBodyScanIdx(seg.parts.length - 1);
    } else if (bodyScanSentences.length > 0) {
      // Crossfade every 5 seconds as per spec
      const holdPerSentence = 5;
      const idx = Math.min(Math.floor(segElapsed / holdPerSentence), bodyScanSentences.length - 1);
      setBodyScanIdx(idx);
    }
  }, [segElapsed, seg, bodyScanSentences]);

  // Animation loop
  useEffect(() => {
    if (paused) return;
    lastTimeRef.current = performance.now();
    const tick = (now) => {
      const dt = (now - (lastTimeRef.current || now)) / 1000;
      lastTimeRef.current = now;
      setSegElapsed(prev => {
        const next = prev + dt;
        if (next >= seg.duration) {
          if (segIdx < segments.length - 1) { setSegIdx(si => si + 1); setBodyScanIdx(0); return 0; }
          else { onComplete(); return prev; }
        }
        return next;
      });
      setTotalElapsed(prev => prev + dt);
      rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); voicePlayer.stop(); };
  }, [paused, segIdx, seg, segments.length]);

  // Haptic now handled inside phase computation above

  const progressSegments = useMemo(() => {
    let acc = 0;
    return segments.map((s, i) => { const start = acc / totalDuration * 100; const width = s.duration / totalDuration * 100; acc += s.duration; return { start, width, type: s.type }; });
  }, [segments, totalDuration]);

  const subInstruction = seg?.type === 'breathing' ? (t[PHASE_SUB_LANG_KEY[seg.technique]?.[phaseName]] || '') : '';

  const isTextSegment = seg && ['text','bodyscan','visualization'].includes(seg.type);

  const renderSegment = () => {
    if (!seg) return null;
    switch (seg.type) {
      case 'breathing':
        return (
          <div className="flex-1 flex flex-col items-center justify-center">
            <div className={isTextSegment ? 'circle-hidden' : 'circle-visible'}>
              <BreathingCircle technique={seg.technique} params={seg.params || TECHNIQUES[seg.technique]?.defaults} elapsed={segElapsed} phaseName={phaseName} phaseTime={0} phaseRemaining={phaseRemaining} t={t} accentRgb={accentRgb} world={world} />
            </div>
            {subInstruction && (
              <div className="font-body text-center mt-5 px-8" style={{fontSize:13,fontWeight:300,color:'var(--text-2)',maxWidth:280,lineHeight:1.6}}>
                {subInstruction}
              </div>
            )}
            {seg.hint && segElapsed < 15 && !subInstruction && (
              <div className="font-body text-center mt-5 px-8 text-deblur" style={{fontSize:13, fontWeight:300, lineHeight:1.6, color:'var(--text-2)', maxWidth:280}}>
                {seg.hint}
              </div>
            )}
          </div>
        );
      case 'text':
        return (
          <div className="flex-1 flex items-center justify-center" style={{position:'relative'}}>
            <div className="session-text-segment">
              <div className="session-text-content text-deblur" key={seg.text?.slice(0,20)}>
                {seg.text}
              </div>
            </div>
          </div>
        );
      case 'bodyscan': {
        const bsText = bodyScanSentences[bodyScanIdx] || '';
        return (
          <div className="flex-1 flex items-center justify-center" style={{position:'relative'}}>
            <div className="session-text-segment">
              <div className="session-text-content text-deblur" key={bodyScanIdx}>
                {bsText}
              </div>
            </div>
          </div>
        );
      }
      case 'visualization': {
        const vText = seg.texts?.[world] || seg.texts?.ocean || '';
        return (
          <div className="flex-1 flex items-center justify-center" style={{position:'relative'}}>
            <div className="session-text-segment">
              <div className="session-text-content text-deblur" key={vText?.slice(0,20)}>
                {vText}
              </div>
            </div>
          </div>
        );
      }
      case 'video':
        // Video placeholder (no real videos yet)
        return (
          <div className="flex-1 flex flex-col items-center justify-center px-8">
            <div className="glass p-8 text-center screen-transition" style={{maxWidth:300}}>
              <div style={{marginBottom:16, color:palette.accent, opacity:0.4}}><Icon name="play_circle" size={48}/></div>
              <div className="font-body mb-4" style={{fontWeight:400, fontSize:14, color:'var(--text-2)', lineHeight:1.5}}>{t.videoComingSoon}</div>
              <button className="px-8 py-3 rounded-full font-body"
                style={{fontWeight:500, fontSize:14, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}
                onClick={() => {
                  if (segIdx < segments.length - 1) { setSegIdx(si => si + 1); setSegElapsed(0); setBodyScanIdx(0); }
                  else onComplete();
                }}>
                {t.continueText}
              </button>
            </div>
          </div>
        );
      default: return null;
    }
  };

  return (
    <div className="fixed inset-0 flex flex-col z-50" style={{...bgStyle, transition:'background 2s ease'}}>
      <Particles world={world} diveProgress={depthProgress} />
      <div className="relative z-10 flex flex-col h-full">
        {/* Top bar */}
        <div className="flex items-center justify-between px-6" style={{paddingTop:'env(safe-area-inset-top, 48px)', paddingBottom:8}}>
          <button onClick={() => setShowExitConfirm(true)} className="flex items-center justify-center rounded-full" style={{width:44,height:44,background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.06)'}}>
            <Icon name="close" size={18}/>
          </button>
          <div className="font-mono" style={{fontSize:13, fontWeight:300, color:'rgba(226,232,240,0.5)'}}>
            {Math.floor(totalElapsed / 60)}:{String(Math.floor(totalElapsed % 60)).padStart(2,'0')} / {Math.floor(totalDuration / 60)}:{String(Math.floor(totalDuration % 60)).padStart(2,'0')}
          </div>
          <div className="flex items-center gap-2">
            {currentLang === 'en' && (
              <button onClick={() => setVoiceOn(v => !v)} className="flex items-center justify-center rounded-full" style={{width:44,height:44,background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.06)', color: voiceOn ? palette.accent : 'var(--text-3)'}}>
                <Icon name={voiceOn ? 'mic' : 'mic_off'} size={16}/>
              </button>
            )}
            <button onClick={() => setPaused(!paused)} className="flex items-center justify-center rounded-full" style={{width:44,height:44,background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.06)'}}>
              <Icon name={paused ? 'play' : 'pause'} size={16}/>
            </button>
          </div>
        </div>

        {/* Progress bar */}
        <div className="relative" style={{height:2, borderRadius:1, background:'rgba(255,255,255,0.04)', margin:'0 24px 8px'}}>
          <div className="absolute top-0 h-full" style={{width:`${(totalElapsed/totalDuration)*100}%`, borderRadius:1, background:`rgba(${accentRgb},0.6)`, transition:'width 1s linear'}} />
        </div>

        {renderSegment()}

        {/* Exit confirm */}
        {showExitConfirm && (
          <div className="absolute inset-0 flex items-center justify-center z-60" style={{background:'rgba(0,0,0,0.6)', backdropFilter:'blur(12px)'}}>
            <div className="text-center screen-transition">
              <div className="font-body mb-2" style={{fontSize:20, fontWeight:400, color:'rgba(226,232,240,0.95)'}}>{t.exitSession}</div>
              <div className="font-body mb-6" style={{fontSize:14, fontWeight:300, color:'var(--text-2)'}}>{t.exitConfirm}</div>
              <div className="flex gap-3 justify-center">
                <button onClick={() => { setShowExitConfirm(false); onExit(); }} className="px-6 py-3 rounded-full font-body" style={{fontWeight:500, background:'rgba(255,255,255,0.08)', border:'1px solid rgba(255,255,255,0.1)', color:'var(--text)'}}>{t.exitYes}</button>
                <button onClick={() => setShowExitConfirm(false)} className="px-6 py-3 rounded-full font-body" style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}>{t.exitNo}</button>
              </div>
            </div>
          </div>
        )}

        {/* Pause overlay */}
        {paused && !showExitConfirm && (
          <div className="absolute inset-0 flex items-center justify-center z-60" style={{background:'rgba(0,0,0,0.6)', backdropFilter:'blur(12px)'}}>
            <div className="text-center screen-transition">
              <div className="font-body mb-6" style={{fontSize:32, fontWeight:300, color:'rgba(226,232,240,0.95)', letterSpacing:'0.1em'}}>{t.pause}</div>
              <button onClick={() => setPaused(false)} className="px-8 py-3 rounded-full font-body" style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}>
                {t.resume}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ===== MAIN APP =====
function App() {
  const [currentLang, setCurrentLang] = useState(() => {
    return window.localStorage?.getItem('user-lang') || null;
  });
  const [stats, setStats] = useState(() => loadData() || defaultStats());
  const [screen, setScreen] = useState(() => {
    if (!currentLang) return 'lang_select';
    if (stats.onboarded) return 'home';
    return 'splash';
  });
  const [onboardStep, setOnboardStep] = useState(0);
  const [selectedCat, setSelectedCat] = useState(null);
  const [selectedScenario, setSelectedScenario] = useState(null);
  const [selectedDuration, setSelectedDuration] = useState(null);
  const [activeSession, setActiveSession] = useState(null);
  const [selectedProgram, setSelectedProgram] = useState(null);
  const [tab, setTab] = useState('home');
  const [showPaywall, setShowPaywall] = useState(false);
  const [showCompletion, setShowCompletion] = useState(false);
  const [completionData, setCompletionData] = useState(null);
  const ambientRef = useRef(new AmbientEngine());
  const world = stats.world || 'ocean';
  const w = WORLDS[world];
  const palette = w.palette;
  const accentRgb = palette.accentRgb;

  const t = LANG[currentLang] || LANG.en;

  // Apply language
  useEffect(() => {
    if (!currentLang) return;
    window.localStorage?.setItem('user-lang', currentLang);
    document.documentElement.lang = currentLang;
    document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
    if (currentLang === 'ar') document.body.style.fontFamily = "'IBM Plex Sans Arabic','DM Sans',sans-serif";
    else if (currentLang === 'zh') document.body.style.fontFamily = "'Noto Sans SC','DM Sans',sans-serif";
    else document.body.style.fontFamily = "'DM Sans',sans-serif";
  }, [currentLang]);

  useEffect(() => { saveData(stats); }, [stats]);

  // Apply CSS vars for world
  useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty('--accent', palette.accent);
    r.style.setProperty('--accent-rgb', accentRgb);
    r.style.setProperty('--accent-text', palette.accent);
    r.style.setProperty('--glow', palette.glow);
  }, [world]);

  useEffect(() => {
    if (!stats.lastSessionDate) return;
    const last = new Date(stats.lastSessionDate);
    const today = new Date();
    const diffDays = Math.floor((today - last) / 86400000);
    if (diffDays > 1) setStats(s => ({...s, streak: 0}));
  }, []);

  const updateStats = useCallback((sessionInfo) => {
    const now = new Date();
    const today = now.toISOString().split('T')[0];
    const hour = now.getHours();
    setStats(prev => {
      const newTechs = [...new Set([...(prev.techniquesUsed||[]), ...(sessionInfo.techniques||[])])];
      const newCats = [...new Set([...(prev.categoriesUsed||[]), sessionInfo.category].filter(Boolean))];
      const isNight = hour >= 21 || hour <= 5;
      const isMorning = hour >= 5 && hour < 9;
      let streak = prev.streak;
      if (prev.lastSessionDate !== today) {
        const last = prev.lastSessionDate ? new Date(prev.lastSessionDate) : null;
        const diff = last ? Math.floor((new Date(today) - last) / 86400000) : 2;
        streak = diff === 1 ? prev.streak + 1 : 1;
      }
      const depth = (sessionInfo.duration || 0) / 60 * (sessionInfo.multiplier || 1);
      return {
        ...prev, totalSessions: prev.totalSessions + 1, streak, lastSessionDate: today,
        totalDepth: Math.round((prev.totalDepth + depth) * 10) / 10,
        totalMinutes: prev.totalMinutes + Math.round((sessionInfo.duration || 0) / 60),
        techniquesUsed: newTechs, categoriesUsed: newCats,
        nightSessions: prev.nightSessions + (isNight ? 1 : 0),
        morningSessions: prev.morningSessions + (isMorning ? 1 : 0),
        history: [...prev.history, { date: now.toISOString(), scenario: sessionInfo.scenario, duration: sessionInfo.duration, category: sessionInfo.category }].slice(-100),
      };
    });
  }, []);

  const startSession = (segments, meta = {}) => {
    setActiveSession({ segments, meta });
    if (stats.soundEnabled) { ambientRef.current.init(WORLDS[world].ambient); ambientRef.current.fadeIn(); }
  };

  const endSession = (completed = true) => {
    ambientRef.current.fadeOut();
    setTimeout(() => ambientRef.current.destroy(), 2500);
    if (completed && activeSession) {
      const segs = activeSession.segments;
      const totalDur = segs.reduce((s, seg) => s + seg.duration, 0);
      const techs = [...new Set(segs.filter(s => s.type === 'breathing').map(s => s.technique))];
      const maxMult = Math.max(...segs.filter(s => s.type === 'breathing').map(s => TECHNIQUES[s.technique]?.multiplier || 1), 1);
      updateStats({ duration: totalDur, techniques: techs, category: activeSession.meta?.category, scenario: activeSession.meta?.scenario, multiplier: maxMult });
      if (activeSession.meta?.programId && activeSession.meta?.day !== undefined) {
        setStats(prev => {
          const pp = {...(prev.programProgress || {})};
          if (!pp[activeSession.meta.programId]) pp[activeSession.meta.programId] = [];
          if (!pp[activeSession.meta.programId].includes(activeSession.meta.day)) pp[activeSession.meta.programId] = [...pp[activeSession.meta.programId], activeSession.meta.day];
          const prog = PROGRAMS[activeSession.meta.programId];
          const programsCompleted = prog && pp[activeSession.meta.programId].length >= prog.days ? prev.programsCompleted + 1 : prev.programsCompleted;
          return {...prev, programProgress: pp, programsCompleted};
        });
      }
      setCompletionData({ duration: totalDur, techniques: techs, depth: Math.round(totalDur / 60 * maxMult * 10) / 10 });
      setShowCompletion(true);
    }
    setActiveSession(null);
  };

  const checkAccess = (item) => stats.isPremium || item.free || false;
  const selectWorld = (w) => setStats(s => ({...s, world: w}));

  const bg = w.bgGradient;

  // ===== LANGUAGE SELECTION SCREEN =====
  if (screen === 'lang_select') {
    return (
      <div className="fixed inset-0 flex flex-col items-center justify-center" style={{background:'#070c15'}}>
        <div className="screen-transition text-center z-10 w-full max-w-sm px-6">
          <div className="font-body mb-2" style={{fontSize:48, fontWeight:200, color:'rgba(220,225,235,0.92)', letterSpacing:'0.25em', textTransform:'uppercase'}}>DIVE</div>
          <div className="font-body mb-12" style={{fontSize:13, fontWeight:400, color:'rgba(220,225,235,0.30)'}}>Choose language</div>
          <div className="space-y-3">
            {[['en','English'],['ru','Русский'],['zh','中文'],['ar','العربية']].map(([code,label]) => (
              <button key={code} className="w-full glass p-4 text-center" style={{fontSize:17, fontWeight:400, color:'rgba(220,225,235,0.92)'}}
                onClick={() => { setCurrentLang(code); setScreen(stats.onboarded ? 'home' : 'splash'); }}>
                {label}
                {code === 'en' && <div className="font-body mt-1" style={{fontSize:11, fontWeight:400, color:'rgba(220,225,235,0.30)'}}>{LANG.en.voiceGuided}</div>}
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ===== SPLASH =====
  if (screen === 'splash') {
    return (
      <div className="fixed inset-0 flex flex-col items-center justify-center" style={{background:bg}}>
        <Particles world={world} />
        <div className="screen-transition text-center z-10">
          <div className="font-body" style={{fontSize:48, fontWeight:200, color:'var(--text)', letterSpacing:'0.25em', textTransform:'uppercase'}}>{t.appName}</div>
          <div className="font-body mt-3" style={{fontSize:13, fontWeight:400, color:'var(--text-2)', letterSpacing:'0.06em'}}>{t.tagline}</div>
          <button className="mt-16 flex items-center justify-center mx-auto font-body"
            style={{height:52, padding:'0 32px', borderRadius:12, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent, fontSize:15, fontWeight:500, letterSpacing:'0.04em'}}
            onClick={() => setScreen('onboarding')}>
            {t.begin}
          </button>
        </div>
      </div>
    );
  }

  // ===== ONBOARDING =====
  if (screen === 'onboarding') {
    const stepKeys = [
      {title:t.onb1title, sub:t.onb1sub, desc:t.onb1desc},
      {title:t.onb2title, sub:t.onb2sub, desc:t.onb2desc},
      {title:t.onb3title, sub:t.onb3sub, desc:t.onb3desc},
      {title:t.onb4title, sub:t.onb4sub, desc:t.onb4desc},
    ];
    if (onboardStep < stepKeys.length) {
      const step = stepKeys[onboardStep];
      return (
        <div className="fixed inset-0 flex flex-col items-center justify-center px-8" style={{background:bg}}>
          <Particles world={world} />
          <div className="screen-transition text-center z-10" key={onboardStep}>
            <div className="font-body mb-3" style={{fontSize:36, fontWeight:300, color:'rgba(226,232,240,0.95)', letterSpacing:'0.1em'}}>{step.title}</div>
            <div className="font-body mb-5" style={{fontSize:16, fontWeight:500, color:palette.accent, letterSpacing:'0.03em'}}>{step.sub}</div>
            <div className="font-body mb-12" style={{fontSize:14, fontWeight:400, color:'var(--text-2)', maxWidth:300, lineHeight:1.7, margin:'0 auto'}}>{step.desc}</div>
            <div className="flex gap-2 justify-center mb-10">
              {stepKeys.map((_, i) => (
                <div key={i} className="rounded-full transition-all" style={{width: i === onboardStep ? 24 : 6, height:6, borderRadius:3, background: i === onboardStep ? palette.accent : 'rgba(255,255,255,0.15)', transition:'all 300ms ease'}} />
              ))}
              <div className="rounded-full" style={{width:6, height:6, borderRadius:3, background:'rgba(255,255,255,0.15)'}} />
            </div>
            <button className="px-10 py-3 rounded-full font-body"
              style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}
              onClick={() => setOnboardStep(onboardStep + 1)}>
              {t.next}
            </button>
          </div>
        </div>
      );
    }
    // World selection
    return (
      <div className="fixed inset-0 flex flex-col items-center justify-center px-6" style={{background:bg}}>
        <div className="screen-transition text-center z-10 w-full max-w-sm">
          <div className="font-body mb-2" style={{fontSize:28, fontWeight:300, color:'rgba(226,232,240,0.95)', letterSpacing:'0.1em'}}>{t.chooseWorld}</div>
          <div className="font-body mb-10" style={{fontSize:13, fontWeight:400, color:'var(--text-3)'}}>{t.canChangeLater}</div>
          <div className="space-y-3">
            {Object.entries(WORLDS).map(([key, wd]) => (
              <button key={key} className="w-full glass p-5 flex items-center gap-4 text-left"
                style={{border: world === key ? `1px solid ${wd.palette.accent}4d` : '1px solid rgba(255,255,255,0.06)', boxShadow: world === key ? `0 0 20px ${wd.palette.accent}1a` : undefined}}
                onClick={() => selectWorld(key)}>
                <span style={{color:wd.palette.accent,opacity:0.6}}><Icon name="world" size={22}/></span>
                <div>
                  <div className="font-body" style={{fontWeight:600, fontSize:15, color:'rgba(255,255,255,0.92)'}}>{t[key]}</div>
                  <div className="font-body" style={{fontSize:12, fontWeight:400, color:'rgba(255,255,255,0.4)', marginTop:2}}>
                    {t[key+'Desc']}
                  </div>
                </div>
              </button>
            ))}
          </div>
          <button className="mt-10 px-10 py-3 rounded-full font-body"
            style={{fontWeight:500, background:`rgba(${WORLDS[world].palette.accentRgb},0.12)`, border:`1px solid rgba(${WORLDS[world].palette.accentRgb},0.25)`, color:WORLDS[world].palette.accent}}
            onClick={() => { setStats(s => ({...s, onboarded:true})); setScreen('home'); setTab('home'); }}>
            {t.begin}
          </button>
        </div>
      </div>
    );
  }

  // Active session
  if (activeSession) {
    return <SessionPlayer segments={activeSession.segments} world={world} onComplete={() => endSession(true)} onExit={() => endSession(false)} t={t} voiceEnabled={stats.voiceEnabled} ambientRef={ambientRef} currentLang={currentLang} />;
  }

              return (
                <div key={b.id} className="glass p-3 text-center" style={{opacity: has ? 1 : 0.25}}>
                  <div style={{color: has ? palette.accent : 'var(--text-3)', opacity: has ? 0.8 : 0.4}}><Icon name="check" size={20}/></div>
                  <div className="font-body mt-1" style={{fontSize:10, fontWeight:400, color:'rgba(226,232,240,0.6)'}}>{BADGE_NAMES[b.id]}</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Settings */}
        <div className="mb-8">
          <div className="font-body mb-4" style={{fontSize:13, fontWeight:600, color:'rgba(226,232,240,0.6)', letterSpacing:'0.06em', textTransform:'uppercase'}}>{t.settings}</div>
          <div className="glass p-5 space-y-4">
            {[
              [t.ambientSound, 'soundEnabled'],
              [t.vibration, 'vibrateEnabled'],
            ].map(([label, key]) => (
              <div key={key} className="flex items-center justify-between">
                <span className="font-body" style={{fontSize:14, fontWeight:400, color:'rgba(226,232,240,0.75)'}}>{label}</span>
                <button className="relative rounded-full" style={{width:44, height:24, background: stats[key] ? `rgba(${accentRgb},0.25)` : 'rgba(255,255,255,0.1)', border:'1px solid rgba(255,255,255,0.06)', transition:'all 200ms ease'}}
                  onClick={() => setStats(s => ({...s, [key]:!s[key]}))}>
                  <div className="absolute rounded-full transition-all" style={{top:3, width:16, height:16, background: stats[key] ? palette.accent : 'rgba(255,255,255,0.3)', left: stats[key] ? 'calc(100% - 20px)' : '4px'}} />
                </button>
              </div>
            ))}
            {/* Voice narration toggle */}
            <div className="flex items-center justify-between">
              <span className="font-body" style={{fontSize:14, fontWeight:400, color:'rgba(226,232,240,0.75)'}}>{t.voiceNarration}</span>
              <button className="relative rounded-full" style={{width:44, height:24, background: stats.voiceEnabled ? `rgba(${accentRgb},0.25)` : 'rgba(255,255,255,0.1)', border:'1px solid rgba(255,255,255,0.06)', transition:'all 200ms ease'}}
                onClick={() => setStats(s => ({...s, voiceEnabled:!s.voiceEnabled}))}>
                <div className="absolute rounded-full transition-all" style={{top:3, width:16, height:16, background: stats.voiceEnabled ? palette.accent : 'rgba(255,255,255,0.3)', left: stats.voiceEnabled ? 'calc(100% - 20px)' : '4px'}} />
              </button>
            </div>
            {/* Language switch */}
            <div className="flex items-center justify-between">
              <span className="font-body" style={{fontSize:14, fontWeight:400, color:'rgba(226,232,240,0.75)'}}>{t.language}</span>
              <select className="font-body rounded-lg px-3 py-1" style={{fontSize:13, fontWeight:400, background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.08)', color:'rgba(226,232,240,0.75)', outline:'none'}}
                value={currentLang} onChange={e => setCurrentLang(e.target.value)}>
                <option value="en">English</option>
                <option value="ru">Русский</option>
                <option value="zh">中文</option>
                <option value="ar">العربية</option>
              </select>
            </div>
            <div className="flex items-center justify-between">
              <span className="font-body" style={{fontSize:14, fontWeight:400, color:'rgba(226,232,240,0.75)'}}>{t.premium}</span>
              <span className="font-body" style={{fontSize:13, fontWeight:500, color: stats.isPremium ? palette.accent : 'var(--text-3)'}}>{stats.isPremium ? t.active : t.free}</span>
            </div>
          </div>
        </div>

        {/* History */}
        {stats.history.length > 0 && (
          <div className="mb-8">
            <div className="font-body mb-4" style={{fontSize:13, fontWeight:600, color:'rgba(226,232,240,0.6)', letterSpacing:'0.06em', textTransform:'uppercase'}}>{t.history}</div>
            <div className="space-y-2">
              {stats.history.slice(-5).reverse().map((h, i) => (
                <div key={i} className="glass p-4 flex items-center gap-3">
                  <span style={{color:palette.accent,opacity:0.4}}><Icon name={SCENARIOS[h.scenario]?.svgIcon || 'check'} size={16}/></span>
                  <div className="flex-1">
                    <div className="font-body" style={{fontSize:14, fontWeight:500, color:'rgba(226,232,240,0.85)'}}>{t[SCENARIO_LANG_KEY[h.scenario]] || h.scenario}</div>
                    <div className="font-body" style={{fontSize:11, fontWeight:400, color:'var(--text-3)', marginTop:2}}>{new Date(h.date).toLocaleDateString(currentLang === 'zh' ? 'zh-CN' : currentLang === 'ar' ? 'ar' : currentLang)}</div>
                  </div>
                  <div className="font-mono" style={{fontSize:12, fontWeight:300, color:palette.accent}}>{Math.round(h.duration/60)}{t.min}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Reset */}
        <button className="w-full py-3 font-body rounded-full" style={{fontSize:13, fontWeight:400, color:'rgba(252,129,129,0.6)', border:'1px solid rgba(252,129,129,0.15)'}}
          onClick={() => { if (confirm(t.resetConfirm)) { setStats(defaultStats()); setScreen('splash'); }}}>
          {t.resetProgress}
        </button>
      </div>
    );
  };

  const renderScreen = () => {
    if (screen === 'category') return renderCategory();
    if (screen === 'session_pre') return renderSessionPre();
    if (screen === 'program_view') return renderProgramView();
    switch (tab) {
      case 'home': return renderHome();
      case 'quick': return renderQuickDive();
      case 'programs': return renderPrograms();
      case 'profile': return renderProfile();
      default: return renderHome();
    }
  };

  const showTabs = !['category','session_pre','program_view'].includes(screen);

  return (
    <div className="fixed inset-0" style={{background:bg}}>
      <Particles world={world} />
      <div className="relative z-10 h-full">
        {renderScreen()}
      </div>

      {/* Tab bar */}
      {showTabs && (
        <div className="fixed bottom-0 left-0 right-0 z-40" style={{background:'rgba(7,12,21,0.85)', backdropFilter:'blur(20px)', WebkitBackdropFilter:'blur(20px)', borderTop:'1px solid rgba(255,255,255,0.04)'}}>
          <div className="flex justify-around" style={{paddingTop:12, paddingBottom:'env(safe-area-inset-bottom, 24px)'}}>
            {[
              {id:'home', svgIcon:'home', labelKey:'home'},
              {id:'quick', svgIcon:'quick', labelKey:'explore'},
              {id:'programs', svgIcon:'programs', labelKey:'programs'},
              {id:'profile', svgIcon:'profile', labelKey:'profile'},
            ].map(tb => (
              <button key={tb.id} className="flex flex-col items-center py-1 px-3" style={{gap:3}}
                onClick={() => { setTab(tb.id); if (['category','session_pre','program_view'].includes(screen)) setScreen('home'); }}>
                <span style={{color: tab === tb.id ? palette.accent : 'var(--text-3)', transition:'color 200ms ease'}}><Icon name={tb.svgIcon} size={20}/></span>
                <span className="font-body" style={{fontSize:10, fontWeight:500, letterSpacing:'0.03em', color: tab === tb.id ? palette.accent : 'var(--text-3)', transition:'color 200ms ease'}}>{t[tb.labelKey]}</span>
              </button>
            ))}
          </div>
        </div>
      )}

      {showPaywall && <PaywallModal />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
