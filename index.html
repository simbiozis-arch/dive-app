* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { background: #020a10 !important; min-height: 100vh; min-height: 100dvh; margin: 0; padding: 0; }
#root { background: linear-gradient(180deg, #0e3d5c 0%, #041520 50%, #020a10 100%) !important; min-height: 100vh; min-height: 100dvh; }
html,body,#root { width:100%; height:100%; overflow:hidden; font-family:'DM Sans',sans-serif; }
:root {
  --bg-1:#070c15; --bg-2:#0c1322; --bg-3:#111b2e; --bg-4:#182640;

  --accent:#5eaaa8; --accent-rgb:94,170,168; --accent-glow:rgba(94,170,168,0.12); --accent-text:#7ec8c8;

  --text-2:rgba(220,225,235,0.60); --text-3:rgba(220,225,235,0.35);
}

@keyframes fade-in { from{opacity:0} to{opacity:1} }
@keyframes deblur { from{opacity:0;filter:blur(3px)} to{opacity:1;filter:blur(0)} }
@keyframes rays-appear { from{opacity:0} to{opacity:1} }
@keyframes count-up { from{opacity:0} to{opacity:1} }
@keyframes drift { 0%{transform:translateY(100vh);opacity:0} 5%{opacity:var(--peak-opacity)} 95%{opacity:var(--peak-opacity)} 100%{transform:translateY(-5vh);opacity:0} }
@keyframes drift-h { 0%{transform:translateX(-10vw);opacity:0} 5%{opacity:var(--peak-opacity)} 95%{opacity:var(--peak-opacity)} 100%{transform:translateX(110vw);opacity:0} }
@keyframes twinkle { 0%,100%{opacity:var(--base-opacity)} 50%{opacity:0.05} }
@keyframes bokeh-drift { 0%{transform:translate(0,0)} 25%{transform:translate(10px,-15px)} 50%{transform:translate(-8px,12px)} 75%{transform:translate(15px,5px)} 100%{transform:translate(0,0)} }
@keyframes caustic-drift { 0%{transform:translateX(0)} 100%{transform:translateX(30px)} }
@keyframes causticsWave {
  0%   { background-position: 20% 30%, 75% 60%, 45% 20%, 60% 80%; }
  33%  { background-position: 35% 15%, 60% 75%, 55% 35%, 40% 65%; }
  66%  { background-position: 15% 50%, 85% 40%, 35% 55%, 70% 45%; }
  100% { background-position: 25% 25%, 70% 65%, 50% 25%, 55% 75%; }
}
.ocean-caustics {
  position:fixed; top:0; left:0; right:0; height:30vh; pointer-events:none; z-index:1; opacity:0.04;
  mix-blend-mode:screen;
  background:
    radial-gradient(ellipse 80px 40px at 20% 30%, rgba(94,170,168,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 60px 30px at 50% 20%, rgba(94,170,168,0.04) 0%, transparent 70%),
    radial-gradient(ellipse 90px 45px at 75% 35%, rgba(94,170,168,0.05) 0%, transparent 70%);
  animation: causticsWave 8s ease-in-out infinite alternate;
}
@keyframes tentacle-sway { 0% { transform: rotate(-3deg) scaleY(1); } 100% { transform: rotate(3deg) scaleY(1.05); } }
@keyframes light-emerge { 0% { width:4px; height:4px; opacity:0; } 100% { width:min(80vw,320px); height:min(80vw,320px); opacity:1; } }
@keyframes text-emerge { from { color:rgba(220,225,235,0); } to { color:rgba(220,225,235,0.6); } }
@keyframes bg-emerge { from { background:#000; } to { background:linear-gradient(180deg, #0e3d5c 0%, #082a42 33%, #041520 66%, #020a10 100%); } }
@keyframes hold-counter-pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.03); } }
@keyframes tap-pulse { 0%,100% { opacity:0.3; } 50% { opacity:0.7; } }
@keyframes bubbleRise { 0%{transform:translateY(0) scale(1);opacity:0} 10%{opacity:0.6} 90%{opacity:0.4} 100%{transform:translateY(-100vh) scale(0.6);opacity:0} }
@keyframes slowRotate { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes surfaceUp { 0%{transform:translateY(0);opacity:0.9} 60%{opacity:1} 100%{transform:translateY(-40px);opacity:0} }
@keyframes pulse { 0%,100%{opacity:0.15;transform:scale(1)} 50%{opacity:0.4;transform:scale(1.5)} }
@keyframes surfaceBgLighten { 0%{background:linear-gradient(180deg,#050a12 0%,#080e1a 100%)} 100%{background:linear-gradient(180deg,#0a1520 0%,#060c16 100%)} }
@keyframes completionFadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes checkPop { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
.intro-title { font-family:'DM Sans',sans-serif; font-weight:200; font-size:42px; letter-spacing:0.3em; text-transform:uppercase; color:rgba(94,170,168,0.9); }
.intro-phrase { font-family:'DM Sans',sans-serif; font-weight:300; font-size:20px; line-height:1.6; color:rgba(220,225,235,0.70); }
.intro-tagline { font-family:'DM Sans',sans-serif; font-weight:400; font-size:24px; color:rgba(220,225,235,0.80); }

.font-body { font-family:inherit; }

.screen-transition { animation: fade-in 400ms ease-out; }
.screen-crossfade { animation: screenCrossfade 350ms ease-out; }
@keyframes screenCrossfade { from { opacity:0; } to { opacity:1; } }
.text-deblur { animation: deblur 600ms ease-out forwards; }

.glass {
  background: rgba(255,255,255,0.024);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 14px;
  padding: 18px 20px;
  transition: transform 120ms ease, background 120ms ease;
}
.glass:active { transform: scale(0.985); background: rgba(255,255,255,0.04); box-shadow: inset 0 0 30px rgba(94,170,168,0.04); }

/* FIX1: Breathe Now instant CTA */
.breathe-now-btn {
  display:block; width:calc(100% - 0px); margin:0 0 16px;
  padding:15px 0; border-radius:14px;
  background:rgba(94,170,168,0.09); border:1px solid rgba(94,170,168,0.18);
  font-family:'DM Sans',sans-serif; font-weight:500; font-size:16px;
  letter-spacing:0.03em; color:rgba(94,170,168,0.9);
  transition:transform 200ms cubic-bezier(0.34,1.56,0.64,1), background 150ms ease;
}
.breathe-now-btn:active { transform:scale(0.97); background:rgba(94,170,168,0.14); }

/* Session layout — 3-zone clean system */
.session-controls-bar { position:fixed; top:0; left:0; right:0; z-index:20; transition:opacity 600ms ease; }
.session-progress-bar { position:fixed; bottom:calc(56px + env(safe-area-inset-bottom,0px)); left:0; right:0; height:2px; z-index:15; background:rgba(255,255,255,0.03); }
.session-info-zone { position:fixed; bottom:calc(80px + env(safe-area-inset-bottom,24px)); left:0; right:0; z-index:10; text-align:center; padding:0 24px; pointer-events:none; }

/* FIX7: Contrast — mood circle borders, lock icons */
.mood-circle { border:1.5px solid rgba(255,255,255,0.14) !important; }
.duration-badge { color:rgba(220,225,235,0.58) !important; }

.no-scrollbar::-webkit-scrollbar { display:none; }
.no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:#5eaaa8; cursor:pointer; margin-top:-7px; }
input[type=range]::-moz-range-thumb { width:18px; height:18px; border-radius:50%; background:#5eaaa8; cursor:pointer; border:none; }
input[type=range] { -webkit-appearance:none; height:4px; border-radius:2px; outline:none; }

button, [role="button"] { transition: transform 200ms cubic-bezier(0.34, 1.56, 0.64, 1); -webkit-tap-highlight-color: transparent; }
button:active, [role="button"]:active { transform: scale(0.97); transition: transform 80ms ease-out; }

.screen-glow {
  position:fixed; top:-20%; left:-10%; width:60%; height:50%;
  background: radial-gradient(ellipse, rgba(var(--accent-rgb),0.04) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}

/* Session text segments: circle hides, text takes center */
.session-text-segment {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: calc(100% - 48px);
  max-width: 320px;
  text-align: center;
  z-index: 10;
  padding: 0 24px;

}

function determineLevel(breathTests) {
  if (!breathTests || breathTests.length === 0) return 'basic';
  const bestDepth = Math.max(...breathTests.map(t => holdTimeToDepth(t.holdTime)));
  if (bestDepth >= 60) return 'expert';
  if (bestDepth >= 40) return 'advanced';
  if (bestDepth >= 25) return 'intermediate';
  if (bestDepth >= 10) return 'basic';
  return 'novice';
}

const HAPTIC_PATTERNS = {
  inhale(durationMs) {
    const steps = Math.floor(durationMs / 200);
    const p = [];
    for (let i = 0; i < steps; i++) {
      const t = i / steps;
      p.push(20 + Math.round(t * 100), Math.max(60, 200 - Math.round(t * 140)));
    }
    return p;
  },
  exhale(durationMs) {
    const steps = Math.floor(durationMs / 200);
    const p = [];
    for (let i = 0; i < steps; i++) {
      const t = i / steps;
      p.push(120 - Math.round(t * 100), 60 + Math.round(t * 160));
    }
    return p;
  },
  hold(durationMs) {
    const beats = Math.floor(durationMs / 2000);
    const p = [];
    for (let i = 0; i < beats; i++) p.push(15, 1985);
    return p;
  },
  transition: [200],
};

// iOS audio tick fallback (no navigator.vibrate on iOS)
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
let tickCtx = null;
function initTickCtx() {
  if (!tickCtx) {
    try { tickCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch {}
  }
}
function playTick(durationMs = 15, freq = 200) {
  if (!tickCtx || tickCtx.state === 'closed') return;
  if (tickCtx.state === 'suspended') tickCtx.resume();
  try {
    const osc = tickCtx.createOscillator();
    const gain = tickCtx.createGain();
    osc.connect(gain); gain.connect(tickCtx.destination);
    osc.frequency.value = freq; osc.type = 'sine';
    const now = tickCtx.currentTime;
    const dur = durationMs / 1000;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.06, now + dur * 0.1);
    gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
    osc.start(now); osc.stop(now + dur);
  } catch {}
}
document.addEventListener('touchstart', function initOnce() {
  initTickCtx();
  document.removeEventListener('touchstart', initOnce);
}, { once: true });
document.addEventListener('click', function initOnce() {
  initTickCtx();
  document.removeEventListener('click', initOnce);
}, { once: true });

const HAPTIC = {
  phaseChange: () => { if (!isIOS && navigator.vibrate) navigator.vibrate(15); else playTick(15, 200); },
  inhaleCue: () => { if (!isIOS && navigator.vibrate) navigator.vibrate(40); else playTick(40, 250); },
  exhaleCue: () => { if (!isIOS && navigator.vibrate) navigator.vibrate(20); else playTick(20, 120); },
  holdCue: () => { if (!isIOS && navigator.vibrate) navigator.vibrate([30,20,30]); else { playTick(30,180); setTimeout(()=>playTick(30,150),50); } },
  textMoment: () => { if (!isIOS && navigator.vibrate) navigator.vibrate([50,30,50]); else { playTick(50,180); setTimeout(()=>playTick(50,150),80); } },
  sessionStart: () => { if (!isIOS && navigator.vibrate) navigator.vibrate([100,50,100,50,100]); else { playTick(100,200); setTimeout(()=>playTick(100,170),150); setTimeout(()=>playTick(100,140),300); } },
  splash: () => { if (!isIOS && navigator.vibrate) navigator.vibrate(200); else playTick(200, 100); },
  celebrate: () => { if (!isIOS && navigator.vibrate) navigator.vibrate([50,30,50,30,80,40,120]); else { playTick(50,250); setTimeout(()=>playTick(80,200),80); setTimeout(()=>playTick(120,150),200); } },
};

function mapPhaseToHaptic(phase) {
  if (['inhale','inhale1','inhale2','belly','ribs','chest'].includes(phase)) return 'inhale';
  if (phase === 'exhale') return 'exhale';
  if (['holdIn','hold','holdOut','pause'].includes(phase)) return 'hold';
  return 'hold';
}

function getSessionInsight(stats, completionData, lang) {
  const now = new Date();
  const hour = now.getHours();
  const sessions = stats.totalSessions || 0;
  const streak = stats.streak || 0;
  const totalMinutes = stats.totalMinutes || 0;
  const totalDepth = stats.totalDepth || 0;
  const longestStreak = stats.longestStreak || 0;
  const techCount = (stats.techniquesUsed||[]).length;
  const weekNum = Math.ceil(streak / 7);
  const duration = completionData?.duration || 0;
  const minutes = Math.round(duration / 60);
  const depth = completionData?.depth || 0;
  const cycles = Math.round(duration / 10);
  const techniques = completionData?.techniques || [];

  const ctx = {
    duration, techniques, totalSessions: sessions, streak, totalMinutes,
    totalDepth, longestStreak, techniquesUsed: stats.techniquesUsed || [],
    techCount, sessions, weekNum, depth, minutes, cycles,
  };

  const shownIds = stats.shownInsightIds || [];
  const eligible = SESSION_INSIGHTS.filter(ins => {
    if (shownIds.includes(ins.id)) return false;
    try { return ins.condition(ctx); } catch { return false; }
  });

  if (eligible.length === 0) return null;
  const pick = eligible[Math.floor(Math.random() * eligible.length)];

  let text = pick.text;

  // Replace placeholders
  text = text.replace(/\{cycles\}/g, cycles)
    .replace(/\{depth\}/g, formatDepth(depth))
    .replace(/\{totalDepth\}/g, formatDepth(totalDepth))
    .replace(/\{streak\}/g, streak)
    .replace(/\{minutes\}/g, minutes)
    .replace(/\{totalMinutes\}/g, totalMinutes)
    .replace(/\{sessions\}/g, sessions)
    .replace(/\{longestStreak\}/g, longestStreak)
    .replace(/\{techCount\}/g, techCount)
    .replace(/\{weekNum\}/g, weekNum);

  return { id: pick.id, text };
}

      .from('profiles')

async function flushPendingSync(userId) {
  if (!supabaseClient || isDemo({ id: userId })) return;
  try {
    const pending = JSON.parse(localStorage.getItem('dive-pending-sync') || '[]');
    if (pending.length === 0) return;
    for (const item of pending) {

  } catch {}
}

  const sR = Math.round(14 - p*6), sG = Math.round(61 - p*25), sB = Math.round(92 - p*35);
  const dR = Math.max(0, Math.round(2 - p*2)), dG = Math.max(0, Math.round(10 - p*8)), dB = Math.max(0, Math.round(16 - p*12));

}

// ===== DEPTH CALCULATION =====
function holdTimeToDepth(holdSeconds) {
  // descentTime = 40% of hold, speed = 0.5 m/s, log compression after 15m
  const descentTime = holdSeconds * 0.4;
  const rawDepth = descentTime * 0.5;
  if (rawDepth > 15) return Math.round((15 + (rawDepth - 15) * 0.6) * 10) / 10;
  return Math.max(1, Math.round(rawDepth * 10) / 10);
}
function sessionDepth(durationSec, technique, level) {
  const baseMult = { tidal:0.8, diaphragmatic:1.0, box:1.2, segmented:1.2, ujjayi:1.5, recovery:0.8, physiological_sigh:1.3, custom:1.0 };
  const levelMult = LEVELS[level || 'basic']?.mult || 1.0;
  return Math.round(((durationSec / 60) * (baseMult[technique] || 1.0) * levelMult) * 10) / 10;
}
function detectFavourite(stats) {
  const last10 = (stats.history || []).slice(-10);
  const counts = {};
  last10.forEach(s => {
    const key = s.scenarioKey || s.scenario;
    if (key && key !== 'stress_sos_quick' && key !== 'surface_breath' && key !== '_first_session')
      counts[key] = (counts[key] || 0) + 1;
  });
  const top = Object.entries(counts).sort((a,b) => b[1]-a[1])[0];
  return top && top[1] >= 3 ? top[0] : null;
}

}

function checkOnOpenReminders(stats) {
  if (!stats.onboarded || !stats.reminderTime || stats.reminderTime === 'dismissed') return stats;
  const now = new Date();
  const today = now.toDateString();
  const hour = now.getHours();
  const reminderHour = stats.reminderTime === 'evening' ? 20 : 9;
  // Daily reminder: past reminder hour + no session today
  const todaySessions = (stats.history || []).filter(h => new Date(h.date).toDateString() === today);
  let changed = false;
  if (hour >= reminderHour && todaySessions.length === 0 && stats.lastOnOpenReminder !== today) {
    stats.showDailyReminder = true;
    stats.lastOnOpenReminder = today;
    changed = true;
  }
  // Streak at risk: missed yesterday, streak ≥ 3
  if ((stats.streak || 0) >= 3 && stats.history && stats.history.length > 0) {
    const lastSession = new Date(stats.history[stats.history.length - 1].date);
    const daysSince = (now - lastSession) / (1000*60*60*24);
    if (daysSince >= 1.5 && daysSince < 2.5 && stats.lastStreakWarning !== today) {
      stats.showStreakWarning = true;
      stats.lastStreakWarning = today;
      changed = true;
    }
  }
  if (changed) saveData(stats);
  return stats;
}

// ===== NOTIFICATION SCHEDULER (best-effort, tab must be open) =====
function scheduleNextNotification(stats) {
  if (!stats.notificationsGranted || typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
  const now = new Date();
  const next = new Date();
  const hour = stats.reminderTime === 'evening' ? 20 : 9;
  next.setHours(hour, 0, 0, 0);
  if (next <= now) next.setDate(next.getDate() + 1);
  const ms = next - now;
  setTimeout(() => {
    const today = new Date().toDateString();
    const todaySessions = (stats.history || []).filter(h => new Date(h.date).toDateString() === today);
    if (todaySessions.length === 0 && Notification.permission === 'granted') {
      try { new Notification('DIVE', { body:'Your 5-minute dive is waiting.', icon:'/icon-192.png' }); } catch(e) {}
    }
    scheduleNextNotification(stats);
  }, Math.min(ms, 86400000)); // cap at 24h to avoid overflow
}

function getDailyRecommendation(stats, t) {
  const hour = new Date().getHours();
  const sessions = stats.totalSessions || 0;

  // First session
  if (sessions === 0) return { scenario:'_first_session', duration:5, title: t.firstDiveLabel || 'Your first dive', sub:'5 ' + t.min + ' \u00b7 Cyclic sigh + Diaphragmatic', isFirstSession:true };

  // Days 1-7: fixed progression
  const dayProgression = [
    { scenario:'_first_session', duration:5, title: t.firstDiveLabel, sub:'5 ' + t.min + ' \u00b7 Cyclic sigh + Diaphragmatic', isFirstSession:true },
    { scenario:'meeting', duration:5, title: 'Box breathing basics', sub:'5 ' + t.min + ' \u00b7 ' + (t.boxBreathing||'Box Breathing') },
    { scenario:'hard_day', duration:5, title: 'Ocean breath', sub:'5 ' + t.min + ' \u00b7 ' + (t.ujjayi||'Ujjayi') },
    { scenario:'cant_focus', duration:5, title: 'Segmented breathing', sub:'5 ' + t.min + ' \u00b7 ' + (t.segmented||'Segmented') },
    { scenario:'morning', duration:5, title: 'Diaphragmatic mastery', sub:'5 ' + t.min + ' \u00b7 ' + (t.diaphragmatic||'Diaphragmatic') },
    { scenario:'just_relax', duration:5, title: 'Extended box', sub:'5 ' + t.min + ' \u00b7 ' + (t.boxBreathing||'Box Breathing') },
    { scenario:'deep_dive', duration:10, title: 'Combined techniques', sub:'10 ' + t.min + ' \u00b7 Deep dive' },
  ];
  if (sessions >= 1 && sessions <= 7) {
    return dayProgression[Math.min(sessions, dayProgression.length - 1)];
  }

  // Favourite detection (existing — 20% chance)
  const fav = detectFavourite(stats);
  if (fav && SCENARIOS[fav] && Math.random() < 0.2) {
    const sc = SCENARIOS[fav];
    return { scenario:fav, duration:sc.durations[0], title:'Your go-to', sub:getScenarioDisplayName(fav), isGoTo:true };
  }

  // Day 8+: algorithmic Daily Dive engine
  const hist = stats.history || [];
  const timeSlot = getTimeSlot(hour);
  const slotLabel = TIME_SLOT_LABELS[timeSlot];

  // 1. Mood override: avg of last 3 postMoods
  const recentMoods = hist.filter(h => typeof h.postMood === 'number').slice(-3);
  if (recentMoods.length >= 3) {
    const avgMood = recentMoods.reduce((s,h) => s + h.postMood, 0) / recentMoods.length;
    if (avgMood < 2.5) {
      return { scenario:'hard_day', duration:3, title:'Calm down', sub:'3 ' + t.min + ' \u00b7 Cyclic Sigh', technique:'physiological_sigh', isDailyDive:true };
    }
    if (avgMood > 4.0 && timeSlot === 0) {
      return { scenario:'morning', duration:3, title:'Morning energy', sub:'3 ' + t.min + ' \u00b7 Segmented', technique:'segmented', isDailyDive:true };
    }
  }

  // 2. Recency: exclude yesterday's technique
  const lastTech = hist.length > 0 ? hist[hist.length - 1].mainTechnique : null;

  // 3. Mastery gap: underused techniques get more weight
  const techStats = stats.techniqueStats || {};
  const allTechs = ['physiological_sigh','box','diaphragmatic','segmented','ujjayi','tidal'];
  const avgCount = allTechs.reduce((s,t) => s + (techStats[t]||0), 0) / allTechs.length;

  // 4. Weekly rotation pick
  const dayOfWeek = new Date().getDay();
  let pick = (ROTATION_MATRIX[dayOfWeek] || ROTATION_MATRIX[0])[timeSlot];

  // 5. Apply mastery gap: if rotation pick is overused, substitute
  if (pick === lastTech || (techStats[pick]||0) > avgCount * 1.5) {
    const category = CALMING_TECHNIQUES.includes(pick) ? CALMING_TECHNIQUES : ACTIVATING_TECHNIQUES;
    const sorted = category.filter(t => t !== lastTech).sort((a,b) => (techStats[a]||0) - (techStats[b]||0));
    if (sorted.length > 0) pick = sorted[0];
  }

  // Free tier: substitute premium techniques
  if (!stats.isPremium && !FREE_TECHNIQUES.includes(pick)) {
    const subs = {segmented:'physiological_sigh', ujjayi:'diaphragmatic', tidal:'box', recovery:'diaphragmatic'};
    pick = subs[pick] || 'physiological_sigh';
  }

  const displayName = TECHNIQUE_DISPLAY[pick] || pick;
  const techToScenario = { physiological_sigh:'hard_day', box:'meeting', diaphragmatic:'just_relax', segmented:'morning', ujjayi:'just_relax', tidal:'insomnia' };
  const scenario = techToScenario[pick] || 'just_relax';
  const durMin = stats.isPremium ? 5 : 2;

  return { scenario, duration:durMin, title: slotLabel, sub:durMin + ' ' + t.min + ' \u00b7 ' + displayName, technique:pick, isDailyDive:true };
}

// ===== AMBIENT ENGINE =====
class AmbientEngine {
  constructor() { this.ctx = null; this.running = false; this.masterGain = null; }
  init(worldConfig) {
    if (this.ctx) this.destroy();
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = 0;
      this.masterGain.connect(this.ctx.destination);
      this.osc = this.ctx.createOscillator();
      this.osc.type = 'sine';
      this.osc.frequency.value = worldConfig.baseFreq;
      const oscGain = this.ctx.createGain();
      oscGain.gain.value = 0.12;
      this.osc.connect(oscGain);
      oscGain.connect(this.masterGain);
      const bufSize = this.ctx.sampleRate * 2;
      const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) d[i] = Math.random() * 2 - 1;
      this.noiseSrc = this.ctx.createBufferSource();
      this.noiseSrc.buffer = buf;
      this.noiseSrc.loop = true;
      this.filter = this.ctx.createBiquadFilter();
      this.filter.type = 'lowpass';
      this.filter.frequency.value = worldConfig.filterFreq;
      const noiseGain = this.ctx.createGain();
      noiseGain.gain.value = 0.06;
      this.noiseSrc.connect(this.filter);
      this.filter.connect(noiseGain);
      noiseGain.connect(this.masterGain);
      this.lfo = this.ctx.createOscillator();
      this.lfo.frequency.value = worldConfig.lfoRate;
      const lfoGain = this.ctx.createGain();
      lfoGain.gain.value = 3;
      this.lfo.connect(lfoGain);
      lfoGain.connect(this.osc.frequency);
      this.osc.start(); this.noiseSrc.start(); this.lfo.start();
      this._baseFreq = worldConfig.baseFreq;
      this._filterFreq = worldConfig.filterFreq;
      this.running = true;
    } catch(e) { console.warn('Audio init failed', e); }
  }
  updateForBreathing(phase, progress) {
    if (!this.ctx || !this.masterGain) return;
    const now = this.ctx.currentTime;
    const t = progress;
    if (phase === 'inhale' || phase === 'inhale1' || phase === 'inhale2') {
      if (this.osc) this.osc.frequency.linearRampToValueAtTime(this._baseFreq * (1 + 0.15 * t), now + 0.1);
      if (this.filter) this.filter.frequency.linearRampToValueAtTime(this._filterFreq * (1 + 0.5 * t), now + 0.1);
      this.masterGain.gain.linearRampToValueAtTime(0.10 + 0.06 * t, now + 0.1);
    } else if (phase === 'exhale') {
      if (this.osc) this.osc.frequency.linearRampToValueAtTime(this._baseFreq * (1.15 - 0.15 * t), now + 0.1);
      if (this.filter) this.filter.frequency.linearRampToValueAtTime(this._filterFreq * (1.5 - 0.5 * t), now + 0.1);
      this.masterGain.gain.linearRampToValueAtTime(0.16 - 0.06 * t, now + 0.1);
    } else if (phase === 'holdIn' || phase === 'hold') {
      const pulse = Math.sin(progress * Math.PI * 2) * 0.01;
      this.masterGain.gain.linearRampToValueAtTime(0.14 + pulse, now + 0.1);
    } else {
      this.masterGain.gain.linearRampToValueAtTime(0.06, now + 0.3);
      if (this.filter) this.filter.frequency.linearRampToValueAtTime(this._filterFreq * 0.6, now + 0.3);
    }
  }
  duck(dur=0.5) { if (!this.ctx||!this.masterGain) return; this.masterGain.gain.cancelScheduledValues(this.ctx.currentTime); this.masterGain.gain.setValueAtTime(this.masterGain.gain.value,this.ctx.currentTime); this.masterGain.gain.linearRampToValueAtTime(0.03,this.ctx.currentTime+dur); }
  unduck(dur=2) { if (!this.ctx||!this.masterGain) return; this.masterGain.gain.cancelScheduledValues(this.ctx.currentTime); this.masterGain.gain.setValueAtTime(this.masterGain.gain.value,this.ctx.currentTime); this.masterGain.gain.linearRampToValueAtTime(0.12,this.ctx.currentTime+dur); }
  fadeIn(dur=3) { if (!this.ctx||!this.masterGain) return; if (this.ctx.state==='suspended') this.ctx.resume(); this.masterGain.gain.cancelScheduledValues(this.ctx.currentTime); this.masterGain.gain.setValueAtTime(this.masterGain.gain.value,this.ctx.currentTime); this.masterGain.gain.linearRampToValueAtTime(0.15,this.ctx.currentTime+dur); }
  fadeOut(dur=2) { if (!this.ctx||!this.masterGain) return; this.masterGain.gain.cancelScheduledValues(this.ctx.currentTime); this.masterGain.gain.setValueAtTime(this.masterGain.gain.value,this.ctx.currentTime); this.masterGain.gain.linearRampToValueAtTime(0,this.ctx.currentTime+dur); }
  destroy() { this.fadeOut(0.5); setTimeout(() => { try { this.ctx?.close(); } catch {} this.ctx = null; this.running = false; }, 600); }
}

// ===== VOICE PLAYER =====
class VoicePlayer {
  constructor() {
    this.current = null;
    this.enabled = true;
  }
  play(audioKey, volume = 0.85) {
    if (!this.enabled) return null;
    if (!AUDIO_MAP[audioKey]) return null;
    if (this.current) { this.current.pause(); this.current = null; }
    const audio = new Audio(AUDIO_MAP[audioKey]);
    audio.volume = volume;
    audio.onerror = () => { this.current = null; };
    audio.play().catch(() => {});
    this.current = audio;
    return audio;
  }
  fadeOut(duration = 2000) {
    if (!this.current) return;
    const audio = this.current;
    const step = audio.volume / (duration / 50);
    const fade = setInterval(() => {
      if (audio.volume > step) { audio.volume -= step; }
      else { audio.pause(); audio.volume = 0; clearInterval(fade); }
    }, 50);
  }
  stop() {
    if (this.current) { this.current.pause(); this.current = null; }
  }
  toggle() {
    this.enabled = !this.enabled;
    if (!this.enabled) this.stop();
    return this.enabled;
  }
}
const voicePlayer = new VoicePlayer();

// ===== RANDOMIZED VOICE CUE SYSTEM =====
// Phase cue key maps (normal + whisper)
const PHASE_CUE_MAP = {
  inhale:'cue_breathe_in', inhale1:'cue_breathe_in', inhale2:'cue_little_more',
  exhale:'cue_breathe_out', holdIn:'cue_hold', hold:'cue_hold',
  holdOut:'cue_pause', pause:'cue_pause',
  belly:'cue_breathe_in', ribs:'cue_little_more', chest:'cue_little_more',
};
const EC_CUE_MAP = {
  inhale:'ec_breathe_in', inhale1:'ec_breathe_in', inhale2:'ec_more',
  exhale:'ec_breathe_out', holdIn:'ec_hold', hold:'ec_hold',
  holdOut:'ec_hold', pause:'ec_hold',
  belly:'ec_breathe_in', ribs:'ec_more', chest:'ec_more',
};
const TECHNIQUE_INTRO_MAP = {
  physiological_sigh:'intro_cyclic_sigh', sigh:'intro_cyclic_sigh',
  box:'intro_box', diaphragmatic:'intro_diaphragmatic',
  segmented:'intro_segmented', ujjayi:'intro_ujjayi',
  tidal:'intro_tidal', recovery:'intro_diaphragmatic',
};

// Voice randomization state
let _lastSpokenKey = null;
let _consecutiveSilences = 0;

function resetVoiceState() { _lastSpokenKey = null; _consecutiveSilences = 0; }

function playPhaseCue(technique, phase, cycleCount, phaseDuration, isEyesClosed) {
  if (!voicePlayer.enabled) return;
  const tech = technique === 'physiological_sigh' ? 'sigh' : technique;

  // Technique intro on first cycle, first inhale
  if (cycleCount === 0 && (phase === 'inhale' || phase === 'inhale1' || phase === 'belly')) {
    const introKey = TECHNIQUE_INTRO_MAP[tech] || TECHNIQUE_INTRO_MAP[technique];
    if (introKey && AUDIO_MAP[introKey]) { voicePlayer.play(introKey); return; }
  }

  const cueKey = PHASE_CUE_MAP[phase];
  if (!cueKey) return;

  // RULE 1: Cycles 0-1 — ALWAYS speak (teaching mode)
  let shouldSpeak = cycleCount < 2;

  if (!shouldSpeak) {
    // RULE 2: After 3+ consecutive silences → force speak
    if (_consecutiveSilences >= 3) {
      shouldSpeak = true;
    }
    // RULE 3: Eyes-closed → ~60% chance
    else if (isEyesClosed) {
      shouldSpeak = Math.random() < 0.6;
    }
    // RULE 4: Normal → ~35% chance
    else {
      shouldSpeak = Math.random() < 0.35;
    }
    // RULE 5: Never same phrase twice in a row
    if (shouldSpeak && cueKey === _lastSpokenKey) {
      shouldSpeak = false;
    }
  }

  if (!shouldSpeak) {
    _consecutiveSilences++;
    return;
  }

  // Duration-aware: try normal → whisper → skip
  const cueDur = CLIP_DURATIONS[cueKey] || 4;
  const ecKey = EC_CUE_MAP[phase];
  const ecDur = ecKey ? (CLIP_DURATIONS[ecKey] || 4) : 99;

  if (phaseDuration && cueDur <= phaseDuration * 0.75 && AUDIO_MAP[cueKey]) {
    voicePlayer.play(cueKey, 0.55);
    _lastSpokenKey = cueKey;
    _consecutiveSilences = 0;
  } else if (phaseDuration && ecKey && AUDIO_MAP[ecKey] && ecDur <= phaseDuration * 0.75) {
    voicePlayer.play(ecKey, 0.4);
    _lastSpokenKey = ecKey;
    _consecutiveSilences = 0;
  } else {
    _consecutiveSilences++;
  }
}

// ===== HAPTIC ENGINE =====
function hapticForPhase(phase, phaseDuration) {
  if (!navigator.vibrate && !isIOS) return null;
  if (isIOS) {
    // Use audio ticks on iOS
    if (phase === 'inhale' || phase === 'inhale1') { playTick(40, 250); }
    else if (phase === 'inhale2') { playTick(40, 220); }
    else if (phase === 'exhale') { playTick(20, 120); }
    else if (phase === 'holdIn' || phase === 'hold') { playTick(15, 180); }
    return null;
  }
  try {
    if (phase === 'inhale' || phase === 'inhale1') {
      // ascending vibration: short bursts getting longer, 2 per second
      const count = Math.max(2, Math.floor(phaseDuration * 2));
      const pattern = [];
      for (let i = 0; i < count; i++) {
        const dur = 10 + (30 * i / count); // 10ms -> 40ms
        pattern.push(dur, Math.max(50, 500 / count - dur));
      }
      navigator.vibrate(pattern);
      return pattern;
    } else if (phase === 'inhale2') {
      navigator.vibrate([40, 80, 40]);
      return [40, 80, 40];
    } else if (phase === 'exhale') {
      const count = Math.max(2, Math.floor(phaseDuration * 2));
      const pattern = [];
      for (let i = 0; i < count; i++) {
        const dur = 40 - (30 * i / count); // 40ms -> 10ms
        pattern.push(dur, Math.max(50, 500 / count - dur));
      }
      navigator.vibrate(pattern);
      return pattern;
    } else if (phase === 'holdIn' || phase === 'hold') {
      // heartbeat pulse every 2 seconds
      navigator.vibrate([15, 1985]);
      return [15, 1985];
    } else {
      // holdOut, pause: silence
      navigator.vibrate(0);
      return null;
    }
  } catch { return null; }
}

// ===== SESSION ENGINE =====
class SessionEngine {
  constructor(segments, world, lang, voiceEnabled) {
    this.segments = segments;
    this.world = world;
    this.lang = lang;
    this.voiceEnabled = voiceEnabled;
    this.currentSegmentIndex = 0;
    this.segmentElapsed = 0;
    this.totalElapsed = 0;
    this.totalDuration = segments.reduce((sum, s) => sum + s.duration, 0);
    this.isRunning = false;
    this.isPaused = false;
    this.currentPhase = null;
    this.phaseElapsed = 0;
    this.phaseDuration = 0;
    this.cycleCount = 0;
    this.breathScale = 1.0;
    this.glowIntensity = 0.1;
    this.onUpdate = null;
    this.onSegmentChange = null;
    this.onPhaseChange = null;
    this.onComplete = null;
    this._lastTime = null;
    this._rafId = null;
    this.actualElapsed = 0;
    this.actualBreathCycles = 0;
    this._lastPhase = null;
    // Initialize first segment
    const seg = segments[0];
    if (seg && seg.type === 'breathing') {
      const phases = Object.keys(seg.params);
      this.currentPhase = phases[0];
      this.phaseDuration = seg.params[this.currentPhase];
    }
  }
  start() {
    this.isRunning = true;
    this._lastTime = performance.now();
    this._tick();
  }
  _tick() {
    if (!this.isRunning) return;
    const now = performance.now();
    const delta = (now - this._lastTime) / 1000;
    this._lastTime = now;
    if (this.isPaused) {
      this._rafId = requestAnimationFrame(() => this._tick());
      return;
    }
    this.segmentElapsed += delta;
    this.totalElapsed += delta;
    this.actualElapsed += delta;
    const segment = this.segments[this.currentSegmentIndex];
    if (!segment) return;
    // Video segments with duration 0 wait for skip()
    if (segment.duration > 0 && this.segmentElapsed >= segment.duration) {
      this._nextSegment();
      this._rafId = requestAnimationFrame(() => this._tick());
      return;
    }
    if (segment.type === 'breathing') {
      this._updateBreathing(segment, delta);
    }
    const diveProgress = this.totalDuration > 0 ? this.totalElapsed / this.totalDuration : 0;
    if (this.onUpdate) {
      this.onUpdate({
        segmentIndex: this.currentSegmentIndex,
        segmentType: segment.type,
        segmentElapsed: this.segmentElapsed,
        segmentDuration: segment.duration,
        segmentProgress: segment.duration > 0 ? Math.min(this.segmentElapsed / segment.duration, 1) : 0,
        phase: this.currentPhase,
        phaseElapsed: this.phaseElapsed,
        phaseDuration: this.phaseDuration,
        phaseProgress: this.phaseDuration > 0 ? this.phaseElapsed / this.phaseDuration : 0,
        cycleCount: this.cycleCount,
        breathScale: this.breathScale,
        glowIntensity: this.glowIntensity,
        totalElapsed: this.totalElapsed,
        totalDuration: this.totalDuration,
        diveProgress: Math.min(diveProgress, 1),
      });
    }
    this._rafId = requestAnimationFrame(() => this._tick());
  }
  _updateBreathing(segment, delta) {
    this.phaseElapsed += delta;
    if (this.phaseElapsed >= this.phaseDuration) {
      this._nextPhase(segment);
    }
    const t = this.phaseDuration > 0 ? Math.min(this.phaseElapsed / this.phaseDuration, 1) : 0;
    const eased = 0.5 - 0.5 * Math.cos(t * Math.PI); // cosine easing — zero velocity at both ends, no jitter
    const p = this.currentPhase;
    if (p==='inhale') {
      this.breathScale = 1.0 + 0.5*eased;
      this.glowIntensity = 0.1 + 0.15*eased;
    } else if (p==='inhale1') {
      // physiological sigh: first inhale 1.0 → 1.3
      this.breathScale = 1.0 + 0.3*eased;
      this.glowIntensity = 0.1 + 0.10*eased;
    } else if (p==='inhale2') {
      // physiological sigh: second inhale 1.3 → 1.5
      this.breathScale = 1.3 + 0.2*eased;
      this.glowIntensity = 0.2 + 0.05*eased;
    } else if (p==='belly') {
      // segmented: belly 1.0 → 1.17
      this.breathScale = 1.0 + 0.17*eased;
      this.glowIntensity = 0.1 + 0.05*eased;
    } else if (p==='ribs') {
      // segmented: ribs 1.17 → 1.33
      this.breathScale = 1.17 + 0.16*eased;
      this.glowIntensity = 0.15 + 0.05*eased;
    } else if (p==='chest') {
      // segmented: chest 1.33 → 1.5
      this.breathScale = 1.33 + 0.17*eased;
      this.glowIntensity = 0.20 + 0.05*eased;
    } else if (p==='holdIn'||p==='hold') {
      this.breathScale = 1.5;
      this.glowIntensity = 0.25 + Math.sin(this.phaseElapsed*2)*0.03;
    } else if (p==='exhale') {
      this.breathScale = 1.5 - 0.5*eased;
      this.glowIntensity = 0.25 - 0.15*eased;
    } else if (p==='holdOut'||p==='pause') {
      this.breathScale = 1.0;
      this.glowIntensity = 0.1;
    }
  }
  _nextPhase(segment) {
    const prevPhase = this.currentPhase;
    const phases = Object.keys(segment.params);
    const idx = phases.indexOf(this.currentPhase);
    if (idx >= phases.length - 1) {
      this.cycleCount++;
      this.currentPhase = phases[0];
    } else {
      this.currentPhase = phases[idx + 1];
    }
    const newPhase = this.currentPhase;
    if ((prevPhase === 'exhale' && newPhase === 'inhale') || (prevPhase === 'exhale' && newPhase === 'belly')) {
      this.actualBreathCycles++;
    }
    this.phaseElapsed = 0;
    this.phaseDuration = segment.params[this.currentPhase] || 4;
    if (this.onPhaseChange) this.onPhaseChange(this.currentPhase, this.cycleCount, this.phaseDuration);
  }
  _nextSegment() {
    this.currentSegmentIndex++;
    if (this.currentSegmentIndex >= this.segments.length) {
      this.isRunning = false;
      if (this.onComplete) this.onComplete();
      return;
    }
    this.segmentElapsed = 0;
    const seg = this.segments[this.currentSegmentIndex];
    if (seg.type === 'breathing') {
      const phases = Object.keys(seg.params);
      this.currentPhase = phases[0];
      this.phaseElapsed = 0;
      this.phaseDuration = seg.params[this.currentPhase] || 4;
      this.cycleCount = 0;
    } else {
      this.currentPhase = null;
      this.phaseElapsed = 0;
      this.phaseDuration = 0;
      this.cycleCount = 0;
    }
    if (this.onSegmentChange) this.onSegmentChange(this.currentSegmentIndex, seg);
  }
  // FIX6: extend current segment if audio is longer than planned
  extendCurrentSegment(minDuration) {
    const seg = this.segments[this.currentSegmentIndex];
    if (seg && seg.duration < minDuration) {
      const diff = minDuration - seg.duration;
      seg.duration = minDuration;
      this.totalDuration += diff;
    }
  }
  pause() { this.isPaused = true; }
  resume() { this.isPaused = false; this._lastTime = performance.now(); }
  skip() {
    const seg = this.segments[this.currentSegmentIndex];
    if (!seg) return;
    if (seg.duration > 0) {
      this.segmentElapsed = seg.duration;
    } else {
      // For duration-0 segments (e.g. video placeholders), directly advance
      this._nextSegment();
    }
  }
  destroy() { this.isRunning = false; if (this._rafId) cancelAnimationFrame(this._rafId); }
}
