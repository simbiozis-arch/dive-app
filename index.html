  const [sosCascadeLevel, setSosCascadeLevel] = useState(0);
  const [lastSessionWasSOS, setLastSessionWasSOS] = useState(false);
  const [sosPartialMsg, setSosPartialMsg] = useState(false);
  const [showSurfaceBreath, setShowSurfaceBreath] = useState(false);
  const [surfaceBreathStreak, setSurfaceBreathStreak] = useState(0);
  const [showRetestPrompt, setShowRetestPrompt] = useState(false);
  const [retestDays, setRetestDays] = useState(0);
  const [showResetConfirm, setShowResetConfirm] = useState(false);
  const [showInstallBanner, setShowInstallBanner] = useState(false);
  const [durationPickerScenario, setDurationPickerScenario] = useState(null);
  // showStressChoice removed — SOS is instant
  const [exploreCat, setExploreCat] = useState('focus');
  const [isReplayIntro, setIsReplayIntro] = useState(false);
  const [customPatterns, setCustomPatterns] = useState(() => {
    try { return JSON.parse(localStorage.getItem('dive_custom_patterns') || '[]'); } catch { return []; }
  });
  const [editingPattern, setEditingPattern] = useState(null);
  const [levelUpMessage, setLevelUpMessage] = useState(null);
  const ambientRef = useRef(new AmbientEngine());
  const world = 'ocean'; // ocean only — space world removed
  const w = WORLDS[world];
  const palette = w.palette;
  const accentRgb = palette.accentRgb;

  const t = LANG.en;

  // Weekly summary check
  const shouldShowWeekly = useMemo(() => {
    if (!stats.onboarded) return false;
    const lastSummary = stats.lastWeeklySummary;
    const daysSinceSummary = lastSummary
      ? Math.floor((Date.now() - new Date(lastSummary).getTime()) / 86400000)
      : 999;
    if (daysSinceSummary < 7) return false;
    const sevenDaysAgo = Date.now() - 7 * 86400000;
    const recentSessions = (stats.history || [])
      .filter(s => new Date(s.date).getTime() > sevenDaysAgo);
    if (recentSessions.length < 2) return false;
    return true;
  }, [stats.onboarded, stats.lastWeeklySummary, stats.history]);
  const [showWeekly, setShowWeekly] = useState(false);
  useEffect(() => { if (shouldShowWeekly && screen === 'home' && !showCompletion && !activeSession) setShowWeekly(true); }, [shouldShowWeekly, screen, showCompletion, activeSession]);


  useEffect(() => {
    audioDebug();
    ph('app_open', { totalSessions: stats.totalSessions, streak: stats.currentStreak, totalDepth: stats.totalDepth });
    // Trial expiry check
    if (checkTrialExpiry(stats)) {
      setStats(s => ({...s, isPremium: false, trialExpired: true}));
    }
    // On-open reminder checks
    const checked = checkOnOpenReminders({...stats});
    if (checked.showDailyReminder !== stats.showDailyReminder || checked.showStreakWarning !== stats.showStreakWarning) {
      setStats(s => ({...s, showDailyReminder: checked.showDailyReminder, showStreakWarning: checked.showStreakWarning, lastOnOpenReminder: checked.lastOnOpenReminder, lastStreakWarning: checked.lastStreakWarning}));
    }
    // Schedule browser notification if granted
    scheduleNextNotification(stats);
    // PWA install banner check
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    if (!isStandalone && stats.onboarded) {
      const sessions = stats.totalSessions || 0;
      if ((sessions >= 2 && !stats.installPromptDismissed) || (sessions >= 5 && stats.installPromptDismissed)) {
        setShowInstallBanner(true);
        try { ph('install_prompt_shown', {}); } catch(e) {}
      }
    }
    // Handle /?sos=true shortcut (PWA shortcut from manifest)
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('sos') === 'true' && stats.onboarded) {
      window.history.replaceState({}, '', '/');
      const segs = [{ type:'breathing', technique:'physiological_sigh', duration:90, params:{inhale1:2,inhale2:1,exhale:7} }];
      actuallyStartSession(segs, {scenario:'stress_sos_quick', category:'stress'});
    }
  }, []);
  useEffect(() => {
    saveData(stats);
    // Cloud sync: debounced save to Supabase
    if (authUser && !isDemo(authUser)) {
      const t = setTimeout(() => cloudSaveProfile(authUser.id, stats), 2000);
      return () => clearTimeout(t);
    }
  }, [stats, authUser]);

  // Sync from cloud on auth
  useEffect(() => {
    if (!authUser || isDemo(authUser)) return;
    (async () => {
      await flushPendingSync(authUser.id);
      const cloudData = await cloudLoadProfile(authUser.id);
      if (cloudData) {
        // Merge: cloud wins if it has more sessions
        const local = loadData() || defaultStats();
        if ((cloudData.totalSessions || 0) >= (local.totalSessions || 0)) {
          setStats({ ...defaultStats(), ...cloudData });
        }
      }
    })();
  }, [authUser]);

  // Flush pending sync on reconnect
  useEffect(() => {
    const handleOnline = () => { if (authUser && !isDemo(authUser)) flushPendingSync(authUser.id); };
    window.addEventListener('online', handleOnline);
    return () => window.removeEventListener('online', handleOnline);
  }, [authUser]);

  // P1.2: Background audio — resume on app visibility restore
  useEffect(() => {
    const handleVisibility = () => {
      if (!document.hidden) {
        // App resumed — resume AudioContext if suspended
        if (ambientRef.current?.ctx?.state === 'suspended') {
          ambientRef.current.ctx.resume();
        }
        // Resume voice audio if playing
        if (voicePlayer.current && voicePlayer.current.paused) {
          voicePlayer.current.play().catch(() => {});
        }
      }
      // When hidden: do nothing — let audio continue naturally
    };
    document.addEventListener('visibilitychange', handleVisibility);
    return () => document.removeEventListener('visibilitychange', handleVisibility);
  }, []);

  // Apply CSS vars for world
  useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty('--accent', palette.accent);
    r.style.setProperty('--accent-rgb', accentRgb);
    r.style.setProperty('--accent-text', palette.accent);
    r.style.setProperty('--glow', palette.glow);
  }, [world]);

  useEffect(() => {
    if (!stats.lastSessionDate) return;
    const last = new Date(stats.lastSessionDate);
    const today = new Date();
    const diffDays = Math.floor((today - last) / 86400000);
    if (diffDays >= 2 && stats.streak > 0) {
      // Missed 2+ days — offer surface breath to save streak
      setSurfaceBreathStreak(stats.streak);
      setShowSurfaceBreath(true);
    }
  }, []);

  // Breath retest check
  useEffect(() => {
    if (screen === 'home' && stats.onboarded) {
      const lastTest = (stats.breathTests || [])[((stats.breathTests || []).length) - 1];
      const days = lastTest ? Math.floor((Date.now() - new Date(lastTest.date).getTime()) / 86400000) : 999;
      // Check dismiss — only re-show after 1 day from dismiss
      const dismissDate = stats.lastRetestDismiss;
      const daysSinceDismiss = dismissDate ? Math.floor((Date.now() - new Date(dismissDate).getTime()) / 86400000) : 999;
      if (days >= 7 && (stats.totalSessions || 0) >= 3 && daysSinceDismiss >= 1 && !showRetestPrompt) {
        setRetestDays(days);
        setShowRetestPrompt(true);
      }
    }
  }, [screen]);

  const updateStats = (sessionInfo) => {
    const now = new Date();
    const today = now.toISOString().split('T')[0];
    const hour = now.getHours();
    setStats(prev => {
      const newTechs = [...new Set([...(prev.techniquesUsed||[]), ...(sessionInfo.techniques||[])])];
      const newCats = [...new Set([...(prev.categoriesUsed||[]), sessionInfo.category].filter(Boolean))];
      const isNight = hour >= 21 || hour <= 5;
      const isMorning = hour >= 5 && hour < 9;
      let streak = prev.streak;
      if (prev.lastSessionDate !== today) {
        const last = prev.lastSessionDate ? new Date(prev.lastSessionDate) : null;
        const diff = last ? Math.floor((new Date(today) - last) / 86400000) : 2;
        streak = diff === 1 ? prev.streak + 1 : 1;
      }
      const longestStreak = Math.max(prev.longestStreak || 0, streak);
      const depth = sessionDepth(sessionInfo.duration || 0, sessionInfo.mainTechnique || 'diaphragmatic', prev.level || 'basic');
      const newTechStats = {...(prev.techniqueStats || {})};
      (sessionInfo.techniques || []).forEach(tc => { newTechStats[tc] = (newTechStats[tc] || 0) + 1; });
      // Update techniqueMastery
      const newMastery = {...(prev.techniqueMastery || {})};
      let masteryLevelUp = null;
      (sessionInfo.techniques || []).forEach(tc => {
        if (!newMastery[tc]) newMastery[tc] = { sessions:0, level:null };
        newMastery[tc] = { ...newMastery[tc], sessions: newMastery[tc].sessions + 1 };
        const newLevel = getMasteryLevel(newMastery[tc].sessions);
        const oldLevel = newMastery[tc].level;
        if (newLevel && newLevel.name !== oldLevel) {
          newMastery[tc].level = newLevel.name;
          masteryLevelUp = { technique: tc, newLevel: newLevel.name };
          try { ph('mastery_level_up', { technique: tc, level: newLevel.name }); } catch(e) {}
        }
      });
      return {
        ...prev, totalSessions: prev.totalSessions + 1, streak, longestStreak, lastSessionDate: today,
        totalDepth: Math.round((prev.totalDepth + depth) * 10) / 10,
        totalMinutes: prev.totalMinutes + Math.round((sessionInfo.duration || 0) / 60),
        totalSeconds: (prev.totalSeconds || 0) + (sessionInfo.duration || 0),
        techniquesUsed: newTechs, categoriesUsed: newCats,
        nightSessions: prev.nightSessions + (isNight ? 1 : 0),
        morningSessions: prev.morningSessions + (isMorning ? 1 : 0),
        techniqueStats: newTechStats,
        techniqueMastery: newMastery,
        _masteryLevelUp: masteryLevelUp, // transient flag for UI toast
        history: [...prev.history, { date: now.toISOString(), scenario: sessionInfo.scenario, scenarioKey: sessionInfo.scenario, duration: sessionInfo.duration, category: sessionInfo.category, depth, mainTechnique: sessionInfo.mainTechnique || 'diaphragmatic', preMood: sessionInfo.preMood != null ? sessionInfo.preMood : null, sessionType: sessionInfo.sessionType || 'regular' }].slice(-100),
      };
    });
  };

  const mergeConsecutiveTexts = (segs) => {
    const result = [];
    for (let i = 0; i < segs.length; i++) {
      if (segs[i].type === 'text' && result.length > 0 && result[result.length - 1].type === 'text') {
        const prev = result[result.length - 1];
        prev.duration = (prev.duration || 5) + (segs[i].duration || 5) + 2;
        prev.texts = prev.texts || [prev.text || prev.textKey];
        prev.texts.push(segs[i].text || segs[i].textKey);
      } else {
        result.push({...segs[i]});
      }
    }
    return result;
  };

  const actuallyStartSession = (segments, meta = {}) => {
    resetVoiceState(); // Reset randomization state for new session
    // Apply adaptive difficulty level timings to breathing segments
    const userLevel = stats.level || 'basic';
    segments.forEach(seg => {
      if (seg.type === 'breathing' && seg.technique !== 'custom') {
        const levelTimings = getSessionTimings(seg.technique, userLevel);
        if (levelTimings && Object.keys(levelTimings).length > 0) {
          seg.params = { ...seg.params, ...levelTimings };
        }
      }
    });
    const mergedSegs = mergeConsecutiveTexts(segments);
    ph('session_start', { scenario: meta?.scenario, technique: segments.find(s=>s.type==='breathing')?.technique, duration: segments.reduce((a,s)=>a+(s.duration||0),0), level: userLevel, session_type: meta?.isSOSSession ? 'sos' : meta?.isFirstSession ? 'onboarding' : meta?.programId ? 'program' : meta?.category === 'custom' ? 'custom' : meta?.category === 'breathe_now' ? 'breathe_now' : 'quick_dive' });
    setActiveSession({ segments: mergedSegs, meta });
    if (stats.soundEnabled) {
      ambientRef.current.init(WORLDS[world].ambient);
      ambientRef.current.fadeIn();
      playSplashWithVariation(); // splash on dive start
      HAPTIC.sessionStart();
    }
    // P1.2: MediaSession metadata so lock screen shows session info
    if ('mediaSession' in navigator) {
      try {
        navigator.mediaSession.metadata = new window.MediaMetadata({
          title: 'DIVE — Breathing Session',
          artist: 'DIVE',
        });
        navigator.mediaSession.setActionHandler('pause', () => {});
      } catch(e) {}
    }
  };

  const [showPreMood, setShowPreMood] = useState(false);
  const [pendingSessionData, setPendingSessionData] = useState(null);
  const preMoodTimerRef = useRef(null);

  const startSession = (segments, meta = {}, options = {}) => {
    setCurrentMood({pre: options.preMood != null ? options.preMood : null, post:null});
    setMoodDelta(null);
    if (options.skipPreMood) {
      // Skip pre-mood screen entirely (e.g. SOS flow already asked)
      actuallyStartSession(segments, meta);
    } else {
      setPendingSessionData({ segments, meta });
      setShowPreMood(true);
    }
  };

  // Fade out pre-mood then start session
  const dismissPreMood = () => {
    const el = document.querySelector('.pre-mood-fade');
    if (el) { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s ease'; }
    setTimeout(() => {
      setShowPreMood(false);
      if (pendingSessionData) { actuallyStartSession(pendingSessionData.segments, pendingSessionData.meta); setPendingSessionData(null); }
    }, 300);
  };
  // Auto-dismiss pre-mood after 5 seconds
  useEffect(() => {
    if (showPreMood && pendingSessionData) {
      preMoodTimerRef.current = setTimeout(dismissPreMood, 5000);
      return () => clearTimeout(preMoodTimerRef.current);
    }
  }, [showPreMood, pendingSessionData]);


  const endSession = (completed = true, actualData = null) => {
    ambientRef.current.fadeOut();
    setTimeout(() => ambientRef.current.destroy(), 2500);
    if (completed && activeSession) {
      const segs = activeSession.segments;
      const totalDur = segs.reduce((s, seg) => s + seg.duration, 0);
      const techs = [...new Set(segs.filter(s => s.type === 'breathing').map(s => s.technique))];
      const breathSegs = segs.filter(s => s.type === 'breathing');
      const mainTech = breathSegs.length > 0 ? breathSegs.reduce((a, b) => b.duration > a.duration ? b : a).technique : 'diaphragmatic';
      const actualDur = (actualData && actualData.actualElapsed > 0) ? actualData.actualElapsed : totalDur;
      updateStats({ duration: actualDur, techniques: techs, category: activeSession.meta?.category, scenario: activeSession.meta?.scenario, mainTechnique: mainTech, preMood: currentMood.pre, sessionType: activeSession.meta?.isSOSSession ? 'sos' : activeSession.meta?.isFirstSession ? 'onboarding' : 'regular' });
      if (activeSession.meta?.programId && activeSession.meta?.day !== undefined) {
        setStats(prev => {
          const pp = {...(prev.programProgress || {})};
          if (!pp[activeSession.meta.programId]) pp[activeSession.meta.programId] = [];
          if (!pp[activeSession.meta.programId].includes(activeSession.meta.day)) pp[activeSession.meta.programId] = [...pp[activeSession.meta.programId], activeSession.meta.day];
          const prog = PROGRAMS[activeSession.meta.programId];
          const programsCompleted = prog && pp[activeSession.meta.programId].length >= prog.days ? prev.programsCompleted + 1 : prev.programsCompleted;
          // Proactive paywall after First Dive Day 3 (day index 2)
          if (activeSession.meta.programId === 'first_dive' && activeSession.meta.day === 2 && !prev.paywallShownAfterDay3 && !prev.isPremium) {
            return {...prev, programProgress: pp, programsCompleted, showDay3Paywall: true};
          }
          return {...prev, programProgress: pp, programsCompleted};
        });
      }
      const breathCycles = (actualData && actualData.actualBreathCycles > 0)
        ? actualData.actualBreathCycles
        : (segs.filter(s => s.type === 'breathing').reduce((total, s) => {
            const cycleDur = Object.values(s.params).reduce((a, b) => a + b, 0);
            return total + (cycleDur > 0 ? Math.floor(s.duration / cycleDur) : 0);
          }, 0) || Math.round(totalDur / 16));
      const cData = { duration: actualDur, techniques: techs, depth: sessionDepth(actualDur, mainTech, stats.level || 'basic'), breathCycles, segments: segs, _lastScenario: activeSession.meta?.scenario, _isFirstSession: activeSession.meta?.isFirstSession || false };
      ph('session_complete', { scenario: activeSession.meta?.scenario, technique: mainTech, duration: actualDur, depth: cData.depth, preMood: currentMood.pre, postMood: currentMood.post, mood_delta: (currentMood.pre != null && currentMood.post != null) ? currentMood.pre - currentMood.post : null, session_type: activeSession.meta?.isSOSSession ? 'sos' : activeSession.meta?.isFirstSession ? 'onboarding' : activeSession.meta?.programId ? 'program' : 'quick_dive' });
      // Update user properties
      try { ph('$set', { total_sessions: (stats.totalSessions||0)+1, streak: stats.streak, is_premium: stats.isPremium, techniques_tried: Object.keys(stats.techniqueStats||{}).length, total_depth: stats.totalDepth, goal: stats.userGoal }); } catch(e) {}
      setActiveSession(null);
      setShowSurfacing(true);
      HAPTIC.celebrate();
      try { const doneAudio = new Audio('/audio/bookend_done.mp3'); doneAudio.volume = 0.6; doneAudio.play().catch(()=>{}); } catch(e) {}
      setTimeout(() => {
        setShowSurfacing(false);
        setCompletionData(cData);
        setShowCompletion(true);
      }, 2200);
      return;
    }
    ph('session_exit', { scenario: activeSession?.meta?.scenario });
    setActiveSession(null);
  };

  const checkAccess = (item, dur) => {
    if (stats.isPremium) return true;
    if (!item.free) return false;
    // Free users: only 2-min durations
    if (dur && dur > 2) return false;
    return true;
  };
  const isTechniqueFree = (tech) => stats.isPremium || FREE_TECHNIQUES.includes(tech);
  const isDurationFree = (durMin) => stats.isPremium || durMin <= 2;
  const isProgramDayFree = (progId, dayIdx) => stats.isPremium || (FREE_PROGRAM_DAYS[progId] || 0) > dayIdx;

  const bg = getDepthBackground(stats.totalDepth);

  // ===== CUSTOM PATTERN HELPERS =====
  function saveCustomPattern(pattern) {
    const newPattern = {
      id: Date.now().toString(),
      name: pattern.name || ('Custom ' + (customPatterns.length + 1)),
      inhale: pattern.inhale,
      holdIn: pattern.holdIn,
      exhale: pattern.exhale,
      holdOut: pattern.holdOut,
      extraSip: pattern.extraSip,
      sessionMode: pattern.sessionMode,
      sessionLength: pattern.sessionLength,
      createdAt: new Date().toISOString(),
    };
    const updated = [...customPatterns, newPattern];
    setCustomPatterns(updated);
    localStorage.setItem('dive_custom_patterns', JSON.stringify(updated));
    return newPattern;
  }

  function customPatternToSegments(pattern) {
    const params = {};
    if (pattern.inhale > 0) params.inhale = pattern.inhale;
    if (pattern.extraSip) params.inhale2 = 1;
    if (pattern.holdIn > 0) params.holdIn = pattern.holdIn;
    if (pattern.exhale > 0) params.exhale = pattern.exhale;
    if (pattern.holdOut > 0) params.holdOut = pattern.holdOut;
    let duration;
    if (pattern.sessionMode === 'cycles') {
      const cycleLen = (pattern.inhale||0) + (pattern.extraSip?1:0) + (pattern.holdIn||0) + (pattern.exhale||0) + (pattern.holdOut||0);
      duration = cycleLen * (pattern.sessionLength || 5);
    } else {
      duration = (pattern.sessionLength || 3) * 60;
    }
    return [{ type: 'breathing', technique: 'custom', duration, params }];
  }

  function startBreathTest() {
    setShowRetestPrompt(false);
    setOnboardingPhase('cinematic'); // reset
    setScreen('breath_test');
  }

  function getAdaptedParams(technique, baseParams) {
    const level = getDifficultyLevel(stats?.bestHoldDepth || 0);
    if (!level) return baseParams;
    const t2 = level.timings;
    switch(technique) {
      case 'box': return { inhale: t2.box.i, holdIn: t2.box.hIn, exhale: t2.box.e, holdOut: t2.box.hOut };
      case 'physiological_sigh': return { inhale1: t2.sigh.i1, inhale2: t2.sigh.i2, exhale: t2.sigh.e };
      case 'diaphragmatic': return { inhale: t2.exhale.i, exhale: t2.exhale.e };
      default: return baseParams;
    }
  }



  // ===== AUTH GATE =====
  // Non-onboarded users bypass auth — go straight to cinematic
  // Auth shown as soft prompt AFTER onboarding
  if (!stats.onboarded) {
    // First-time: skip auth entirely, go to cinematic
    // (authUser may be null — that's fine for first_breath)
  } else if (authLoading) {
    return (<div style={{position:'fixed',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(180deg,#0e3d5c 0%,#020a10 100%)'}}>
      <p style={{fontFamily:"'DM Sans',sans-serif",fontWeight:200,fontSize:'24px',letterSpacing:'0.2em',color:'rgba(94,170,168,0.5)'}}>DIVE</p>
    </div>);
  } else if (!authUser) {
    return <AuthScreen onDemo={() => {
      localStorage.setItem('dive-anonymous-user', 'true');
      setAuthUser({ id: 'demo', isDemo: true });
    }} />;
  }

  // ===== FIRST BREATH SCREEN =====
  // New onboarding flow: cinematic → real session → completion (post-mood) → goal → soft auth → home
  const [onboardingPhase, setOnboardingPhase] = useState('cinematic'); // 'cinematic' | 'session' | 'goal' | 'soft_auth'
  const [onboardingPostMood, setOnboardingPostMood] = useState(null);
  const [onboardingGoal, setOnboardingGoal] = useState(null);
  const [softAuthEmail, setSoftAuthEmail] = useState('');
  const [softAuthLoading, setSoftAuthLoading] = useState(false);
  const [softAuthSent, setSoftAuthSent] = useState(false);

  if (screen === 'first_breath') {
    // Phase 1: Cinematic intro
    if (onboardingPhase === 'cinematic') {
      return <FirstBreathScreen palette={palette} accentRgb={accentRgb} t={t} ambientRef={ambientRef}
        onComplete={(signal) => {
          if (signal === 'cinematic_done' && !isReplayIntro) {
            // Start real 2-min cyclic sigh session
            setOnboardingPhase('session');
            setCurrentMood({pre: null, post: null});
            setMoodDelta(null);
            const segs = [{ type:'breathing', technique:'physiological_sigh', duration:120, params:{inhale1:2,inhale2:1,exhale:7} }];
            try { ph('onboarding_first_session_started', {}); } catch(e) {}
            actuallyStartSession(segs, {scenario:'first_session_real', category:'onboarding', isFirstSession:true});
          } else {
            // Replay intro or skip → go home
            setIsReplayIntro(false);
            setScreen('home'); setTab('home');
          }
        }} />;
    }

    // Phase 2: Goal selector (shown after completion post-mood)
    if (onboardingPhase === 'goal') {
      return (
        <div className="fixed inset-0 flex flex-col items-center justify-center px-8 screen-transition" style={{background:WORLDS.ocean.bgGradient}}>
          <Particles world="ocean" />
          <div className="text-center z-10">
            <div className="font-body mb-10" style={{fontSize:24, fontWeight:300, color:'rgba(220,225,235,0.95)', letterSpacing:'0.06em'}}>{t.whatBroughtYou}</div>
            <div className="flex flex-col gap-3 items-center">
              {[[t.stressRelief,'stress_relief'],[t.betterFocus,'better_focus'],[t.betterSleep,'better_sleep'],[t.moreEnergy,'more_energy']].map(([label,val]) => (
                <button key={val} className="glass px-8 py-3 font-body w-full max-w-xs"
                  style={{fontWeight:500, fontSize:16, color:palette.accent, border:`1px solid rgba(${accentRgb},0.25)`}}
                  onClick={() => { try{ph('onboarding_goal_selected',{goal:val});}catch(e){} setOnboardingGoal(val); setOnboardingPhase('soft_auth'); }}>
                  {label}
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // Phase 3: Soft auth (save progress)
    if (onboardingPhase === 'soft_auth') {
      const finishOnboarding = (method) => {
        try { ph(method === 'anonymous' ? 'onboarding_auth_skipped' : 'onboarding_auth_email', {}); } catch(e) {}
        if (method === 'anonymous') {
          localStorage.setItem('dive-anonymous-user', 'true');
          setAuthUser({ id: 'demo', isDemo: true });
        }
        setStats(s => ({...s,
          onboarded:true, introSeen:true, world:'ocean',
          firstFeeling: onboardingPostMood, userGoal: onboardingGoal,
        }));
        ph('onboarding_complete', { goal: onboardingGoal, method });
        setOnboardingPhase('cinematic');
        setSoftAuthEmail(''); setSoftAuthLoading(false); setSoftAuthSent(false);
        setScreen('home'); setTab('home');
      };
      return (
        <div className="fixed inset-0 flex flex-col items-center justify-center px-8 screen-transition" style={{background:WORLDS.ocean.bgGradient}}>
          <Particles world="ocean" />
          <div className="text-center z-10" style={{width:'100%', maxWidth:300}}>
            <div className="font-body mb-2" style={{fontSize:22, fontWeight:300, color:'rgba(220,225,235,0.95)', letterSpacing:'0.06em'}}>Save your progress</div>
            <div className="font-body mb-8" style={{fontSize:14, fontWeight:300, color:'rgba(220,225,235,0.35)'}}>Get your data back on any device</div>
            {softAuthSent ? (
              <div>
                <p className="font-body" style={{fontSize:16, color:'rgba(220,225,235,0.7)'}}>Check your email for a magic link</p>
                <button onClick={() => finishOnboarding('email')} className="font-body mt-6" style={{fontSize:14, color:'rgba(220,225,235,0.3)', background:'none', border:'none', cursor:'pointer'}}>Continue</button>
              </div>
            ) : (
              <div>
                <input type="email" value={softAuthEmail} onChange={e => setSoftAuthEmail(e.target.value)}
                  placeholder="Email address" style={{width:'100%',padding:'14px 16px',borderRadius:12,background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.06)',color:'rgba(220,225,235,0.85)',fontFamily:"'DM Sans',sans-serif",fontSize:17,outline:'none',marginBottom:12,boxSizing:'border-box'}} />
                <button disabled={softAuthLoading || !softAuthEmail} onClick={async () => {
                  if (!softAuthEmail || !supabaseClient) return;
                  setSoftAuthLoading(true);
                  const { error } = await supabaseClient.auth.signInWithOtp({ email: softAuthEmail, options: { emailRedirectTo: window.location.origin } });
                  setSoftAuthLoading(false);
                  if (!error) setSoftAuthSent(true);
                }} style={{width:'100%',padding:'14px',borderRadius:12,background:'rgba(94,170,168,0.10)',border:'1px solid rgba(94,170,168,0.22)',color:'rgba(94,170,168,0.9)',fontFamily:"'DM Sans',sans-serif",fontSize:17,cursor:'pointer',opacity:softAuthLoading||!softAuthEmail?0.4:1}}>
                  {softAuthLoading ? 'Sending...' : 'Save with email'}
                </button>
                <button onClick={() => finishOnboarding('anonymous')} className="font-body" style={{marginTop:20,fontSize:15,color:'rgba(220,225,235,0.3)',background:'none',border:'none',cursor:'pointer',display:'block',width:'100%'}}>
                  Skip for now
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }
  }


  // Program day intro
  if (pendingProgramDay) {
    const {programId, day, segs, intro} = pendingProgramDay;
    return (
      <div className="fixed inset-0 flex flex-col items-center justify-center px-8 screen-transition" style={{background:WORLDS.ocean.bgGradient}}>
        <Particles world="ocean" />
        <div className="text-center z-10" style={{maxWidth:320}}>
          <div className="font-body mb-3" style={{fontSize:20, fontWeight:300, color:'rgba(220,225,235,0.95)', letterSpacing:'0.04em'}}>{intro.title}</div>
          <div className="font-body mb-10" style={{fontSize:15, fontWeight:300, color:'rgba(220,225,235,0.5)', lineHeight:1.7}}>{intro.text}</div>
          <button className="px-10 py-3 rounded-full font-body" onClick={() => {
            setPendingProgramDay(null);
            startSession(segs, {programId, day, category:'program'});
          }} style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}>
            Begin
          </button>
          <button className="font-body block mx-auto mt-4" onClick={() => setPendingProgramDay(null)}
            style={{fontSize:14, color:'rgba(220,225,235,0.3)', background:'none', border:'none', cursor:'pointer'}}>Back</button>
        </div>
      </div>
    );
  }

  // Pre-mood overlay
  if (showPreMood && pendingSessionData) {
    return (
      <div className="fixed inset-0 flex flex-col items-center justify-center pre-mood-fade" style={{background:bg, zIndex:50, transition:'opacity 0.3s ease'}}>
        <Particles world={world} />
        <div className="z-10 text-center">
          <p className="font-body" style={{fontWeight:300, fontSize:20, color:'var(--text)', marginBottom:32}}>How are you feeling?</p>
          <div style={{display:'flex', gap:16, justifyContent:'center'}}>
            {[1,2,3,4,5].map(n => (
              <button key={n} onClick={() => {
                if (preMoodTimerRef.current) clearTimeout(preMoodTimerRef.current);
                setCurrentMood(m => ({...m, pre:n}));
                dismissPreMood();
                actuallyStartSession(pendingSessionData.segments, pendingSessionData.meta);
                setPendingSessionData(null);
              }} style={{
                width:48, height:48, borderRadius:'50%',
                border:'1px solid rgba(255,255,255,0.08)', background:'transparent',
                fontFamily:"'JetBrains Mono',monospace", fontWeight:300, fontSize:18,
                color:'var(--text-2)', display:'flex', alignItems:'center', justifyContent:'center',
                cursor:'pointer',
              }}>{n}</button>
            ))}
          </div>
          <div style={{display:'flex', justifyContent:'space-between', width:280, margin:'12px auto 0'}}>
            <span style={{fontSize:13, color:'var(--text-3)'}}>calm</span>
            <span style={{fontSize:13, color:'var(--text-3)'}}>stressed</span>
          </div>
          <button onClick={() => {
            if (preMoodTimerRef.current) clearTimeout(preMoodTimerRef.current);
            setShowPreMood(false);
            actuallyStartSession(pendingSessionData.segments, pendingSessionData.meta);
            setPendingSessionData(null);
          }} style={{marginTop:32, fontSize:15, color:'var(--text-3)', background:'none', border:'none', cursor:'pointer'}}>Skip</button>
        </div>
      </div>
    );
  }

  // Active session
  if (activeSession) {
    return <SessionPlayer segments={activeSession.segments} world={world} onComplete={(actualData) => endSession(true, actualData)} onExit={() => endSession(false)} t={t} voiceEnabled={stats.voiceEnabled} ambientRef={ambientRef} currentLang={currentLang} />;
  }

  // Surfacing transition
  if (showSurfacing) {
    return (
      <div className="fixed inset-0 flex items-center justify-center" style={{background:'linear-gradient(180deg, #0e3d5c 0%, #082a42 100%)'}}>
        <Particles world={world} />
        <div className="z-10 text-center">
          <div className="font-body" style={{fontSize:18, fontWeight:200, color:'rgba(220,225,235,1)', opacity:0.25, letterSpacing:'0.15em', animation:'surfaceUp 2.2s ease-out forwards'}}>Surfacing</div>
        </div>
      </div>
    );
  }

  // Completion — inline overlay (no page change)
  if (showCompletion && completionData) {
    const earnedBadges = BADGES.filter(b => b.condition(stats));
    const scienceFact = SCIENCE_FACTS[Math.floor(((stats.totalSessions || 0) * 7 + Date.now() % 10000) % SCIENCE_FACTS.length)];
    const isSOS = lastSessionWasSOS;
    const isFirstOnboarding = completionData._isFirstSession;
    const closeCompletion = () => {
      // Fade out completion overlay
      const el = document.querySelector('.completion-fade-target');
      if (el) { el.style.opacity = '0'; el.style.transition = 'opacity 0.4s ease'; }
      setTimeout(() => {
        setShowCompletion(false); setCompletionData(null); setCompletionStep('stats');
        setCompletionFeeling(null); setMoodDelta(null); setLastSessionWasSOS(false); setSosCascadeLevel(0); setSosPartialMsg(false);
        setStats(s => ({...s, _masteryLevelUp: null}));
        if (isFirstOnboarding) { setOnboardingPhase('goal'); }
      }, 400);
    };
    // SOS cascade technique progression: cyclic_sigh → box → extended_exhale
    const SOS_CASCADE_TECHNIQUES = [
      null, // level 0 = initial (cyclic_sigh 90s, already played)
      { technique:'box', duration:120, params:{inhale:4,holdIn:4,exhale:4,holdOut:4} },
      { technique:'diaphragmatic', duration:120, params:{inhale:4,exhale:8} }, // extended exhale style
    ];
    const recordSOSOutcome = (outcome) => {
      try { ph('sos_outcome', { outcome, cascade_level: sosCascadeLevel }); } catch(e) {}
      setStats(s => {
        const hist = [...s.history];
        if (hist.length > 0) { hist[hist.length-1] = {...hist[hist.length-1], sosOutcome: outcome, sosCascadeLevel, sessionType:'sos'}; }
        return {...s, history: hist};
      });
      if (outcome === 'resolved') {
        closeCompletion();
      } else if (outcome === 'partial') {
        setSosPartialMsg(true);
        setTimeout(() => { setSosPartialMsg(false); closeCompletion(); }, 2000);
      } else if (outcome === 'stressed') {
        const nextLevel = sosCascadeLevel + 1;
        if (nextLevel > 2) {
          // After 3rd "Still stressed" → show PostCascadeScreen
          try { ph('sos_post_cascade_shown', {}); } catch(e) {}
          setCompletionStep('post_cascade');
          return;
        }
        setSosCascadeLevel(nextLevel);
        setShowCompletion(false); setCompletionData(null); setCompletionStep('stats');
        const cascade = SOS_CASCADE_TECHNIQUES[nextLevel];
        const segs = [{ type:'breathing', technique: cascade.technique, duration: cascade.duration, params: cascade.params }];
        actuallyStartSession(segs, {scenario:'stress_sos', category:'stress', isSOSSession:true});
      }
    };
    return (
      <div className="fixed inset-0 completion-fade-target" style={{background:'linear-gradient(180deg, #0a1520 0%, #060c16 50%, #040810 100%)', animation:'surfaceBgLighten 1.5s ease-out forwards', transition:'opacity 0.4s ease'}}>
        <Particles world={world} />
        <div style={{position:'fixed',inset:0,zIndex:30,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16,padding:24,animation:'completionFadeIn 800ms ease-out'}}>
          {/* Checkmark */}
          <div style={{width:32,height:32,borderRadius:'50%',border:'1.5px solid rgba(94,170,168,0.4)',display:'flex',alignItems:'center',justifyContent:'center',animation:'checkPop 500ms ease-out 200ms both'}}>
            <Icon name="check" size={16} style={{color:palette.accent, opacity:0.7}}/>
          </div>
          {/* Title */}
          <div className="font-body" style={{fontSize:20,fontWeight:300,color:'rgba(220,225,235,0.95)',animation:'fade-in 600ms 300ms both'}}>{t.diveComplete}</div>
          {/* Stats, badges, science — hidden on first onboarding session */}
          {!isFirstOnboarding && (
            <>
            <div style={{borderTop:'1px solid rgba(255,255,255,0.08)',borderBottom:'1px solid rgba(255,255,255,0.08)',padding:'16px 0',margin:'8px 0',width:'100%',maxWidth:300}}>
              <div style={{display:'flex',justifyContent:'center',gap:24}}>
                {[[Math.round(completionData.duration/60)+'',t.duration||'duration'],[''+(completionData.breathCycles||Math.round(completionData.duration/16)),t.breathCycles||'cycles'],[formatDepth(completionData.depth),WORLDS[world].depthUnit]].map(([val,label],i) => (
                  <div key={i} style={{textAlign:'center',animation:`count-up 600ms ${i*150}ms ease-out both`}}>
                    <div className="font-mono" style={{fontSize:22,fontWeight:300,color:palette.accent}}>{val}</div>
                    <div className="font-body" style={{fontSize:11,fontWeight:300,color:'rgba(220,225,235,0.35)',marginTop:4,letterSpacing:'0.05em',textTransform:'lowercase'}}>{label}</div>
                  </div>
                ))}
              </div>
            </div>
            {earnedBadges.length > 0 && (
              <div className="flex gap-2 justify-center flex-wrap">
                {earnedBadges.slice(-3).map((b) => (
                  <div key={b.id} className="glass px-3 py-1.5 flex items-center gap-2">
                    <span style={{color:palette.accent,opacity:0.6}}><Icon name="check" size={12}/></span>
                    <span className="font-body" style={{fontSize:11,fontWeight:500,color:'rgba(220,225,235,0.85)'}}>{BADGE_NAMES[b.id]}</span>
                  </div>
                ))}
              </div>
            )}
            <div style={{borderTop:'1px solid rgba(255,255,255,0.08)',paddingTop:12,marginTop:4,maxWidth:280,textAlign:'center'}}>
              <div className="font-body" style={{fontSize:13,fontWeight:300,color:'rgba(220,225,235,0.45)',lineHeight:1.7}}>{scienceFact}</div>
            </div>
            <div style={{borderTop:'1px solid rgba(255,255,255,0.08)',width:'100%',maxWidth:300,marginTop:4}} />
            </>
          )}

          {/* SOS flow: 3-option response */}
          {isSOS && completionStep === 'stats' && !sosPartialMsg && (
            <div className="screen-transition" style={{textAlign:'center'}}>
              <div className="font-body" style={{fontSize:17,fontWeight:300,color:'rgba(220,225,235,0.7)',marginBottom:16}}>How's the surface?</div>
              <div style={{display:'flex',flexDirection:'column',gap:10,alignItems:'center',maxWidth:260}}>
                <button className="w-full py-3 rounded-xl font-body"
                  style={{fontWeight:500,background:`rgba(${accentRgb},0.12)`,border:`1px solid rgba(${accentRgb},0.25)`,color:palette.accent,fontSize:15}}
                  onClick={() => recordSOSOutcome('resolved')}>Much better</button>
                <button className="w-full py-3 rounded-xl font-body"
                  style={{fontWeight:400,background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.08)',color:'rgba(220,225,235,0.55)',fontSize:15}}
                  onClick={() => recordSOSOutcome('partial')}>A little better</button>
                <button className="w-full py-3 rounded-xl font-body"
                  style={{fontWeight:400,background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.06)',color:'rgba(220,225,235,0.35)',fontSize:14}}
                  onClick={() => recordSOSOutcome('stressed')}>Still stressed</button>
              </div>
            </div>
          )}
          {/* SOS partial message */}
          {isSOS && sosPartialMsg && (
            <div className="screen-transition" style={{textAlign:'center'}}>
              <div className="font-body" style={{fontSize:17,fontWeight:300,color:'rgba(220,225,235,0.65)',lineHeight:1.6}}>That's progress. Come back anytime.</div>
            </div>
          )}
          {/* SOS PostCascadeScreen — after 3rd "Still stressed" */}
          {isSOS && completionStep === 'post_cascade' && (
            <div className="screen-transition" style={{textAlign:'center',maxWidth:300}}>
              <div className="font-body" style={{fontSize:18,fontWeight:300,color:'rgba(220,225,235,0.8)',marginBottom:24,lineHeight:1.6}}>Sometimes stress needs more than breathing.</div>
              <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:24}}>
                {['Walk outside \u2014 10 min','Call someone you trust','Write down what\'s bothering you'].map(s => (
                  <div key={s} className="glass" style={{padding:'14px 16px',borderRadius:12,fontSize:14,color:'rgba(220,225,235,0.6)',fontFamily:"'DM Sans',sans-serif",textAlign:'left'}}>
                    {s}
                  </div>
                ))}
              </div>
              <button className="px-8 py-3 rounded-full font-body"
                style={{fontWeight:500,background:`rgba(${accentRgb},0.12)`,border:`1px solid rgba(${accentRgb},0.25)`,color:palette.accent}}
                onClick={closeCompletion}>Back to Home</button>
            </div>
          )}

          {/* Regular sessions: post-mood 1-5 */}
          {!isSOS && completionStep === 'stats' && !moodDelta && (
            <div className="screen-transition">
              <MoodScale label={t.andNow || 'And now?'} lowLabel={t.moodLow} highLabel={t.moodHigh} onSelect={(n) => {
                setCurrentMood(m => ({...m, post:n}));
                const pre = currentMood.pre;
                if (pre !== null && n !== null) {
                  const delta = pre - n;
                  if (delta > 0) setMoodDelta(`Dropped ${delta} point${delta > 1 ? 's' : ''}`);
                  else if (delta === 0) setMoodDelta('Consistency builds resilience');
                  else setMoodDelta('Some sessions plant seeds for later');
                }
                setStats(s => {
                  const hist = [...s.history];
                  if (hist.length > 0) { hist[hist.length-1] = {...hist[hist.length-1], preMood: pre, postMood: n}; }
                  return {...s, history: hist, lastFeeling: n};
                });
                if (isFirstOnboarding) setOnboardingPostMood(n);
                setTimeout(() => {
                  if (isFirstOnboarding) { setCompletionStep('done'); return; }
                  if (completionData && isIntensiveSession(completionData.segments)) setCompletionStep('safety');
                  else setCompletionStep('done');
                }, pre !== null ? 2000 : 600);
              }} />
            </div>
          )}
          {/* Mood delta */}
          {!isSOS && moodDelta && currentMood.pre !== null && (
            <div className="screen-transition">
              <div className="font-mono" style={{fontSize:22,fontWeight:300,color:'rgba(220,225,235,0.8)',textAlign:'center',marginBottom:4}}>
                {currentMood.pre} \u2192 {currentMood.post}
              </div>
              <div className="font-body" style={{fontSize:15,fontWeight:300,color:'rgba(220,225,235,0.45)',textAlign:'center'}}>{moodDelta}</div>
            </div>
          )}

          {/* Mastery level-up toast */}
          {stats._masteryLevelUp && (
            <div className="screen-transition" style={{textAlign:'center',marginTop:4}}>
              <div className="font-body" style={{fontSize:14,fontWeight:400,color:palette.accent,opacity:0.8}}>
                {'★'.repeat((MASTERY_LEVELS.find(l=>l.name===stats._masteryLevelUp.newLevel)||{stars:1}).stars)} {MASTERY_DISPLAY[stats._masteryLevelUp.newLevel]||stats._masteryLevelUp.newLevel} in {TECHNIQUE_DISPLAY[stats._masteryLevelUp.technique]||stats._masteryLevelUp.technique}
              </div>
            </div>
          )}

          {/* Safety check */}
          {completionStep === 'safety' && (
            <div className="screen-transition">
              <div className="font-body mb-5" style={{fontSize:16,fontWeight:300,color:'rgba(220,225,235,0.8)',textAlign:'center'}}>{t.safetyQuestion}</div>
              <div className="flex gap-3 justify-center">
                <button className="glass px-6 py-2.5 font-body" style={{fontSize:16,fontWeight:500,color:'rgba(252,129,129,0.8)',border:'1px solid rgba(252,129,129,0.25)'}}
                  onClick={() => { setStats(s => ({...s, safetyFlag:{date:new Date().toISOString()}})); setCompletionStep('safety_msg'); }}>{t.safetyYes}</button>
                <button className="glass px-6 py-2.5 font-body" style={{fontSize:16,fontWeight:500,color:palette.accent,border:`1px solid rgba(${accentRgb},0.25)`}}
                  onClick={() => setCompletionStep('done')}>{t.safetyNo}</button>
              </div>
            </div>
          )}
          {completionStep === 'safety_msg' && (
            <div className="screen-transition">
              <div className="font-body mb-3" style={{fontSize:17,fontWeight:300,color:'rgba(220,225,235,0.65)',lineHeight:1.7,textAlign:'center',maxWidth:300,margin:'0 auto'}}>{t.safetyMessage}</div>
              <button className="px-8 py-3 rounded-full font-body mx-auto block"
                style={{fontWeight:500,background:`rgba(${accentRgb},0.12)`,border:`1px solid rgba(${accentRgb},0.25)`,color:palette.accent}}
                onClick={() => { if (stats.totalSessions<=1 && !stats.reminderTime) setCompletionStep('reminder'); else setCompletionStep('done'); }}>{t.continueText}</button>
            </div>
          )}
          {/* Reminder */}
          {completionStep === 'reminder' && (
            <div className="screen-transition">
              <div className="font-body mb-4" style={{fontSize:16,fontWeight:300,color:'rgba(220,225,235,0.8)',textAlign:'center'}}>{t.buildHabit || t.setReminder}</div>
              <div className="flex gap-3 justify-center">
                {[[t.habitMorning||t.reminderMorning,'morning'],[t.habitEvening||t.reminderEvening,'evening'],[t.habitNotNow||t.reminderNotNow,null]].map(([label,val]) => (
                  <button key={label} className="glass px-5 py-2.5 font-body"
                    style={{fontSize:15,fontWeight:500,color:val?palette.accent:'rgba(220,225,235,0.5)',border:val?`1px solid rgba(${accentRgb},0.25)`:'1px solid rgba(255,255,255,0.06)'}}
                    onClick={() => { setStats(s => ({...s, reminderTime:val})); setCompletionStep('done'); }}>{label}</button>
                ))}
              </div>
            </div>
          )}
          {/* Day 3 proactive paywall prompt */}
          {completionStep === 'done' && stats.showDay3Paywall && !stats.paywallShownAfterDay3 && (
            <div className="screen-transition" style={{textAlign:'center', marginBottom:16}}>
              <div className="font-body" style={{fontSize:16, fontWeight:300, color:'rgba(220,225,235,0.8)', marginBottom:4}}>You've learned 3 techniques in 3 days.</div>
              <div className="font-body" style={{fontSize:14, fontWeight:300, color:'rgba(220,225,235,0.5)', marginBottom:12}}>Ready for the full experience?</div>
              <button className="px-6 py-2.5 rounded-full font-body mb-3"
                style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}
                onClick={() => { setStats(s => ({...s, paywallShownAfterDay3:true, showDay3Paywall:false})); setShowPaywall(true); }}>See what's next</button>
              <button className="font-body block mx-auto"
                style={{fontSize:13, color:'rgba(220,225,235,0.3)', background:'none', border:'none', cursor:'pointer'}}
                onClick={() => setStats(s => ({...s, paywallShownAfterDay3:true, showDay3Paywall:false}))}>Not now</button>
            </div>
          )}
          {/* Final: New dive / Continue */}
          {completionStep === 'done' && (
            <div className="screen-transition" style={{textAlign:'center'}}>
              <button className="px-8 py-3 rounded-full font-body"
                style={{fontWeight:500,background:`rgba(${accentRgb},0.12)`,border:`1px solid rgba(${accentRgb},0.25)`,color:palette.accent}}
                onClick={closeCompletion}>{isFirstOnboarding ? t.continueText || 'Continue' : t.newDive}</button>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ===== PAYWALL =====
  const PaywallModal = () => {
    const monthlyPrice = t.paywallMonthly || t.monthly;
    const yearlyPrice = t.paywallYearly || t.yearly;
    const yearlySave = t.paywallYearlySave || t.yearlySave;
    const trialNote = t.trialNotice || t.paywallTrialNote || '';
    const startTrialLabel = t.paywallStartTrial || t.startTrial;
    return (
    <div className="fixed inset-0 z-50 flex items-end justify-center" style={{background:'rgba(0,0,0,0.7)', backdropFilter:'blur(12px)', animation:'fade-in 300ms ease-out'}}>
      <div className="glass w-full max-w-sm mx-6 mb-8 p-6 screen-transition" style={{borderRadius:14}}>
        <div className="text-center mb-5">
          {stats.trialExpired && <div className="font-body mb-3" style={{fontSize:13, fontWeight:300, color:'rgba(252,180,100,0.7)', textAlign:'center'}}>Your free trial has ended. Subscribe to keep your full dive.</div>}
          <div className="font-body mb-2" style={{fontSize:24, fontWeight:300, color:'rgba(220,225,235,0.95)', letterSpacing:'0.08em'}} onClick={(() => { let c=0,t=0; return ()=>{ const n=Date.now(); if(n-t>3000)c=0; c++;t=n; if(c>=5){setStats(s=>({...s,isPremium:true}));setShowPaywall(false);} }; })()}>{t.unlockAll}</div>
        </div>
        <div className="space-y-2.5 mb-5">
          {(t.paywallFeatures||[]).map(f => (
            <div key={f} className="flex items-center gap-3 font-body" style={{fontSize:15, fontWeight:400, color:'rgba(220,225,235,0.75)'}}>
              <span style={{color:palette.accent}}><Icon name="check" size={14}/></span>{f}
            </div>
          ))}
        </div>
        <div style={{display:'flex', gap:12, marginBottom:16, padding:'0 2px', boxSizing:'border-box'}}>

    const sc = SCENARIOS[id];
    if (!sc) return;
    if (!checkAccess(sc)) { ph('paywall_shown', {}); setShowPaywall(true); return; }
    const d = dur || sc.durations[0];
    // Check 10min premium restriction
    // Free users: max 2-min sessions (except SOS which bypasses launchScenario)
    if (!stats.isPremium && d > 2) { ph('paywall_shown', { reason:'duration' }); setShowPaywall(true); return; }
    let segs = getSessionContent(t, world)[id]?.[d];
    // Fallback: if no segments for this duration, generate a generic session
    if (!segs || segs.length === 0) {
      const scenarioContent = getSessionContent(t, world)[id];
      const existingDurations = scenarioContent ? Object.keys(scenarioContent).map(Number) : [];
      if (existingDurations.length > 0) {
        // Use the closest existing duration's first breathing technique as base
        const closest = existingDurations.reduce((a, b) => Math.abs(b - d) < Math.abs(a - d) ? b : a);
        const baseSegs = scenarioContent[closest];
        const firstBreathing = baseSegs.find(s => s.type === 'breathing');
        if (firstBreathing) {
          const targetSec = d * 60;
          segs = [
            { type:'text', duration:8, text:t.sitDown, textKey:'sitDown' },
            { type:'breathing', technique:firstBreathing.technique, duration: Math.round(targetSec * 0.7), params:{...firstBreathing.params} },
            { type:'breathing', technique:'diaphragmatic', duration: Math.round(targetSec * 0.25), params:{inhale:4, exhale:8} },
            { type:'text', duration: Math.round(targetSec * 0.05) || 5, text:t.openEyes, textKey:'openEyes' },
          ];
        }
      }
    }
    if (segs) {
      // FIX3: skip leading text segments for users with 3+ sessions
      if (stats.totalSessions >= 3) {
        const firstBreathIdx = segs.findIndex(s => s.type === 'breathing');
        if (firstBreathIdx > 0) segs = segs.slice(firstBreathIdx);

            const prevCompleted = i === 0 || progress.includes(i - 1);
            // Cooldown: if previous day completed today, show "available tomorrow"
            const prevCompletedToday = i > 0 && progress.includes(i - 1) && lastCompletionDate === today && hoursSinceLast < 12;

        {/* 3. THIS WEEK MOOD CHART */}
        {hasMoodChart && (() => {

          const preLine = moodSessions.map((h,i) => `${padX + i * xStep},${yScale(h.preMood)}`).join(' ');
