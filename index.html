                    <div className="font-body" style={{fontSize:15, fontWeight:400, color:'rgba(220,225,235,0.75)'}}>{progNames[key] || key}</div>
                    <div className="font-mono" style={{fontSize:12, fontWeight:300, color:'var(--text-3)', marginTop:2}}>Day {completed} of {total}</div>
                  </div>
                  {completed >= total && (
                    <span className="font-body" style={{fontSize:11, color:palette.accent, opacity:0.7}}>Complete</span>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        {/* 6. DEPTH PROGRESS — breath tests */}
        {(stats.breathTests || []).length > 0 && (
          <div style={{marginBottom:24, borderTop:'1px solid rgba(255,255,255,0.03)', paddingTop:20}}>
            <div className="font-body mb-4" style={{fontSize:13, fontWeight:500, color:'rgba(220,225,235,0.28)', letterSpacing:'0.12em', textTransform:'uppercase'}}>Depth progress</div>
            <div className="space-y-2">
              {(stats.breathTests || []).slice(-6).map((bt, i) => {
                const maxDepth = Math.max(...(stats.breathTests || []).map(b => b.depth || 0), 1);
                const pct = ((bt.depth || 0) / maxDepth) * 100;
                return (
                  <div key={i} className="flex items-center gap-3">
                    <div className="font-body" style={{fontSize:12, color:'var(--text-3)', minWidth:50}}>{new Date(bt.date).toLocaleDateString('en', {month:'short', day:'numeric'})}</div>
                    <div style={{flex:1, height:6, borderRadius:3, background:'rgba(255,255,255,0.04)', overflow:'hidden'}}>
                      <div style={{width:pct+'%', height:'100%', borderRadius:3, background:`rgba(${accentRgb},0.5)`, transition:'width 600ms ease'}} />
                    </div>
                    <div className="font-mono" style={{fontSize:13, color:palette.accent, minWidth:36, textAlign:'right'}}>{formatDepth(bt.depth)}{WORLDS[world].depthUnit}</div>
                  </div>
                );
              })}
            </div>
            <button onClick={() => startBreathTest()} style={{
              width:'100%', padding:'11px', marginTop:12,
              borderRadius:12, border:'1px solid rgba(94,170,168,0.2)',
              background:'rgba(94,170,168,0.06)',
              color:'rgba(94,170,168,0.8)', fontSize:16, cursor:'pointer', fontFamily:"'DM Sans',sans-serif",
            }}>
              {stats.lastRetestDate ? 'Retest breath hold' : 'Take breath hold test'}
            </button>
          </div>
        )}

        {/* No breath tests yet — show CTA */}
        {(stats.breathTests || []).length === 0 && (
          <div style={{marginBottom:24, borderTop:'1px solid rgba(255,255,255,0.03)', paddingTop:20}}>
            <div className="font-body mb-4" style={{fontSize:13, fontWeight:500, color:'rgba(220,225,235,0.28)', letterSpacing:'0.12em', textTransform:'uppercase'}}>Depth progress</div>
            <button onClick={() => startBreathTest()} style={{
              width:'100%', padding:'11px',
              borderRadius:12, border:'1px solid rgba(94,170,168,0.2)',
              background:'rgba(94,170,168,0.06)',
              color:'rgba(94,170,168,0.8)', fontSize:16, cursor:'pointer', fontFamily:"'DM Sans',sans-serif",
            }}>
              Take breath hold test
            </button>
          </div>
        )}

        {/* 6. RECENT DIVES */}
        {stats.history.length > 0 && (
          <div style={{marginBottom:24, borderTop:'1px solid rgba(255,255,255,0.03)', paddingTop:20}}>
            <div className="font-body mb-4" style={{fontSize:13, fontWeight:500, color:'rgba(220,225,235,0.28)', letterSpacing:'0.12em', textTransform:'uppercase'}}>Recent dives</div>
            <div className="space-y-2">
              {stats.history.slice(-10).reverse().map((h, i) => (
                <div key={i} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 0', borderBottom:'1px solid rgba(255,255,255,0.02)'}}>
                  <div>
                    <div className="font-body" style={{fontSize:16, fontWeight:400, color:'rgba(220,225,235,0.8)'}}>{getScenarioDisplayName(h.scenario)}</div>
                    <div className="font-body" style={{fontSize:13, fontWeight:400, color:'var(--text-3)', marginTop:2}}>{new Date(h.date).toLocaleDateString('en', {month:'short', day:'numeric'})}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    {typeof h.preMood === 'number' && typeof h.postMood === 'number' && (
                      <div className="font-mono" style={{fontSize:13, fontWeight:300, color: h.postMood < h.preMood ? 'rgba(94,170,168,0.7)' : 'rgba(220,225,235,0.35)'}}>
                        {h.preMood} {'\u2192'} {h.postMood}
                      </div>
                    )}
                    {h.sosOutcome && (
                      <div className="font-body" style={{fontSize:12, fontWeight:400, color: (h.sosOutcome === 'resolved' || h.sosOutcome === 'partial' || h.sosOutcome === 'better') ? 'rgba(94,170,168,0.7)' : 'rgba(220,225,235,0.35)'}}>
                        {h.sosOutcome === 'resolved' ? 'Much better' : h.sosOutcome === 'partial' ? 'A little better' : h.sosOutcome === 'better' ? 'Better' : 'Cascaded'}
                      </div>
                    )}
                    <div className="font-mono" style={{fontSize:11, fontWeight:300, color:'var(--text-3)'}}>
                      {Math.round((h.duration || 0)/60)}min{h.depth > 0 ? ` · ${formatDepth(h.depth)}m` : ''}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* 7. SETTINGS */}
        <div style={{marginBottom:24, borderTop:'1px solid rgba(255,255,255,0.03)', paddingTop:20}}>
          <div className="font-body mb-4" style={{fontSize:13, fontWeight:500, color:'rgba(220,225,235,0.28)', letterSpacing:'0.12em', textTransform:'uppercase'}}>{t.settings}</div>
          <div className="glass p-5 space-y-4">
            {[
              [t.ambientSound, 'soundEnabled'],
              [t.vibration, 'vibrateEnabled'],
            ].map(([label, key]) => (
              <div key={key} className="flex items-center justify-between">
                <span className="font-body" style={{fontSize:16, fontWeight:400, color:'rgba(220,225,235,0.75)'}}>{label}</span>
                <button className="relative rounded-full" style={{width:44, height:24, background: stats[key] ? `rgba(${accentRgb},0.25)` : 'rgba(255,255,255,0.1)', border:'1px solid rgba(255,255,255,0.06)', transition:'all 200ms ease'}}
                  onClick={() => setStats(s => ({...s, [key]:!s[key]}))}>
                  <div className="absolute rounded-full transition-all" style={{top:3, width:16, height:16, background: stats[key] ? palette.accent : 'rgba(255,255,255,0.3)', left: stats[key] ? 'calc(100% - 20px)' : '4px'}} />
                </button>
              </div>
            ))}
            {/* Voice narration toggle */}
            <div className="flex items-center justify-between">
              <span className="font-body" style={{fontSize:16, fontWeight:400, color:'rgba(220,225,235,0.75)'}}>{t.voiceNarration}</span>
              <button className="relative rounded-full" style={{width:44, height:24, background: stats.voiceEnabled ? `rgba(${accentRgb},0.25)` : 'rgba(255,255,255,0.1)', border:'1px solid rgba(255,255,255,0.06)', transition:'all 200ms ease'}}
                onClick={() => setStats(s => ({...s, voiceEnabled:!s.voiceEnabled}))}>
                <div className="absolute rounded-full transition-all" style={{top:3, width:16, height:16, background: stats.voiceEnabled ? palette.accent : 'rgba(255,255,255,0.3)', left: stats.voiceEnabled ? 'calc(100% - 20px)' : '4px'}} />
              </button>
            </div>
          </div>

          {/* Daily reminder settings */}
          {stats.reminderTime && stats.reminderTime !== 'dismissed' && (
            <div className="glass p-5 mt-3 space-y-3">
              <div className="flex items-center justify-between">
                <span className="font-body" style={{fontSize:16, fontWeight:400, color:'rgba(220,225,235,0.75)'}}>Daily reminder</span>
                <button className="relative rounded-full" style={{width:44, height:24, background:`rgba(${accentRgb},0.25)`, border:'1px solid rgba(255,255,255,0.06)', transition:'all 200ms ease'}}
                  onClick={() => setStats(s => ({...s, reminderTime: null}))}>
                  <div className="absolute rounded-full transition-all" style={{top:3, width:16, height:16, background:palette.accent, left:'calc(100% - 20px)'}} />
                </button>
              </div>
              <div className="flex gap-2">
                {[['Morning (9 AM)','morning'],['Evening (8 PM)','evening']].map(([label,val]) => (
                  <button key={val} onClick={() => setStats(s => ({...s, reminderTime: val}))}
                    style={{flex:1, padding:'8px', borderRadius:8, fontSize:13,
                      background: stats.reminderTime === val ? `rgba(${accentRgb},0.15)` : 'rgba(255,255,255,0.03)',
                      border: stats.reminderTime === val ? `1px solid rgba(${accentRgb},0.3)` : '1px solid rgba(255,255,255,0.06)',
                      color: stats.reminderTime === val ? palette.accent : 'rgba(220,225,235,0.4)', cursor:'pointer'}}>
                    {label}
                  </button>
                ))}
              </div>
              {stats.notificationsGranted && <div className="font-body" style={{fontSize:11, color:'rgba(94,170,168,0.5)'}}>Browser notifications active</div>}
            </div>
          )}

          {/* Replay intro + Reset */}
          <button className="w-full py-3 font-body rounded-full mb-3" style={{fontSize:15, fontWeight:400, color:'var(--text-2)', border:'1px solid rgba(255,255,255,0.07)', marginTop:16}}
            onClick={() => { setIsReplayIntro(true); setScreen('first_breath'); }}>
            Replay intro
          </button>
          <button className="w-full py-3 font-body rounded-full" style={{fontSize:15, fontWeight:400, color:'rgba(252,129,129,0.6)', border:'1px solid rgba(252,129,129,0.15)'}}
            onClick={() => setShowResetConfirm(true)}>
            {t.resetProgress}
          </button>
          {authUser && !isDemo(authUser) && (
            <button className="w-full py-3 font-body rounded-full" style={{fontSize:15, fontWeight:400, color:'var(--text-3)', border:'1px solid rgba(255,255,255,0.05)', marginTop:12}}
              onClick={async () => { if (supabaseClient) await supabaseClient.auth.signOut(); setAuthUser(null); }}>
              Sign out
            </button>
          )}
          {isDemo(authUser) && (
            <button className="w-full py-3 font-body rounded-full" style={{fontSize:15, fontWeight:400, color:'rgba(94,170,168,0.6)', border:'1px solid rgba(94,170,168,0.15)', marginTop:12}}
              onClick={() => setAuthUser(null)}>
              Create account to sync data
            </button>
          )}
          {showResetConfirm && (
            <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,padding:'24px'}}>
              <div style={{background:'rgba(12,22,40,0.98)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:'14px',padding:'24px',maxWidth:'320px',width:'100%'}}>
                <p style={{fontSize:'16px',fontWeight:400,color:'rgba(220,225,235,0.88)',marginBottom:'8px'}}>Reset all progress?</p>
                <p style={{fontSize:'15px',color:'rgba(220,225,235,0.45)',marginBottom:'24px',lineHeight:1.5}}>Depth, streak, sessions, and settings will be permanently deleted.</p>
                <div style={{display:'flex',gap:'12px'}}>
                  <button onClick={() => setShowResetConfirm(false)} style={{flex:1,padding:'10px',borderRadius:'10px',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',color:'rgba(220,225,235,0.7)',fontSize:'14px',cursor:'pointer'}}>Cancel</button>
                  <button onClick={() => { setShowResetConfirm(false); clearDiveData(); setStats(defaultStats()); setAuthUser(null); setScreen('first_breath'); }} style={{flex:1,padding:'10px',borderRadius:'10px',background:'rgba(180,60,60,0.12)',border:'1px solid rgba(180,60,60,0.25)',color:'rgba(220,130,130,0.85)',fontSize:'14px',cursor:'pointer'}}>Delete everything</button>
                </div>
              </div>
            </div>
          )}
        </div>

        {/* Medical disclaimer */}
        <div style={{marginTop:8, paddingTop:16, borderTop:'1px solid rgba(255,255,255,0.03)', fontSize:13, color:'rgba(220,225,235,0.20)', lineHeight:1.6}}>
          DIVE is a breathing exercise tool, not a medical device. Consult your doctor before starting any breathing practice, especially if you have cardiovascular or respiratory conditions. Based on peer-reviewed research including Balban et al. (Stanford, 2023).
        </div>
      </div>
    );
  };


  const renderScreen = () => {
    // Breath hold test (standalone, for retest and Discovery card)
    if (screen === 'breath_test') return (
      <FirstBreathScreen palette={palette} accentRgb={accentRgb} t={t} ambientRef={ambientRef}
        startAtPhase="holdTest"
        onComplete={(goal, holdTimeResult) => {
          if (holdTimeResult && holdTimeResult > 0) {
            const hDepthForTracking = holdTimeToDepth(holdTimeResult);
            try { ph('breath_test_completed', { depth: hDepthForTracking, hold_time: Math.round(holdTimeResult*10)/10 }); } catch(e) {}
            setStats(s => {
              const hDepth = holdTimeToDepth(holdTimeResult);
              const newState = {...s};
              newState.breathTests = [...(s.breathTests || []), { date: new Date().toISOString(), holdTime: Math.round(holdTimeResult*10)/10, depth: hDepth }];
              try { const tests = JSON.parse(localStorage.getItem('dive-breath-tests') || '[]'); tests.push({ date: new Date().toISOString(), holdTime: Math.round(holdTimeResult*10)/10, depth: hDepth }); localStorage.setItem('dive-breath-tests', JSON.stringify(tests)); } catch(e) {}
              const newBestDepth = Math.max(s.bestHoldDepth || 0, hDepth || 0);
              const newLevel = getDifficultyLevel(newBestDepth);
              const currentLevelIdx = DIFFICULTY_LEVELS.findIndex(l => l.id === (s.difficultyLevel || 'beginner'));
              const newLevelIdx = DIFFICULTY_LEVELS.findIndex(l => l.id === newLevel.id);
              newState.bestHoldDepth = newBestDepth;
              newState.difficultyLevel = newLevelIdx > currentLevelIdx ? newLevel.id : (s.difficultyLevel || 'beginner');
              newState.totalDepth = Math.round((s.totalDepth + hDepth) * 10) / 10;
              const allTests = [...(s.breathTests || []), { holdTime: Math.round(holdTimeResult*10)/10 }];
              const newAdaptiveLevel = determineLevel(allTests);
              if (LEVELS[newAdaptiveLevel].id > LEVELS[s.level || 'basic'].id) newState.level = newAdaptiveLevel;
              newState.lastRetestDate = new Date().toISOString();
              return newState;
            });
          }
          setScreen('home'); setTab('home');
        }} />
    );
    if (screen === 'custom-pattern') return (
      <CustomPatternScreen
        onBack={() => setScreen('home')}
        onSave={(cp) => saveCustomPattern(cp)}
        onStart={(cp) => {
          const segs = customPatternToSegments(cp);
          setScreen('home');
          startSession(segs, {scenario:'custom', category:'custom'});
        }}
      />
    );
    if (screen === 'category') return renderCategory();

    if (screen === 'breathe-choice') return (
      <div style={{position:'fixed',inset:0,background:'linear-gradient(180deg,#0e3d5c 0%,#020a10 100%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',zIndex:50,padding:'24px'}}>
        <p style={{fontSize:'20px',fontWeight:300,color:'rgba(220,225,235,0.7)',marginBottom:'32px'}}>What do you need?</p>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',width:'100%',maxWidth:'320px'}}>
          {[
            {label:'Calm down', sub:'Cyclic sigh \u00b7 3 min', technique:'physiological_sigh', duration:180, methodLabel:'Stanford protocol'},
            {label:'Get focused', sub:'Box breathing \u00b7 3 min', technique:'box', duration:180, methodLabel:'Military performance'},
            {label:'Energy boost', sub:'Segmented \u00b7 3 min', technique:'segmented', duration:180, methodLabel:'Pranayama'},
            {label:'Just breathe', sub:'Extended exhale \u00b7 3 min', technique:'diaphragmatic', duration:180, methodLabel:'Vagal stimulation'},
          ].map(opt => {
            const locked = !isTechniqueFree(opt.technique);
            return (
            <button key={opt.label} onClick={() => { if (locked) { setShowPaywall(true); return; } setScreen('home'); startBreatheNowChoice(opt); }} style={{padding:'20px 16px',borderRadius:'14px',background:'rgba(255,255,255,0.025)',border:'1px solid rgba(255,255,255,0.06)',cursor:'pointer',textAlign:'left',position:'relative',opacity:locked?0.6:1}}>
              <div style={{fontSize:'17px',fontWeight:400,color:'rgba(220,225,235,0.8)'}}>{opt.label}</div>
              <div style={{fontSize:'13px',fontWeight:300,color:'rgba(220,225,235,0.35)',marginTop:4}}>{opt.sub}</div>
              <div style={{display:'flex',alignItems:'center',marginTop:6}}>
                <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,fontWeight:400,color:'rgba(94,170,168,0.5)',letterSpacing:'0.03em'}}>{opt.methodLabel}</span>
                <InfoButton techniqueId={opt.technique} />
              </div>
              {locked && <div style={{position:'absolute',top:8,right:8,fontSize:10,color:'rgba(220,225,235,0.4)'}}>Premium</div>}
            </button>
            );
          })}
        </div>
        <button onClick={() => setScreen('home')} style={{marginTop:32,fontSize:15,color:'rgba(220,225,235,0.3)',background:'none',border:'none',cursor:'pointer'}}>Cancel</button>
      </div>
    );

    if (screen === 'program_view') return renderProgramView();
    switch (tab) {
      case 'home': return renderHome();
      case 'profile': return renderProfile();
      default: return renderHome();
    }
  };

  const showTabs = !['category','program_view','breathe-choice','custom-pattern','breath_test'].includes(screen);

  return (
    <div className="fixed inset-0" style={{background:bg}}>
      <div className="ocean-caustics" />
      <Particles world={world} />
      <div className="relative z-10 h-full screen-crossfade" key={screen + '-' + tab}>
        {renderScreen()}
      </div>

      {/* Tab bar */}
      {/* PWA install banner */}
      {showInstallBanner && showTabs && (
        <div style={{position:'fixed', bottom:'calc(60px + env(safe-area-inset-bottom, 0px))', left:12, right:12, zIndex:45,
          background:'rgba(14,61,92,0.95)', backdropFilter:'blur(16px)', borderRadius:14, padding:'14px 16px',
          border:'1px solid rgba(94,170,168,0.15)', display:'flex', alignItems:'center', gap:12}}>
          <div style={{flex:1}}>
            <div className="font-body" style={{fontSize:14, fontWeight:500, color:'rgba(220,225,235,0.85)'}}>Add DIVE to your home screen</div>
            <div className="font-body" style={{fontSize:12, fontWeight:300, color:'rgba(220,225,235,0.4)'}}>
              {/iPhone|iPad/.test(navigator.userAgent) && !window.navigator.standalone ? 'Tap Share then Add to Home Screen' : 'Quick access, works offline'}
            </div>
          </div>
          {!/iPhone|iPad/.test(navigator.userAgent) && window._diveInstallPrompt && (
            <button onClick={async () => {
              if (window._diveInstallPrompt) {
                window._diveInstallPrompt.prompt();
                const result = await window._diveInstallPrompt.userChoice;
                if (result.outcome === 'accepted') { setShowInstallBanner(false); ph('install_prompt_accepted', {}); }
                window._diveInstallPrompt = null;
              }
            }} style={{padding:'8px 16px', borderRadius:10, background:`rgba(${accentRgb},0.15)`, border:`1px solid rgba(${accentRgb},0.3)`, color:palette.accent, fontSize:13, fontWeight:500, cursor:'pointer', flexShrink:0}}>Install</button>
          )}
          <button onClick={() => { setShowInstallBanner(false); setStats(s => ({...s, installPromptDismissed:true})); }}
            style={{background:'none', border:'none', color:'rgba(220,225,235,0.3)', fontSize:16, cursor:'pointer', padding:'2px 6px', lineHeight:1, flexShrink:0}}>{'\u00D7'}</button>
        </div>
      )}

      {showTabs && (
        <div className="fixed bottom-0 left-0 right-0 z-40" style={{background:'rgba(7,12,21,0.72)', backdropFilter:'blur(24px) saturate(1.4)', WebkitBackdropFilter:'blur(24px) saturate(1.4)', borderTop:'1px solid rgba(255,255,255,0.04)'}}>
          <div className="flex justify-around" style={{paddingTop:12, paddingBottom:'env(safe-area-inset-bottom, 24px)'}}>
            {[
              {id:'home', svgIcon:'home', labelKey:'home'},
              {id:'profile', svgIcon:'profile', labelKey:'profile'},
            ].map(tb => (
              <button key={tb.id} className="flex flex-col items-center py-1 px-3" style={{gap:3}}
                onClick={() => { setTab(tb.id); if (['category','program_view'].includes(screen)) setScreen('home'); }}>
                <span style={{color: tab === tb.id ? palette.accent : 'var(--text-3)', transition:'color 200ms ease'}}><Icon name={tb.svgIcon} size={20}/></span>
                <span className="font-body" style={{fontSize:12, fontWeight:500, letterSpacing:'0.03em', color: tab === tb.id ? palette.accent : 'var(--text-3)', transition:'color 200ms ease'}}>{t[tb.labelKey]}</span>
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Surface breath overlay */}
      {showSurfaceBreath && (
        <div className="fixed inset-0 z-50 flex items-center justify-center" style={{background:'rgba(0,0,0,0.8)', backdropFilter:'blur(16px)'}}>
          <div className="screen-transition text-center z-10 px-8">
            <div className="font-body mb-3" style={{fontSize:20, fontWeight:300, color:'rgba(220,225,235,0.95)'}}>{t.missedYesterday}</div>
            <div className="font-body mb-6" style={{fontSize:16, fontWeight:400, color:palette.accent}}>
              {surfaceBreathStreak} {t.streakAtRisk || t.dayStreak}
            </div>
            <div className="font-body mb-8" style={{fontSize:16, fontWeight:400, color:'var(--text-2)', maxWidth:280, margin:'0 auto', lineHeight:1.6}}>
              {(t.surfaceBreathOffer || '').replace('{N}', surfaceBreathStreak)}
            </div>
            <div className="flex flex-col gap-3 items-center">
              <button className="px-8 py-3 rounded-full font-body w-full max-w-xs"
                style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}
                onClick={() => {
                  setShowSurfaceBreath(false);
                  setCurrentMood({pre: null, post: null});
                  setMoodDelta(null);
                  // Launch 60s cyclic sigh (6 cycles x 10s) — no pre-mood
                  const surfaceSegs = [
                    { type:'breathing', technique:'physiological_sigh', duration:60, params:{ inhale1:2, inhale2:1, exhale:7 } }
                  ];
                  actuallyStartSession(surfaceSegs, {scenario:'surface_breath', category:'recovery'});
                  // Preserve streak + 1
                  setStats(s => {
                    const newStreak = s.streak + 1;
                    return {...s, streak: newStreak, longestStreak: Math.max(s.longestStreak || 0, newStreak), lastSessionDate: new Date().toISOString().split('T')[0]};
                  });
                }}>
                {t.surfaceBreath1Min || t.surfaceBreathButton}
              </button>
              <button className="px-8 py-3 rounded-full font-body w-full max-w-xs"
                style={{fontWeight:400, fontSize:15, color:'var(--text-3)', border:'1px solid rgba(255,255,255,0.06)'}}
                onClick={() => {
                  setShowSurfaceBreath(false);
                  setStats(s => ({...s, streak: 1, lastSessionDate: new Date().toISOString().split('T')[0]}));
                }}>
                {t.letItGo}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Retest prompt overlay */}
      {showRetestPrompt && (() => {
        const prevTest = (stats.breathTests || []).slice(-1)[0];
        const prevDepth = prevTest ? prevTest.depth : null;
        return (
        <div className="fixed inset-0 z-50 flex items-center justify-center" style={{background:'rgba(0,0,0,0.8)', backdropFilter:'blur(16px)'}}>
          <div className="screen-transition text-center z-10 px-8">
            <div className="font-body mb-4" style={{fontSize:20, fontWeight:300, color:'rgba(220,225,235,0.95)'}}>Weekly Deep Dive</div>
            <div className="font-body mb-2" style={{fontSize:14, fontWeight:300, color:'rgba(220,225,235,0.45)'}}>Time to go deeper</div>
            <div className="font-body mb-4" style={{fontSize:16, fontWeight:400, color:'var(--text-2)', maxWidth:280, margin:'0 auto', lineHeight:1.6}}>
              {retestDays === 999 ? '' : retestDays + ' days since your last test.'}
            </div>
            {prevDepth != null && (
              <div className="font-body mb-6" style={{fontSize:15, fontWeight:300, color:palette.accent, opacity:0.7}}>
                Previous depth: {formatDepth(prevDepth)}m
              </div>
            )}
            <div className="flex flex-col gap-3 items-center">
              <button className="px-8 py-3 rounded-full font-body w-full max-w-xs"
                style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}
                onClick={() => startBreathTest()}>
                {t.retestNow}
              </button>
              <button className="px-8 py-3 rounded-full font-body w-full max-w-xs"
                style={{fontWeight:400, fontSize:15, color:'var(--text-3)', border:'1px solid rgba(255,255,255,0.06)'}}
                onClick={() => { setShowRetestPrompt(false); setStats(s => ({...s, lastRetestDismiss: new Date().toISOString()})); }}>
                {t.retestLater}
              </button>
            </div>
          </div>
        </div>
        );
      })()}

      {/* Stress SOS overlay removed — SOS is now instant from home button */}

      {showPaywall && <PaywallModal />}

      {/* Duration picker bottom sheet */}
      {durationPickerScenario && (() => {
        // Find primary technique for this scenario
        const scContent = getSessionContent(t, world)[durationPickerScenario.id];
        const firstDur = scContent ? Object.keys(scContent)[0] : null;
        const firstSegs = firstDur ? scContent[firstDur] : null;
        const firstBreath = firstSegs ? firstSegs.find(s => s.type === 'breathing') : null;
        const techId = firstBreath?.technique;
        const techInfo = techId ? TECHNIQUE_INFO[techId] : null;
        return (
        <div onClick={() => setDurationPickerScenario(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'flex-end',zIndex:50}}>
          <div onClick={e => e.stopPropagation()} style={{width:'100%',padding:'24px',paddingBottom:'calc(24px + env(safe-area-inset-bottom, 16px))',background:'rgba(12,19,34,0.98)',borderRadius:'20px 20px 0 0',borderTop:'1px solid rgba(255,255,255,0.06)'}}>
            <p style={{fontSize:'16px',fontWeight:400,color:'rgba(220,225,235,0.88)',marginBottom:4}}>{t[SCENARIO_LANG_KEY[durationPickerScenario.id]] || durationPickerScenario.id}</p>
            {techInfo && (
              <div style={{display:'flex',alignItems:'center',marginBottom:16}}>
                <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:'rgba(94,170,168,0.6)',letterSpacing:'0.03em'}}>{techInfo.name} · {techInfo.method}</span>
                <InfoButton techniqueId={techId} />
              </div>
            )}
            {!techInfo && <div style={{marginBottom:16}} />}
            <div style={{display:'flex',gap:'12px'}}>
              {(durationPickerScenario.durations || []).map(d => (
                <button key={d} onClick={() => { launchScenario(durationPickerScenario.id, d); setDurationPickerScenario(null); }} style={{flex:1,padding:'14px',borderRadius:'12px',background:'rgba(255,255,255,0.025)',border:'1px solid rgba(255,255,255,0.06)',fontSize:'17px',color:'rgba(220,225,235,0.88)',cursor:'pointer'}}>
                  {d} {t.min}
                </button>
              ))}
            </div>
          </div>
        </div>
        );
      })()}

      {/* Weekly summary overlay */}
      {showWeekly && (() => {
        const weekSessions = stats.history?.filter(h => {
          const d = new Date(h.date);
          return (Date.now() - d.getTime()) < 7 * 86400000;
        }) || [];
        const weekMinutes = weekSessions.reduce((s, h) => s + Math.round((h.duration || 0) / 60), 0);
        const weekDepthRaw = weekSessions.reduce((s, h) => s + (h.depth || 0), 0);
        const weekDepth = formatDepth(weekDepthRaw);
        // Most used technique from recent history
        const techCounts = {};
        (stats.history || []).slice(-20).forEach(h => {
          if (h.scenario) {
            const sc = SCENARIOS[h.scenario];
            if (sc) {
              const content = getSessionContent(t, world)[h.scenario];
              if (content) {
                const firstDur = Object.keys(content)[0];
                const segs = content[firstDur] || [];
                segs.filter(s => s.type === 'breathing').forEach(s => {
                  techCounts[s.technique] = (techCounts[s.technique] || 0) + 1;
                });
              }
            }
          }
        });
        const topTech = Object.entries(techCounts).sort((a,b) => b[1] - a[1])[0];
        const topTechLabel = topTech ? (t[TECHNIQUE_LANG_KEY[topTech[0]]] || topTech[0]) : '-';
        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center" style={{background:'rgba(0,0,0,0.8)', backdropFilter:'blur(16px)'}}>
            <div className="screen-transition text-center z-10 px-8">
              <div className="font-body mb-8" style={{fontSize:16, fontWeight:500, color:palette.accent, letterSpacing:'0.15em'}}>{t.thisWeek}</div>
              {/* Hero depth number */}
              <div className="text-center mb-6">
                <div className="font-mono" style={{fontSize:48, fontWeight:300, color:palette.accent}}>{weekDepth}</div>
                <div className="font-body" style={{fontSize:12, fontWeight:400, color:'var(--text-3)', marginTop:4}}>{t.weeklyDepth}</div>
              </div>
              <div className="flex gap-6 justify-center mb-8">
                {[[weekSessions.length, t.weeklyDives],[weekMinutes, t.weeklyMinutes],[stats.streak, t.dayStreak]].map(([val,label],i) => (
                  <div key={i} className="text-center">
                    <div className="font-mono" style={{fontSize:28, fontWeight:300, color:palette.accent}}>{val}</div>
                    <div className="font-body" style={{fontSize:13, fontWeight:400, color:'var(--text-3)', marginTop:4}}>{label}</div>
                  </div>
                ))}
              </div>
              <div className="glass p-4 mx-auto mb-8" style={{maxWidth:200}}>
                <div className="font-body" style={{fontSize:13, fontWeight:500, color:'var(--text-3)', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:4}}>{t.mostUsed}</div>
                <div className="font-body" style={{fontSize:16, fontWeight:400, color:'rgba(220,225,235,0.9)'}}>{topTechLabel}</div>
              </div>
              <button className="px-10 py-3 rounded-full font-body"
                style={{fontWeight:500, background:`rgba(${accentRgb},0.12)`, border:`1px solid rgba(${accentRgb},0.25)`, color:palette.accent}}
                onClick={() => { setShowWeekly(false); setStats(s => ({...s, lastWeeklySummary: new Date().toISOString()})); }}>
                {t.continueText}
              </button>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(
    React.createElement(ErrorBoundary, null, React.createElement(App))
  );
} catch(e) {
  document.getElementById('root').innerHTML = '<pre style="color:red;padding:20px">'+e.message+'\n'+e.stack+'</pre>';
}
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
// PWA install prompt capture
window._diveInstallPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  window._diveInstallPrompt = e;
});
</script>
</body>
</html>
